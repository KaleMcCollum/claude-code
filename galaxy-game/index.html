function worldSummary(w){ return { name:w.name, biome:w.biome, biomeName:w.biomeName, tier:w.tier,
  tech:w.tech, wealth:w.wealth, danger:w.danger, pop:w.pop, popName:w.popName, settle:w.settle, occupied:w.occupied }; }

/* ---- travel to a world in your system; generate it on arrival; maybe meet someone ---- */
let arriving=null;
const OUTPOSTS=["a dusty trading post","a crowded ship dock","a frontier landing pad","a market caravanserai",
  "a refueling depot","a quiet spaceport","a mining camp gate","a pilgrim's waystation"];
/* build a fresh (all-uncharted) planet list for a system of the given size */
function buildSystemPlanets(size){
  const planets=[];
  for(let i=0;i<size;i++) planets.push({ index:i, discovered:false, isHome:false, occupied:false, world:null });
  return planets;
}
/* Scatter neighbouring systems around a home position (galactic coordinates, ly). Count and
   size scale with how central the home position is. The first few sit within a starter
   interstellar ship's reach so there's always somewhere to jump. ids start at startId. */
/* ===================== GOVERNMENTS, FACTIONS & TERRITORY =====================
   The galaxy is carved into regional powers (governments), each holding a patch of space, leaning
   Light or Dark. Smaller factions nest under or across them — and can feud even when they share an
   alignment. You start Independent & Neutral and earn your place through play. */
const GOV_TITLES={
  dark:["Imperium","Dominion","Hegemony","Ascendancy","Tyranny","Eclipse"],
  light:["Republic","Federation","Coalition","Concord","Commonwealth","Alliance"],
  neutral:["Confederacy","League","Union","Compact","Directorate","Assembly"],
};
const GOV_COLORS=["#d6455a","#3a8dff","#39c07a","#c9963f","#9a6cff","#e0823a"];
const FAC_ADJ=["Crimson","Iron","Free","Shadow","Silver","Ashen","Radiant","Obsidian","Golden","Storm","Hollow","Burning","Pale","Verdant"];
const FAC_NOUN=["Vanguard","Rebellion","Syndicate","Covenant","Legion","Hand","Circle","Front","Order","Brotherhood","Talons","Accord","Banner"];
const FAC_KINDS_INDIE=["rebel cell","syndicate","free clan","hidden order"];
const FAC_KINDS_GOV=["loyalist order","military clan","trade syndicate","inner circle"];
function genGovernments(){
  const n=rnd(4,6), govs=[];
  for(let i=0;i<n;i++){
    const alignment = i===0?"dark" : i===1?"light" : pick(["dark","light","neutral"]);
    const name = (chance(0.55)?nameWord(2,3)+" ":"The ")+pick(GOV_TITLES[alignment]);
    // seats of power cluster near the core (sqrt bias pulls them inward), out to ~a third of the disc
    const ang=(i/n)*Math.PI*2 + rndF(-0.5,0.5), dist=GALAXY.radius*0.36*Math.sqrt(Math.random());
    const center={ x:+(Math.cos(ang)*dist).toFixed(1), y:+(Math.sin(ang)*dist).toFixed(1) };
    const strength=+rndF(0.65,1.4).toFixed(2);
    const radius=clamp(Math.round((70+rnd(0,70))*strength), 55, 170), wealth=rnd(2,9);
    govs.push({ id:"gov"+i, name, alignment, center, radius, strength, wealth,
      power:Math.round(radius*strength*4 + wealth*30), color:GOV_COLORS[i%GOV_COLORS.length],
      capitalName:genName("system"), rivals:[] });
  }
  // opposite alignments are sworn rivals
  govs.forEach(a=>govs.forEach(b=>{ if(a!==b &&
    ((a.alignment==="dark"&&b.alignment==="light")||(a.alignment==="light"&&b.alignment==="dark"))) a.rivals.push(b.id); }));
  govs.sort((x,y)=>y.power-x.power).forEach((g,i)=>g.rank=i+1);
  return govs;
}
function mkFaction(i, parent){
  return { id:"fac"+i, name:pick(FAC_ADJ)+" "+pick(FAC_NOUN), alignment:parent?parent.alignment:pick(["light","dark","neutral"]),
    govId:parent?parent.id:null, kind:parent?pick(FAC_KINDS_GOV):pick(FAC_KINDS_INDIE), rivals:[] };
}
function genFactions(govs){
  const facs=[]; let i=0;
  // give the larger powers a couple of internal factions, so same-banner rivals can feud
  govs.slice(0, Math.min(govs.length,3)).forEach(g=>{ const k=rnd(1,2); for(let j=0;j<k;j++) facs.push(mkFaction(i++, g)); });
  // plus a handful of independents — rebels, syndicates, free clans
  const extra=rnd(3,5); for(let j=0;j<extra;j++) facs.push(mkFaction(i++, null));
  facs.forEach((a,ai)=>facs.slice(ai+1).forEach(b=>{
    if(a.govId && a.govId===b.govId){ a.rivals.push(b.id); b.rivals.push(a.id); }   // an internal power struggle
    else if((!a.govId||!b.govId) && a.alignment!=="neutral" && b.alignment!=="neutral" && a.alignment!==b.alignment && chance(0.4)){ a.rivals.push(b.id); b.rivals.push(a.id); }
  }));
  return facs;
}
/* which government holds a point in space (null = independent / contested rim) */
function govAt(x,y,govs){
  let best=null, bestScore=2;
  for(const g of (govs||[])){ const d=Math.hypot(x-g.center.x,y-g.center.y);
    if(d<=g.radius){ const score=d/g.radius; if(score<bestScore){ bestScore=score; best=g; } } }
  return best?best.id:null;
}
function seedPolitics(galaxy){
  if(!galaxy || galaxy.governments) return;
  const govs=genGovernments();
  galaxy.governments=govs; galaxy.factions=genFactions(govs);
  (galaxy.systems||[]).forEach(s=>{ s.govId=govAt(s.x,s.y,govs); });
  assignCapitals(galaxy);
}
/* plant each government's capital on the real system nearest its seat of power (these sit core-ward,
   since government centres are seeded within the inner half of the disc). Idempotent. */
function assignCapitals(galaxy){
  const govs=galaxy.governments||[], sys=galaxy.systems||[]; if(!govs.length||!sys.length) return;
  const used=new Set();
  govs.forEach(g=>{ if(g.capitalSys!=null && sys[g.capitalSys]){ used.add(g.capitalSys); return; } });
  govs.forEach(g=>{ if(g.capitalSys!=null && sys[g.capitalSys]) return;
    let best=null, bd=Infinity;
    sys.forEach(s=>{ if(used.has(s.id)) return; const d=Math.hypot(s.x-g.center.x, s.y-g.center.y); if(d<bd){ bd=d; best=s; } });
    if(best){ g.capitalSys=best.id; g.capitalName=best.name; best.capital=g.id; best.capitalSlot=0; best.govId=g.id; used.add(best.id); } });
}
const govById=id=>((state.galaxy&&state.galaxy.governments)||[]).find(g=>g.id===id)||null;
const factionById=id=>((state.galaxy&&state.galaxy.factions)||[]).find(f=>f.id===id)||null;
function systemGov(sys){ if(!sys) return null;
  if(sys.govId===undefined) sys.govId=govAt(sys.x,sys.y,(state.galaxy&&state.galaxy.governments)||[]);
  return sys.govId?govById(sys.govId):null; }
/* your earned Light<->Dark standing (a -100..100 meter) as a label & a coarse side */
function alignLabel(v){ v=v||0; return v<=-60?"Dark":v<=-20?"Shadowed":v<20?"Neutral":v<60?"Tempered":"Light"; }
function alignSide(v){ v=v||0; return v<=-20?"dark":v>=20?"light":"neutral"; }
/* nudge your alignment by a deed; logs when it tips you toward the Light or the Dark */
function shiftAlign(d, reason){
  if(!state.allegiance) state.allegiance={govId:null,factionIds:[],align:0};
  const before=alignLabel(state.allegiance.align);
  state.allegiance.align=clamp((state.allegiance.align||0)+d, -100, 100);
  if(reason && alignLabel(state.allegiance.align)!==before)
    Game.logMsg(`Your path turns ${d>0?"toward the Light":"toward the Dark"} — you are now ${alignLabel(state.allegiance.align)}. (${reason})`, d>0?"good":"bad");
}
/* how a government currently regards you, from your allegiance, the factions you serve & your alignment */
function govStance(g){
  const al=state.allegiance||{}; if(!g) return "neutral";
  if(al.govId===g.id) return "friendly";
  if((al.factionIds||[]).some(fid=>{ const f=factionById(fid); return f && f.govId===g.id; })) return "friendly";
  if(al.govId && g.rivals.includes(al.govId)) return "hostile";
  const side=alignSide(al.align);
  if(side!=="neutral" && g.alignment!=="neutral" && side!==g.alignment) return "wary";
  return "neutral";
}
/* ---- declaring allegiance: earned by being present in a power's space, in their good graces,
   and walking a compatible path. Factions ask only that your creed and their patrons allow it. ---- */
function pledgeCheck(g){
  const al=state.allegiance||{}; if(!g||al.govId===g.id) return {ok:false, why:"already"};
  const here=systemGov(curSys());
  if(!here || here.id!==g.id) return {ok:false, why:`You must be within ${g.name} space to pledge.`};
  if(govStance(g)==="hostile") return {ok:false, why:`${g.name} counts you an enemy — they'd never take your oath.`};
  const side=alignSide(al.align);
  if(g.alignment!=="neutral" && side!=="neutral" && side!==g.alignment) return {ok:false, why:`Your ${alignLabel(al.align)} path clashes with their ${g.alignment} cause.`};
  return {ok:true};
}
function pledgeGov(id){ const g=govById(id), chk=pledgeCheck(g); if(!chk.ok){ if(chk.why&&chk.why!=="already") toast(chk.why); return; }
  state.allegiance.govId=id; state.allegiance.factionIds=state.allegiance.factionIds||[];
  if(g.alignment==="dark") shiftAlign(-8,""); else if(g.alignment==="light") shiftAlign(8,"");
  Game.logMsg(`You pledge yourself to ${g.name}. Their banner is now yours, and their space your home.`,"good");
  toast("Allegiance pledged"); Game.save(); UI.render("gov"); }
function renounceGov(){ const al=state.allegiance; if(!al||!al.govId) return; const g=govById(al.govId);
  al.govId=null; al.factionIds=(al.factionIds||[]).filter(fid=>{ const f=factionById(fid); return !(f&&g&&f.govId===g.id); });
  Game.logMsg(`You renounce ${g?g.name:"your government"} and walk independent once more.`,"sys");
  toast("Renounced"); Game.save(); UI.render("gov"); }
function joinFactionCheck(f){
  const al=state.allegiance||{}; if(!f||(al.factionIds||[]).includes(f.id)) return {ok:false, why:"already"};
  const side=alignSide(al.align);
  if(f.alignment!=="neutral" && side!=="neutral" && side!==f.alignment) return {ok:false, why:`Your path clashes with their ${f.alignment} creed.`};
  if(f.govId){ const g=govById(f.govId); if(g && govStance(g)==="hostile") return {ok:false, why:"Their patrons count you an enemy."}; }
  if((al.factionIds||[]).some(fid=>f.rivals.includes(fid))) return {ok:false, why:"You already serve their sworn enemy."};
  return {ok:true};
}
function joinFaction(id){ const f=factionById(id), chk=joinFactionCheck(f); if(!chk.ok){ if(chk.why&&chk.why!=="already") toast(chk.why); return; }
  state.allegiance.factionIds=(state.allegiance.factionIds||[]).concat(id);
  Game.logMsg(`You throw in with the ${f.name}.`,"good"); toast("Joined "+f.name); Game.save(); UI.render("gov"); }
function leaveFaction(id){ const f=factionById(id); if(!state.allegiance) return;
  state.allegiance.factionIds=(state.allegiance.factionIds||[]).filter(x=>x!==id);
  Game.logMsg(`You part ways with the ${f?f.name:"faction"}.`,"sys"); toast("Left"); Game.save(); UI.render("gov"); }
function makeNeighborSystems(hx, hy, startId){
  const cf=centralFactor(hx,hy);
  const n=clamp(Math.round((8 + 30*cf)*rndF(0.8,1.2)), 5, 44);  // dense core, sparse rim
  const out=[];
  for(let i=0;i<n;i++){
    const ang=Math.random()*Math.PI*2;
    const r = i<3 ? rndF(4.5,7.5) : rndF(4,55);  // ly from the home star (first few in clipper reach)
    const x=+(hx+Math.cos(ang)*r).toFixed(2), y=+(hy+Math.sin(ang)*r).toFixed(2);
    out.push({ id:startId+i, name:genName("system"), x, y,
      size:rollSystemSize(centralFactor(x,y)), discovered:false, planets:null });
  }
  return out;
}
/* Fill out the WHOLE galaxy disc with star systems — a rich local neighborhood around home, then a
   scatter across the entire disc whose density follows the core (packed) -> rim (sparse) gradient,
   so wherever you sail there are stars, thinning as you head for the rim. Idempotent (galaxy.full). */
function populateGalaxy(galaxy, spawn){
  if(!galaxy || galaxy.full) return;
  const sys=galaxy.systems||[]; let id=sys.reduce((m,s)=>Math.max(m,s.id),0)+1;
  const home=sys[0]||{x:(spawn&&spawn.x)||0, y:(spawn&&spawn.y)||0};
  const add=(x,y,cf)=>sys.push({ id:id++, name:genName("system"), x:+x.toFixed(1), y:+y.toFixed(1),
    size:rollSystemSize(cf), discovered:false, planets:null });
  // 1) a dense home neighborhood (so early exploration always has reachable stars), if not already there
  if(sys.filter(s=>s.id!==0 && Math.hypot(s.x-home.x,s.y-home.y)<=55).length < 6){
    const cf=centralFactor(home.x,home.y), n=clamp(Math.round((8+30*cf)*rndF(0.8,1.2)),6,44);
    for(let i=0;i<n;i++){ const ang=Math.random()*Math.PI*2, r=i<3?rndF(4.5,7.5):rndF(4,55);
      const x=home.x+Math.cos(ang)*r, y=home.y+Math.sin(ang)*r; add(x,y,centralFactor(x,y)); }
  }
  // 2) scatter the broad galaxy across the disc, accepting points far more readily toward the core
  // so the inner galaxy is densely packed and the outer rim thins to scattered lonely stars
  const target=Math.max(sys.length+550, 820); let tries=0;
  while(sys.length<target && tries<target*16){ tries++;
    const ang=Math.random()*Math.PI*2, r=GALAXY.radius*Math.sqrt(Math.random());
    const x=Math.cos(ang)*r, y=Math.sin(ang)*r, cf=centralFactor(x,y);
    if(Math.random() > Math.pow(cf, 0.85)) continue;     // steep falloff: thick core, sparse rim
    add(x,y,cf);
  }
  galaxy.systems=sys; galaxy.full=true;
  if(galaxy.governments) sys.forEach(s=>{ if(s.govId===undefined) s.govId=govAt(s.x,s.y,galaxy.governments); });
}
/* ===================== MOVEMENT =====================
   Ships move as a group. You ride along only if your active ship is in the group; a group
   you aren't aboard can only travel to worlds you've already charted (no remote exploring). */
function shipsByIds(ids){ const set=new Set(ids); return (state.vehicles||[]).filter(v=>set.has(v.id)); }
const RANGE_ORDER={ surface:0, system:1, interstellar:2 };
/* a group's capabilities: weakest range tier + weakest-link jump range (ly), and its system */
function groupCaps(ids){
  const ships=shipsByIds(ids); if(!ships.length) return { tier:"surface", jump:0, sysId:null };
  let tier="interstellar", jump=Infinity;
  ships.forEach(v=>{ if(RANGE_ORDER[v.range]<RANGE_ORDER[tier]) tier=v.range;
    if(v.range==="interstellar") jump=Math.min(jump, jumpRange(v)); });
  if(tier!=="interstellar") jump=0;
  return { tier, jump:jump===Infinity?0:jump, sysId:ships[0].sysId??0 };
}
/* ships in the group that lack the crew to fly — they block any move */
function groupBlockers(ids){ return shipsByIds(ids).filter(v=>!Game.operational(v)); }
/* drop a set of ships (and, if your ship is among them, you) onto a charted world */
function relocateGroup(ids, destSys, destSlot){
  const set=new Set(ids);
  // note where the moving carriers sit, so a launched fighter parked alongside one rides along too
  const carrierAt={}; (state.vehicles||[]).forEach(v=>{ if(set.has(v.id)) carrierAt[v.id]={s:v.sysId??0,p:v.slot}; });
  (state.vehicles||[]).forEach(v=>{
    if(set.has(v.id) || (v.carrier&&set.has(v.carrier))){ v.sysId=destSys; v.slot=destSlot; return; }   // moving ships + their stowed fighters
    const h=v.homeCarrier && carrierAt[v.homeCarrier];                                                   // launched-but-homed fighter
    if(!v.carrier && h && (v.sysId??0)===h.s && v.slot===h.p){ v.sysId=destSys; v.slot=destSlot; }       // ...sitting with its carrier
  });
  const sys=state.galaxy.systems[destSys]; sys.discovered=true;
  if(set.has(state.activeShip)){ state.sysId=destSys; state.atSlot=destSlot; state.system=sys;
    state.world=sys.planets[destSlot].world; state.voidPos=null; }   // arriving at a star ends the drift
}
/* move a group to (destSys,destSlot). Uncharted worlds need you aboard (you do the charting). */
function moveGroupTo(ids, destSys, destSlot, backTo){
  const caps=groupCaps(ids), origin=caps.sysId, crossSys=destSys!==origin;
  const sys=state.galaxy.systems[destSys];
  if(crossSys){
    if(caps.tier!=="interstellar"){ toast("Not every ship can jump between systems"); return; }
    const dist=pointDist(groupXY(ids), {x:sys.x, y:sys.y});   // measured from your system OR your drift point
    if(dist>caps.jump+1e-6){ toast(`Out of range — the fleet reaches ${caps.jump.toFixed(1)} ly`); return; }
  } else if(caps.tier==="surface"){ toast("These ships can't leave the ground"); return; }
  const blockers=groupBlockers(ids);
  if(blockers.length){ toast(`${blockers[0].name} needs more crew to fly`); return; }
  if(!sys.planets) sys.planets=buildSystemPlanets(sys.size);
  const p=sys.planets[destSlot], playerIn=ids.includes(state.activeShip);
  if(destSys===origin && destSlot===groupSlot(ids)){ toast("Already there"); return; }
  if(!p.discovered && !playerIn){ toast("You must be aboard to chart a new world"); return; }
  if(advanceTime()) return;                       // a move is one action
  if(p.discovered){
    relocateGroup(ids, destSys, destSlot);
    Game.logMsg(crossSys?`The fleet jumps to ${p.world.name}, in the ${sys.name} system.`
                        :`The fleet sets down on ${p.world.name}.`,"sys");
    Game.save(); UI.render(playerIn?"hub":(backTo||"crew")); UI.flashLog(); return;
  }
  // uncharted, and you're aboard -> chart it. Development tracks position; a government's seat world
  // is a guaranteed, fully-developed Capital City.
  const cf=centralFactor(sys.x, sys.y), isCap=sys.capital!=null && destSlot===(sys.capitalSlot||0);
  const world=Gen.world(isCap?1:cf);
  if(isCap){ world.tech=Math.max(world.tech,7); world.wealth=Math.max(world.wealth,7); }
  const occupied = isCap || chance(worldOccChance(sys, world));
  if(occupied) world.settle = isCap ? "capital" : pickSettlement(world, destSys);   // capital, trade hub, farmworld, ...
  const draw=occupied?drawRace():null;
  arriving={ sysId:destSys, slot:destSlot, world, occupied, draw, outpost:pick(OUTPOSTS),
    person:null, step:1, crossSys, shipIds:ids.slice() };
  UI.render("arrive");
}
/* a group's current planet slot (its lead ship's) */
function groupSlot(ids){ const s=shipsByIds(ids)[0]; return s?s.slot:state.atSlot; }
function finishArrival(){
  const a=arriving, slot=a.slot, sid=a.sysId;
  a.world.occupied=a.occupied;
  const sys=state.galaxy.systems[sid]; sys.discovered=true;
  if(!sys.planets) sys.planets=buildSystemPlanets(sys.size);
  sys.planets[slot]={ index:slot, discovered:true, isHome:false, world:a.world,
    occupied:a.occupied, raceId:a.draw?a.draw.id:null };
  const ws=worldSummary(a.world); ws.reported=false; ws.sysName=sys.name; state.codex.worlds.push(ws);
  if(a.draw && a.draw.isNew){ state.codex.races[a.draw.id]=a.draw.race; }
  relocateGroup(a.shipIds||[state.activeShip], sid, slot);   // you + your group arrive together
  if(a.occupied){
    recordMeeting(a.person, a.draw.race, a.world.name);   // the local who greets you
    if(settleHasShipyard(a.world)){ state.yarders=state.yarders||{}; state.yarders[sid+":"+slot]=state.codex.people.length-1; }
  }
  Game.logMsg(`You chart ${a.world.name}${a.crossSys?` in the ${sys.name} system`:""}${a.occupied?`, met at the dock by ${a.person.name}`:" — uninhabited"}.`,"sys");
  checkObjectives();
  arriving=null; Game.save(); UI.render("hub"); UI.flashLog();
}

/* ===================== DEEP SPACE (hyperdrive drift) =====================
   When no star is in jump range, you can hyperdrive in a straight line into open space —
   covering one jump's worth of distance toward a heading. Out in the void there's a chance of
   crossing paths with other ships, from a lone freighter to a whole armada (the seed for
   future ship-to-ship combat). */
const VOID_FLEETS=[
  // most traffic is peaceful: lone civilians & cargo dominate, armed groups are the exception,
  // and a true war-fleet/armada is a rare event you'll remember
  { id:"derelict",  name:"Derelict Hulk",    weight:6,    ships:[1,1],   threat:0, salvage:[40,320], blurb:"a dead, drifting wreck — long abandoned" },
  { id:"cargo",     name:"Cargo Freighter",  weight:26,   ships:[1,2],   threat:0, blurb:"a lone freighter hauling goods between the stars" },
  { id:"transport", name:"Transport Convoy", weight:16,   ships:[2,4],   threat:0, blurb:"a transport convoy ferrying colonists out to the rim" },
  { id:"trader",    name:"Free Trader",      weight:14,   ships:[1,2],   threat:0, blurb:"a free trader flashing a friendly beacon" },
  { id:"patrol",    name:"Patrol Squadron",  weight:6,    ships:[2,4],   threat:1, blurb:"a patrol squadron sweeping the lanes" },
  { id:"mercs",     name:"Mercenary Wing",   weight:4,    ships:[2,5],   threat:1, blurb:"a mercenary wing — for hire, or for hunting" },
  { id:"pirates",   name:"Pirate Raiders",   weight:3.5,  ships:[2,6],   threat:2, blurb:"pirate raiders sizing up your hull" },
  { id:"warfleet",  name:"War Fleet",        weight:1.2,  ships:[8,18],  threat:3, blurb:"a war fleet under banners you don't recognize" },
  { id:"armada",    name:"Grand Armada",     weight:0.25, ships:[30,90], threat:4, blurb:"a vast armada — an entire army adrift between worlds" },
];
/* Build an enemy fleet as REAL individual ships (each its own stat-block), drawn from hull classes
   that suit the threat level — a low-threat raid is fighters & gunships, a warlord brings frigates,
   destroyers and capitals. Per-mount firepower tracks the player's own weapon tiers. */
const ENEMY_POOLS={
  0:["shuttle","clipper","sysfreighter","starfighter"],
  1:["starfighter","interceptor","gunship","corvette"],
  2:["interceptor","heavyfighter","gunship","corvette","frigate"],
  3:["gunship","corvette","frigate","destroyer"],
  4:["frigate","destroyer","capital"],
};
const ENEMY_PERMOUNT=[150,420,950,2100,4200];   // firepower per gun, by threat (mirrors WEAPON tiers)
function genEnemyFleet(threat, n){
  const t=clamp(threat,0,4), pool=ENEMY_POOLS[t]||ENEMY_POOLS[1];
  const tierId=RARITY.tiers[clamp(Math.round(t*0.7),0,RARITY.tiers.length-1)].id;   // mostly common; tougher fleets a notch rarer
  const ships=[];
  for(let i=0;i<n;i++){
    const cls=shipClass(pick(pool)); if(!cls) continue;
    const cs=shipStatsFor(cls, tierId), maxHp=cs.maxHp;
    const guns=Math.max(1,(cls.pilotGuns||0)+(cls.gunnerGuns||0));
    const skillMult=1+clamp(t*1.6/10,0,1)*0.3;                 // tougher fleets crew their guns better
    const attack=Math.round(guns*ENEMY_PERMOUNT[t]*skillMult*rndF(0.85,1.15));
    const fighter=cls.cat==="fighter";
    const canSh=["gunship","warship"].includes(cls.cat);
    const shieldTier=canSh?clamp(Math.round(t/1.5),0,SHIELD_MAX_TIER):0;   // tougher fleets fit better shields
    const maxShield=Math.round(maxHp*SHIELD[shieldTier].mult);
    ships.push({ name:cls.name, cls:cls.id, cat:cls.cat, maxHp, hp:maxHp, shieldTier, maxShield, shield:maxShield,
      attack, evasion: fighter?clamp(0.1+t*0.06,0,0.5):0 });
  }
  return ships;
}
let voidMeet=null;   // transient deep-space ship encounter
let shipCombat=null; // transient ship-to-ship battle
/* drop your group out of a system (or further along) into open space at `np` */
function enterVoid(ids, np){
  const set=new Set(ids);
  (state.vehicles||[]).forEach(v=>{ if(set.has(v.id)){ v.sysId=-1; v.slot=0; } });
  if(set.has(state.activeShip)){ state.sysId=-1; state.atSlot=0; state.system=null; state.world=null; state.voidPos=np; }
}
/* hyperdrive one jump's distance in a cardinal direction (n/e/s/w). If a star is in range
   afterward, you can Jump in to it from the Deep Space view. */
const VOID_DIRS={ n:{d:[0,1], name:"north"}, e:{d:[1,0], name:"east"}, s:{d:[0,-1], name:"south"}, w:{d:[-1,0], name:"west"} };
function voidHop(dir){
  const ids=playerGroupIds(), caps=groupCaps(ids);
  if(caps.tier!=="interstellar"){ toast("You need an interstellar hyperdrive for that"); return; }
  if(groupBlockers(ids).length){ toast("Your ships need more crew to fly"); return; }
  const D=VOID_DIRS[dir]||VOID_DIRS.e, reach=caps.jump, cur=groupXY(ids);
  if(advanceTime()) return;                                 // a hop is one action
  enterVoid(ids, { x:+(cur.x+D.d[0]*reach).toFixed(2), y:+(cur.y+D.d[1]*reach).toFixed(2) });
  Game.logMsg(`Your hyperdrive carries you ${reach.toFixed(1)} ly ${D.name} into open space.`,"sys");
  if(voidEncounter()){ Game.save(); UI.flashLog(); return; }   // crossed paths with someone
  Game.save(); UI.render("hub"); UI.flashLog();
}
/* a rough compass bearing from a vector (which way a star lies) */
function compassBearing(dx,dy){ const dirs=["E","NE","N","NW","W","SW","S","SE"];
  let a=Math.atan2(dy,dx); if(a<0) a+=Math.PI*2; return dirs[Math.round(a/(Math.PI/4))%8]; }
/* a chance, on each deep-space hop, to run into other ships */
function voidEncounter(){
  if(!chance(0.4)) return false;
  const f=weightedPick(VOID_FLEETS), n=rnd(f.ships[0], f.ships[1]);
  const pos=playerXY()||{x:0,y:0};
  const gov=govById(govAt(pos.x,pos.y,(state.galaxy&&state.galaxy.governments)||[]));
  voidMeet={ id:f.id, name:f.name, ships:n, threat:f.threat, salvage:f.salvage,
    govId:gov?gov.id:null, faction:gov?gov.name:"unaligned spacers", factionColor:gov?gov.color:"#9aa3b2",
    dispo:encounterDispo(f, gov), blurb:f.blurb, resolved:false, msg:"" };
  UI.render("voidmeet"); return true;
}
/* how a deep-space encounter regards you — set from the LOCAL controlling power's stance plus the
   kind of ship: civilians never open fire, pirates prey regardless of politics, and government
   forces in space hostile to you will move to engage. */
function encounterDispo(f, gov){
  if(f.id==="derelict") return "none";
  const stance = gov ? govStance(gov) : "neutral";
  if(f.id==="pirates") return chance(0.8)?"hostile":"wary";              // raiders are raiders
  if(f.threat===0) return stance==="hostile"?"wary": stance==="friendly"?"friendly":"neutral";  // civilians won't fight
  if(f.id==="mercs") return stance==="hostile"&&chance(0.5)?"hostile":"neutral";
  // patrols, war-fleets & armadas are the local power's muscle — they mirror its stance toward you
  if(stance==="hostile") return "hostile";
  if(stance==="friendly") return "friendly";
  if(stance==="wary") return chance(0.4)?"hostile":"wary";
  return "neutral";
}
function voidSalvage(){
  const m=voidMeet; if(!m||m.resolved) return;
  const [lo,hi]=m.salvage||[20,120], cr=rnd(lo,hi); state.credits+=cr;
  m.resolved=true; m.msg=`You strip the hulk for ${commas(cr)}c in salvage.`;
  // a derelict can hide a forgotten cache — scavenged gear you'd never find in a shop
  if(chance(0.22)){ state.gear=state.gear||[]; const g=genGear(rollDropRarity(1));
    state.gear.push(g); m.msg+=` Buried in the hulk you find <b style="color:${rarityColor(g.rarity)}">${g.name}</b>!`; }
  Game.gainXp(8); Game.save(); UI.render("voidmeet");
}
/* which career commands each kind of void fleet */
const VOID_CAREER={ cargo:"merchant", transport:"merchant", trader:"merchant", patrol:"mercenary",
  mercs:"mercenary", pirates:"pirate", warfleet:"warlord", armada:"warlord" };
/* a plain-words read on how dangerous a fleet is to take on, by threat level */
const FLEET_ASSESS={
  0:"Lightly crewed and barely armed — you'd cut through them, if you've the stomach for it.",
  1:"Armed and able to defend themselves — expect a real fight.",
  2:"A dangerous, battle-ready force — don't pick this fight lightly.",
  3:"A war-fleet that could overwhelm a lone ship — bring a fleet of your own.",
  4:"A full armada — suicide for anything less than an army.",
};
/* break off the conversation and open fire on the fleet you were just talking to */
function attackFromContact(){
  const m=meeting; if(!m||!m.fleet) return;
  voidMeet=m.fleet; startShipBattle();
  if(shipCombat) meeting=null; else voidMeet=null;   // battle started, or it couldn't (toast said why) — don't dangle
}
/* Contact: open a channel and meet whoever commands the ship/fleet — name them, learn their
   race (like meeting a stranger), and see the force they command. */
function voidContact(){
  const m=voidMeet; if(!m) return;
  const draw=drawRace(), person=Gen.person(draw.race);
  const career=VOID_CAREER[m.id]||"merchant", cc=careerById(career);
  person.career=career;
  if(!person.name) person.name=genName("person");   // Gen.person leaves name null — name them, or the meet screen crashes
  // their command becomes their "force"; bigger fleets, deeper pockets
  person.force={ ships:m.ships, shipName:"ship", crew:rnd(m.ships*3, Math.max(m.ships*12,6)),
    fleet:m.ships>=4, controls:false };
  person.credits=Math.round(rollWealth(cc)*(1+m.ships*0.15));
  delete person.bounty; delete person.hostile;
  if(cc.hostile){ person.hostile=cc.hostile; person.bounty=rollBounty(cc, draw.race.tier); }
  meeting={ draw, person, intro:`You open a channel to the ${m.name}, flying ${m.faction} colors.`,
    back:"hub", step:1, where:"deep space", fleet:m };
  UI.render("meet"); voidMeet=null;   // clear the encounter only AFTER the meet screen renders, so a glitch can't strand it
}
function voidEvade(){
  const m=voidMeet; if(!m) return;
  let p=clamp(0.55+Game.effStat("agility")*0.01+Game.gearMod("flee")-m.threat*0.08, 0.1, 0.95);
  if(m.dispo==="hostile") p=clamp(p-0.25, 0.05, 0.85);   // a hostile force is hard to shake
  if(chance(p)){ m.resolved=true; m.msg=`You slip back into hyperspace before they can close.`; }
  else if(m.dispo==="hostile"){ Game.logMsg(`The ${m.name} run you down — there's no shaking them.`,"bad"); return startShipBattle(); }
  else if(m.threat>=2){ const lost=Math.round(state.credits*0.15); state.credits-=lost;
    state.hp=Math.max(1,state.hp-Math.round(Game.effMaxHp()*0.15));
    m.resolved=true; m.msg=`They rake your hull as you run — ${commas(lost)}c and some blood lost, but you escape.`; }
  else { m.resolved=true; m.msg=`They shadow you a while, then lose interest. You drift on.`; }
  Game.save(); UI.render("voidmeet");
}
function voidLeave(){ voidMeet=null; UI.render("hub"); UI.flashLog(); }

/* ---- SHIP-TO-SHIP COMBAT ----
   Your fleet's guns vs theirs. Each round both sides fire: you deal your fleet's total attack
   to the enemy pool; they focus-fire your ships one at a time. Repair disabled hulls later. */
function myBattleShips(){ return shipsByIds(playerGroupIds()).filter(v=>Game.operational(v)); }
/* crewed fighters waiting in the bays of carriers that are in this battle group */
function carrierWing(carrierIds){ const set=new Set(carrierIds);
  return (state.vehicles||[]).filter(v=>v.carrier && set.has(v.carrier) && (v.hp>0) && Game.operational(v)); }
function fleetAttack(ids){ return ids.map(id=>(state.vehicles||[]).find(v=>v.id===id)).filter(v=>v&&v.hp>0).reduce((s,v)=>s+shipAttack(v),0); }
/* the ships currently in the fight: your main line, plus the fighter wing if it's launched */
function battleLine(){ const c=shipCombat; if(!c) return []; return c.main.concat(c.wingOut?c.wing:[]); }
/* one tap to commit the whole wing — or pull it back into the bays where it's safe (but idle) */
function toggleWing(){ const c=shipCombat; if(!c||c.over||!c.wing.length) return;
  c.wingOut=!c.wingOut; c.my=battleLine();
  c.log=[c.wingOut?"Your fighter wing screams out of the launch bays!":"Your fighters break off and dock back in the bays."];
  Game.save(); UI.render("shipbattle"); }
/* land one salvo on a combatant (a vehicle OR an enemy ship object with hp/shield). Evasion can
   make a nimble fighter dodge the whole shot; otherwise it bleeds the shield, then the hull. */
function applyHit(obj, dmg, evasion){
  if(evasion>0 && chance(evasion)) return -1;            // dodged
  let d=dmg;
  if(obj.shield>0){ const s=Math.min(obj.shield, d); obj.shield-=s; d-=s; }
  obj.hp-=d; return dmg;
}
/* pick which of your ships an enemy gun fires at — weighted toward those that can't dodge, so
   your fighters draw less fire (and dodge what does come) instead of evaporating turn one */
function pickPlayerTarget(live){
  const w=live.map(v=>({v, w:Math.max(0.12, 1-shipEvasion(v))}));
  const tot=w.reduce((s,x)=>s+x.w,0); let r=Math.random()*tot;
  for(const x of w){ if((r-=x.w)<0) return x.v; } return live[0];
}
/* one enemy volley: each ship in `shooters` fires at one of yours (mult<1 for a glancing shot) */
function enemyVolley(c, shooters, mult){
  const live=()=>c.my.map(id=>(state.vehicles||[]).find(v=>v.id===id)).filter(v=>v&&v.hp>0);
  let total=0; const downed=[];
  for(const e of shooters){            // caller decides who fires (the start-of-round roster)
    const L=live(); if(!L.length) break;
    const tgt=pickPlayerTarget(L), dealt=applyHit(tgt, Math.round(e.attack*(mult||1)), shipEvasion(tgt));
    if(dealt>0) total+=dealt;
    if(tgt.hp<=0 && !downed.includes(tgt)) downed.push(tgt);
  }
  c.log.push(`Enemy guns answer for ${commas(total)}.`);
  downed.forEach(v=>c.log.push(`Your ${v.name} is crippled!`));
}
function startShipBattle(){
  const m=voidMeet; if(!m) return;
  const mine=myBattleShips();
  if(!mine.length){ toast("No crewed ship to fight with"); return; }
  const wing=carrierWing(mine.map(v=>v.id));
  const all=mine.concat(wing);
  if(all.reduce((s,v)=>s+shipPower(v),0)<=0){ toast("Your ships have no working guns — mount weapons at a shipyard"); return; }
  const enemy=genEnemyFleet(m.threat, m.ships);
  all.forEach(v=>{ v.shield=shipMaxShield(v); });                 // raise your shields for the fight
  const loot=Math.round(enemy.reduce((s,e)=>s+e.maxHp,0)*0.10*(1+m.threat*0.4)) + m.ships*180;
  shipCombat={ name:m.name, faction:m.faction, threat:m.threat, enemy,
    foeKind:m.id, foeDispo:m.dispo, foeThreat:m.threat, foeGovId:m.govId,   // for the alignment reckoning on victory
    main:mine.map(v=>v.id), wing:wing.map(v=>v.id), wingOut:true, my:all.map(v=>v.id),
    target:null, loot, over:false, win:false, lost:false, fled:false, round:0,
    log: wing.length?[`Your carrier${mine.filter(v=>v.bays>0).length>1?"s":""} launch ${wing.length} fighter${wing.length>1?"s":""} to join the line.`]:[] };
  Game.logMsg(`You bring your guns to bear on the ${m.name}.`,"hit"); UI.render("shipbattle"); voidMeet=null;
}
function shipFire(){
  const c=shipCombat; if(!c||c.over) return;
  c.round++; c.log=[];
  // both sides fire SIMULTANEOUSLY — snapshot who's alive at the top of the round so a ship downed
  // by your salvo still gets its shot off this turn (and vice-versa)
  const shooters=c.my.map(id=>(state.vehicles||[]).find(v=>v.id===id)).filter(v=>v&&v.hp>0);
  const enemyShooters=c.enemy.filter(e=>e.hp>0).slice();
  // ---- your salvo: concentrate on the focus target (or finish the weakest), overflowing as ships die
  const pickEnemy=()=>{ if(c.target!=null && c.enemy[c.target] && c.enemy[c.target].hp>0) return c.enemy[c.target];
    const L=c.enemy.filter(e=>e.hp>0); return L.length?L.reduce((a,b)=>a.hp<=b.hp?a:b):null; };
  let total=0, dodged=0; const kills=[];
  for(const v of shooters){ const tgt=pickEnemy(); if(!tgt) break;
    const dealt=applyHit(tgt, shipPower(v), tgt.evasion);
    if(dealt<0) dodged++; else { total+=dealt; if(tgt.hp<=0) kills.push(tgt.name); } }
  c.log.push(`Your salvo deals ${commas(total)}${dodged?` (${dodged} shot${dodged>1?"s":""} evaded)`:""}.`);
  kills.forEach(nm=>c.log.push(`Enemy ${nm} destroyed!`));
  // ---- enemy's return fire (from the start-of-round roster), then both sides regen shields
  enemyVolley(c, enemyShooters, 1);
  c.enemy.forEach(e=>{ if(e.hp>0 && e.maxShield) e.shield=Math.min(e.maxShield, e.shield+Math.round(e.maxShield*0.15)); });
  shooters.forEach(v=>{ const ms=shipMaxShield(v); if(v.hp>0 && ms) v.shield=Math.min(ms,(v.shield||0)+Math.round(ms*0.15)); });
  // resolve — if you're wiped you lose even in a mutual kill; otherwise a cleared enemy is a win
  if(!c.my.some(id=>{ const v=(state.vehicles||[]).find(x=>x.id===id); return v&&v.hp>0; })) return loseShipBattle();
  if(c.enemy.every(e=>e.hp<=0)) return winShipBattle();
  // the enemy may break and run once they're badly beaten — half their ships gone, or hull integrity low
  const liveE=c.enemy.filter(e=>e.hp>0);
  const eFrac=liveE.reduce((s,e)=>s+e.hp,0)/Math.max(1,c.enemy.reduce((s,e)=>s+e.maxHp,0));
  const halfGone=liveE.length<=Math.floor(c.enemy.length/2);
  if(c.round>=2 && (eFrac<0.28 || (halfGone && c.enemy.length>=3)) && chance(0.3)) return enemyFlee();
  Game.save(); UI.render("shipbattle");
}
/* the enemy routs: they bolt for hyperspace and you get one parting volley as they run */
function enemyFlee(){
  const c=shipCombat; c.log=c.log||[];
  c.log.push(`The ${c.name} breaks and runs for hyperspace!`);
  const shooters=c.my.map(id=>(state.vehicles||[]).find(v=>v.id===id)).filter(v=>v&&v.hp>0);
  const weakest=()=>{ const L=c.enemy.filter(e=>e.hp>0); return L.length?L.reduce((a,b)=>a.hp<=b.hp?a:b):null; };
  let total=0; const kills=[];
  for(const v of shooters){ const tgt=weakest(); if(!tgt) break; const dealt=applyHit(tgt, shipPower(v), tgt.evasion);
    if(dealt>0){ total+=dealt; if(tgt.hp<=0) kills.push(tgt.name); } }
  c.log.push(`You rake them as they flee for ${commas(total)}${kills.length?`, downing ${kills.length} more`:""}.`);
  c.routed=true; return winShipBattle();
}
/* retreat: the enemy gets exactly one parting volley, then you jump clear */
function shipRetreat(){
  const c=shipCombat; if(!c||c.over) return;
  c.log=["You break off — the enemy looses one parting volley as you run."];
  enemyVolley(c, c.enemy.filter(e=>e.hp>0), 1);
  if(!c.my.some(id=>{ const v=(state.vehicles||[]).find(x=>x.id===id); return v&&v.hp>0; })) return loseShipBattle();
  c.over=true; c.win=false; c.fled=true; c.msg=`You disengage and jump clear of the ${c.name}.`;
  Game.save(); UI.render("shipbattle");
}
function winShipBattle(){
  const c=shipCombat; c.over=true; c.win=true;
  const escaped=c.enemy.filter(e=>e.hp>0).length;
  const loot=Math.round(c.loot*(c.routed?0.5:1));
  state.credits+=loot; Game.gainXp(Math.round(loot*0.02));
  c.msg = (c.routed && escaped>0)
    ? `You rout the ${c.name} — ${escaped} ship${escaped!==1?"s":""} scatter into hyperspace. You strip the wrecks for ${commas(loot)}c.`
    : `You shatter the ${c.name}! You strip the wrecks for ${commas(loot)}c.`;
  // your deeds tilt your alignment: crushing raiders & the hostile is the Light's work; preying on
  // the defenseless or turning on friends is the Dark's
  if(c.foeKind==="pirates" || c.foeDispo==="hostile") shiftAlign(+4, "you destroyed a hostile force");
  else if(c.foeDispo==="friendly") shiftAlign(-12, "you turned your guns on friends");
  else if(c.foeThreat===0) shiftAlign(-8, "you preyed on the defenseless");
  // pick over the wrecks: supplies, scrap and — rarely — real gear you can't buy anywhere
  const downed=c.enemy.filter(e=>e.hp<=0);
  const finds=rollWreckLoot(downed, c.foeThreat||c.threat||0);
  if(finds) c.msg+=` Picking over the wrecks turns up ${finds}.`;
  // RARE: one of the hulls you downed is still flyable — its survivors throw in with you and it
  // limps into your fleet at almost no hull, running alongside until you can repair it
  if(!c.tradeRaid && downed.length && chance(0.10)){
    const name=salvageShip(pick(downed));
    if(name) c.msg+=` Against the odds, a ${name} is still flyable — its crew throw in with you and it limps into your fleet, barely holding together.`;
  }
  if(c.tradeRaid){ const f=fleetById(c.tradeRaid); if(f&&f.trade) f.trade.earned=(f.trade.earned||0)+loot; }
  Game.save(); UI.render("shipbattle");
}
/* loot the wrecks of destroyed enemy ships: scrap & supplies often, real gear rarely, and a tiny
   chance at an Epic/Legendary find (better odds from tougher foes). Returns a summary string. */
function rollWreckLoot(downed, threat){
  const got=[]; state.gear=state.gear||[];
  downed.forEach(()=>{
    if(chance(0.16 + threat*0.05)){ const g=genGear(rollDropRarity(threat)); state.gear.push(g);
      got.push(`<b style="color:${rarityColor(g.rarity)}">${g.name}</b>`); }
    else if(chance(0.45)){ const id=pick(["medpack","medpack","energy-cell","stim","circuit-scrap"]);
      Game.addItem(id,1); got.push(DATA.items[id].name); }
  });
  if(!got.length) return "";
  // collapse duplicates (e.g. "Medpack x2")
  const counts={}; got.forEach(g=>counts[g]=(counts[g]||0)+1);
  return Object.entries(counts).map(([n,c])=>c>1?`${n} x${c}`:n).join(", ");
}
/* a rare salvage: a downed enemy hull still flyable. It joins you, crewed by survivors, limping at
   almost no hull, and follows you in your fleet (form one if you have none). */
function salvageShip(e){
  const cd=shipClass(e.cls)||shipClass("corvette"); if(!cd) return null;
  const ship=vehicleFromOffer(shipOfferFrom(cd, "common", 1.0));
  ship.name=`Salvaged ${cd.name}`;
  ship.hp=Math.max(1, Math.round(ship.maxHp*rndF(0.05,0.13)));   // almost zero — barely holding together
  ship.range="interstellar";                                     // it was out in the deep, so it can follow you
  ship.sysId=state.sysId; ship.slot=state.atSlot; ship.voidCapture=true; ship.salvaged=true;
  state.vehicles.push(ship);
  // press the survivors into your service — just enough to fly it
  let seat=0; const raceName=genName("race"); state.crew=state.crew||[];
  const add=(career,n)=>{ for(let i=0;i<(n||0);i++) state.crew.push({ name:genName("person"), raceName, career, shipId:ship.id, seat:seat++, skills:rollCrewSkills(career,null), salvaged:true }); };
  add("pilot", ship.reqPilots||1); add("mechanic", ship.reqMech||0); add("laborer", ship.reqLabor||0);
  // join your group so it follows you — form a fleet around your active ship if you don't have one
  const active=Game.ship();
  if(active){
    let fleet=active.fleetId?fleetById(active.fleetId):null;
    if(!fleet){ fleet={ id:newVfid(), name:"Salvage Group", shipIds:[active.id] }; state.fleets=state.fleets||[]; state.fleets.push(fleet); active.fleetId=fleet.id; }
    fleet.shipIds.push(ship.id); ship.fleetId=fleet.id;
  }
  return cd.name;
}
function loseShipBattle(){
  const c=shipCombat; c.over=true; c.win=false; c.lost=true;
  c.msg = c.tradeRaid ? `Your trade fleet is overrun — escorts shot to pieces. It limps on, holds plundered.`
                      : `Your ships are shot to pieces. You limp away — hull integrity gone.`;
  Game.logMsg(c.tradeRaid?`Your trade fleet is crippled by the ${c.name}.`:`Your fleet is crippled by the ${c.name}.`,"bad");
  Game.save(); UI.render("shipbattle");
}
/* leave the battle screen — knocked out fleets limp home */
function shipBattleDone(){
  const c=shipCombat; const lost=c.lost; shipCombat=null;
  (state.vehicles||[]).forEach(v=>{ delete v.shield; });   // shields recharge out of combat
  if(c.tradeRaid){                       // a remote trade-fleet fight — the fleet limps on, never destroyed in absentia
    const f=fleetById(c.tradeRaid);
    if(f){ shipsByIds(f.shipIds).forEach(v=>{ if(v.hp<=0) v.hp=1; });   // crippled hulls survive, barely
      if(lost){ let plundered=0;                                       // overrun: raiders strip the holds as they peel off
        shipsByIds(f.shipIds).forEach(v=>{ for(const id in (v.cargo||{})){ const take=Math.round(v.cargo[id]*rndF(0.4,0.7)); if(take>0){ v.cargo[id]=Math.max(0,v.cargo[id]-take); if(v.cargo[id]<=0) delete v.cargo[id]; plundered+=take; } } });
        if(plundered) Game.logMsg(`${f.name} loses ${commas(plundered)} units of cargo to the raiders.`,"bad");
      }
    }
    Game.save(); UI.render(c.raidBack||"crew"); UI.flashLog(); return;
  }
  if(lost){ const stranded=Game.ship();
    // crippled ships (and you) limp home if you can; otherwise you wake on your homeworld
    if(state.galaxy){ playerGroupIds().forEach(id=>{ const v=(state.vehicles||[]).find(x=>x.id===id); if(v){ v.sysId=0; v.slot=0; } });
      state.voidPos=null; state.sysId=0; state.atSlot=0; state.system=state.galaxy.systems[0]; state.world=state.system.planets[0].world; }
    state.hp=Math.max(1,Math.round(Game.effMaxHp()*0.4));
    Game.logMsg(`You limp home to ${state.world?state.world.name:"port"}. Repair your hulls at the Shipyard.`,"bad");
  }
  Game.save(); UI.render("hub"); UI.flashLog();
}

/* ---- meet a person on the planet you're on (tavern patrons, strangers, ...) ---- */
let meeting=null;
const RUMORS=[

/* ask the bartender to point you to a tradesperson drinking here — a pilot, gunner or mechanic
   looking for a berth. Drops you into a normal meeting where you can size them up and hire them. */
function askBartenderCrew(career){
  const draw=drawRace(); if(!draw.race.name) draw.race.name=genName("race");
  const person=Gen.person(draw.race);
  person.career=career; if(!person.name) person.name=genName("person");
  delete person.bounty; delete person.hostile; delete person.force;   // a worker, not a mark
  const cc=careerById(career); if(cc) person.credits=rollWealth(cc);

  personExpand=false; shipDealMsg=null; UI.render("meet");
}
function startMeeting(intro, back){

/* offer the stranger a job on the spot: record them into your Codex, then hire them in */
function hireFromMeeting(){

/* The shipyard buys used hulls at a fair fraction of their worth — enough that a ship snapped up
   cheap off a private owner can be flipped here for a profit. */
function shipSell(v){ return Math.round((v.value||(spaceworthy(v)?3000:600))*0.6); }
/* transient note shown on the meet / person screen after a buy-ship offer */
let shipDealMsg=null;
/* offer to buy a person's ship for `amount`; they may refuse, accept, or (rarely) take a steal */
function buyPersonShip(person, amount, onDone){
  const o=person&&person.ship; if(!o) return;
  amount=Math.max(0, Math.round(amount||0));
  if(amount<=0){ toast("Name a price"); return; }
  if(state.credits<amount){ toast("You don't have "+commas(amount)+"c"); return; }
  if(chance(shipBuyChance(amount, o.price))){
    state.credits-=amount;
    const ship=vehicleFromOffer(o);
    state.vehicles.push(ship);
    if(spaceworthy(ship) && !Game.canLeave()) state.activeShip=ship.id;   // your first ride off-world
    person.ship=null;
    const steal=amount<o.price*0.85;
    Game.logMsg(`${person.name} sells you ${article(o.name)} ${o.name} (worth ~${commas(o.price)}c) for ${commas(amount)}c${steal?" — a steal":""}.`,"good");
    toast("Bought "+o.name+"!"); shipDealMsg=null;
  } else {
    shipDealMsg=`${person.name.split(" ")[0]} turns down your ${commas(amount)}c offer for the ${o.name}.`;
    Game.logMsg(shipDealMsg,"sys"); toast("They refused");
  }
  Game.save(); if(onDone) onDone();
}
function sellShip(id){
  if(state.vehicles.length<=1){ toast("That's your only craft"); return; }
  if(id===state.activeShip){ toast("Pilot another ship first"); return; }
  if(carriedShips(id).length){ toast("Launch its fighters from the hangar first"); return; }
  const i=state.vehicles.findIndex(v=>v.id===id); if(i<0) return;
  const v=state.vehicles[i], p=shipSell(v);
  if(v.fleetId){ const fl=fleetById(v.fleetId); if(fl){ fl.shipIds=fl.shipIds.filter(x=>x!==v.id);
    if(!fl.shipIds.length) state.fleets=(state.fleets||[]).filter(x=>x.id!==fl.id); } }   // don't orphan the fleet
  state.vehicles.splice(i,1); state.credits+=p;
  Game.logMsg(`You sell the ${v.name} for ${p}c.`,"sys"); Game.save(); UI.render("shipyard");
}

/* ---- Depot: buy/sell commodities across your active fleet docked here ---- */
function buyCommodity(id, all){
  const c=commodityById(id), w=state.world, ships=poolShips();
  if(!ships.length){ toast("No ship docked here"); return; }
  if(!canBuyHere(w,c)){ toast("Not sold here"); return; }
  const space=poolMax()-poolUsed();
  if(space<c.bulk){ toast("Not enough cargo space"); return; }
  const p=commodityBuy(w,c);
  if(state.credits<p){ toast("Not enough credits"); return; }
  let qty = all ? Math.min(Math.floor(space/c.bulk), Math.floor(state.credits/p)) : 1;
  if(qty<1){ toast("Not enough room or credits"); return; }
  state.credits-=qty*p; let rem=qty;
  for(const v of ships){ if(rem<=0) break; const free=Math.floor((v.hold-shipUsed(v))/c.bulk), add=Math.min(free, rem);
    if(add>0){ v.cargo[id]=(v.cargo[id]||0)+add; rem-=add; } }
  if(rem>0){ state.credits+=rem*p; qty-=rem; }    // couldn't pack the last few — refund them
  if(qty>0) Game.logMsg(`Bought ${qty} ${c.name} for ${commas(qty*p)}c (${qty*c.bulk} slot${qty*c.bulk>1?"s":""}).`,"sys");
  Game.save(); UI.render("depot");
}
function sellCommodity(id, all){
  const c=commodityById(id), w=state.world, ships=poolShips();
  const have=ships.reduce((s,v)=>s+(v.cargo[id]||0),0); if(!have) return;
  if(!canSellHere(w,c)){ toast("Not bought here"); return; }
  const p=commoditySell(w,c);
  let qty = all ? have : 1; state.credits+=qty*p; let rem=qty;
  for(const v of ships){ if(rem<=0) break; const take=Math.min(v.cargo[id]||0, rem);
    if(take>0){ v.cargo[id]-=take; if(v.cargo[id]<=0) delete v.cargo[id]; rem-=take; } }
  Game.logMsg(`Sold ${qty} ${c.name} for ${commas(qty*p)}c.`,"sys");
  Game.save(); UI.render("depot");
}
/* select which ship you're piloting — only if it's docked where you are */
function selectShip(id){
  const v=(state.vehicles||[]).find(x=>x.id===id); if(!v) return;
  if(shipBusy(v)){ toast("That ship is away on a trade run"); return; }
  if(!atHere(v)){ toast("That ship is docked elsewhere"); return; }

}
function renameShip(id){

/* ---- shipyard outfitting: repair, weapons, armor (only where there's a shipyard) ---- */
let outfitShip=null, mountPick=null;   // ship id being outfitted, hardpoint slot being filled
function repairShip(id){ const v=(state.vehicles||[]).find(x=>x.id===id); if(!v) return;
  const cost=repairCost(v); if(cost<=0){ toast("Hull is already whole"); return; }
  if(state.credits<cost){ toast(`Repairs cost ${commas(cost)}c`); return; }
  state.credits-=cost; v.hp=v.maxHp;
  Game.logMsg(`You repair the ${v.name}'s hull for ${commas(cost)}c.`,"sys"); Game.save(); UI.render("outfit"); }
/* every damaged ship docked at this yard (incl. fighters stowed in carriers here) */
function damagedShipsHere(){ return (state.vehicles||[]).filter(v=>{
    const carrierHere=v.carrier && (()=>{ const c=(state.vehicles||[]).find(x=>x.id===v.carrier); return c&&atHere(c); })();
    return (atHere(v)||carrierHere) && !shipBusy(v) && (v.hp||0)<(v.maxHp||0); }); }
function repairTotalHere(){ return damagedShipsHere().reduce((s,v)=>s+repairCost(v),0); }
/* repair every damaged hull docked here in one go, for the combined price */
function repairAll(){
  const dmg=damagedShipsHere(); if(!dmg.length){ toast("All hulls are whole"); return; }
  const total=dmg.reduce((s,v)=>s+repairCost(v),0);
  if(state.credits<total){ toast(`Repairing all costs ${commas(total)}c`); return; }
  state.credits-=total; dmg.forEach(v=>v.hp=v.maxHp);
  Game.logMsg(`You patch up ${dmg.length} ship${dmg.length>1?"s":""} for ${commas(total)}c.`,"sys");
  toast(`Repaired ${dmg.length} ship${dmg.length>1?"s":""}`); Game.save(); UI.render(UI.current==="depot"?"depot":"shipyard"); }
/* a trade fleet patches up at its docking depot — quietly, paid from your credits if you can afford it */
function tradeRepair(f){ const here=worldAt(f.trade.pos.sysId, f.trade.pos.slot);
  if(!here || !settleAmen(here).includes("depot")) return;           // only where there's a depot to do the work
  const dmg=shipsByIds(f.shipIds).filter(v=>(v.hp||0)<(v.maxHp||0)); if(!dmg.length) return;
  let total=dmg.reduce((s,v)=>s+repairCost(v),0); if(total<=0) return;
  if(state.credits<total){ // can't cover it all — patch what you can afford, cheapest first
    dmg.sort((a,b)=>repairCost(a)-repairCost(b)); let done=0;
    for(const v of dmg){ const c=repairCost(v); if(state.credits<c) break; state.credits-=c; v.hp=v.maxHp; done++; }
    if(done) Game.logMsg(`${f.name} repairs ${done} hull${done>1?"s":""} at the ${here.name} depot — couldn't cover the rest.`,"sys");
    return;
  }
  state.credits-=total; dmg.forEach(v=>v.hp=v.maxHp);
  Game.logMsg(`${f.name} patches up at the ${here.name} depot for ${commas(total)}c.`,"sys"); }
/* buy a weapon and mount it on a hardpoint (slot index) in one step */
function mountWeapon(id, slot, wid){ const v=(state.vehicles||[]).find(x=>x.id===id), w=weaponById(wid); if(!v||!w) return;
  if(state.world && w.minTech>state.world.tech){ toast("Not sold at this shipyard"); return; }
  if(state.credits<w.price){ toast(`That weapon costs ${commas(w.price)}c`); return; }
  if(slot>=v.guns.length){ toast("No such hardpoint"); return; }
  if((w.size||0) > (v.slotSizes?v.slotSizes[slot]:2)){ toast(`A ${w.name} is too big for a ${SLOT_SIZES[v.slotSizes[slot]].toLowerCase()} mount`); return; }
  state.credits-=w.price; v.guns[slot]=wid; v.value=(v.value||0)+Math.round(w.price*0.5);
  Game.logMsg(`You mount ${article(w.name)} ${w.name} on the ${v.name}.`,"good"); Game.save(); UI.render("outfit"); }
/* strip a weapon off a hardpoint (sell it back for half) */
function unmountWeapon(id, slot){ const v=(state.vehicles||[]).find(x=>x.id===id); if(!v) return;
  const wid=v.guns[slot]; if(!wid) return; const w=weaponById(wid);
  const refund=Math.round(w.price*0.5); state.credits+=refund; v.guns[slot]=null; v.value=Math.max(0,(v.value||0)-refund);
  Game.logMsg(`You strip the ${w.name} off the ${v.name} (+${commas(refund)}c).`,"sys"); Game.save(); UI.render("outfit"); }
/* upgrade hull plating one tier (boosts max HP) */
function upgradeArmor(id){ const v=(state.vehicles||[]).find(x=>x.id===id); if(!v) return;
  if((v.armor||0)>=ARMOR.length-1){ toast("Already the best plating"); return; }
  const next=(v.armor||0)+1, c=shipClass(v.cls);
  const cost=Math.round((c?c.baseHp:200)*ARMOR[next].mult*8*(1+(state.world?state.world.wealth:4)*0.04));
  if(state.credits<cost){ toast(`That plating costs ${commas(cost)}c`); return; }
  // re-scale max HP to the new plating (keep current damage ratio)
  const ratio=v.maxHp>0?v.hp/v.maxHp:1, baseNoArmor=v.maxHp/ARMOR[v.armor||0].mult;
  v.armor=next; v.maxHp=Math.round(baseNoArmor*ARMOR[next].mult); v.hp=Math.round(v.maxHp*ratio);
  v.value=(v.value||0)+Math.round(cost*0.5); state.credits-=cost;
  Game.logMsg(`You refit the ${v.name} with ${ARMOR[next].name}.`,"good"); Game.save(); UI.render("outfit"); }
/* upgrade hyperdrive one tier (extends jump range by a percentage) */
function upgradeHyper(id){ const v=(state.vehicles||[]).find(x=>x.id===id); if(!v) return;
  if(v.range!=="interstellar"){ toast("Only interstellar ships have a hyperdrive"); return; }
  if((v.hyper||0)>=HYPERDRIVE.length-1){ toast("Already the top hyperdrive"); return; }
  const next=(v.hyper||0)+1;

/* ---- automated trade runs: send a fleet (without you) to haul goods on a loop ---- */
function shipBusy(v){ const f=fleetOf(v); return !!(f&&f.trade); }   // away on a trade route
function fleetCargoCap(f){ return shipsByIds(f.shipIds).reduce((s,v)=>s+(v.hold||0),0); }
function fleetLoc(f){ const v=shipsByIds(f.shipIds)[0]; return v?{sysId:v.sysId??0, slot:v.slot||0}:{sysId:state.sysId,slot:state.atSlot}; }
function worldAt(sysId, slot){ const sys=state.galaxy&&state.galaxy.systems[sysId]; const p=sys&&sys.planets&&sys.planets[slot]; return p?p.world:null; }
function fleetAllCrewed(f){ const s=shipsByIds(f.shipIds); return s.length>0 && s.every(v=>Game.operational(v)); }
/* best single leg: buy a good at A, sell at B, filling `cap` cargo slots */
/* charted, inhabited planets in one system: [{slot, world}] */
/* forget/remember was replaced by a Favorites system — favourite a planet for quick travel */
function togglePlanetFav(ref){ const [si,pi]=ref.split(":").map(Number);
  const sys=state.galaxy&&state.galaxy.systems[si], p=sys&&sys.planets&&sys.planets[pi];
  if(!p||!p.world) return;

function toggleSystemFav(sysId){ const s=state.galaxy&&state.galaxy.systems[+sysId]; if(!s) return;
  s.fav=!s.fav; toast(s.fav?`&#9733; ${s.name} favourited`:`${s.name} unfavourited`); Game.save(); UI.render(UI.current);

function inhabPlanets(sysId){ const sys=state.galaxy&&state.galaxy.systems[sysId]; if(!sys||!sys.planets) return [];
  return sys.planets.map((p,slot)=>({slot,p})).filter(x=>x.p&&x.p.discovered&&isInhabited(x.p.world)).map(x=>({slot:x.slot, world:x.p.world})); }
/* charted, inhabited systems the fleet can run a route to. Same system always; any OTHER charted

function reachableTradeSystems(fromSys, f){ const caps=groupCaps(f.shipIds);
  return (state.galaxy?state.galaxy.systems:[]).filter(s=>{ if(!s.discovered||!inhabPlanets(s.id).length) return false;
    if(s.id===fromSys) return true;
    return caps.tier==="interstellar"; }); }
/* number of actions to move between two planets: 0 same planet, 1 a same-system hop, else one per

function legActions(aSys,aSlot,bSys,bSlot,jump){
  if(aSys===bSys) return (aSlot===bSlot)?0:1;
  return Math.max(1, Math.ceil(sysDist(aSys,bSys)/Math.max(1,jump||9999))); }
function tradeCycleActions(t,jump){ return legActions(t.buySys,t.buySlot,t.sellSys,t.sellSlot,jump)
  + legActions(t.sellSys,t.sellSlot,t.buySys,t.buySlot,jump); }
/* the fleet buys its chosen good at the buy world, filling its holds with the player's credits */
function tradeBuy(f){ const t=f.trade, c=commodityById(t.commodity), w=worldAt(t.buySys,t.buySlot);
  if(!w||!c||!canBuyHere(w,c)) return;
  const ships=shipsByIds(f.shipIds), free=ships.reduce((s,v)=>s+Math.max(0,(v.hold||0)-shipUsed(v)),0), p=commodityBuy(w,c);
  let qty=Math.min(Math.floor(free/c.bulk), Math.floor(state.credits/p)); if(!(qty>0)){ t.lastBuy=0; return; }
  state.credits-=qty*p; t.lastBuy=qty*p; let rem=qty;
  for(const v of ships){ if(rem<=0) break; const add=Math.min(Math.floor(((v.hold||0)-shipUsed(v))/c.bulk), rem); if(add>0){ v.cargo[t.commodity]=(v.cargo[t.commodity]||0)+add; rem-=add; } } }
/* and sells it all at the sell world */
function tradeSell(f){ const t=f.trade, c=commodityById(t.commodity), w=worldAt(t.sellSys,t.sellSlot);
  if(!w||!c||!canSellHere(w,c)) return;
  const ships=shipsByIds(f.shipIds), have=ships.reduce((s,v)=>s+(v.cargo[t.commodity]||0),0); if(!have) return;
  const p=commoditySell(w,c); state.credits+=have*p; let rem=have;

/* a trade fleet's total combat strength — escorts (fighters/warships) carry it; bare freighters

function fleetFirepower(f){ return shipsByIds(f.shipIds).reduce((s,v)=>s+(v.hp>0?shipPower(v):0),0); }
/* odds raiders hit a running trade fleet this action — low in policed core/friendly space, higher

function ambushChance(f){ const sys=state.galaxy&&state.galaxy.systems[f.trade.pos.sysId]; if(!sys) return 0.025;
  let ch=0.018+(1-centralFactor(sys.x,sys.y))*0.05; const gov=systemGov(sys); if(gov&&govStance(gov)==="friendly") ch*=0.4; return ch; }
/* raiders intercept a trade fleet — instead of resolving it silently, freeze the run and hand the

function beginTradeRaid(f){

/* apply cargo plunder + hull damage across a fleet's living ships; returns units of cargo lost */

/* STAND AND FIGHT — take the helm of your trade fleet and fight the raiders out in the real
   ship-to-ship battle screen, so you see the engagement play out and decide it round by round. */
function raidFight(){
  const r=state.tradeRaid; if(!r) return;
  const f=fleetById(r.fleetId);
  if(!f||!f.trade){ endTradeRaid(); return; }
  const mine=shipsByIds(f.shipIds).filter(v=>v.hp>0 && Game.operational(v));
  if(!mine.length){ Game.logMsg(`${f.name} has no ship fit to fight — it has to run.`,"bad"); raidFlee(); return; }
  const wing=carrierWing(mine.map(v=>v.id)), all=mine.concat(wing);
  const n=clamp(rnd(Math.max(1,r.threat-1), r.threat+1), 1, 8);   // raider ships scale with the threat
  const enemy=genEnemyFleet(r.threat, n);
  all.forEach(v=>{ v.shield=shipMaxShield(v); });                  // raise shields for the fight
  const loot=Math.round(enemy.reduce((s,e)=>s+e.maxHp,0)*0.10*(1+r.threat*0.4)) + n*160;
  shipCombat={ name:`raiders off ${r.sysName}`, faction:"raiders", threat:r.threat, enemy,
    foeKind:"pirates", foeDispo:"hostile", foeThreat:r.threat, foeGovId:null,
    tradeRaid:r.fleetId, raidBack:r.back,                          // mark this as a remote trade-fleet fight
    main:mine.map(v=>v.id), wing:wing.map(v=>v.id), wingOut:true, my:all.map(v=>v.id),
    target:null, loot, over:false, win:false, lost:false, fled:false, round:0,
    log:[`<b>${f.name}</b> brings its escort guns to bear on the raiders.`] };
  state.tradeRaid=null;                                            // now resolved through the battle screen
  Game.save(); UI.render("shipbattle");
}
/* RUN FOR IT — light, fast fleets slip the net; if the raiders run you down they hit you from astern,
   worse than a lost stand-up fight. */
function raidFlee(){
  const r=state.tradeRaid; if(!r) return;
  const f=fleetById(r.fleetId);
  if(!f||!f.trade){ endTradeRaid(); return; }
  const armed=fleetFirepower(f)>=r.raiderPower*0.6;
  const esc=clamp(0.72 - r.threat*0.07 + (armed?0.12:0), 0.18, 0.85);
  if(chance(esc)){
    const lost=raidMaul(f, rndF(0.04,0.16), 0);            // jettison a little to run light
    Game.logMsg(`&#128640; <b>${f.name}</b> burned hard and slipped the ambush near ${r.sysName}${lost?` — ${commas(lost)} units jettisoned to run light`:""}.`,"good");
  } else {
    const cargoFrac=rndF(0.5,0.85), hullFrac=rndF(0.2,0.42), lost=raidMaul(f, cargoFrac, hullFrac);
    Game.logMsg(`&#128640; <b>${f.name}</b> tried to run but the raiders ran it down near ${r.sysName} — ${lost?commas(lost)+" units plundered, ":""}struck hard from astern.`,"bad");
  }
  endTradeRaid();
}
/* advance one fleet's route by a single action — a same-system hop arrives at once; a jump between
   systems takes one action per jump (distance / jump range) before it arrives and trades */
function tradeStep(f){ const t=f.trade; if(!t||!fleetAllCrewed(f)) return;
  if(chance(ambushChance(f))){ beginTradeRaid(f); return; }   // raiders strike — freeze the run for the player's call
  const tgt = t.phase==="toSell" ? {s:t.sellSys,p:t.sellSlot} : {s:t.buySys,p:t.buySlot};
  if(t.pos.sysId!==tgt.s){                                  // crossing to another system — count down the jumps
    if(t.legLeft==null){ const jump=Math.max(1, groupCaps(f.shipIds).jump);
      t.legLeft=Math.max(1, Math.ceil(sysDist(t.pos.sysId,tgt.s)/jump)); }
    if(--t.legLeft>0) return;                               // still in transit this action
    t.legLeft=null; t.pos={sysId:tgt.s, slot:tgt.p};
    shipsByIds(f.shipIds).forEach(v=>{ v.sysId=tgt.s; v.slot=tgt.p; });
  } else if(t.pos.slot!==tgt.p){                            // same system, different planet — one hop
    t.pos={sysId:tgt.s, slot:tgt.p}; shipsByIds(f.shipIds).forEach(v=>{ v.sysId=tgt.s; v.slot=tgt.p; });
  }
  if(t.pos.sysId===tgt.s && t.pos.slot===tgt.p){            // arrived — buy or sell, patch up, then turn around
    if(t.phase==="toSell"){ tradeSell(f); t.phase="toBuy"; } else { tradeBuy(f); t.phase="toSell"; }
    tradeRepair(f);                                         // depots mend the fleet's battle scars
  }
}
function setFleetTrade(fid, route){
  const f=fleetById(fid); if(!f) return;
  if(f.shipIds.includes(state.activeShip)){ toast("You can't send the fleet you're flying with"); return; }
  if(!fleetAllCrewed(f)){ toast("Every ship needs its crew to run a route"); return; }
  if(fleetCargoCap(f)<=0){ toast("This fleet has no cargo hold"); return; }
  const loc=fleetLoc(f);
  f.trade={ ...route, pos:{sysId:loc.sysId, slot:loc.slot}, phase:"toBuy", earned:0, runs:0, lastBuy:0 };
  const A=worldAt(route.buySys,route.buySlot), B=worldAt(route.sellSys,route.sellSlot), c=commodityById(route.commodity);
  Game.logMsg(`${f.name} takes up a trade run: buy ${c.name} at ${A.name}, sell at ${B.name}.`,"good");
  Game.save(); UI.render("crew");
}
function clearFleetTrade(fid){ const f=fleetById(fid); if(!f||!f.trade) return;
  Game.logMsg(`${f.name} comes off its trade run (${f.trade.runs||0} runs, +${commas(f.trade.earned||0)}c net).`,"sys");
  f.trade=null; Game.save(); UI.render("crew"); }
/* called from advanceTime — every trading fleet takes one route step per player action */
function tickTrades(n){ for(let i=0;i<n;i++){ if(state.tradeRaid) return;   // a pending ambush freezes all runs until you call it
  (state.fleets||[]).forEach(f=>{ if(f.trade && !state.tradeRaid) tradeStep(f); }); } }

/* ---- bounty hunting: duel a Wanted person, then kill or restrain them ---- */
function startDuel(i){
  const p=(state.codex.people||[])[i];
  if(!p || !isHostile(p) || p.captured) return;
  const lvl=p.level||bountyLevel(p.hostile); p.level=lvl;
  const maxHp=Math.round(p.attrs.endurance.value*5 + p.height.value*0.06);
  const dtraits={1:["evasive"],2:["savage"],3:["armored","savage"],4:["armored","brute","savage"]}[p.hostile]||[];
  combat={ person:true, personIdx:i, name:p.name, level:lvl,
    blurb:`A ${careerName(p.career).toLowerCase()} — ${commas(p.bounty.alive)}c alive.${forceDesc(p.force)?` Backed by ${forceDesc(p.force)}.`:""}`,
    maxHp, hp:maxHp, atk:Math.round(p.attrs.strength.value*0.8 + p.mass.value*0.02),
    xp:Math.round(maxHp*0.4), over:false, claim:false, stim:state.stimReady, surprised:false, bounty:p.bounty,
    traits:dtraits.slice(), dropTier:clamp(p.hostile,0,4) };
  applyLevelScaling(combat); combat.xp=Math.round(combat.xp*(1+lvl*0.05)); initCombat(combat); state.stimReady=false;
  Game.logMsg(`You move to apprehend ${p.name}.`,"hit");
  UI.render("combat");
}
function winDuel(){
  combat.over=true; combat.claim=true;
  Game.logMsg(`You overpower ${combat.name}.`,"good");
  dropFoeGear(0.3);   // a wanted mark often carries something worth taking
  Game.save(); UI.render("combat");
}
function claimBounty(alive){
  const p=(state.codex.people||[])[combat.personIdx], val=alive?combat.bounty.alive:combat.bounty.dead;
  state.bounties=state.bounties||[];
  state.bounties.push({ name:p.name, raceName:p.raceName, value:val, alive });
  p.captured=true; p.captureAlive=alive;
  let extra="";
  if(p.contractId){ const had=(state.contracts||[]).some(c=>c.id===p.contractId);
    state.contracts=(state.contracts||[]).filter(c=>c.id!==p.contractId);
    if(had) extra=" Contract fulfilled."; }
  Game.logMsg(`${alive?"You restrain":"You kill"} ${p.name}. Redeem the ${commas(val)}c bounty at a bar.${extra}`,"good");
  combat=null; Game.save(); UI.render("hub"); UI.flashLog();
}
/* ---- BOUNTY CONTRACTS: a hunter at the bar posts marks; track them to a world and hunt them down ---- */
/* inhabited, charted worlds where a mark could be holed up */
function bountyLocations(){
  const out=[];
  (state.galaxy?state.galaxy.systems:[]).forEach(s=>{ if(!s.discovered||!s.planets) return;
    s.planets.forEach(p=>{ if(p&&p.discovered&&p.occupied&&p.world) out.push({sysId:s.id,slot:p.index,sysName:s.name,worldName:p.world.name}); }); });
  return out;
}
/* roll one contract: a hostile mark, their alive/dead price, and the world they were last seen on */
function genContract(){
  const draw=drawRace(); if(!draw.race.name) draw.race.name=genName("race");   // the notice names the mark's species
  let person, n=0;
  do { person=Gen.person(draw.race); n++; } while(!isHostile(person)&&n<14);
  if(!isHostile(person)){ const cc=pick(CAREERS.filter(c=>c.hostile));   // force a wanted mark if the roll came up civilian
    person.career=cc.id; person.hostile=cc.hostile; person.bounty=rollBounty(cc, draw.race.tier);
    const f=rollForce(cc); if(f) person.force=f; person.credits=rollWealth(cc); delete person.ship; }
  if(!person.name) person.name=genName("person");
  person.raceName=draw.race.name;
  const locs=bountyLocations();
  const loc=locs.length?pick(locs):{sysId:state.sysId??0,slot:state.atSlot,sysName:(curSys()||{name:"this"}).name,worldName:state.world?state.world.name:"this world"};
  const id="ct"+Date.now().toString(36)+rnd(100,999); person.contractId=id;
  person.level=bountyLevel(person.hostile);
  return { id, draw, person, name:person.name, career:person.career, raceName:draw.race.name, threat:person.hostile, level:person.level,
    alive:person.bounty.alive, dead:person.bounty.dead, sysId:loc.sysId, slot:loc.slot, sysName:loc.sysName, worldName:loc.worldName };
}
/* talk to the hunter — post three marks (steady per planet until you move on) */
function openBountyBoard(){
  const key=(state.sysId??0)+":"+state.atSlot;
  if(!state.bountyBoard || state.bountyBoard.key!==key) state.bountyBoard={ key, list:[genContract(),genContract(),genContract()] };
  UI.render("bounties");
}
function acceptContract(i){
  const b=state.bountyBoard; if(!b) return; const ct=b.list[i]; if(!ct) return;
  state.contracts=state.contracts||[];
  if(state.contracts.length>=3){ toast("You can carry 3 contracts at once"); return; }
  state.contracts.push(ct); b.list[i]=null;
  Game.logMsg(`Bounty accepted: ${ct.name}, last seen on ${ct.worldName} in the ${ct.sysName} system.`,"good");
  toast("Bounty accepted"); Game.save(); UI.render("bounties");
}
function abandonContract(id){ state.contracts=(state.contracts||[]).filter(c=>c.id!==id);
  Game.logMsg("You let a bounty go cold.","sys"); toast("Dropped"); Game.save(); UI.render("bounties"); }
/* an accepted mark hiding on the very world you're standing on */
function activeContractHere(){ const sid=state.sysId??0, slot=state.atSlot;
  return (state.contracts||[]).find(c=>c.sysId===sid && c.slot===slot); }
/* the dockmaster who runs this planet's shipyard — a Shipwright, met once per planet */
function talkToYarder(){
  state.yarders = state.yarders||{};
  const key=(state.sysId??0)+":"+state.atSlot, existing=state.yarders[key];
  if(existing!=null && state.codex.people[existing]){ viewingPerson=existing; UI.render("cx_person"); return; }
  const draw=drawRace(), person=Gen.person(draw.race);
  person.career="shipwright"; person.name=genName("person");
  delete person.bounty; delete person.hostile; delete person.force;
  person.credits=shipwrightWorth(state.world.tech);
  if(draw.isNew){ draw.race.name=genName("race"); state.codex.races[draw.id]=draw.race; }
  person.raceName=draw.race.name;

function buyYarderShip(){

/* charged once per year of play: crew wages + ship maintenance */
function chargeUpkeep(){
  if(state.job){ state.credits+=state.job.pay;   // your yearly salary comes in first
    Game.logMsg(`Salary from your work as ${careerName(state.job.career)}: +${commas(state.job.pay)}c.`,"good"); }
  const wages=annualWages(), maint=annualMaint(), bill=wages+maint;
  if(bill<=0) return;
  if(state.credits>=bill){ state.credits-=bill;
    Game.logMsg(`Annual upkeep: -${commas(bill)}c (${commas(wages)}c wages, ${commas(maint)}c maintenance).`,"sys");
    return;
  }
  let shortfall=bill-state.credits; state.credits=0;
  Game.logMsg(`You can't cover ${commas(bill)}c of annual upkeep!`,"bad");
  // unpaid crew quit (highest-paid first) until the saved wages would have covered the gap
  let saved=0;
  while(saved<shortfall && (state.crew||[]).length){
    let bi=0,bs=-1; state.crew.forEach((c,i)=>{ const s=careerSalary(c.career); if(s>bs){bs=s;bi=i;} });
    const c=state.crew[bi];
    if(c.personIdx>=0 && state.codex.people[c.personIdx]) state.codex.people[c.personIdx].hired=false;
    state.crew.splice(bi,1); saved+=bs;
    Game.logMsg(`${c.name} walks off — unpaid wages.`,"bad");
  }
  if(saved<shortfall) Game.logMsg(`Your ships fall behind on maintenance — keep your credits up or risk losing them.`,"bad");
}
function redeemBounties(){
  const list=state.bounties||[]; if(!list.length){ toast("No bounties to redeem"); return; }
  const total=list.reduce((s,b)=>s+b.value,0), n=list.length;
  state.credits+=total; state.bounties=[];
  Game.logMsg(`You redeem ${n} bounty claim${n>1?"s":""} for ${commas(total)}c.`,"good"); toast("+"+commas(total)+"c");
  Game.save(); UI.render("tavern");
}
function buyShip(i){
  const stock=shipStockAt(), o=stock[i]; if(!o) return;
  if(state.credits<o.price){ toast("Not enough credits"); return; }
  state.credits-=o.price;
  const ship=vehicleFromOffer(o);
  state.vehicles.push(ship);
  if(spaceworthy(ship) && !Game.canLeave()) state.activeShip=ship.id;  // auto-pilot if it frees you to leave
  stock.splice(i,1);
  Game.logMsg(`You buy ${article(o.name)} ${o.name} for ${commas(o.price)}c.`,"good");
  toast("Bought "+o.name); Game.save(); UI.render("shipyard");
}
function departFirstFlight(){
  if(advanceTime()) return;
  // your home sits at your galactic birthplace; the core is denser & more settled than the rim
  const sp=state.spawn||{x:0,y:0}, cf=centralFactor(sp.x,sp.y);
  const size=rollSystemSize(cf), planets=[];
  for(let i=0;i<size;i++) planets.push({ index:i, discovered:i===0, isHome:i===0,
    occupied:i===0, world:i===0?state.world:null });
  const home={ id:0, name:genName("system"), x:sp.x, y:sp.y, size, discovered:true, reported:true, planets };
  // scatter the rest of the galaxy on the flat 2D plane around the home star
  const galaxy={ name:state.galaxyName, systems:[home] };
  populateGalaxy(galaxy, sp);                        // fill the whole disc: dense core, sparse rim
  seedPolitics(galaxy);                              // carve the galaxy into governments & factions
  state.galaxy=galaxy; state.sysId=0; state.system=home; state.atSlot=0;
  const hg=systemGov(home);
  if(hg) Game.logMsg(`Your home star lies within the territory of ${hg.name}.`,"sys");
  state.grounded=false; mapView=null;
  const dist=Math.round(Math.hypot(sp.x,sp.y)), region=cf>0.66?"deep in the crowded core":cf>0.33?"in the galaxy's middle reaches":"out on the sparse rim";
  const nearby=galaxy.systems.filter(s=>s.id!==0 && Math.hypot(s.x-sp.x,s.y-sp.y)<=MAP_SIGHT).length;
  Game.logMsg(`You break atmosphere for the first time. Your home star, ${home.name}, lies ${region} — ${dist} ly from the core — and holds ${size} world${size>1?"s":""}, with ${nearby} other system${nearby!==1?"s":""} glinting within sensor range and countless more scattered across the galaxy.`,"hit");
  awardObjective("first_flight");
  Game.save(); UI.render("codex"); UI.flashLog();
}

/* ---------- small text helpers ---------- */
function article(w){ return /^[aeiou]/i.test(w)?"an":"a"; }
function ordinal(n){ const s=["th","st","nd","rd"], v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); }
function powerLine(v){ return v.axes.map(a=>`${UNITS.power[a].abbr} ${commas(v.power[a])}`).join(" / ")+" "+UNITS.power.unit; }

/* ---------- procedural names (for the 🎲 Randomize buttons) ---------- */
const NAMEBANK={
  on:["ka","ve","sho","tri","lo","ma","ze","qu","ar","en","ix","tha","rho","sy","vor","el","nu","dra","phi","os","yl","ten","cas","mir","sol","vex","bro","gan","hel","ja","kor","lum","ny","or","pra","ski"],
  mid:["ra","li","no","sa","te","mi","va","ce","do","ny","za","ko","lu","be","ri","fa","mo","de","su","ta"],
  end:["n","s","r","x","l","th","k","ne","ra","os","is","um","ar","en","ix","on","al","yr","ius","ah","eth"],
};
function nameWord(min,max){ const r=a=>a[Math.floor(Math.random()*a.length)];
  const n=rnd(min,max); let w=r(NAMEBANK.on);
  for(let i=1;i<n;i++) w += (i<n-1 ? r(NAMEBANK.mid) : r(NAMEBANK.end));
  return cap(w);
}
function genName(kind){
  if(kind==="person") return nameWord(2,3)+" "+nameWord(2,3);
  if(kind==="galaxy") return nameWord(2,3)+(chance(0.5)?" "+pick(["Expanse","Reach","Cluster","Spiral","Drift","Veil","Sprawl","Verge","Deep"]):"");
  if(kind==="system") return nameWord(2,3)+(chance(0.35)?" "+pick(["Majoris","Minoris","Prime","Gate","Reach","Hub","Cross","Verge"]):"");
  return nameWord(2,3); // world, race, ship
}
/* a text input paired with a Randomize button */
function nameField(id, placeholder, kind, val){

    <input type="text" id="${id}" maxlength="22" placeholder="${placeholder}" value="${val||""}" style="flex:1">

}

/* ---- compact STAT SHEET rows (easy to scan & compare across people) ---- */
// one numeric trait: label | value (species range) | percentile
function trow(label, t, fmt){
  return `<div class="srow"><span class="lbl">${label}</span>`+
    `<span class="v">${fmt(t.value)} <span class="rg">${fmt(t.min)}&ndash;${fmt(t.max)}</span></span>`+
    `<span class="pc" style="color:${pctColor(t.pct)}">${t.pct}</span></div>`;
}
// one label : value line (categorical traits)
function krow(label, val){

}

/* The whole species as a compact stat sheet — shared by the reveal and Self screen
   so any two people read the same way and line up for comparison. */
/* The ORIGIN card — body-plan, race rarity, population, genome. Works for the player,
   anyone you meet, and Codex entries (any species/person-shaped object). */
