<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#05060a">
<title>Edge of the Outer Stars</title>
<!--
  EDGE OF THE OUTER STARS
  A self-contained, text-based galaxy RPG in a single HTML file. Open it in any phone
  or desktop browser; progress autosaves to the browser and can be exported to a file.

  DESIGN PILLARS
   - You are the NAMER and EXPLORER, not the rule-maker. You choose names (character,
     species, world, ship, beast, gun, ...). The GAME rolls everything else — stats,
     power, rarity, life and death — through weighted randomness. No re-rolls.
   - RARITY drives power. Every generated thing rolls a tier (Common -> Primordial)
     with transparent odds. Rarer = stronger and may carry rarer powers (e.g. flight).
   - UNIVERSAL METRICS. Shared units measure everything. First up: the vehicle power
     triad — Star / Flight / Ground Power, all in "Stellar-Horsepower" (SHp).

  CODE MAP
    UNITS    - documented universal measurements
    RARITY   - weighted tier engine (roll, odds, power scaling)
    TABLES   - archetypes, biomes, populations, vehicle classes, names of axes
    Gen      - procedural generators (species, world, vehicle) -> player names them
    DATA     - hand-authored creatures & items (procedural versions come later)
    state    - the live save object
    Game     - logic (creation, economy, leveling, saving)
    combat   - turn-based encounters
    UI       - screen rendering + scrolling log
-->
<style>
  :root{
    --bg:#05060a; --panel:#0d1018; --panel2:#141a26; --line:#222c3d;
    --ink:#cdd6e6; --dim:#7c8aa3; --gold:#e8c372; --blue:#5fd0ff;
    --green:#6ee7a0; --red:#ff6b6b; --violet:#b98cff;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--ink);
    font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace; font-size:16px;
    line-height:1.45;}
  body{max-width:680px; margin:0 auto; min-height:100vh; padding:0 14px 90px;}
  h1,h2,h3{font-weight:700; line-height:1.2; margin:0 0 8px;}
  h1{font-size:1.45rem; color:var(--gold); letter-spacing:.5px;}
  h2{font-size:1.1rem; color:var(--blue);}
  h3{font-size:.95rem; color:var(--dim); text-transform:uppercase; letter-spacing:1px;}
  p{margin:0 0 10px;}
  a{color:var(--blue);}
  .stars{position:fixed; inset:0; z-index:-1; background:
    radial-gradient(1px 1px at 20% 30%, #fff8 0, transparent),
    radial-gradient(1px 1px at 70% 60%, #fff6 0, transparent),
    radial-gradient(1px 1px at 40% 80%, #fff5 0, transparent),
    radial-gradient(2px 2px at 85% 20%, #fffa 0, transparent),
    radial-gradient(1px 1px at 55% 12%, #fff7 0, transparent),
    radial-gradient(1px 1px at 12% 70%, #fff6 0, transparent),
    var(--bg);}
  header{padding:12px 6px 6px; text-align:center;}
  header .sub{color:var(--dim); font-size:.8rem; letter-spacing:2px; text-transform:uppercase;}
  header .topbar{display:flex; justify-content:space-between; align-items:center; gap:10px; text-align:left;}
  header .topbar .nm{font-weight:700; font-size:1.02rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  header .topbar .meta{display:flex; align-items:center; gap:8px; font-size:.76rem; color:var(--dim); white-space:nowrap;}
  header .topbar .meta .lv{color:var(--gold); border:1px solid #4a3f22; border-radius:99px; padding:1px 7px; font-size:.7rem; font-weight:600;}
  header .topbar .meta .cr{color:var(--gold); font-weight:600; font-variant-numeric:tabular-nums;}
  header .topbar .meta .sep{opacity:.4;}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:14px; margin:0 0 12px;}
  /* a tap-to-expand dropdown that folds away a block of detail cards */
  details.drop{margin:0 0 12px;}
  details.drop>summary{list-style:none; cursor:pointer; user-select:none;
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:13px 14px; display:flex; justify-content:space-between; align-items:center;
    font-size:.95rem; color:var(--ink); transition:.12s;}
  details.drop>summary::-webkit-details-marker{display:none;}
  details.drop>summary:active{transform:scale(.99);}
  details.drop>summary .chev{color:var(--gold); transition:.15s; font-size:.85rem;}
  details.drop[open]>summary{border-radius:12px 12px 0 0; border-bottom-color:transparent;}
  details.drop[open]>summary .chev{transform:rotate(90deg);}
  details.drop>.dropbody{margin-top:12px;}
  .row{display:flex; gap:8px; flex-wrap:wrap;}
  .row.between{justify-content:space-between; align-items:center;}
  button{font-family:inherit; font-size:.95rem; cursor:pointer; color:var(--ink);
    background:var(--panel2); border:1px solid var(--line); border-radius:10px;
    padding:11px 14px; transition:.12s; touch-action:manipulation;}
  button:active{transform:scale(.97);}
  button:hover{border-color:var(--blue);}
  button.primary{background:linear-gradient(180deg,#1c2638,#141a26); border-color:var(--gold); color:var(--gold);}
  button.full{display:block; width:100%; margin:6px 0; text-align:left;}
  button.ghost{background:transparent;}
  button:disabled{opacity:.4; cursor:not-allowed;}
  button.sel{border-color:var(--gold); background:#1a2233; color:var(--gold);}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
  .pill{display:inline-block; background:var(--panel2); border:1px solid var(--line);
    border-radius:999px; padding:3px 10px; font-size:.78rem; margin:2px 4px 2px 0; color:var(--dim);}
  .pill.g{color:var(--gold); border-color:#4a3f22;}
  .pill.b{color:var(--blue); border-color:#234a57;}
  .pill.v{color:var(--violet); border-color:#3a2a57;}
  /* grouped ship list — a tappable card per ship with status chips */
  .shipcat{margin:14px 0 4px; font-size:.72rem; letter-spacing:.7px; text-transform:uppercase; color:var(--gold);}
  .shipcat:first-child{margin-top:2px;}
  .shipcard{display:block; width:100%; text-align:left; background:var(--panel2); border:1px solid var(--line);
    border-radius:11px; padding:10px 12px; margin:6px 0; transition:.12s;}
  .shipcard:active{transform:scale(.99);} .shipcard:hover{border-color:var(--blue);}
  .shipcard.on{border-color:var(--gold); background:#19212f;}
  .shipcard .top{display:flex; justify-content:space-between; align-items:center; gap:8px;}
  .shipcard .nm{font-weight:600; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .shipcard .sub{font-size:.75rem; color:var(--dim); margin-top:2px;}
  .shipcard .chips{margin-top:7px; display:flex; flex-wrap:wrap; gap:4px;}
  .chip{font-size:.69rem; padding:2px 8px; border-radius:999px; border:1px solid var(--line); color:var(--dim); background:var(--panel); white-space:nowrap;}
  .chip.g{color:var(--green); border-color:#2c4a38;} .chip.r{color:var(--red); border-color:#5a2b2b;}
  .chip.b{color:var(--blue); border-color:#234a57;} .chip.v{color:var(--violet); border-color:#3a2a57;}
  .chip.gold{color:var(--gold); border-color:#4a3f22;}
  .frow{display:flex; justify-content:space-between; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--line);}
  .frow:last-child{border-bottom:none;}
  .frow .finfo{min-width:0;} .frow .finfo .nm{font-weight:600; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  input[type=text],input[type=number]{width:100%; font-family:inherit; font-size:1rem; padding:11px;
    background:#070a11; color:var(--ink); border:1px solid var(--line); border-radius:10px;}
  button.rnd{flex:0 0 auto; padding:11px 13px; font-size:1.1rem; line-height:1;}
  .dim{color:var(--dim);} .gold{color:var(--gold);} .green{color:var(--green);}
  .red{color:var(--red);} .blue{color:var(--blue);} .violet{color:var(--violet);}
  .bar{height:9px; background:#070a11; border:1px solid var(--line); border-radius:99px; overflow:hidden; margin:3px 0 8px;}
  .bar > i{display:block; height:100%;}
  .hpfill{background:linear-gradient(90deg,#ff6b6b,#ffae6b);}
  .xpfill{background:linear-gradient(90deg,#5fd0ff,#b98cff);}
  .enfill{background:linear-gradient(90deg,#6ee7a0,#5fd0ff);}
  .statline{display:flex; justify-content:space-between; font-size:.9rem; padding:2px 0;}
  /* condensed vitals panel — one label · bar · value row per stat */
  .vitals{padding:11px 13px;}
  .vitals .vhead{display:flex; justify-content:space-between; align-items:baseline; gap:8px; margin-bottom:9px;}
  .vitals .vrow{display:grid; grid-template-columns:24px 1fr auto; gap:9px; align-items:center; margin:5px 0;}
  .vitals .vrow .vlbl{font-size:.66rem; letter-spacing:.6px; color:var(--dim); text-transform:uppercase;}
  .vitals .vrow .bar{margin:0; height:7px;}
  .vitals .vrow .vval{font-size:.76rem; color:var(--ink); font-variant-numeric:tabular-nums; min-width:62px; text-align:right;}
  .vitals .vrow .vval.low{color:var(--red);}
  /* compact stat-sheet rows */
  .sheet .srow{display:grid; grid-template-columns:1fr auto 28px; gap:10px; align-items:baseline;
    padding:4px 0; border-bottom:1px solid var(--line); font-size:.86rem;}
  .sheet .srow:last-of-type{border-bottom:none;}
  .sheet .srow .lbl{color:var(--dim);}
  .sheet .srow .v{text-align:right; color:var(--ink); font-weight:600; white-space:nowrap;}
  .sheet .srow .v .rg{color:var(--dim); font-weight:400; font-size:.72rem;}
  .sheet .srow .pc{text-align:right; font-variant-numeric:tabular-nums; font-size:.8rem; font-weight:600;}
  .sheet .krow{display:grid; grid-template-columns:auto 1fr; gap:10px; align-items:baseline;
    padding:4px 0; border-bottom:1px solid var(--line); font-size:.86rem;}
  .sheet .krow:last-of-type{border-bottom:none;}
  .sheet .krow .lbl{color:var(--dim);} .sheet .krow .kv{text-align:right;}
  .log{background:#070a11; border:1px solid var(--line); border-radius:10px; padding:10px;
    height:160px; overflow-y:auto; font-size:.86rem;}
  .log p{margin:0 0 5px;}
  .log .sys{color:var(--dim);} .log .good{color:var(--green);} .log .bad{color:var(--red);}
  .log .hit{color:var(--gold);}
  nav{position:fixed; left:0; right:0; bottom:0; background:#0a0d14ee; backdrop-filter:blur(6px);
    border-top:1px solid var(--line); display:flex; max-width:680px; margin:0 auto; z-index:10;}
  nav button{flex:1; border:none; border-radius:0; background:transparent; padding:10px 2px;
    font-size:.7rem; color:var(--dim); display:flex; flex-direction:column; align-items:center; gap:2px;}
  nav button.on{color:var(--gold);}
  nav .ico{font-size:1.1rem;}
  .center{text-align:center;}
  .small{font-size:.8rem;}
  .divider{height:1px; background:var(--line); margin:12px 0;}
  .tag{font-size:.72rem; padding:2px 7px; border-radius:6px; background:var(--panel2); color:var(--dim);}
  .compass{display:grid; grid-template-columns:repeat(3,1fr); grid-template-areas:". n ." "w . e" ". s ."; gap:6px; max-width:240px; margin:8px auto;}
  .compass button{padding:10px 0;} .compass .cn{grid-area:n;} .compass .cs{grid-area:s;} .compass .cw{grid-area:w;} .compass .ce{grid-area:e;}
  svg.gmap{display:block; width:100%; max-width:340px; margin:8px auto; aspect-ratio:1/1;
    background:radial-gradient(circle at 50% 50%, #0d1322, #070a11); border:1px solid var(--line); border-radius:10px;}
  .hidden{display:none;}
  .flash{animation:flash .5s;}
  @keyframes flash{0%{background:#1a2233;}100%{background:var(--panel);}}
  .reveal{animation:reveal .5s ease;}
  @keyframes reveal{from{opacity:0; transform:translateY(8px);}to{opacity:1; transform:none;}}
  .rarity-banner{border-radius:12px; padding:12px; margin:0 0 12px; text-align:center;
    border:1px solid; background:#0a0d14;}
  .rarity-banner .rn{font-size:1.3rem; font-weight:700; letter-spacing:1px;}
  .rarity-banner .odds{font-size:.78rem; color:var(--dim); letter-spacing:1px;}
  .toast{position:fixed; top:14px; left:50%; transform:translateX(-50%); z-index:50;
    background:#141a26; border:1px solid var(--gold); color:var(--gold); padding:10px 16px;
    border-radius:10px; font-size:.85rem; opacity:0; transition:.25s; pointer-events:none; max-width:90%;}
  .toast.show{opacity:1;}
</style>
</head>
<body>
<div class="stars"></div>
<header id="topbar">
  <div class="sub">A galaxy text RPG</div>
</header>

<main id="app"><!-- screens render here --></main>

<nav id="nav" class="hidden">
  <button data-screen="hub"><span class="ico">&#9737;</span>World</button>
  <button data-screen="codex"><span class="ico">&#9776;</span>Codex</button>
  <button data-screen="map"><span class="ico">&#128506;</span>Map</button>
  <button data-screen="gov"><span class="ico">&#127963;</span>Powers</button>
  <button data-screen="bag"><span class="ico">&#9783;</span>Items</button>
  <button data-screen="crew"><span class="ico">&#128101;</span>Crew</button>
  <button data-screen="save"><span class="ico">&#8635;</span>Save</button>
</nav>

<div id="toast" class="toast"></div>

<script>
"use strict";
/* ============================================================ UTIL ===== */
const $ = (sel,el=document)=>el.querySelector(sel);
const app = $("#app");
const rnd  = (a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const rndF = (a,b)=>Math.random()*(b-a)+a;
const pick = arr => arr[Math.floor(Math.random()*arr.length)];
const chance = p => Math.random() < p;
const cap = s => s.charAt(0).toUpperCase()+s.slice(1);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const commas = n => n.toLocaleString("en-US");
// pick one entry from [{...,weight}] proportional to weight
function weightedPick(list){
  const total=list.reduce((s,e)=>s+e.weight,0);
  let r=Math.random()*total;
  for(const e of list){ if((r-=e.weight)<0) return e; }
  return list[list.length-1];
}
// integer 0..max, biased low when skew>1 (rare highs); biased high when skew<1
const skewRoll=(max,skew)=>Math.floor(Math.pow(Math.random(),skew)*(max+1));

/* ============================================================ UNITS ==== */
/* Universal measurements every system shares. Display helpers live here so
   the whole game speaks the same language. Add new metrics in one place. */
const UNITS = {
  // Vehicle power triad — the "horsepower equivalent" of the galaxy.
  power:{
    unit:"SHp", unitLong:"Stellar-Horsepower",
    star:{   label:"Star Power",   abbr:"STR", desc:"Interstellar drive output among the stars (hyperlanes)." },
    flight:{ label:"Flight Power", abbr:"FLT", desc:"Sublight & atmospheric flight thrust." },
    ground:{ label:"Ground Power", abbr:"GRD", desc:"Locomotion for craft that ride the ground." },
  },
  fmtPower:v=>`${commas(Math.round(v))} ${UNITS.power.unit}`,
};

/* ============================================================ RARITY === */
/* The heart of the game. Everything generated rolls a tier here. Weights are
   relative; odds are computed and shown to the player ("a 1-in-N origin").
   `pow` is the stat/power multiplier band for that tier. */
const RARITY = {
  tiers:[
    { id:"common",     name:"Common",     color:"#9aa7bd", weight:600000, pow:[0.85,1.15] },
    { id:"uncommon",   name:"Uncommon",   color:"#6ee7a0", weight:240000, pow:[1.1,1.45] },
    { id:"rare",       name:"Rare",       color:"#5fd0ff", weight:100000, pow:[1.4,1.9] },
    { id:"epic",       name:"Epic",       color:"#b98cff", weight:40000,  pow:[1.85,2.5] },
    { id:"legendary",  name:"Legendary",  color:"#e8c372", weight:15000,  pow:[2.4,3.4] },
    { id:"mythic",     name:"Mythic",     color:"#ff9f5a", weight:4000,   pow:[3.2,4.6] },
    { id:"godlike",    name:"Godlike",    color:"#ff6b6b", weight:900,    pow:[4.4,6.5] },
    { id:"primordial", name:"Primordial", color:"#ffffff", weight:100,    pow:[6,9] },
  ],
  _total:0,
  init(){ this._total=this.tiers.reduce((s,t)=>s+t.weight,0); },
  byId(id){ return this.tiers.find(t=>t.id===id); },
  index(id){ return this.tiers.findIndex(t=>t.id===id); },
  roll(){ // weighted tier draw
    let r=Math.random()*this._total;
    for(const t of this.tiers){ if((r-=t.weight)<0) return t; }
    return this.tiers[0];
  },
  mult(tier){ return rndF(tier.pow[0],tier.pow[1]); },
  // "1 in N" string for a tier's odds
  odds(tier){ const n=Math.round(this._total/tier.weight); return n<=1?"near-certain":`1 in ${commas(n)}`; },
};
RARITY.init();

/* ============================================================ GENETICS = */
/* Two independent layers of luck decide who you are:
     1) SPECIES rarity  — how unusual the PEOPLE you're born to are. Rarer peoples
        have smaller populations, so being born one is itself rare (population-weighted).
        Rarer species also drift further from the human baseline (taller giants, etc.).
     2) GENETICS        — where YOU land within your own species' range. Even a common
        humanlike person can roll a 1-in-1000 genome. Sampled near the middle, so
        extremes (runts and prodigies) are rare. These values are FIXED for life.
   Everything is anchored to humans so the numbers are intuitive at a glance. */
const HUMAN = { height:175, mass:78, maturity:18, lifespan:82, attr:10 }; // cm, kg, yrs, yrs, pts

/* Conceptual scale of the setting (tunable). Drives flavor + population math. */
const GALAXY = {
  speciesCap: 10000,     // estimated number of distinct sapient peoples in the galaxy
  totalSapients: 1e12,   // ~1 trillion thinking beings across all worlds
  radius: 480,           // ly from the galactic core (0,0) to the rim — the disc is 2*radius across
};
/* How "central" a galactic position is: 1 at the core, 0 at the rim. The core is dense and
   well-settled; the rim is sparse and mostly empty. Drives system count, planets-per-system,
   and how likely a world is to be inhabited. */
function centralFactor(x,y){ return clamp(1 - Math.hypot(x,y)/GALAXY.radius, 0, 1); }
/* odds a charted world is inhabited, given its galactic position */
/* odds a charted world is inhabited: central, mild worlds are readily settled; rim worlds
   and harsh biomes (molten, frozen, airless) almost never are. (biomeHab defined w/ BIOMES) */
function occChanceFor(sys, biomeId){ const cf=centralFactor(sys.x,sys.y);
  return clamp((0.15 + 0.8*cf) * Math.pow(biomeHab(biomeId), 0.9), 0.02, 0.97); }
/* Whether a world ends up settled. Region & habitability set the base, but a world that rolled
   an advanced, wealthy civilization is almost always inhabited — so you don't find a hyper-
   advanced world standing empty. (Low-tech worlds stay mostly wild unless the region is busy.) */
function worldOccChance(sys, world){
  const base=occChanceFor(sys, world.biome);
  const civ=clamp((Math.max(0,world.tech-2)+Math.max(0,world.wealth-2))/8, 0, 1);
  return clamp(base + civ*0.92, 0.02, 0.99);
}

/* You begin as a YOUNG CHILD — able to do a bit of everything, but far from your
   genetic potential — and grow toward it as the years pass (full power at maturity). */
const LIFE = {
  startFraction:  0.20,  // you start at 20% of your species' age-of-maturity
  childPotential: 0.35,  // a young child performs at ~35% of adult potential (not worthless)
};
/* Time is action-based: every action (explore, rest, fly to/from a world) advances you,
   and this many actions = one year of age — which triggers annual wages + maintenance. */
const ACTIONS_PER_YEAR = 24;
/* Life stages by fraction of maturity age (elder is handled via twilight). */
const LIFE_STAGES = [
  { f:0.12, name:"infant" }, { f:0.30, name:"young child" }, { f:0.55, name:"child" },
  { f:0.85, name:"adolescent" }, { f:1.10, name:"young adult" }, { f:Infinity, name:"adult" },
];

const ATTR_KEYS  = ["strength","agility","endurance","intellect","attunement","presence"];
const ATTR_LABEL = { strength:"Strength", agility:"Agility", endurance:"Endurance",
  intellect:"Intellect", attunement:"Attunement", presence:"Presence" };

/* How far a species' average can drift from human, by rarity index (0..7). */
const SPECIES_DEV = [0.10, 0.16, 0.26, 0.40, 0.60, 0.90, 1.30, 1.90];
/* Population band of a species, by rarity index — rarer peoples are fewer. */
const POP_RANGE = [
  [2e9, 2.5e10], [3e8, 2e9], [2e7, 3e8], [1e6, 2e7],
  [8e4, 1e6], [6e3, 8e4], [400, 6e3], [12, 400],
];
function rollPopulation(ti){ const [lo,hi]=POP_RANGE[ti];
  return Math.round(Math.exp(rndF(Math.log(lo),Math.log(hi)))); }

/* ~normal-ish bounded draw in [-1,1], used for SPECIES-level mean drift. */
const approxNorm = ()=>((Math.random()+Math.random()+Math.random())/3)*2-1;
/* True standard-normal (Box–Muller) + its CDF — used for INDIVIDUAL genetics so
   percentiles span 1–99 with realistic tails (≈1% reach the 99th, etc.). */
function gauss(){ let u=0,v=0; while(u===0)u=Math.random(); while(v===0)v=Math.random();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); }
function normCdf(x){ const t=1/(1+0.2316419*Math.abs(x)), d=0.3989423*Math.exp(-x*x/2);
  let p=d*t*(0.3193815+t*(-0.3565638+t*(1.781478+t*(-1.821256+t*1.330274))));
  return x>0?1-p:p; }

/* Generate one fixed genetic trait:
   - the SPECIES gets an average that drifts from `humanMean` by the rarity `dev`
   - the species gets a min..max spread around that average
   - YOU get a specific value sampled within, plus the percentile you landed at. */
function genTrait(humanMean, dev, opts={}){
  // SPECIES average: drifts from the human baseline by the rarity `dev`
  let meanMult = 1 + approxNorm()*dev*(opts.devScale??1) + (opts.skew||0);
  meanMult = Math.max(opts.floorMult??0.2, meanMult);
  const mean = humanMean*meanMult;
  const spread = opts.spread ?? rndF(0.1,0.18);
  const min = mean*(1-spread), max = mean*(1+spread);
  // INDIVIDUAL position within the species, as a standard-normal `g`. `lifeRoll`
  // is the character's overall genetic luck; `corr` mixes it in (so a gifted soul
  // tends broadly gifted) while keeping a fresh per-trait roll (strong-but-slow ok).
  const corr = opts.corr ?? 0;
  const g = corr*(opts.lifeRoll??0) + Math.sqrt(1-corr*corr)*gauss();
  // value clusters near the mean; ±2.5σ reaches the species' stated min/max
  const value = clamp(mean*(1 + g*spread/2.5), min, max);
  const pct = clamp(Math.round(normCdf(g)*100), 1, 99);
  const r = opts.intval ? (x=>Math.max(opts.floor??1, Math.round(x))) : (x=>x);
  return { mean:r(mean), min:r(min), max:r(max), value:r(value), pct, g };
}

/* formatters anchored to human-readable units */
function cmToFt(cm){ const ti=cm/2.54; let ft=Math.floor(ti/12), inch=Math.round(ti-ft*12);
  if(inch===12){ft++; inch=0;} return `${ft}'${inch}"`; }
function kgToLb(kg){ return `${commas(Math.round(kg*2.20462))} lb`; }

function humanizeCount(n){
  if(n>=1e12) return (n/1e12).toFixed(1)+" trillion";

function isInhabited(w){ return !!(w && w.occupied!==false && settleDef(w.settle)); }
function settleAmen(w){ return isInhabited(w) ? settleDef(w.settle).amen : []; }
function settleHasShipyard(w){ return settleAmen(w).includes("shipyard"); }
/* choose a settlement for a freshly-charted inhabited world (gated by its tech/wealth) */
const PRODUCER_SETTLES=["agri","mining","industrial","capital"];   // worlds that make goods to export
const BUYER_SETTLES=["frontier","mining","trade","scrap"];          // worlds that import/resell them
function pickSettlement(world, sysId){
  let pool=SETTLEMENTS.filter(s=> s.weight>0
    && (s.minTech==null||world.tech>=s.minTech) && (s.minWealth==null||world.wealth>=s.minWealth));
  if(!pool.length) pool=SETTLEMENTS.filter(s=>s.id==="frontier");
  // give every system a varied economy: don't clone a niche that's already here, make sure the
  // system PRODUCES something, and give it somewhere to sell it — so an in-system trade always exists
  const sys=state.galaxy && state.galaxy.systems[sysId];
  const present=(sys&&sys.planets) ? sys.planets.filter(p=>p&&p.world&&isInhabited(p.world)).map(p=>p.world.settle) : [];
  const hasProducer=present.some(t=>PRODUCER_SETTLES.includes(t));
  const adj=pool.map(s=>{ let w=s.weight;
    if(present.includes(s.id)) w*=0.18;                                           // avoid a duplicate niche
    if(!hasProducer && PRODUCER_SETTLES.includes(s.id)) w*=4;                      // the system must grow something
    else if(hasProducer && BUYER_SETTLES.includes(s.id) && !present.includes(s.id)) w*=2;  // ...and have a buyer for it
    return { id:s.id, weight:Math.max(0.01,w) }; });
  return (weightedPick(adj)||pool[0]).id;
}

  const skew=(center, nudge)=>{ let g=gauss(); if(g<0) g*=0.4; return clamp(Math.round(center+g*1.6+nudge), 4, 10); };

/* Annual ship maintenance as a share of the hull's worth, by family. Warships bleed money just
   sitting idle (an army you must fund); freighters run leaner so trade profit can outpace upkeep. */
const MAINT_RATE={ utility:0.05, freight:0.10, fighter:0.14, gunship:0.16, warship:0.20 };
function shipMaint(v){ if(!spaceworthy(v)) return Math.round((v.value||0)*0.04);
  const cat=(shipClass(v.cls)||{}).cat, rate=MAINT_RATE[cat]!=null?MAINT_RATE[cat]:0.12;
  let m=(v.value||0)*rate;
  m += (v.guns||[]).reduce((s,g)=>s+(g?weaponById(g).price*0.18:0),0);   // mounted guns add to the bill
  return Math.round(m); }
/* what it costs to fully repair a ship's hull right now */
function repairCost(v){ const miss=(v.maxHp||0)-(v.hp||0); return miss<=0?0:Math.round(miss*3*(1+(state.world?state.world.wealth:4)*0.03)); }
function annualWages(){ return (state.crew||[]).reduce((s,c)=>s+careerSalary(c.career),0); }
function annualMaint(){ return (state.vehicles||[]).reduce((s,v)=>s+shipMaint(v),0); }

   ONLY systems have coordinates, on a flat 2D plane measured in light-years. Travel
   within a system is free (no fuel); crossing between systems needs an interstellar
   hyperdrive whose reach scales with the ship's Star Power. */
const LY_PER_STAR=120;                       // Star-Power per light-year of hyperdrive reach
function sysDist(aId,bId){ const g=state.galaxy; if(!g) return 0;
  const A=g.systems[aId], B=g.systems[bId]; if(!A||!B) return 0;
  return Math.hypot(A.x-B.x, A.y-B.y); }
function jumpRange(v){ v=v||Game.ship(); if(!v||v.range!=="interstellar") return 0;
  return (v.power.star||0)/LY_PER_STAR * HYPERDRIVE[v.hyper||0].mult; }
/* is ship v docked exactly where the player is — same system AND same planet? */
function atHere(v){ return !!(v && (v.sysId??0)===(state.sysId??0) && v.slot===state.atSlot); }
/* the system the player is currently in (null while adrift in deep space) */
function curSys(){ if(!state.galaxy) return state.system; const id=state.sysId??0; return id>=0?state.galaxy.systems[id]:null; }
/* ---- deep space (hyperdrive drift between the stars) ---- */
function adrift(){ return !!(state && state.voidPos); }
function pointDist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }
/* your current galactic coordinate — your drift point, or the system you're in */
function playerXY(){ if(adrift()) return state.voidPos; const s=curSys();
  return s?{x:s.x,y:s.y}:{x:(state.spawn&&state.spawn.x)||0,y:(state.spawn&&state.spawn.y)||0}; }
/* a group's origin coordinate (its system, or the void if its lead ship is adrift) */
function groupXY(ids){ const v=shipsByIds(ids)[0]; if(!v) return playerXY();
  if((v.sysId??0)<0) return state.voidPos||playerXY();
  const s=state.galaxy.systems[v.sysId??0]; return s?{x:s.x,y:s.y}:playerXY(); }
/* the ships that travel with YOU: your active ship's fleet, or just your ship */
function playerGroupIds(){ const a=Game.ship(); if(!a) return [];
  if(a.fleetId){ const f=(state.fleets||[]).find(x=>x.id===a.fleetId); if(f) return f.shipIds.slice(); }
  return [a.id]; }
/* distance of a system from the galactic core (0,0) */
function distFromCore(sys){ return Math.hypot(sys.x, sys.y); }
/* ---- map visibility (fog of war) ----
   You can see a system on the galaxy map only if you've charted it, or if it lies within
   MAP_SIGHT light-years of one of your charted systems (a sensor contact). */
const MAP_SIGHT=50;
function nearestDiscoveredDist(sys){ let best=Infinity;
  (state.galaxy?state.galaxy.systems:[]).forEach(s=>{ if(s.discovered) best=Math.min(best, Math.hypot(s.x-sys.x, s.y-sys.y)); });
  return best; }
function systemVisible(sys){ return sys.discovered || nearestDiscoveredDist(sys)<=MAP_SIGHT; }
function visibleSystems(){ return state.galaxy ? state.galaxy.systems.filter(systemVisible) : []; }

const SHIP_RARITY_MULT=[1, 1.3, 1.7, 2.4, 3.2, 4.5, 6, 8];
/* roll hull plating (0..4). Common hulls are unplated; only rarer ships can mount heavy/exotic. */
function rollArmor(tierId){ const ti=RARITY.index(tierId), maxA=clamp(Math.round(ti/1.4),0,4);
  let a=0; for(let k=0;k<maxA;k++) if(chance(0.45)) a++; return Math.min(a,4); }
/* roll a fitted hyperdrive tier (0..4) — only interstellar hulls, and the better tiers are a
   rare prize on legendary ships. */
function rollHyper(c, tierId){ if(c.range!=="interstellar") return 0;
  const ti=RARITY.index(tierId), maxH=clamp(Math.round(ti/1.6),0,4);
  let h=0; for(let k=0;k<maxH;k++) if(chance(0.4)) h++; return Math.min(h,4); }
/* roll the SIZE of one hardpoint (0 light, 1 medium, 2 heavy, 3 super-heavy). Sizes lean heavier
   with the hull's combat grade and rarity, so a frigate might come mostly-heavy (a real warship)
   or mostly-light (a lightly-armed carrier). Super-heavy mounts only appear on warships and are
   rare — a really good frigate might get one; two is extremely uncommon. Pilot mounts (captain-
   run) usually run light/medium but can, on a lucky hull, carry the heaviest guns. */
function rollSlotSize(mount, grade, ti){
  let w;
  if(mount==="pilot")  w=[ Math.max(6, 34-ti*2), 34+grade*4, grade*5+ti*4,      grade>=2?Math.round(ti*0.9):0 ];
  else                 w=[ Math.max(4, 42-grade*11-ti*3), 26+grade*5, Math.max(2,grade*13+ti*6), grade>=2?Math.round(1+ti*1.5):0 ];
  const tot=w[0]+w[1]+w[2]+w[3]; let r=Math.random()*tot;
  for(let i=0;i<4;i++){ if((r-=w[i])<0) return i; } return 0;
}

const HP_SCALE=3;   // hulls are tough relative to weapon attack, so battles last several salvos
function shipStatsFor(c, tierId){
  const ti=RARITY.index(tierId), armor=rollArmor(tierId), grade=c.grade||0;
  const maxHp=Math.round(c.baseHp * HP_SCALE * ARMOR[armor].mult * (1+ti*0.6) * rndF(0.9,1.15));

  for(let i=0;i<pilotGuns;i++) slotSizes.push(rollSlotSize("pilot", grade, ti));
  for(let i=0;i<gunnerGuns;i++) slotSizes.push(rollSlotSize("gunner", grade, ti));

}
/* write combat fields onto a ship object (empty hardpoints) */
function applyShipStats(ship, c, tierId){
  const s=shipStatsFor(c, tierId);
  ship.maxHp=s.maxHp; ship.hp=s.maxHp; ship.armor=s.armor; ship.hyper=s.hyper;
  ship.pilotGuns=s.pilotGuns; ship.gunnerGuns=s.gunnerGuns; ship.slotSizes=s.slotSizes.slice();
  ship.guns=new Array(s.pilotGuns+s.gunnerGuns).fill(null);

/* count a ship's hardpoints by size for display, e.g. {light:2, medium:1, heavy:3} */
function slotBreakdown(sizes){ const b=[0,0,0,0]; (sizes||[]).forEach(s=>b[s]++);
  return b.map((n,i)=>n?`${n} ${SLOT_SIZES[i].toLowerCase()}`:"").filter(Boolean).join(" / ")||"none"; }
/* a ship's battle attack: pilot mounts fire under the captain; each gunner mount needs a gunner */
function shipAttack(v){
  if(!v||!v.guns||!v.guns.length) return 0;
  const pilotN=v.pilotGuns||0, gunners=Game.aboard(v,"gunner");
  let atk=0, used=0;
  v.guns.forEach((gid,i)=>{ if(!gid) return; const w=weaponById(gid); if(!w) return;
    if(i<pilotN) atk+=w.atk;                       // captain mans these for free

function mountedCount(v){ return (v.guns||[]).filter(Boolean).length; }
/* ---- ship combat stats: skill-scaled attack, fighter evasion, big-ship shields ---- */
/* Gunnery multiplier: a crack gun crew turns raw gun power into more effective damage (up to +30%).
   Pilot-mounts are run by the ship's pilot (you, if you're flying it); heavy mounts by gunners. */
function shipGunneryMult(v){
  const skills=[];
  if((v.pilotGuns||0)>0){ if(v.id===state.activeShip) skills.push(Game.selfGunnery());
    else { const p=(state.crew||[]).find(c=>c.shipId===v.id&&c.career==="pilot"); if(p) skills.push(crewSkill(p,"gunnery")); } }
  (state.crew||[]).filter(c=>c.shipId===v.id&&c.career==="gunner").forEach(g=>skills.push(crewSkill(g,"gunnery")));

function shipPower(v){ return Math.round(shipAttack(v)*shipGunneryMult(v)); }
/* Evasion: ONLY nimble fighters dodge, and only as well as their pilot flies. Big hulls never weave. */
function shipEvasion(v){

  if(v.id===state.activeShip) pil=Game.selfPiloting();
  else { const p=(state.crew||[]).find(c=>c.shipId===v.id&&c.career==="pilot"); pil=p?crewSkill(p,"piloting"):0; }
  return clamp(0.08 + pil/10*0.45, 0, 0.55);

/* Shields: NOT standard — a regenerating layer you install and upgrade (up to Tier 3) on gunships

const SHIELD=[ {name:"None",mult:0}, {name:"Deflector Screen",mult:0.15}, {name:"Aegis Field",mult:0.25}, {name:"Bastion Barrier",mult:0.38} ];
const SHIELD_MAX_TIER=3;
function shipCanShield(v){ return ["gunship","warship"].includes(shipCat(v)); }
function shipMaxShield(v){ return shipCanShield(v) ? Math.round((v.maxHp||0)*SHIELD[v.shieldTier||0].mult) : 0; }
/* Rarer hulls only turn up at higher-tech worlds (and are still rare even there). */
function rollShipTier(tech){
  const maxIdx=clamp(Math.floor(tech*0.9), 0, RARITY.tiers.length-1);
  const allowed=RARITY.tiers.slice(0, maxIdx+1);
  const total=allowed.reduce((s,t)=>s+t.weight,0); let r=Math.random()*total;
  for(const t of allowed){ if((r-=t.weight)<0) return t; }
  return allowed[0];
}
/* A planet's shipyard stock, shaped by its tech & wealth AND its settlement: a frontier
   scrap yard sells junkers, while only a Capital City deals in capital ships. */
function genShipStock(w){
  const sd=settleDef(w.settle);
  const capSize = sd && sd.shipMax ? (shipClass(sd.shipMax)?shipClass(sd.shipMax).size:99) : 99;  // biggest class this yard builds
  const avail=SHIP_CLASSES.filter(c=>w.tech>=c.minTech && (c.size||1)<=capSize);
  if(!avail.length) return [];
  const count=clamp(Math.round((w.tech+w.wealth)/3)+rnd(-1,1), 0, 8);
  const stock=[];
  for(let i=0;i<count;i++){
    const c=weightedPick(avail), t=rollShipTier(w.tech);
    stock.push(shipOfferFrom(c, t.id, (1.35-w.wealth*0.04)*rndF(0.92,1.1)));
  }
  return stock;
}
function shipStockAt(){ state.shipStock=state.shipStock||{};
  const key=(state.sysId??0)+":"+state.atSlot;
  if(!state.shipStock[key]) state.shipStock[key]=genShipStock(state.world);
  return state.shipStock[key]; }

/* Build one ship "offer" (the pre-vehicle blueprint shipyards and ship-owners use) from a
   hull class at a given rarity tier, with an appraised price. */
function shipOfferFrom(c, tierId, priceFactor){
  const m=SHIP_RARITY_MULT[RARITY.index(tierId)], vf=rndF(0.9,1.12);
  const power={}; Object.keys(c.power).forEach(a=>power[a]=Math.round(c.power[a]*m));
  const cs=shipStatsFor(c, tierId);
  // a rarer gunship/warship hull sometimes ships with a shield already fitted
  let shieldTier=0;
  if(["gunship","warship"].includes(c.cat)){ const ti=RARITY.index(tierId);
    if(ti>=2 && chance(0.18+ti*0.1)) shieldTier=clamp(Math.round(ti/2),1,SHIELD_MAX_TIER); }
  const price=Math.round((c.price + cs.armor*c.price*0.25 + cs.hyper*c.price*0.2 + cs.slotSizes.reduce((s,z)=>s+z*c.price*0.06,0) + shieldTier*c.price*0.18)*m*(priceFactor||1)*rndF(0.95,1.08));
  return { cls:c.id, name:c.name, role:c.role, cat:c.cat, size:c.size, tier:tierId, range:c.range,
    cargo:Math.round(c.cargo*m*vf), crew:Math.max(c.crew, Math.round(c.crew*m)), bays:Math.round(c.bays*m),
    reqPilots:c.reqPilots, reqMech:c.reqMech, reqGun:c.reqGun, reqLabor:c.reqLabor||0,
    maxHp:cs.maxHp, armor:cs.armor, hyper:cs.hyper, shieldTier, pilotGuns:cs.pilotGuns, gunnerGuns:cs.gunnerGuns, slotSizes:cs.slotSizes,

/* Some people you meet own a personal ship — ordinary civilians, pilots, mechanics, traders.
   We roll the ship's RANGE first (independent of where you are or how rich they are), so a fair
   share of owners can leave the planet, and a smaller share can leave the system — you're never
   truly stranded on a backwater. Wealth only nudges WHICH hull within that band. */
const SHIP_OWN_RATE=0.26;            // chance a (non-hostile) person owns a personal ship
const SHIP_RANGE_BANDS=[ {range:"surface",p:0.60}, {range:"system",p:0.28}, {range:"interstellar",p:0.12} ];
function rollPersonShip(credits){
  if(!chance(SHIP_OWN_RATE)) return null;
  let r=Math.random(), band="surface";
  for(const b of SHIP_RANGE_BANDS){ if((r-=b.p)<0){ band=b.range; break; } }
  let avail=SHIP_CLASSES.filter(c=>c.range===band);
  if(!avail.length) avail=SHIP_CLASSES.filter(c=>c.range==="surface");
  const pull=clamp((credits||0)/250000,0,1), exp=0.5-pull*0.34;   // richer owners skew to pricier hulls in the band
  const weighted=avail.map(c=>({c, w:1/Math.pow(c.price,exp)}));
  const tot=weighted.reduce((s,x)=>s+x.w,0); let x=Math.random()*tot, hull=weighted[0].c;
  for(const it of weighted){ if((x-=it.w)<0){ hull=it.c; break; } }
  const t=rollShipTier(5);   // mostly common, the odd better-spec hull
  return shipOfferFrom(hull, t.id, 1.0);
}
/* Turn an offer blueprint into a real owned vehicle (docked where you stand). */
function vehicleFromOffer(o){

    bays:o.bays, reqPilots:o.reqPilots, reqMech:o.reqMech, reqGun:o.reqGun, reqLabor:o.reqLabor||0, value:o.price, cargo:{}, slot:state.atSlot, sysId:state.sysId,

/* ---- Carriers: ships with bays stow fighter-class craft, which then ride along inside ---- */
function shipCat(v){ return (shipClass(v&&v.cls)||{}).cat || null; }

function canBeCarried(v){ return !!v && !v.carrier && shipCat(v)==="fighter" && v.id!==state.activeShip; }
/* fold a fighter into a carrier's hangar (both docked where you stand) */
function stowFighter(fid, cid){
  const f=(state.vehicles||[]).find(v=>v.id===fid), c=(state.vehicles||[]).find(v=>v.id===cid);
  if(!f||!c) return;
  if(!atHere(c) || !atHere(f)){ toast("Both ships must be docked where you are"); return; }

  if(!canBeCarried(f)){ toast("Only fighters can be carried — and not the one you're flying"); return; }

/* deploy a fighter back out of its carrier, to wherever the carrier now sits. It stays homed to

function launchFighter(fid){
  const f=(state.vehicles||[]).find(v=>v.id===fid); if(!f||!f.carrier) return;
  const cid=f.carrier, c=(state.vehicles||[]).find(v=>v.id===cid);
  f.carrier=null; f.homeCarrier=cid; if(c){ f.sysId=c.sysId; f.slot=c.slot; }

/* Odds an owner accepts your offer, by how it compares to the ship's worth. People are loath to
   sell: a fair (at-worth) offer is a long shot; overpaying tempts them; lowballs almost never land
   — but the rare fool takes a steal. */
function shipBuyChance(offer, worth){
  if(!(worth>0) || offer<=0) return 0;
  const r=offer/worth;
  return r>=1 ? Math.min(0.97, 0.12+(r-1)*0.85)
              : Math.max(0.01, 0.12*Math.pow(r,4));
}

/* A market's stock for the year: staple supplies are always carried; the gear on offer is a
   rotating selection (wealthier worlds carry more), refreshed when a year passes. */
function genMarketStock(w){
  const eligible=Object.keys(DATA.items).filter(id=>{ const it=DATA.items[id]; return it.kind!=="trade" && it.minTech<=w.tech; });
  const staples=eligible.filter(id=>DATA.items[id].kind==="consumable");
  const gear=eligible.filter(id=>DATA.items[id].kind!=="consumable").sort(()=>Math.random()-0.5);
  const take=clamp(Math.round(gear.length*(0.4+w.wealth*0.06)), Math.min(3,gear.length), gear.length);
  return staples.concat(gear.slice(0,take));
}
/* a rare under-the-counter find at an Outfitter: usually nothing, occasionally a Rare piece, and
   only the wealthiest/highest-tech worlds ever turn up an Epic — Legendary almost never. Priced at a
   steep premium, because you can't buy this calibre anywhere else. */
function genMarketGear(w){
  const richness=(w.tech||0)+(w.wealth||0);                 // 0..18
  if(!chance(0.08 + richness*0.012)) return [];
  const ceil = richness>=16?4 : richness>=12?3 : 2;          // rare .. (rich) epic .. (richest) legendary
  const lean={ rare:40, epic:8, legendary:1 };
  const wts={}; for(let i=2;i<=ceil;i++){ const id=ITEM_RARITY[i].id; if(lean[id]) wts[id]=lean[id]; }
  const g=genGear(weightedKey(wts)); g.price=Math.round(g.value*1.9*(1+(w.wealth||4)*0.03));
  return [g];
}
function buyMarketGear(uid){ const list=Game.marketGear(); const g=list.find(x=>x.uid===uid); if(!g) return;
  if(state.credits<g.price){ toast("Not enough credits"); return; }
  state.credits-=g.price; state.gear=state.gear||[]; delete g.price; state.gear.push(g);
  const key=(state.sysId??0)+":"+state.atSlot; state.marketGearByLoc[key]=list.filter(x=>x.uid!==uid);
  Game.logMsg(`You buy a rare find: <b style="color:${rarityColor(g.rarity)}">${g.name}</b>.`,"good"); toast("Bought "+g.name); Game.save(); UI.render("market"); }

/* Planetary-system size: how many worlds orbit your home star. Avg ~5, rarely alone,
   rarely crowded. Rolled the first time you leave your planet. */
const SYSTEM_SIZE = [
  {size:1,weight:4},{size:2,weight:8},{size:3,weight:14},{size:4,weight:18},{size:5,weight:18},
  {size:6,weight:14},{size:7,weight:8},{size:8,weight:5},{size:9,weight:3},{size:10,weight:1.5},
  {size:11,weight:1},{size:12,weight:0.7},
];
/* Core systems run larger; rim systems are sparse. cf in [0,1] adds up to a few extra worlds. */
function rollSystemSize(cf){ let s=weightedPick(SYSTEM_SIZE).size;
  if(cf!=null) s += Math.round(cf*rndF(0,4)) - Math.round((1-cf)*rndF(0,1.5));
  return clamp(s, 1, 12); }

/* Tradeable commodities. Each takes `bulk` cargo slots per unit (a chassis is 10, grain is 1).

   it (they pay a premium). Capitals & trade hubs are general markets that deal in everything.
   The classic loop: buy where it's produced, haul it to where it's demanded. */
const COMMODITIES=[
  // —— food & agriculture ——
  { id:"grain",      name:"Grain",                cat:"Food",       base:6,   bulk:1,  produce:["agri"],                 demand:["mining","industrial","scrap","frontier","colony"] },
  { id:"livestock",  name:"Livestock",            cat:"Food",       base:16,  bulk:3,  produce:["agri"],                 demand:["capital","trade","frontier","colony"] },
  { id:"textiles",   name:"Textiles",             cat:"Food",       base:18,  bulk:2,  produce:["agri","capital"],       demand:["mining","frontier","colony","scrap"] },
  // —— raw materials & fuel ——
  { id:"ore",        name:"Raw Ore",              cat:"Raw",        base:9,   bulk:4,  produce:["mining"],               demand:["industrial","capital"] },
  { id:"alloys",     name:"Refined Alloys",       cat:"Raw",        base:34,  bulk:3,  produce:["industrial"],           demand:["capital","trade"] },
  { id:"fuel",       name:"Fuel",                 cat:"Raw",        base:22,  bulk:2,  produce:["mining","industrial"],  demand:["frontier","agri","scrap","colony","trade"] },
  { id:"scrap",      name:"Scrap Metal",          cat:"Raw",        base:7,   bulk:5,  produce:["scrap"],                demand:["industrial"] },
  // —— components & manufactured ——
  { id:"circuitry",  name:"Electronic Components",cat:"Manufactured",base:50, bulk:1,  produce:["industrial","capital"], demand:["frontier","colony","mining"] },
  { id:"machinery",  name:"Machinery",            cat:"Manufactured",base:90, bulk:4,  produce:["industrial"],           demand:["mining","agri","frontier","colony"] },
  { id:"chassis",    name:"Ship Chassis",         cat:"Manufactured",base:420,bulk:10, produce:["industrial"],           demand:["capital","trade"] },
  // —— high-value goods ——

  { id:"electronics",name:"Consumer Electronics", cat:"High-value", base:130, bulk:2,  produce:["capital","industrial"], demand:["trade","frontier","agri","mining","colony"] },

const commodityById=id=>COMMODITIES.find(c=>c.id===id);

const produces=(w,c)=>!!(w&&c.produce.includes(w.settle));

const STAPLE_IDS=["fuel","grain","ore"];

function worldEcon(w,c){ let h=2166136261; const s=(w.name||"?")+":"+c.id;

function commodityFactor(w,c){

function commodityBuy(w,c){ return Math.max(1, Math.round(c.base*commodityFactor(w,c))); }
function commoditySell(w,c){ return Math.max(1, Math.round(c.base*commodityFactor(w,c)*0.82)); }  // depot's cut

function canBuyHere(w,c){ return isInhabited(w) && (produces(w,c) || isGeneralMarket(w) || (isBasicDepot(w)&&isStaple(c))); }

function canSellHere(w,c){ return canBuyHere(w,c) || (isInhabited(w) && demands(w,c)); }
function newVid(){ return "s"+Math.random().toString(36).slice(2,9); }
// cargo lives on each ship; bulk goods fill more of the hold than light ones
function shipUsed(v){ const cg=v.cargo||{}; let s=0; for(const id in cg){ const c=commodityById(id); s+=cg[id]*(c?c.bulk:1); } return s; }
function cargoUsed(){ const s=Game.ship(); return s?shipUsed(s):0; }
function cargoMax(){ const s=Game.ship(); return s?(s.hold||0):0; }
function poolShips(){ return (state.vehicles||[]).filter(v=>atHere(v)&&!shipBusy(v)&&!v.carrier); }  // every ship docked right here, not away trading or stowed
function poolUsed(){ return poolShips().reduce((s,v)=>s+shipUsed(v),0); }

/* Procedural generators. Each rolls rarity + traits, returns an object with
   name:null so the player can christen it. NOTHING here is chosen by the player. */
const Gen = {
  species(forceTier){
    const tier=forceTier||RARITY.roll();      // how rare these PEOPLE are to be born to
    const arche=weightedPick(ARCHETYPES);      // body-plan template
    const ti=RARITY.index(tier.id);
    const dev=SPECIES_DEV[ti];                 // how far this people drifts from human
    const population=rollPopulation(ti);       // how many of them exist in the galaxy

    // every quality trait together, so "great genetics" is a whole-self event (rare).
    const lifeRoll=gauss();

    const q={ lifeRoll, corr:CORR }; // spread into quality-trait rolls below

    const height   = genTrait(HUMAN.height,   dev,      { spread:rndF(0.10,0.20) });

    const attrs={};

    }

    // fixed biology — quality traits share luck; fertility is neutral (independent)
    const bioRoll=()=>genTrait(HUMAN.attr, dev, { spread:rndF(0.12,0.22), devScale:0.7, intval:true, floor:1, ...q });
    const bio={
      metabolism: bioRoll(),   // energy & healing speed
      perception: bioRoll(),   // senses: surprise, crits, finds
      resilience: bioRoll(),   // toughness vs. harm
      recovery:   bioRoll(),   // natural healing over time
      fertility:  genTrait(HUMAN.attr, dev, { spread:rndF(0.15,0.3), devScale:0.8, intval:true, floor:1 }),
    };

    const build=buildLabel(height.value, mass.value);

    // Innate powers are a RARE GIFT. The galaxy is mostly ordinary people: common and
    // uncommon peoples essentially never have one, and even rare/epic peoples usually
    // don't. Flight, night sight, breathing water and the like are true rarities.
    const POWER_EXP=[0, 0.01, 0.05, 0.15, 0.45, 0.95, 1.5, 2.3][ti] || 0; // expected # by tier
    const pool=[...arche.powers];
    ["telepath","nightsight","regen","hardy"].forEach(p=>{ if(!pool.includes(p)) pool.push(p); });
    // Flight is the rarest gift of all — only the very rare, or naturally-winged peoples
    // (and even then only the rare among them), ever truly fly.
    const winged=["avian","insectoid","energy"].includes(arche.id);
    const flightOk=(winged && ti>=3) || ti>=5;
    if(!flightOk){ const i=pool.indexOf("flight"); if(i>=0) pool.splice(i,1); }
    let count=0, exp=POWER_EXP; const capN=Math.min(6, pool.length);
    while(exp>0 && count<capN){ if(exp>=1){ count++; exp-=1; } else { if(chance(exp)) count++; break; } }
    const powers=[];
    for(const p of pool.sort(()=>Math.random()-0.5)){ if(powers.length>=count) break; powers.push(p); }

    // heritage detail (diet, rhythm, body, senses, ancestral biome) + reproduction
    const detail=genDetail(arche.id, powers, ti);
    const reproduction=reproText(bio.fertility.value);

    // overall genome grade = how good a specimen you are (quality axes only; size /
    // fertility / heritage flavor are neutral). Computed from the shared-normal of the
    // quality traits, so averaging shrinks variance: broadly-excellent is rarer than
    // excelling at one thing — exactly the "wow, great genetics" payoff.
    const qg=[...ATTR_KEYS.map(a=>attrs[a].g), lifespan.g,
              bio.perception.g, bio.metabolism.g, bio.resilience.g, bio.recovery.g];
    const avgG=qg.reduce((s,x)=>s+x,0)/qg.length;
    const avgPct=clamp(Math.round(normCdf(avgG)*100),1,99);

    return { kind:"species", name:null, tier:tier.id, arche:arche.id, archeName:arche.name,
             flavor:arche.flavor, sig:arche.sig, population,
             height, mass, maturity, lifespan, attrs, bio, temperament, build,
             detail, reproduction, powers,
             genome:{ avgPct, grade:gradeLabel(avgPct) } };
  },

  world(cf=0.5){
    const tier=RARITY.roll();              // overall "specialness" / resource richness
    const biome=weightedPick(BIOMES);
    const pop=weightedPick(POPULATIONS);
    const ti=RARITY.index(tier.id);
    // development tracks galactic position: rich, high-tech worlds cluster from the core out to about
    // halfway; the outer rim stays poor, low-tech and lightly settled (dev: 1 core .. 0 rim edge)
    const dev=clamp((cf-0.1)/0.45, 0, 1);
    const tech  =clamp(skewRoll(9,1.7)+Math.round(ti*0.4)+Math.round(dev*5),0,9);
    const wealth=clamp(skewRoll(9,1.7)+Math.round(ti*0.5)+Math.round(dev*5),0,9);
    const danger=clamp(skewRoll(9,1.5)+1+Math.round(ti*0.3)-Math.round(dev*2),1,10);
    const market=+(0.5+tech*0.05+wealth*0.05).toFixed(2); // breadth/quality of goods
    return { kind:"world", name:null, tier:tier.id, biome:biome.id, biomeName:biome.name,
             creatures:biome.creatures, pop:pop.id, popName:pop.name, peaceMod:pop.peaceMod,
             stockMod:pop.stock, tech, wealth, danger, market };
  },

  vehicle(humble=false){
    // your INHERITED craft is always a humble SURFACE/atmospheric ride — never star-capable,
    // so you start grounded and must buy a system ship to ever leave the planet.
    const pool=humble ? VEHICLE_CLASSES.filter(v=>v.weight>=10 && !v.axes.includes("star"))
                      : VEHICLE_CLASSES;
    const tier=humble?(chance(0.8)?RARITY.tiers[rnd(0,2)]:RARITY.roll()):RARITY.roll();
    const cls=weightedPick(pool);
    const mult=RARITY.mult(tier);
    const power={};
    cls.axes.forEach(a=>{ power[a]=Math.round(cls.base[a]*mult*rndF(0.9,1.15)); });
    return { kind:"vehicle", id:newVid(), name:null, tier:tier.id, cls:cls.id, clsName:cls.name,
             axes:cls.axes, power, mult:+mult.toFixed(2),
             range:"surface", hold:8, crewMax:1, bays:0, reqPilots:1, reqMech:0, reqGun:0, value:600, cargo:{}, slot:0,
             maxHp:60, hp:60, armor:0, pilotGuns:0, gunnerGuns:0, slotSizes:[], guns:[] };
  },

  /* A PERSON is a fresh individual rolled WITHIN a race's fixed ranges. Same shape as a
     generated species, so the stat sheet renders it identically. */
  person(race){
    const q={ lifeRoll:gauss(), corr:0.5 };       // this person's overall genetic luck
    const R=race.ranges;
    const t=(range,quality,intval)=>{ const g=(quality?q.corr*q.lifeRoll:0)+Math.sqrt(1-(quality?q.corr*q.corr:0))*gauss();
      const spread=range.mean?(range.max-range.min)/(2*range.mean):0.1;
      let value=clamp(range.mean*(1+g*spread/2.5), range.min, range.max);
      const rd=intval?(x=>Math.max(1,Math.round(x))):(x=>x);
      return { mean:rd(range.mean), min:rd(range.min), max:rd(range.max), value:rd(value),
               pct:clamp(Math.round(normCdf(g)*100),1,99), g }; };
    const height=t(R.height,false,false), mass=t(R.mass,false,false),
          maturity=t(R.maturity,false,false), lifespan=t(R.lifespan,true,false);
    const attrs={}; ATTR_KEYS.forEach(k=>attrs[k]=t(R.attrs[k],true,true));
    const bio={}; ["metabolism","perception","resilience","recovery"].forEach(k=>bio[k]=t(R.bio[k],true,true));
    bio.fertility=t(R.bio.fertility,false,true);
    const qg=[...ATTR_KEYS.map(k=>attrs[k].g), lifespan.g, bio.perception.g, bio.metabolism.g, bio.resilience.g, bio.recovery.g];
    const avgPct=clamp(Math.round(normCdf(qg.reduce((s,x)=>s+x,0)/qg.length)*100),1,99);
    const cc=weightedPick(CAREERS), career=cc.id;
    const out={ kind:"species", name:null, raceName:race.name, tier:race.tier, arche:race.arche,
             archeName:race.archeName, flavor:race.flavor, sig:race.sig, population:race.population,
             height, mass, maturity, lifespan, attrs, bio, career, credits:rollWealth(cc),
             temperament:weightedPick(TEMPERAMENTS).id, build:buildLabel(height.value,mass.value),
             detail:race.detail, reproduction:race.reproduction, powers:race.powers,
             genome:{ avgPct, grade:gradeLabel(avgPct) } };
    if(cc.hostile){ out.hostile=cc.hostile; out.bounty=rollBounty(cc, race.tier);
      const f=rollForce(cc); if(f) out.force=f; }
    else { const sh=rollPersonShip(out.credits); if(sh) out.ship=sh; }   // ordinary folk may own a ship
    return out;
  },
};

/* Extract the RACE-level record (fixed ranges + heritage) from a full species. */
function raceFrom(sp){
  const rng=x=>({mean:x.mean,min:x.min,max:x.max});
  const attrs={}, bio={};
  ATTR_KEYS.forEach(k=>attrs[k]=rng(sp.attrs[k]));
  ["metabolism","perception","resilience","recovery","fertility"].forEach(k=>bio[k]=rng(sp.bio[k]));
  return { id:null, name:sp.name||null, tier:sp.tier, arche:sp.arche, archeName:sp.archeName,
    flavor:sp.flavor, sig:sp.sig, population:sp.population, powers:[...sp.powers],
    detail:JSON.parse(JSON.stringify(sp.detail)), reproduction:sp.reproduction,
    ranges:{ height:rng(sp.height), mass:rng(sp.mass), maturity:rng(sp.maturity),
             lifespan:rng(sp.lifespan), attrs, bio } };
}

/* How many distinct races of each rarity exist (fewer common ones saturate fast). */
const RACE_POOL=[5,10,30,80,200,600,2000,6000];
/* Information value paid for documenting a NEW find, by rarity tier index. */
const RACE_VALUE =[50,150,600,2000,7000,30000,120000,500000];
const WORLD_VALUE=[30,90,300,900,3000,12000,50000,200000];
const CREATURE_VALUE=40;
function raceValue(tier){ return RACE_VALUE[RARITY.index(tier)]; }
function worldValue(tier){ return WORLD_VALUE[RARITY.index(tier)]; }
function systemValue(s){ return 120 + (s.size||1)*40; }   // word of a newly-charted star system
/* Draw the race you meet — population-weighted by tier, recognized if already known. */
function drawRace(){
  const tier=RARITY.roll(), ti=RARITY.index(tier.id);
  const slot=rnd(0, RACE_POOL[ti]-1);
  const id="w_"+tier.id+"_"+slot;
  if(state.codex.races[id]) return { id, race:state.codex.races[id], isNew:false };
  const race=raceFrom(Gen.species(tier)); race.id=id; race.reported=false;
  return { id, race, isNew:true };
}

/* ===================== LOOT GEAR: rarity-tiered drops you can't buy =====================
   The Outfitter only sells the basics (the DATA.items catalog). Anything truly powerful is a
   procedurally-rolled instance you SCAVENGE or pull from the wrecks of ships you destroy — and the
   Epic/Legendary finds are vanishingly rare. Each is a one-off object stored in state.gear. */
const ITEM_RARITY=[
  { id:"common",    name:"Common",    color:"#9aa3b2", mult:1.0 },
  { id:"uncommon",  name:"Uncommon",  color:"#5fd0ff", mult:1.6 },
  { id:"rare",      name:"Rare",      color:"#6ee7a0", mult:2.5 },
  { id:"epic",      name:"Epic",      color:"#b98cff", mult:4.0 },
  { id:"legendary", name:"Legendary", color:"#ffae3a", mult:6.5 },
];
const rarityDef=rid=>ITEM_RARITY.find(r=>r.id===rid)||ITEM_RARITY[0];
const rarityColor=rid=>rarityDef(rid).color;
const rarityName=rid=>rarityDef(rid).name;
const rarityRank=rid=>ITEM_RARITY.findIndex(r=>r.id===rid);
/* base archetypes per slot — rolled mods scale with rarity, rarer pieces gain extra affixes */
const GEAR_ARCH={
  weapon:{ kind:"weapon", bases:["Blade","Saber","Carbine","Repeater","Lance","Disruptor","Railgun","Maul","Edge"], stats:["might","agility","force"], base:6 },
  head:  { kind:"armor",  bases:["Helm","Visor","Casque","Hood","Crown"],            base:{hp:14, def:2} },
  chest: { kind:"armor",  bases:["Cuirass","Plate","Hauberk","Carapace","Aegis"],    base:{hp:34, def:5} },
  legs:  { kind:"armor",  bases:["Greaves","Legguards","Tassets","Striders"],        base:{hp:18, def:3} },
  feet:  { kind:"armor",  bases:["Boots","Striders","Treads","Steps"],               base:{hp:9, def:1, dodge:0.03} },
  back:  { kind:"accessory", bases:["Cloak","Harness","Mantle","Wing","Shroud"],     base:{dodge:0.06, flee:0.08, energy:8} },
};
const GEAR_PREFIX={ common:["Worn","Field","Standard","Plain"], uncommon:["Reinforced","Tempered","Marked","Honed"],
  rare:["Vanguard","Stalwart","Ranger's","Keen"], epic:["Warlord's","Eclipse","Phantom","Sovereign"],
  legendary:["Godforged","Ascendant","Starborn","Dread","Eternal"] };
const GEAR_SUFFIX=["of the Verge","of Ruin","of the Deep","of Embers","of the Tyrant","of Dawn","of the Void","of Kings"];
const STAT_LABEL={ might:"Might", agility:"Agility", force:"Force", hp:"HP", def:"armor", energy:"energy", dodge:"dodge", flee:"flee" };
function modBlurb(mods){ const parts=[]; for(const k in mods){ const v=mods[k]; if(!v) continue;
    parts.push((k==="dodge"||k==="flee")?`+${Math.round(v*100)}% ${STAT_LABEL[k]}`:`+${v} ${STAT_LABEL[k]||k}`); }
  return parts.join(", "); }
function gearAffix(mods, mult){
  const roll=pick([["might",Math.round(2*mult)],["agility",Math.round(2*mult)],["force",Math.round(2*mult)],
    ["hp",Math.round(12*mult)],["def",Math.max(1,Math.round(1*mult))],["dodge",+(0.03*mult).toFixed(2)],["energy",Math.round(7*mult)]]);
  mods[roll[0]]=(mods[roll[0]]||0)+roll[1];
}
/* roll one gear instance of the given rarity (random slot, or a forced one) */
function genGear(rarity, forceSlot){
  const slot=forceSlot||pick(Object.keys(GEAR_ARCH)), arch=GEAR_ARCH[slot], mult=rarityDef(rarity).mult, mods={};
  if(slot==="weapon"){ const st=pick(arch.stats); mods[st]=Math.max(1,Math.round(arch.base*mult*rndF(0.85,1.15))); }
  else { for(const k in arch.base){ mods[k]=(k==="dodge"||k==="flee")?+(arch.base[k]*mult*rndF(0.85,1.15)).toFixed(2):Math.max(1,Math.round(arch.base[k]*mult*rndF(0.85,1.15))); } }
  const affixes={common:0,uncommon:1,rare:1,epic:2,legendary:3}[rarity]||0;
  for(let i=0;i<affixes;i++) gearAffix(mods, mult);
  const pre=pick(GEAR_PREFIX[rarity]||GEAR_PREFIX.common), bn=pick(arch.bases);
  let name=pre+" "+bn; if(rarity==="epic"||rarity==="legendary") name+=" "+pick(GEAR_SUFFIX);
  const power=Object.entries(mods).reduce((s,[k,v])=>s+((k==="dodge"||k==="flee")?v*300:Math.abs(v)),0);
  return { uid:"g"+Math.random().toString(36).slice(2,9), kind:arch.kind, slot, name, rarity,
    mods, value:Math.max(20,Math.round(power*10*rarityDef(rarity).mult)), blurb:modBlurb(mods) };
}
/* weighted pick over a {key:weight} map */
function weightedKey(w){ let t=0; for(const k in w) t+=w[k]; let r=Math.random()*t; for(const k in w){ if((r-=w[k])<0) return k; } return Object.keys(w)[0]; }
/* drop rarity for a wreck: shifts toward rarer with the foe's threat; Epic/Legendary stay tiny */
function rollDropRarity(threat){
  return weightedKey({ common:100, uncommon:28+threat*14, rare:6+threat*6, epic:1+threat*1.6, legendary:0.12+threat*0.16 });
}
/* a level-up reward piece: the rarity CEILING rises with level, so nothing strong drops early and
   the top tiers only show up deep in a long career (best high-end gear still comes from kills) */
function levelRewardGear(level){
  const ceil = level<20?0 : level<50?1 : level<100?2 : level<160?3 : 4;   // common..legendary
  const w={}; const lean=[100,42,16,5,1.4];
  for(let i=0;i<=ceil;i++) w[ITEM_RARITY[i].id]=lean[i]||1;
  return genGear(weightedKey(w));
}
/* resolve an equip-slot reference (a catalog id OR a gear uid) to a unified item def */
const gearByUid=uid=>(state.gear||[]).find(g=>g.uid===uid)||null;
function resolveItem(ref){ if(!ref) return null; if(DATA.items[ref]) return DATA.items[ref]; return gearByUid(ref); }

/* Hostile people you run into in settled places — robbers, thieves, raiders. Drop credits
   (loot) and XP, never tamed. minDanger gates the rougher ones to dangerous worlds. */
const FOES=[
  { id:"pickpocket", name:"Pickpocket",    hp:14, atk:4,  xp:9,  weight:10, loot:[10,60],   blurb:"A nimble cutpurse working the crowd." },

  { id:"robber",     name:"Armed Robber",  hp:30, atk:12, xp:26, weight:6,  loot:[60,320],  blurb:"An armed robber demanding your credits." },
