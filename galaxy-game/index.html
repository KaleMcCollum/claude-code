  },
  /* people you've met who don't work for you — neutral acquaintances (and any you've crossed) */
  screen_cx_people(){
    const people=state.codex.people||[];
    const idx=people.map((p,i)=>i).filter(i=>!people[i].hired);   // strangers = not in your crew
    return `
    ${this.statHeader()}
    <div class="card sheet"><h2>&#128483; Strangers <span class="dim small">&middot; ${idx.length}</span></h2>
      <p class="small dim">People you've met but have no ties to. Those who join your crew move to the Crew page.</p>
      ${idx.length?idx.slice().reverse().map(i=>{ const p=people[i];
        const cr = isHostile(p)&&!p.captured ? `<span class="red">${careerName(p.career)}</span>` : careerName(p.career);
        return `<div class="krow"><span class="lbl"><button class="small ghost" data-person="${i}">${p.name}</button> <span class="dim small">&middot; ${cr}</span></span>
          <span class="kv">${p.raceName} <span class="dim">&middot; ${p.where}</span></span></div>`; }).join("")
        :`<p class="small dim">No one yet — talk to strangers and visit taverns.</p>`}
    </div>
    ${this.codexBack()}`;
  },
  /* the people who work for you, drawn from those you've hired into your crew */
  screen_cx_crew(){
    const people=state.codex.people||[];
    const idx=people.map((p,i)=>i).filter(i=>people[i].hired&&!people[i].captured);
    return `
    ${this.statHeader()}
    <div class="card sheet"><h2>&#128101; Crew <span class="dim small">&middot; ${idx.length}</span></h2>
      <p class="small dim">People who work for you. Hire strangers you meet to bring them aboard.</p>
      ${idx.length?idx.slice().reverse().map(i=>{ const p=people[i];
        const member=(state.crew||[]).find(c=>c.personIdx===i), ship=member&&member.shipId?(state.vehicles||[]).find(v=>v.id===member.shipId):null;
        return `<div class="krow"><span class="lbl"><button class="small ghost" data-person="${i}">${p.name}</button> <span class="dim small">&middot; ${careerName(p.career)}</span></span>
          <span class="kv">${ship?`<span class="green">${ship.name}</span>`:'<span class="dim">idle</span>'}</span></div>`; }).join("")
        :`<p class="small dim">No crew yet — hire someone you meet to bring them aboard.</p>`}
    </div>
    ${this.codexBack()}`;
  },
  screen_cx_person(){
    const p=(state.codex.people||[])[viewingPerson]; if(!p) return this.screen_cx_people();
    const here = state.atSlot===p.slot;
    const member = p.hired ? (state.crew||[]).find(c=>c.personIdx===viewingPerson) : null;
    const crewShip = member && member.shipId ? (state.vehicles||[]).find(v=>v.id===member.shipId) : null;
    const talkable = here && !p.hired && !p.captured;   // standing in front of a stranger you can deal with
    const backTo = p.hired ? "cx_crew" : "cx_people";
    return `
    <div class="card"><h2>${p.name}</h2>
      <p class="small dim">${careerName(p.career)} &middot; ${article(p.raceName)} <b class="violet">${p.raceName}</b> &middot; met at ${p.where}.</p>
      <p class="small">Worth <b class="gold">${commas(p.credits||0)}c</b>${p.force&&forceDesc(p.force)?` <span class="dim">&middot; commands ${forceDesc(p.force)}</span>`:""}</p>
    </div>
    ${isHostile(p)&&!p.captured?`<div class="rarity-banner" style="border-color:#ff6b6b">
      <div class="rn" style="color:#ff6b6b">${THREAT_LABEL[p.hostile]||"WANTED"}</div>
      <div class="odds">bounty ${commas(p.bounty.alive)}c alive &middot; ${commas(p.bounty.dead)}c dead</div></div>`:""}
    <div class="card">
      <h3>${isHostile(p)?`A wanted ${careerName(p.career).toLowerCase()}`:"Speak with "+p.name.split(" ")[0]}</h3>
      ${p.captured?`<p class="small">Bounty claimed — you ${p.captureAlive?"restrained":"killed"} them.</p>`
       : p.hired?`<p class="small green">In your crew${crewShip?`, piloting the <b>${crewShip.name}</b>`:` — idle, awaiting a ship (assign from your Fleet)`}.</p>`
       : here?`<div class="row">
            ${jobOf(p.career)&&!p.askedJob&&!isHostile(p)?`<button id="askJob" class="primary">&#128188; Ask for work <span class="small dim">(${Math.round(jobOf(p.career).chance*100)}% &middot; ${commas(jobOf(p.career).pay)}c/yr)</span></button>`:""}
            ${HIRE_ROLES[p.career]?`<button id="hire" class="primary">Offer a job &middot; ${careerName(p.career)} &middot; ${HIRE_ROLES[p.career].fee}c</button>`:""}
            ${isHostile(p)?`<button id="attack" class="primary">&#9876; Attack</button>`:""}
            ${p.career==="shipwright"?`<button id="buyOldShip" class="primary">Buy their old ship &middot; ${commas(YARDER_SHIP.price)}c</button>`:""}
            <button id="sayHi" class="ghost">Say hi</button>
            <button id="learnMore" class="ghost">${personExpand?"Show less":"Learn more"}</button>
            <button id="leaveConvo" class="ghost">Leave conversation</button>
          </div>
          ${!HIRE_ROLES[p.career]&&!isHostile(p)&&p.career!=="shipwright"?`<p class="small dim" style="margin-top:6px">${cap(careerName(p.career))} — can't hire as crew.</p>`:""}
          ${p.askedJob&&!p.hired?`<p class="small dim" style="margin-top:6px">${state.job&&state.job.career===p.career&&state.job.who===p.name?"You work for them now.":"They had no work for you."}</p>`:""}
          ${isHostile(p)&&p.hostile>=3?`<p class="small red" style="margin-top:6px">A figure this powerful is guarded — taking them on alone is desperate work. (Fleet vs. fleet combat is coming.)</p>`:""}
          ${HIRE_ROLES[p.career]?`<p class="small dim" style="margin-top:6px">${cap(careerName(p.career))}: ${HIRE_ROLES[p.career].role}.</p>`:""}
          ${p.career==="shipwright"?`<p class="small dim" style="margin-top:6px">${YARDER_SHIP.name}: in-system only, cargo ${YARDER_SHIP.cargo}, room for you alone — but it'll get you off-world.</p>`:""}
          ${convo&&convo.idx===viewingPerson?`<p class="small" style="margin-top:8px"><b>${p.name.split(" ")[0]}:</b> "${convo.text}"</p>`:""}`
       : `<p class="small dim">You met them on <b>${p.where}</b>. Travel back there to ${isHostile(p)?"hunt":"speak with"} them.</p>
          <button id="learnMore" class="ghost" style="margin-top:8px">${personExpand?"Show less":"Learn more"}</button>`}
    </div>
    ${talkable&&p.ship?this.shipDealCard(p):""}
    ${personExpand?`${p.raceId?`<div class="card"><button class="small ghost" data-race="${p.raceId}">View ${p.raceName} race &rarr;</button></div>`:""}
      ${originCard(p)}
      ${speciesSheet(p)}`:""}
    ${talkable?"":`<div class="card"><button class="ghost full center" id="backPeople" data-back="${backTo}">&larr; Back to ${p.hired?'crew':'strangers'}</button></div>`}`;
  },
  screen_cx_races(){
    const races=Object.values(state.codex.races||{}).sort((a,b)=>RARITY.index(a.tier)-RARITY.index(b.tier));
    return `
    ${this.statHeader()}
    <div class="card sheet"><h2>&#9670; Races <span class="dim small">&middot; ${races.length}</span></h2>
      ${races.map(r=>`<div class="krow"><span class="lbl"><button class="small ghost" data-race="${r.id}">${r.id==="self"?"&#9670; ":""}${r.name}</button> <span class="dim small">(${r.archeName})</span></span>
        <span class="kv"><span style="color:${RARITY.byId(r.tier).color}">${RARITY.byId(r.tier).name}</span>
          <span class="dim">&middot; ${r.id==="self"?"your kind":(r.met||0)+" met"}</span></span></div>`).join("")}
    </div>
    ${this.codexBack()}`;
  },
  screen_cx_race(){
    const race=(state.codex.races||{})[viewingRace]; if(!race) return this.screen_cx_races();
    const t=RARITY.byId(race.tier);
    return `
    <div class="card"><h2 class="violet">${race.name}</h2>
      <p class="small dim">${cap(race.flavor)}.</p></div>
    ${this.rarityBannerInline(race.tier, `${humanizeCount(race.population)} in the galaxy`)}
    <div class="card sheet"><h3>Overview</h3>
      ${krow("Body-plan", race.archeName)}
      ${krow("Rarity", `<span style="color:${t.color}">${t.name}</span> &middot; ${RARITY.odds(t)}`)}
      ${krow("Population", humanizeCount(race.population))}
      ${krow("Individuals met", race.id==="self"?"your own race":(race.met||0))}
    </div>
    ${raceSheet(race)}
    <div class="card"><button class="ghost full center" id="backRaces">&larr; Back to races</button></div>`;
  },
  screen_cx_wildlife(){
    const wild=Object.values(state.codex.creatures||{});
    return `
    ${this.statHeader()}
    <div class="card sheet"><h2>&#128062; Wildlife <span class="dim small">&middot; ${wild.length}</span></h2>
      ${wild.length?wild.map(c=>`<div class="krow"><span class="lbl">${c.name}</span>
        <span class="kv dim">${c.count} seen &middot; first on ${c.where}</span></div>`).join("")
        :`<p class="small dim">None — wander the wilds to find creatures.</p>`}
    </div>
    ${this.codexBack()}`;
  },
  screen_cx_hires(){
    const crew=state.crew||[];
    return `
    ${this.statHeader()}
    <div class="card sheet"><h2>&#128101; Hires <span class="dim small">&middot; ${crew.length}</span></h2>
      ${crew.length?crew.map((c,ci)=>{ const sh=c.shipId?(state.vehicles||[]).find(v=>v.id===c.shipId):null;
        return `<div class="krow"><span class="lbl">${c.personIdx>=0?`<button class="small ghost" data-person="${c.personIdx}">${c.name}</button>`:c.name} <span class="dim small">&middot; Pilot</span></span>
          <span class="kv">${sh?`<span class="green">piloting ${sh.name}</span> <button class="small ghost" data-unassign="${ci}">Unassign</button>`:'<span class="dim">idle</span>'} <button class="small ghost" data-dismiss="${ci}">Dismiss</button></span></div>`; }).join("")
        :`<p class="small dim">No hires yet. Meet a Pilot out in the galaxy and hire them from their Codex page.</p>`}
      <p class="small dim" style="margin-top:8px">Assign idle hires to ships in the <b>Ships</b> tab (you must be docked with the ship).</p>
    </div>
    ${this.codexBack()}`;
  },
  screen_cx_worlds(){
    const g=state.galaxy, sys=curSys(), worlds=state.codex.worlds||[], pos=playerXY();
    // known systems (the one you're in + any you've charted), nearest first — distance from
    // your current system OR your deep-space drift point
    const known = g ? g.systems.filter(s=>s.discovered).map(s=>({ s, d:s.id===state.sysId?0:pointDist(pos,{x:s.x,y:s.y}) }))
      .sort((a,b)=>a.d-b.d) : [];
    return `
    ${this.statHeader()}
    <div class="card sheet"><h2>&#9737; Planets &amp; systems</h2>
      ${sys?`<h3 style="margin-top:8px">${sys.name} <span class="dim small">&middot; current system</span></h3>
        <p class="small dim">${sys.size} world${sys.size>1?"s":""} &middot; ${sys.planets.filter(p=>p.discovered).length} charted. <span class="dim">Tap a charted world to study it.</span></p>
        ${sys.planets.map((p,i)=>{ const here=i===state.atSlot;
          if(p.discovered) return `<div class="krow"><span class="lbl">${p.isHome?"&#9737; ":""}<button class="small ghost" data-world="${sys.id}:${i}">${p.fav?"&#9733; ":""}${p.world.name}</button> ${here?'<span class="green small">&#9679; here</span>':''}</span>
               <span class="kv">${isInhabited(p.world)?`<span class="gold">${settleDef(p.world.settle).name}</span>`:cap(p.world.biomeName)} <button class="small ghost" data-fav="${sys.id}:${i}" title="${p.fav?'Unfavourite':'Favourite'}">${p.fav?'&#9733;':'&#9734;'}</button></span></div>`;
          return `<div class="krow"><span class="lbl dim">Uncharted world ${i+1}</span>
               <span class="kv dim">&#128274; unexplored</span></div>`; }).join("")}`
      : adrift()?`<h3 style="margin-top:8px">&#127756; Deep space</h3>
        <p class="small dim">Adrift between the stars at <b>(${Math.round(pos.x)}, ${Math.round(pos.y)})</b>, ${Math.round(Math.hypot(pos.x,pos.y))} ly from the core. Navigate from the <b>World</b> tab.</p>`
      : `<p class="small dim">Unknown. Buy a ship at the Shipyard and take off to chart your home system — then the wider galaxy opens up.</p>`}
    </div>
    ${g&&g.systems.length>1?`<div class="card sheet"><h3>Known systems <span class="dim small">&middot; ${known.length} charted / ${g.systems.length} in range of sensors</span></h3>
      ${known.map(({s,d})=>{ const cur=!adrift()&&s.id===state.sysId;
        return `<div class="krow"><span class="lbl">${cur?'&#9737; ':''}${s.name}${cur?' <span class="green small">&#9679; here</span>':''}</span>
        <span class="kv">${cur?'<span class="dim">current</span>':`${d.toFixed(1)} ly`} <span class="dim small">&middot; ${(s.planets||[]).filter(p=>p.discovered).length}/${s.size} charted</span></span></div>`; }).join("")}
      <p class="small dim" style="margin-top:6px">Open <b>Travel</b> from the Crew tab to fly or jump between systems.</p>
    </div>`:""}
    <div class="card sheet"><h3>Worlds logged <span class="dim small">&middot; ${worlds.length}</span></h3>
      ${worlds.length?worlds.map((w,wi)=>`<div class="krow"><span class="lbl"><button class="small ghost" data-worldlog="${wi}">${w.name}</button>${w.sysName?` <span class="dim small">&middot; ${w.sysName}</span>`:""}</span>
        <span class="kv">${cap(w.biomeName)} <span style="color:${RARITY.byId(w.tier).color}">${RARITY.byId(w.tier).name}</span></span></div>`).join("")
        :`<p class="small dim">None logged yet.</p>`}
    </div>
    ${this.codexBack()}`;
  },
  screen_cx_world(){
    const w=viewingWorld; if(!w) return this.screen_cx_worlds();
    const t=RARITY.byId(w.tier);
    return `
    <div class="card"><h2 class="blue">${w.name}</h2>
      <p class="small dim">${cap(w.biomeName)}${w.sysName?` &middot; ${w.sysName} system`:""}</p></div>
    ${this.rarityBannerInline(w.tier, `${cap(w.biomeName)} world`)}
    <div class="card sheet"><h3>Survey</h3>
      ${krow("Biome", cap(w.biomeName))}
      ${krow("Settlement", isInhabited(w)?settleDef(w.settle).name:'<span class="dim">Uninhabited</span>')}
      ${krow("Rarity", `<span style="color:${t.color}">${t.name}</span> &middot; ${RARITY.odds(t)}`)}
      ${krow("Technology", techText(w))}
      ${krow("Wealth", wealthText(w))}
      ${w.danger!=null?krow("Danger", dangerText(w)):""}
      ${krow("Population", popText(w))}
    </div>
    ${isInhabited(w)?`<div class="card"><p class="small dim">${settleDef(w.settle).desc}.</p></div>`:""}
    <div class="card"><button class="ghost full center" id="backWorlds">&larr; Back to planets &amp; systems</button></div>`;
  },
  screen_cx_obj(){
    const doneList=OBJECTIVES.filter(o=>state.achievements[o.id]), done=doneList.length;
    const earned=doneList.reduce((s,o)=>s+objReward(o),0);
    return `
    ${this.statHeader()}
    <div class="card sheet"><h2>&#9733; Objectives <span class="dim small">&middot; ${done}/${OBJECTIVES.length}</span></h2>
      <p class="small dim">Each milestone pays a credit bounty when you reach it. Earned so far: <b class="gold">${commas(earned)}c</b>.</p>
      ${OBJECTIVES.map(o=>{ const d=!!state.achievements[o.id];
        return `<div class="krow"><span class="lbl">${d?'<span class="green">&#10003;</span>':'<span class="dim">&#9675;</span>'} ${o.label}</span>
          <span class="kv">${d?'<span class="green small">+'+commas(objReward(o))+'c claimed</span>':'<span class="gold small">+'+commas(objReward(o))+'c</span>'}</span></div>`; }).join("")}
    </div>
    ${this.codexBack()}`;
  },

  /* ---------- ARRIVAL (fly to a world: name it, meet its people, identify their race) ---------- */
  screen_arrive(){
    const a=arriving; if(!a) return this.screen_codex();
    const w=a.world;
    if(a.step===1) return `
      ${this.rarityBanner(w.tier, a.crossSys?`a world in the ${state.galaxy.systems[a.sysId].name} system`:"a world in your system")}
      <div class="card sheet">
        <h2>${cap(article(w.biomeName))} <span class="blue">${w.biomeName}</span></h2>
        <p class="small dim">${worldDesc(w)}</p>
        ${krow("Settlement", isInhabited(w)?`<b class="gold">${settleDef(w.settle).name}</b>`:'<span class="dim">Uninhabited</span>')}
        ${krow("Population", popText(w))}
        ${krow("Technology", techText(w))}
        ${krow("Wealth", wealthText(w))}
        ${krow("Danger", dangerText(w))}
      </div>
      ${isInhabited(w)?`<div class="card"><p class="small dim">${settleDef(w.settle).desc}.</p></div>`:""}
      <div class="card">
        <p class="small">Name this world:</p>
        ${nameField("arrWorld","Name this world","world",w.name)}
        <div class="row between" style="margin-top:10px">
          <button class="ghost" id="arrCancel">&larr; Leave orbit</button>
          <button class="primary" id="arrStep1">${a.occupied?"Name &amp; land &rarr;":"Name &amp; log &rarr;"}</button>
        </div>
      </div>`;
    if(a.step===2) return `
      <div class="card">
        <h2>${w.name}</h2>
        <p class="small dim">You set down at ${a.outpost}. A figure approaches — you are introduced.</p>
        <p class="small">Name this person:</p>
        ${nameField("arrPerson","Name this person","person",a.person?a.person.name:"")}
        <div class="row between" style="margin-top:10px">
          <button class="ghost" id="arrBack2">&larr; Back</button>
          <button class="primary" id="arrStep2">Meet them &rarr;</button>
        </div>
      </div>`;
    // step 3 — their stat sheet + race identity
    const person=a.person, known=!a.draw.isNew, race=a.draw.race;
    return `
      <div class="card">
        <h2>${person.name||"A stranger"}</h2>
        ${known?`<p class="small green">You recognize their kind — <b class="violet">${race.name}</b>, already in your Codex.</p>`
          :`<p class="small gold">Their kind is new to your Codex.</p>`}
        <p class="small dim">Career: ${careerName(person.career)}.</p>
      </div>
      ${originCard(person)}
      ${speciesSheet(person)}
      <div class="card">
        ${known?`<p class="small dim">They are ${article(race.name)} <b class="violet">${race.name}</b>.</p>`
          :`<p class="small">Name this new race:</p>${nameField("arrRace","Name this race","race",race.name)}`}
        <div class="row between" style="margin-top:10px">
          <button class="ghost" id="arrBack3">&larr; Back</button>
          <button class="primary" id="arrFinish">Record &amp; continue &rarr;</button>
        </div>
      </div>`;
  },

  /* ---------- COMBAT ---------- */
  screen_combat(){
    if(!combat) return this.screen_hub();
    const c=combat, atk=state.skills.filter(s=>DATA.skills[s].type==="attack");
    // a beaten Wanted target: choose to kill or restrain
    if(c.person && c.claim) return `
    ${this.statHeader()}
    <div class="card">
      <h2 class="gold">${c.name} is beaten</h2>
      <p class="small dim">Their bounty is yours to claim — redeem it at any bar.</p>
      <div class="row">
        <button class="primary" data-claim="alive">Restrain &middot; ${commas(c.bounty.alive)}c</button>
        <button data-claim="dead">Kill &middot; ${commas(c.bounty.dead)}c</button>
      </div>
    </div>
    ${this.logCard()}`;
    const traits=(c.traits||[]).map(t=>COMBAT_TRAITS[t]).filter(Boolean);
    const eStat=[]; if(c.eStatus){ if(c.eStatus.bleed>0) eStat.push(`<span class="chip r">&#129656; bleeding ${c.eStatus.bleed}</span>`); if(c.eStatus.daze>0) eStat.push(`<span class="chip gold">&#128171; dazed</span>`); }
    const pStat=[]; if(c.pStatus && c.pStatus.poison>0) pStat.push(`<span class="chip v">&#9763; poisoned ${c.pStatus.poison}</span>`);
    const fx=s=>{ const k=DATA.skills[s]; return k.applies==="bleed"?' <span class="r">&#129656;</span>':k.applies==="daze"?' <span class="gold">&#128171;</span>':k.hits>1?` <span class="dim">x${k.hits}</span>`:k.critBonus?' <span class="gold">&#10022;</span>':""; };
    return `
    ${this.statHeader()}
    ${(()=>{ const th=threatOf(c.level||1); return `<div class="card">
      <div class="row between"><h2 class="red">${c.name}</h2>
        <span class="small">Lv ${c.level||1} &middot; <b class="${th.c}">${th.t}</b></span></div>
      <p class="small dim">${c.blurb}</p>
      ${c.stim?'<p class="small gold">stim primed</p>':""}
      ${(c.level||1) > (state.level||1)+30 ? '<p class="small red">&#9760; This foe is far beyond you — one hit could end you. Flee.</p>' : (c.level||1) < (state.level||1)-22 ? '<p class="small dim">Beneath your notice — this will be quick.</p>' : ""}`; })()}
      ${traits.length?`<div class="chips" style="margin:4px 0">${traits.map(t=>`<span class="chip ${t.tag}" title="${t.hint}">${t.name}</span>`).join("")}${eStat.join("")}</div>`:(eStat.length?`<div class="chips" style="margin:4px 0">${eStat.join("")}</div>`:"")}
      <div class="statline"><span>HP</span><span>${Math.max(0,c.hp)} / ${c.maxHp}</span></div>
      <div class="bar"><i class="hpfill" style="width:${Math.max(0,c.hp/c.maxHp*100)}%"></i></div>
      <span class="pill">atk ${c.atk}</span>
      ${c.winding?`<p class="small gold" style="margin-top:6px">&#9888; It's winding up a heavy blow — heal up or hit it fast!</p>`:""}
      ${pStat.length?`<div class="chips" style="margin-top:6px">${pStat.join("")}</div>`:""}
    </div>
    <div class="card">
      <h3>Your move</h3>
      <div class="grid">
        ${atk.map(s=>`<button data-atk="${s}">${s}${fx(s)}<br><span class="small dim">${DATA.skills[s].energy||0} en</span></button>`).join("")}
        ${state.skills.includes("Mend")?`<button data-atk="Mend">Mend<br><span class="small dim">6 en</span></button>`:""}
        <button data-atk="Focus" class="ghost">Focus<br><span class="small dim">+energy</span></button>
        ${(c.person||c.foe)?"":`<button id="actTame">Tame</button>`}

  /* ---------- GARAGE (vehicles + the power metrics) ---------- */

  screen_crew(){

  crewmatesView(){

    let lastRole=null;

  /* a carrier's hangar: the fighters stowed inside, plus a picker to stow more (when docked) */
  hangarCard(v, here){

    const dock=here?(state.vehicles||[]).filter(f=>atHere(f)&&canBeCarried(f)):[];
    return `<div class="card sheet"><h3>&#128640; Hangar bays <span class="dim small">&middot; ${held.length}/${v.bays} full</span></h3>

        ${dock.map(f=>`<div class="krow"><span class="lbl">${f.name} <span class="dim small">&middot; ${f.clsName||"fighter"}</span></span><span class="kv"><button class="small ghost" data-stow="${v.id}:${f.id}">Stow</button></span></div>`).join("")}`
        :`<p class="small dim" style="margin-top:8px">No free fighters docked here to stow. Fly or buy a fighter to this dock first.</p>`)
        :`<p class="small dim" style="margin-top:8px">Travel to this carrier to load or launch fighters.</p>`):""}
      <p class="small dim" style="margin-top:6px">Stowed fighters ride along wherever the carrier goes and don't need their own crew until you launch them.</p></div>`;

  shipsView(){
    const ships=state.vehicles||[];
    if(viewingShip){
      const v=ships.find(x=>x.id===viewingShip); if(!v){ viewingShip=null; return this.shipsView(); }
      const active=v.id===state.activeShip, here=atHere(v), cmax=v.crewMax||1;
      const layout=shipSeats(v), berths=passengerBerths(v);
      let seats="";
      layout.forEach((seat,n)=>{ const lbl=`<span class="${SEAT_COLOR[seat.role]}" style="font-weight:600">${seatLabel(seat)}</span>`;
        if(active && n===0){ seats+=`<div class="frow"><div class="finfo">${lbl}<div class="small dim" style="margin-top:2px">that's you</div></div><span class="chip g">Captain</span></div>`; return; }
        const occ=seatOccupant(v.id,n);
        seats+= occ
          ? `<div class="frow"><div class="finfo">${lbl}<div class="small" style="margin-top:2px">${occ.name} <span class="dim">&middot; ${careerName(occ.career)}</span></div></div><button class="small ghost" data-unseat="${state.crew.indexOf(occ)}">Remove</button></div>`
          : `<div class="frow"><div class="finfo">${lbl}<div class="small dim" style="margin-top:2px">empty</div></div>${here?`<button class="small" data-seat="${v.id}:${n}">Assign</button>`:'<span class="chip">&mdash;</span>'}</div>`;
      });
      // passenger berths (capacity beyond the working crew)
      const pax=(state.crew||[]).filter(c=>c.shipId===v.id && c.seat>=layout.length);
      if(berths>0){
        seats+=`<div class="frow"><div class="finfo"><span class="dim" style="font-weight:600">Passenger berths</span><div class="small dim" style="margin-top:2px">${pax.length}/${berths} aboard</div></div>${here&&pax.length<berths?`<button class="small" data-seatpax="${v.id}">Board</button>`:""}</div>`;
        seats+=pax.map(c=>`<div class="frow"><div class="finfo"><span class="dim small">passenger</span><div class="small" style="margin-top:2px">${c.name} <span class="dim">&middot; ${careerName(c.career)}</span></div></div><button class="small ghost" data-unseat="${state.crew.indexOf(c)}">Remove</button></div>`).join("");
      }
      const fleet=fleetOf(v), grounded=state.grounded && active && spaceworthy(v);
      const canMove=!grounded && (v.range!=="surface") && Game.operational(v);
      const op=Game.operational(v), hpPct=v.maxHp?clamp(Math.round(v.hp/v.maxHp*100),0,100):0, shMax=shipMaxShield(v);
      return `<div class="card">
        <div class="row between"><h2 class="gold">${active?'&#9654; ':''}${v.name}</h2>
          <span class="tag" style="color:${RARITY.byId(v.tier).color}">${RARITY.byId(v.tier).name}</span></div>
        <div class="sub" style="font-size:.78rem;color:var(--dim)">${v.role||v.clsName} &middot; docked at <b class="blue">${shipLocationName(v)}</b></div>
        <div class="chips" style="margin-top:9px">
          ${here?'<span class="chip g">&#9679; here</span>':'<span class="chip">away</span>'}
          <span class="chip ${op?'g':'r'}">${op?'&#10003; operational':'needs crew'}</span>
          <span class="chip">${v.range==="interstellar"?`&#9889; ${jumpRange(v).toFixed(1)} ly`:RANGE_LABEL[v.range]}</span>
          ${fleet?`<span class="chip b">&#9863; ${fleet.name}</span>`:'<span class="chip">independent</span>'}
          ${v.bays>0?`<span class="chip v">&#128640; ${carriedShips(v.id).length}/${v.bays} bays</span>`:""}
          ${shipBusy(v)?'<span class="chip gold">&#128666; trading</span>':""}
        </div>
        <div class="row between small" style="margin:11px 0 1px"><span class="dim">Hull${v.armor?` &middot; ${ARMOR[v.armor].name}`:""}</span><span class="${hpPct<34?'red':''}">${commas(v.hp||0)} / ${commas(v.maxHp||0)} HP</span></div>
        <div class="bar"><i class="hpfill" style="width:${hpPct}%"></i></div>
        ${shMax?`<div class="row between small" style="margin:7px 0 1px"><span class="dim">Shield &middot; ${SHIELD[v.shieldTier].name}</span><span>${commas(shMax)}</span></div><div class="bar"><i class="enfill" style="width:100%"></i></div>`:""}
        ${(grounded||canMove)?`<div class="row" style="margin-top:11px">
          ${grounded?`<button class="primary" data-takeoff="${v.id}">&#9650; Take off &amp; chart your system</button>`:""}
          ${canMove?`<button data-moveship="${v.id}">&#9992; ${fleet?`Move (via ${fleet.name})`:"Move ship"}</button>`:""}
        </div>`:""}
        ${!here?`<p class="small dim" style="margin-top:8px">You're not docked with this ship — travel to it to assign crew or pilot it.</p>`:""}
      </div>
      <div class="card sheet"><h3>Specifications</h3>
        ${krow("Class", `${v.clsName||v.role} <span class="dim small">&middot; ${shipCatName(shipCat(v))||"craft"}</span>`)}
        ${krow("Weapons", `${mountedCount(v)}/${(v.guns||[]).length} mounted &middot; <span class="gold">${commas(shipAttack(v))}</span> atk`)}
        ${(v.guns||[]).length?krow("Hardpoints", slotBreakdown(v.slotSizes)):""}
        ${krow("Crew needed", `${v.reqPilots||1} pilot${(v.reqPilots||1)>1?"s":""}${v.reqMech?`, ${v.reqMech} mech${v.reqMech>1?"s":""}`:""}${(v.gunnerGuns||0)?`, ${v.gunnerGuns} gunner${v.gunnerGuns>1?"s":""}`:""}`)}
        ${krow("Aboard", `${Game.pilots(v)} pilot${Game.pilots(v)!==1?"s":""}${active?' <span class="dim small">(incl. you)</span>':''}, ${Game.aboard(v,"mechanic")} mech${(v.reqLabor||0)?`, ${Game.laborers(v)} labor`:""}`)}
        ${krow("Cargo hold", `${commas(v.hold||0)} slots`)}
        ${krow("Maintenance", `${commas(shipMaint(v))}c / yr`)}
      </div>
      <div class="card sheet"><h3>Crew seats <span class="dim small">&middot; ${layout.length} stations${berths?` + ${berths} berths`:""}</span></h3>${seats}
        <p class="small dim" style="margin-top:6px">The Captain seat is yours. A ship flies only with its pilots and mechanics aboard, and each Gunner mans one weapon mount. Crew aboard travel with the ship.</p></div>
      ${v.bays>0?this.hangarCard(v, here):""}
      <div class="card"><div class="row">
        ${!active&&here?`<button class="small" data-selship="${v.id}">Pilot this</button>`:""}
        <button class="small ghost" data-renship="${v.id}">Rename</button>
        <button class="ghost" id="shipsBack">&larr; All ships</button>
      </div></div>`;
    }
    const shown=ships.filter(v=>!v.carrier);   // stowed fighters live in their carrier's hangar
    const order=SHIP_CATS.map(c=>c.id);
    const active=shown.find(v=>v.id===state.activeShip);
    const rest=shown.filter(v=>v.id!==state.activeShip).sort((a,b)=>{ const ca=order.indexOf(shipCat(a)), cb=order.indexOf(shipCat(b));
      return ((ca<0?99:ca)-(cb<0?99:cb)) || ((shipClass(a.cls)||{}).size||0)-((shipClass(b.cls)||{}).size||0) || a.name.localeCompare(b.name); });
    const shipCard=(v)=>{ const isA=v.id===state.activeShip, here=atHere(v), op=Game.operational(v),
        crew=(isA?1:0)+Game.shipCrew(v).length, cmax=v.crewMax||1, fleet=fleetOf(v), hold=carriedShips(v.id).length, busy=shipBusy(v);
      return `<button class="shipcard${isA?' on':''}" data-selshipview="${v.id}">
        <div class="top"><span class="nm">${isA?'&#9654; ':''}${v.name}</span>

        <div class="sub">${v.clsName||v.role||"Ship"} &middot; ${v.range==="interstellar"?`<span class="gold">${jumpRange(v).toFixed(1)} ly</span>`:RANGE_LABEL[v.range]} &middot; ${shipLocationName(v)}</div>

          ${here?'<span class="chip g">&#9679; here</span>':""}
          <span class="chip${op?'':' r'}">${op?`crew ${crew}/${cmax}`:"needs crew"}</span>
          ${fleet?`<span class="chip b">&#9863; ${fleet.name}</span>`:""}
          ${hold?`<span class="chip v">&#128640; ${hold}</span>`:""}
          ${(!fleet&&!v.carrier&&v.homeCarrier)?(()=>{ const hc=(state.vehicles||[]).find(x=>x.id===v.homeCarrier); return hc&&(hc.sysId??0)===(v.sysId??0)&&hc.slot===v.slot?`<span class="chip v">&#128640; with ${hc.name}</span>`:""; })():""}
          ${busy?'<span class="chip gold">&#128666; trading</span>':""}
        </div></button>`; };
    let lastCat=null;
    const restRows=rest.map(v=>{ const cat=shipCat(v), head=(cat!==lastCat?(lastCat=cat, `<div class="shipcat">${cat?shipCatName(cat):"Other craft"}</div>`):""); return head+shipCard(v); }).join("");
    const rows=(active?`<div class="shipcat" style="color:var(--green)">&#9654; Now commanding</div>${shipCard(active)}`:"")+restRows;
    return `<div class="card"><div class="row between"><h3>Your ships <span class="dim small">&middot; ${shown.length}</span></h3>${state.activeShip?'<span class="small dim">&#9654; piloting</span>':""}</div>
      ${shown.length?rows:'<p class="small dim">No ships yet. Buy one at a shipyard or off a trader you meet.</p>'}
    </div>`;
  },
  /* ---------- FLEETS (named ship groups you can move together) ---------- */
  /* the trade-job panel inside a fleet's view: current job, the route builder, or the entry point */
  fleetTradeCard(f){
    if(f.trade){ const t=f.trade, A=worldAt(t.buySys,t.buySlot), B=worldAt(t.sellSys,t.sellSlot), c=commodityById(t.commodity);
      const bp=A?commodityBuy(A,c):0, sp=B?commoditySell(B,c):0, cap=fleetCargoCap(f), qty=Math.floor(cap/(c?c.bulk:1)), cyc=tradeCycleActions(t, groupCaps(f.shipIds).jump);
      const margin=sp-bp, crewed=fleetAllCrewed(f), uncrewed=shipsByIds(f.shipIds).filter(v=>!Game.operational(v));
      // why isn't it earning? surface the exact blocker
      let warn="";
      if(!crewed) warn=`<p class="small red">&#9888; <b>PAUSED — not moving or earning.</b> ${uncrewed.map(v=>v.name).join(", ")} ${uncrewed.length>1?"need":"needs"} a full crew. Crew ${uncrewed.length>1?"them":"it"} (or call the job off).</p>`;
      else if(cap<=0) warn=`<p class="small red">&#9888; <b>No cargo hold</b> — this fleet's ships have nothing to haul with. Call it off and use a freighter.</p>`;
      else if(!c) warn=`<p class="small red">&#9888; This route's good is missing. Call it off and set a new one.</p>`;
      else if(!A||!canBuyHere(A,c)) warn=`<p class="small red">&#9888; <b>${A?A.name:"The buy world"} no longer sells ${c.name}</b>, so nothing's being bought. Call it off and re-pick.</p>`;
      else if(!B||!canSellHere(B,c)) warn=`<p class="small red">&#9888; <b>${B?B.name:"The sell world"} won't buy ${c.name}</b>, so nothing's being sold. Call it off and re-pick.</p>`;
      else if(margin<=0) warn=`<p class="small red">&#9888; <b>Not profitable right now</b> — ${c.name} sells for no more than it costs here. Call it off and pick a better pair.</p>`;
      else warn=`<p class="small dim">~${commas(Math.max(0,margin)*qty)}c per ${cyc}-action round trip.</p>`;
      const fp=fleetFirepower(f);
      return `<div class="card"><h3>&#128666; Trade job</h3>
        <p class="small">Buy <b>${c?c.name:"?"}</b> at <b>${A?A.name:"?"}</b> (${commas(bp)}c) &rarr; sell at <b>${B?B.name:"?"}</b> (${commas(sp)}c) &middot; margin <b class="${margin>0?'gold':'red'}">${margin>0?'+':''}${commas(margin)}c</b>/unit.</p>
        ${warn}
        <p class="small ${fp<=1?'red':fp<4000?'gold':'dim'}">&#128737; Escort: ${fp<=1?'<b>none — easy prey for raiders</b>':fp<4000?'light — a starfighter or two would help':'well-guarded'} <span class="dim">(firepower ${commas(fp)}). Raiders rarely strike, harder on the rim.</span></p>
        <p class="small dim">${t.runs||0} runs done &middot; <b class="${(t.earned||0)>=0?'gold':'red'}">${(t.earned||0)>=0?'+':''}${commas(t.earned||0)}c</b> net &middot; ${t.phase==="toSell"?"hauling to sell":"returning to buy"}.</p>
        <button class="full center" data-fleetuntrade="${f.id}">Call off the trade job</button></div>`; }
    if(tradeBuild && tradeBuild.fid===f.id) return this.tradeBuilder(f, tradeBuild);
    if(f.shipIds.includes(state.activeShip)) return `<div class="card"><h3>&#128666; Trade job</h3><p class="small dim">You're flying with this fleet — assign a job to a fleet you're not aboard.</p></div>`;
    if(!fleetAllCrewed(f)) return `<div class="card"><h3>&#128666; Trade job</h3><p class="small dim">Every ship needs its full crew before the fleet can take a job.</p></div>`;
    if(fleetCargoCap(f)<=0) return `<div class="card"><h3>&#128666; Trade job</h3><p class="small dim">This fleet has no cargo hold to trade with.</p></div>`;
    return `<div class="card"><h3>&#128666; Assign job</h3>
      <p class="small dim">Send this fleet to run a trade route on its own — it moves one leg each time you take an action.</p>
      <button class="full center" data-tbjob="${f.id}">&#128666; Trade route &hellip;</button></div>`;
  },
  tradeBuilder(f, tb){
    const loc=fleetLoc(f), cap=fleetCargoCap(f);
    const head=`<div class="row between"><h3>&#128666; Trade route</h3>
      <span style="display:flex;gap:6px">${tb.phase!=="buySys"?`<button class="small ghost" data-tbback="${f.id}">&larr; Back</button>`:""}<button class="small ghost" data-tbcancel="${f.id}">Cancel</button></span></div>`;
    const interstellar=groupCaps(f.shipIds).tier==="interstellar";
    const tradeNote=interstellar
      ? `<p class="small dim">Charted, inhabited systems you've visited — more open up as you explore. Far-off systems just take more jumps per run.</p>`
      : `<p class="small gold">This fleet can't jump between systems — every ship in it needs an interstellar hyperdrive. For now it can only trade between worlds in its current system.</p>`;
    if(tb.phase==="buySys"){ const sys=reachableTradeSystems(loc.sysId, f);
      return `<div class="card sheet">${head}<p class="small dim">Step 1 &middot; the system to <b>buy</b> in.</p>${tradeNote}
        ${sys.length?sys.map(s=>`<div class="krow"><span class="lbl">${s.name}${s.id===loc.sysId?' <span class="green small">here</span>':` <span class="dim small">&middot; ${sysDist(loc.sysId,s.id).toFixed(1)} ly</span>`}</span><span class="kv"><button class="small" data-tbbuysys="${f.id}:${s.id}">Pick</button></span></div>`).join(""):`<p class="small dim">No charted inhabited systems in reach.</p>`}</div>`; }
    if(tb.phase==="buyPlanet"){ const ps=inhabPlanets(tb.buySys);
      return `<div class="card sheet">${head}<p class="small dim">Step 2 &middot; the <b>buy</b> planet.</p>
        ${ps.map(x=>`<div class="krow"><span class="lbl">${x.world.name} <span class="dim small">&middot; ${settleDef(x.world.settle).name}</span></span><span class="kv"><button class="small" data-tbbuyplanet="${f.id}:${x.slot}">Pick</button></span></div>`).join("")}</div>`; }
    if(tb.phase==="buyGood"){ const A=worldAt(tb.buySys,tb.buySlot), goods=COMMODITIES.filter(c=>canBuyHere(A,c));
      return `<div class="card sheet">${head}<p class="small dim">Step 3 &middot; the <b>good to buy</b> at ${A.name} — what it sells, at its price.</p>
        ${goods.map(c=>`<div class="krow"><span class="lbl">${c.name} <span class="dim small">&middot; ${c.bulk} slot${c.bulk>1?"s":""}</span></span><span class="kv"><span class="gold small">${commas(commodityBuy(A,c))}c</span> <button class="small" data-tbgood="${f.id}:${c.id}">Pick</button></span></div>`).join("")}</div>`; }
    if(tb.phase==="sellSys"){ const sys=reachableTradeSystems(tb.buySys, f), c=commodityById(tb.commodity);
      return `<div class="card sheet">${head}<p class="small dim">Step 4 &middot; the system to <b>sell</b> your ${c.name} in.</p>${tradeNote}
        ${sys.map(s=>`<div class="krow"><span class="lbl">${s.name}${s.id===tb.buySys?' <span class="dim small">(same system)</span>':` <span class="dim small">&middot; ${sysDist(tb.buySys,s.id).toFixed(1)} ly</span>`}</span><span class="kv"><button class="small" data-tbsellsys="${f.id}:${s.id}">Pick</button></span></div>`).join("")}</div>`; }
    if(tb.phase==="sellPlanet"){ const ps=inhabPlanets(tb.sellSys), c=commodityById(tb.commodity);
      return `<div class="card sheet">${head}<p class="small dim">Step 5 &middot; the <b>sell</b> planet — confirm it buys ${c.name} and see the price.</p>
        ${ps.filter(x=>!(tb.sellSys===tb.buySys&&x.slot===tb.buySlot)).map(x=>{ const ok=canSellHere(x.world,c);
          return `<div class="krow"><span class="lbl">${x.world.name} <span class="dim small">&middot; ${settleDef(x.world.settle).name}</span></span><span class="kv">${ok?`<span class="gold small">${commas(commoditySell(x.world,c))}c</span> <button class="small" data-tbsellplanet="${f.id}:${x.slot}">Pick</button>`:'<span class="dim small">won’t buy it</span>'}</span></div>`; }).join("")}</div>`; }
    // confirm
    const A=worldAt(tb.buySys,tb.buySlot), B=worldAt(tb.sellSys,tb.sellSlot), c=commodityById(tb.commodity);
    const bp=commodityBuy(A,c), sp=commoditySell(B,c), qty=Math.floor(cap/c.bulk), profit=(sp-bp)*qty;
    const cyc=tradeCycleActions({buySys:tb.buySys,buySlot:tb.buySlot,sellSys:tb.sellSys,sellSlot:tb.sellSlot}, groupCaps(f.shipIds).jump);
    return `<div class="card sheet">${head}
      <p class="small">Buy <b>${c.name}</b> at <b>${A.name}</b> for <span class="gold">${commas(bp)}c</span>, sell at <b>${B.name}</b> for <span class="gold">${commas(sp)}c</span> (margin ${commas(sp-bp)}c).</p>
      <p class="small dim">${qty} units a run &middot; ~<b class="${profit>0?'gold':'red'}">${commas(profit)}c</b> profit per ${cyc}-action round trip. The fleet spends your credits to buy and banks the sales.</p>
      <button class="full primary center" data-tbconfirm="${f.id}" ${profit>0?"":"disabled"}>${profit>0?"Confirm trade job":"Not profitable"}</button></div>`;
  },
  fleetsView(){
    const fleets=state.fleets||[];
    const myFleet=(Game.ship()||{}).fleetId||null;   // the fleet you're flying with
    if(fleetBuild){            // creating a new fleet — only ships in your current system, not already in a fleet
      const avail=fleetShipsHereWithYou();
      const sel=new Set(fleetBuild.shipIds);
      return `<div class="card"><h2>New fleet</h2>
        <p class="small dim">Add ships docked in <b class="blue">${curSys()?curSys().name:"this"}</b> system. You must be here to form the fleet.</p>
        ${nameField("fleetName","Name this fleet","ship",fleetBuild.name)}
        <div class="sheet" style="margin-top:8px">
        ${avail.length?avail.map(v=>`<div class="krow"><span class="lbl">${sel.has(v.id)?'&#9745; ':'&#9744; '}${v.name} <span class="dim small">&middot; ${RANGE_LABEL[v.range]}</span></span>
          <span class="kv"><button class="small ${sel.has(v.id)?'':'ghost'}" data-fbtoggle="${v.id}">${sel.has(v.id)?"Remove":"Add"}</button></span></div>`).join("")
          :`<p class="small dim">No free ships in this system. Buy or fly ships here first.</p>`}
        </div>
        <div class="row between" style="margin-top:10px">
          <button class="ghost" id="fbCancel">Cancel</button>
          <button class="primary" id="fbCreate" ${fleetBuild.shipIds.length?"":"disabled"}>Create fleet (${fleetBuild.shipIds.length})</button>
        </div></div>`;
    }
    if(viewingFleet){
      const f=fleetById(viewingFleet); if(!f){ viewingFleet=null; return this.fleetsView(); }
      const caps=groupCaps(f.shipIds), fsys=state.galaxy.systems[fleetSys(f)];
      const withYou=fleetSys(f)===state.sysId;
      const addable=(state.vehicles||[]).filter(v=>!v.fleetId && !v.carrier && (v.sysId??0)===fleetSys(f));
      const fShips=shipsByIds(f.shipIds);
      const fHp=fShips.reduce((s,v)=>s+Math.max(0,v.hp||0),0), fMax=fShips.reduce((s,v)=>s+(v.maxHp||0),0);
      const fAtk=fShips.reduce((s,v)=>s+shipAttack(v),0), fPct=fMax?clamp(Math.round(fHp/fMax*100),0,100):0;
      return `<div class="card">
        <div class="row between"><h2 class="gold">${f.name}</h2><span class="tag">${f.shipIds.length} ship${f.shipIds.length!==1?"s":""}</span></div>
        <div class="chips" style="margin-top:7px">
          <span class="chip b">&#128205; ${fsys?fsys.name:"?"}</span>
          ${withYou?'<span class="chip g">&#9679; with you</span>':'<span class="chip">away</span>'}
          <span class="chip">${RANGE_LABEL[caps.tier]}${caps.tier==="interstellar"?` &middot; ${caps.jump.toFixed(1)} ly`:""}</span>
          ${f.trade?'<span class="chip gold">&#128666; trading</span>':fleetAllCrewed(f)?'<span class="chip g">ready</span>':'<span class="chip r">needs crew</span>'}
        </div>
        <div class="row between small" style="margin:11px 0 1px"><span class="dim">Fleet hull</span><span class="${fPct<34?'red':''}">${commas(fHp)} / ${commas(fMax)} HP &middot; &#9876; ${commas(fAtk)} firepower</span></div>
        <div class="bar"><i class="hpfill" style="width:${fPct}%"></i></div>
        <div class="row" style="margin-top:10px">
          <button data-fleetmove="${f.id}">&#9992; Move fleet</button>
          <button class="ghost small" data-fleetrename="${f.id}">Rename</button>
          <button class="ghost small" data-fleetdisband="${f.id}">Disband</button>
        </div>
        ${withYou?"":'<p class="small dim" style="margin-top:6px">Add or remove ships from anywhere; be with the fleet to disband it.</p>'}
      </div>
      <div class="card sheet"><h3>Ships in fleet</h3>
        ${shipsByIds(f.shipIds).map(v=>{ const a=v.id===state.activeShip, ok=Game.operational(v);
          return `<div class="frow"><div class="finfo"><div class="nm">${a?'&#9654; ':''}${v.name}</div>
            <div class="chips" style="margin-top:4px"><span class="chip">${RANGE_LABEL[v.range]}</span>${ok?'<span class="chip g">crewed</span>':'<span class="chip r">no crew</span>'}</div></div>
            <button class="small ghost" data-fleetremove="${f.id}:${v.id}">Remove</button></div>`; }).join("")}
      </div>
      ${this.fleetTradeCard(f)}
      ${addable.length?`<div class="card sheet"><h3>Add a ship <span class="dim small">&middot; in ${fsys?fsys.name:"system"}</span></h3>
        ${addable.map(v=>`<div class="frow"><div class="finfo"><div class="nm">${v.name}</div>
          <div class="chips" style="margin-top:4px"><span class="chip">${RANGE_LABEL[v.range]}</span></div></div>
          <button class="small" data-fleetadd="${f.id}:${v.id}">Add</button></div>`).join("")}</div>`:""}
      <div class="card"><button class="ghost full center" id="fleetBack">&larr; All fleets</button></div>`;
    }
    return `<div class="card"><h3>Your fleets <span class="dim small">&middot; ${fleets.length}</span></h3>
      <p class="small dim">Group ships to move them together. A fleet jumps between systems only if every ship is interstellar-class, and is limited by its weakest ship's range.</p>
      ${fleets.length?fleets.slice().sort((a,b)=>(b.id===myFleet)-(a.id===myFleet)).map(f=>{ const isMine=f.id===myFleet, caps=groupCaps(f.shipIds), fs=state.galaxy.systems[fleetSys(f)], withYou=fleetSys(f)===state.sysId, crewed=fleetAllCrewed(f);
        return `<button class="shipcard${isMine?' on':''}" data-fleetview="${f.id}">
          <div class="top"><span class="nm">${isMine?'&#9654; ':''}${f.name}</span><span class="tag">${f.shipIds.length} ship${f.shipIds.length!==1?"s":""}</span></div>
          <div class="sub">${RANGE_LABEL[caps.tier]}${caps.tier==="interstellar"?` &middot; <span class="gold">${caps.jump.toFixed(1)} ly</span>`:""} &middot; ${fs?fs.name:"?"}</div>
          <div class="chips">
            ${isMine?'<span class="chip g">&#9654; commanding</span>':""}
            ${withYou&&!isMine?'<span class="chip g">&#9679; with you</span>':""}
            ${f.trade?'<span class="chip gold">&#128666; trading</span>':crewed?'<span class="chip g">ready</span>':'<span class="chip r">needs crew</span>'}
          </div></button>`; }).join("")
        :`<p class="small dim">No fleets yet.</p>`}
    </div>
    <div class="card"><button class="primary full center" id="fleetNew" ${state.galaxy?"":"disabled"}>+ Create a fleet</button>
      ${state.galaxy?"":'<p class="small dim" style="margin-top:6px">Take off first (Ships tab) to chart your system.</p>'}</div>`;
  },

  /* ---------- MENAGERIE ---------- */
  screen_menagerie(){
    return `
    ${this.statHeader()}
    <div class="card">
      <h2>&#9758; Menagerie</h2>
      <p class="small dim">Defeat weakened creatures and choose <b>Tame</b> to add them here.</p>
      ${state.pets.length===0?`<p class="dim">No companions yet.</p>`:""}
      ${state.pets.map((p,i)=>`
        <div class="card" style="margin:8px 0;padding:10px">
          <div class="row between"><b class="violet">${p.nick||p.name}</b><span class="tag">lv ${p.level}</span></div>
          <p class="small dim" style="margin:4px 0">${DATA.creatures[p.cid].blurb}</p>
          <span class="pill">HP ${p.hp}</span><span class="pill">ATK ${p.atk}</span>
          <div class="row" style="margin-top:6px">
            <button class="small" data-nick="${i}">Rename</button>
            <button class="small ghost" data-release="${i}">Release</button>
          </div>
        </div>`).join("")}
    </div>`;
  },

  /* ---------- MARKET ---------- */
  screen_market(){
    const w=state.world, order={weapon:0,armor:1,accessory:2,consumable:3};
    const stock=Game.marketStock().slice().sort((a,b)=>{ const A=DATA.items[a],B=DATA.items[b];
      return (order[A.kind]-order[B.kind])||(A.value-B.value); });
    const SECTION={weapon:"Weapons",armor:"Armor",accessory:"Gear",consumable:"Supplies"};
    let lastKind=null;
    return `
    ${this.statHeader()}
    <div class="card">
      <h2>&#9879; ${w.name} Outfitter</h2>
      <p class="small dim">${WEALTH_LABELS[w.wealth]} ${w.wealth}/9, ${TECH_LABELS[w.tech]} ${w.tech}/9. Weapons, armor and field gear —
        stock turns over each year. Credits: <b class="gold">${state.credits}</b></p>
    </div>
    <div class="card">
      ${stock.length===0?`<p class="dim small">This world is too primitive to sell much of anything.</p>`:""}
      ${stock.map(id=>{ const it=DATA.items[id], p=Game.buyPrice(id), owned=state.inv[id]||0;
        const head = it.kind!==lastKind ? (lastKind=it.kind, `<h3 style="margin:8px 0 2px">${SECTION[it.kind]||"Goods"}</h3>`) : "";
        return `${head}<div class="row between" style="padding:6px 0;border-bottom:1px solid var(--line)">
          <span><b>${it.name}</b>${it.slot?` <span class="tag">${it.slot}</span>`:""}${owned?` <span class="dim small">&middot; owned ${owned}</span>`:""}<br><span class="small dim">${it.blurb}</span></span>
          <button data-buy="${id}" ${state.credits<p?"disabled":""}>${p}c</button></div>`; }).join("")}
    </div>
    ${(()=>{ const finds=Game.marketGear(); if(!finds.length) return "";
      return `<div class="card sheet"><h3>&#10022; Under the counter <span class="dim small">&middot; a rare find</span></h3>
        ${finds.map(g=>{ const col=rarityColor(g.rarity); return `<div class="shipcard" style="border-color:${col}66">
          <div class="top"><span class="nm" style="color:${col}">${g.name}</span><span class="tag" style="color:${col}">${rarityName(g.rarity)}</span></div>
          <div class="sub">${cap(g.slot)} &middot; ${g.blurb}</div>
          <div class="row" style="margin-top:6px"><button class="small" data-buygear="${g.uid}" ${state.credits<g.price?"disabled":""}>Buy &middot; ${commas(g.price)}c</button></div>
        </div>`; }).join("")}
        <p class="small dim" style="margin-top:4px">The smith won't say where it came from. Real power, though, is taken from the dead — not bought.</p></div>`; })()}
    ${(()=>{ const sell=Object.keys(state.inv).filter(id=>!Object.values(state.equipped).includes(id));
      if(!sell.length) return "";
      return `<div class="card"><h3>Sell your haul</h3>
        ${sell.map(id=>{ const it=DATA.items[id], n=state.inv[id], p=Game.sellPrice(id);
          return `<div class="row between" style="padding:6px 0;border-bottom:1px solid var(--line)">
            <span><b>${it.name}</b> <span class="dim small">x${n}</span></span>
            <button class="ghost" data-sell="${id}">Sell &middot; ${p}c</button></div>`; }).join("")}
      </div>`; })()}
    <div class="card"><button id="leaveMarket" class="ghost full center">Leave market</button></div>`;
  },

  /* ---------- SAVE ---------- */
  screen_save(){

    ${this.statHeader()}
    <div class="card">
      <h2>&#8635; Save &amp; Data</h2>
      <p class="small"><span class="dim">Galaxy:</span> <b class="gold">${state.galaxyName||"—"}</b></p>

      <p>Export makes a small <b>.json</b> backup you can store in cloud or email to yourself,

  /* ---------- shared bits ---------- */
  rarityBannerInline(tier, sub){ const t=RARITY.byId(tier);
    return `<div class="rarity-banner" style="border-color:${t.color}">
      <div class="rn" style="color:${t.color}">${t.name.toUpperCase()}</div>
      <div class="odds">${RARITY.odds(t)} &middot; ${sub||""}</div></div>`; },
  /* the fixed bar at the very top of the screen — your character at a glance */
  topBar(screen){
    if(!state || screen==="title" || screen==="create") return `<div class="sub">Edge of the Outer Stars</div>`;
    const age=Math.floor(Game.age()), grown=Math.round(Game.maturation()*100);
    return `<div class="topbar">
      <span class="nm gold">${state.name}</span>
      <span class="meta">
        <span class="lv">Lv ${state.level}</span>
        <span>${cap(Game.stage())}${grown<100?` ${grown}%`:''}</span>
        <span class="sep">&middot;</span><span>Age ${age}</span>
        <span class="sep">&middot;</span><span class="cr">${commas(state.credits)}c</span>
      </span>
    </div>`;
  },
  statHeader(){
    const hpMax=Game.effMaxHp(), enMax=Game.effMaxEnergy();
    const age=Math.floor(Game.age()), life=Math.round(Game.lifespan());
    const grown=Math.round(Game.maturation()*100);
    const low=hpMax>0 && state.hp/hpMax<=0.3;
    return `
    <div class="card vitals">
      <div class="vhead">
        <span class="small"><span class="${grown<100?'blue':'green'}">${cap(Game.stage())}</span>${grown<100?` <span class="dim">${grown}% grown</span>`:''} <span class="dim">&middot; Age ${age} of ~${life}</span></span>
        <span class="small dim">${cap(state.species.build)} ${state.species.archeName}</span>
      </div>
      <div class="vrow"><span class="vlbl">HP</span><div class="bar"><i class="hpfill" style="width:${Math.max(0,state.hp/hpMax*100)}%"></i></div><span class="vval${low?' low':''}">${Math.max(0,state.hp)} / ${hpMax}</span></div>
      <div class="vrow"><span class="vlbl">EN</span><div class="bar"><i class="enfill" style="width:${state.energy/enMax*100}%"></i></div><span class="vval">${state.energy} / ${enMax}</span></div>
      <div class="vrow"><span class="vlbl">XP</span><div class="bar"><i class="xpfill" style="width:${state.xp/state.xpNext*100}%"></i></div><span class="vval">${state.xp} / ${state.xpNext}</span></div>
    </div>`;
  },
  /* a person's personal ship + an offer box to buy it (haggle by naming your own price) */
  shipDealCard(person){
    const o=person&&person.ship; if(!o) return "";
    const guns=(o.pilotGuns||0)+(o.gunnerGuns||0);
    const spec=`${RANGE_LABEL[o.range]} &middot; ${cap(o.tier)} &middot; cargo ${o.cargo}${guns?` &middot; ${guns} gun${guns>1?"s":""}`:""}`;
    return `<div class="card">
      <h3>&#128640; Their ship</h3>
      <p class="small"><b>${o.name}</b> <span class="dim small">&middot; ${spec}</span></p>
      <p class="small dim">Appraised worth <b class="gold">${commas(o.price)}c</b>. People are loath to sell — overpay to tempt them, or lowball and pray. The shipyard will buy it off you for about ${commas(Math.round(o.price*0.6))}c.</p>
      <div class="row" style="margin-top:6px">
        <input type="number" id="shipOfferAmt" inputmode="numeric" min="1" value="${o.price}" style="flex:1">
        <button class="primary" id="shipOfferBtn">Offer</button>
      </div>
      ${shipDealMsg?`<p class="small dim" style="margin-top:6px">${shipDealMsg}</p>`:""}
    </div>`;
  },
  logCard(){ const items=state.log.slice(-30).reverse();
    return `<div class="card"><h3>Log</h3><div class="log" id="logBox">${items.map(l=>`<p class="${l.c}">${l.t}</p>`).join("")}</div></div>`; },
  flashLog(){ const el=$("#logBox"); if(el){ el.scrollTop=0; el.parentElement.classList.add("flash");
    setTimeout(()=>el.parentElement.classList.remove("flash"),500);} },

  /* ---------- binding ---------- */
  bind(screen){
    [...$("#nav").children].forEach(b=> b.onclick=()=>{ if(combat&&!combat.over&&b.dataset.screen!=="bag"){toast("Finish the encounter first");return;} UI.render(b.dataset.screen); });
    // 🎲 randomize buttons work on every screen that hosts a nameField
    app.querySelectorAll("[data-rnd]").forEach(b=> b.onclick=()=>{ const inp=$("#"+b.dataset.for); if(inp) inp.value=genName(b.dataset.rnd); });
    const qj=$("#quitJob"); if(qj) qj.onclick=()=>quitJob();
    if(screen==="bounties"){
      app.querySelectorAll("[data-accept]").forEach(b=> b.onclick=()=>acceptContract(+b.dataset.accept));
      app.querySelectorAll("[data-abandon]").forEach(b=> b.onclick=()=>abandonContract(b.dataset.abandon));
      const bk=$("#bvBack"); if(bk) bk.onclick=()=>UI.render("tavern");
    }
    if(screen==="gov"){
      app.querySelectorAll("[data-pledge]").forEach(b=> b.onclick=()=>pledgeGov(b.dataset.pledge));
      const rn=$("[data-renounce]"); if(rn) rn.onclick=()=>renounceGov();
      app.querySelectorAll("[data-joinfac]").forEach(b=> b.onclick=()=>joinFaction(b.dataset.joinfac));
      app.querySelectorAll("[data-leavefac]").forEach(b=> b.onclick=()=>leaveFaction(b.dataset.leavefac));
    }

    if(screen==="title"){
      const n=$("#btnNew"); if(n) n.onclick=()=>{ creating={step:0}; UI.render("create"); };
      const c=$("#btnContinue"); if(c) c.onclick=()=>{ Game.load(); UI.render(state.dead?"epilogue":"hub"); };
      const w=$("#btnWipe"); if(w) w.onclick=()=>{ if(confirm("Delete your saved galaxy?")){Game.wipe(); UI.render("title");} };
    }
    if(screen==="create") this.bindCreate();
    // start a new life within the SAME galaxy — keep the galaxy name, Codex & achievements
    if(screen==="epilogue"){ $("#btnNewLife").onclick=()=>{ creating={step:1, galaxy:state.galaxyName}; UI.render("create"); }; }

    if(screen==="hub" && adrift()){           // deep-space navigation
      app.querySelectorAll("[data-voiddir]").forEach(b=> b.onclick=()=>voidHop(b.dataset.voiddir));
      app.querySelectorAll("[data-jumpsys]").forEach(b=> b.onclick=()=>{ const sid=+b.dataset.jumpsys, sys=state.galaxy.systems[sid];
        if(!sys.planets) sys.planets=buildSystemPlanets(sys.size);
        let slot=sys.planets.findIndex(p=>p&&p.discovered); if(slot<0) slot=0;
        moveGroupTo(playerGroupIds(), sid, slot, "hub"); });
    }
    else if(screen==="hub"){
      $("#vWilds").onclick=()=>startEncounter();
      const vsy=$("#vShipyard"); if(vsy) vsy.onclick=()=>UI.render("shipyard");
      const vt=$("#vTavern"); if(vt) vt.onclick=()=>UI.render("tavern");
      const vd=$("#vDepot"); if(vd) vd.onclick=()=>UI.render("depot");
      const vb=$("#vBroker"); if(vb) vb.onclick=()=>UI.render("broker");
      const vm=$("#vMarket"); if(vm) vm.onclick=()=>UI.render("market");
      const vk=$("#vTalk"); if(vk) vk.onclick=()=>startMeeting("Out among the crowds you fall into talk with a passing stranger.","hub");
      $("#vRest").onclick=()=>{
        if(advanceTime()) return;                     // resting is one action
        state.hp=Game.effMaxHp(); state.energy=Game.effMaxEnergy();
        Game.logMsg("You make camp and rest. HP and energy restored.","sys"); Game.save(); UI.render("hub"); UI.flashLog(); };
    }
    if(screen==="voidmeet"){
      const s=$("#voidSalvage"); if(s) s.onclick=()=>voidSalvage();
      const c=$("#voidContact"); if(c) c.onclick=()=>voidContact();
      const a=$("#voidAttack"); if(a) a.onclick=()=>startShipBattle();
      const e=$("#voidEvade"); if(e) e.onclick=()=>voidEvade();
      const g=$("#voidGo"); if(g) g.onclick=()=>voidLeave();
    }
    if(screen==="traderaid"){
      const f=$("#raidFight"); if(f) f.onclick=()=>raidFight();
      const e=$("#raidFlee"); if(e) e.onclick=()=>raidFlee();
    }
    if(screen==="shipbattle"){
      const f=$("#sbFire"); if(f) f.onclick=()=>shipFire();
      const wb=$("#sbWing"); if(wb) wb.onclick=()=>toggleWing();
      const r=$("#sbRetreat"); if(r) r.onclick=()=>shipRetreat();
      const d=$("#sbDone"); if(d) d.onclick=()=>shipBattleDone();
      app.querySelectorAll("[data-etarget]").forEach(b=> b.onclick=()=>{ const i=+b.dataset.etarget;
        shipCombat.target = shipCombat.target===i ? null : i; UI.render("shipbattle"); });
    }
    if(screen==="outfit"){
      const rp=$("#ofRepair"); if(rp) rp.onclick=()=>repairShip(outfitShip);
      const ar=$("#ofArmor"); if(ar) ar.onclick=()=>upgradeArmor(outfitShip);
      const hy=$("#ofHyper"); if(hy) hy.onclick=()=>upgradeHyper(outfitShip);
      const ad=$("#ofAdvance"); if(ad) ad.onclick=()=>fitFighterHyperdrive(outfitShip);
      const osh=$("#ofShield"); if(osh) osh.onclick=()=>installShield(outfitShip);
      app.querySelectorAll("[data-unmount]").forEach(b=> b.onclick=()=>unmountWeapon(outfitShip, +b.dataset.unmount));
      app.querySelectorAll("[data-mountslot]").forEach(b=> b.onclick=()=>{ mountPick=+b.dataset.mountslot; UI.render("outfit"); });
      app.querySelectorAll("[data-buygun]").forEach(b=> b.onclick=()=>{ mountWeapon(outfitShip, mountPick, b.dataset.buygun); mountPick=null; });
      const mc=$("#ofMountCancel"); if(mc) mc.onclick=()=>{ mountPick=null; UI.render("outfit"); };
      $("#ofBack").onclick=()=>{ mountPick=null; UI.render("shipyard"); };
    }
    if(screen==="tavern"){
      $("#tPatron").onclick=()=>startMeeting("A patron at a corner table waves you over.","tavern");
      $("#tBartender").onclick=()=>UI.render("bartender");
      $("#tBounty").onclick=()=>openBountyBoard();
      const rd=$("#tRedeem"); if(rd) rd.onclick=()=>redeemBounties();
      $("#tDrink").onclick=()=>{ if(state.credits<10){ toast("Not enough credits"); return; }
        state.credits-=10; state.hp=Math.min(Game.effMaxHp(),state.hp+Math.round(Game.effMaxHp()*0.25));
        state.energy=Game.effMaxEnergy(); Game.logMsg("You buy a round and rest a while. Energy restored, wounds eased.","good"); Game.save(); UI.render("tavern"); UI.flashLog(); };
      $("#tBack").onclick=()=>UI.render("hub");
    }
    if(screen==="bartender"){
      const bs=$("#bSell"); if(bs) bs.onclick=()=>sellInformation();
      const cp=$("#bCrewPilot"); if(cp) cp.onclick=()=>askBartenderCrew("pilot");
      const cg=$("#bCrewGunner"); if(cg) cg.onclick=()=>askBartenderCrew("gunner");
      const cm=$("#bCrewMech"); if(cm) cm.onclick=()=>askBartenderCrew("mechanic");
      $("#bRumor").onclick=()=>{ Game.logMsg("The bartender leans in — "+pick(RUMORS),"sys"); toast("You hear a rumor"); Game.save(); UI.flashLog(); };
      $("#bBack").onclick=()=>UI.render("tavern");
    }
    if(screen==="broker"){
      const sb=$("#sellInfo"); if(sb) sb.onclick=()=>sellInformation();
      $("#brBack").onclick=()=>UI.render("hub");
    }
    if(screen==="depot"){
      app.querySelectorAll("[data-buyc]").forEach(b=> b.onclick=()=>buyCommodity(b.dataset.buyc));
      app.querySelectorAll("[data-buyallc]").forEach(b=> b.onclick=()=>buyCommodity(b.dataset.buyallc,true));
      app.querySelectorAll("[data-sellc]").forEach(b=> b.onclick=()=>sellCommodity(b.dataset.sellc));
      app.querySelectorAll("[data-sellallc]").forEach(b=> b.onclick=()=>sellCommodity(b.dataset.sellallc,true));
      const dr=$("#depRepairAll"); if(dr) dr.onclick=()=>repairAll();
      $("#depBack").onclick=()=>UI.render("hub");
    }
    if(screen==="shipyard"){
      app.querySelectorAll("[data-ship]").forEach(b=> b.onclick=()=>buyShip(+b.dataset.ship));
      app.querySelectorAll("[data-sellship]").forEach(b=> b.onclick=()=>sellShip(b.dataset.sellship));
      app.querySelectorAll("[data-selship]").forEach(b=> b.onclick=()=>selectShip(b.dataset.selship));
      app.querySelectorAll("[data-renship]").forEach(b=> b.onclick=()=>renameShip(b.dataset.renship));
      app.querySelectorAll("[data-outfit]").forEach(b=> b.onclick=()=>{ outfitShip=b.dataset.outfit; mountPick=null; UI.render("outfit"); });
      const yd=$("#yarder"); if(yd) yd.onclick=()=>talkToYarder();
      const ra=$("#syRepairAll"); if(ra) ra.onclick=()=>repairAll();
      const rs=$("#rentStub"); if(rs) rs.onclick=()=>toast("Ship rentals coming soon");
      $("#syBack").onclick=()=>UI.render("hub");
    }
    if(screen==="travel"){
      app.querySelectorAll("[data-traveltab]").forEach(b=> b.onclick=()=>{ travelTab=b.dataset.traveltab; UI.render("travel"); });
      app.querySelectorAll("[data-travelfav]").forEach(b=> b.onclick=()=>{ travelFav=b.dataset.travelfav==="1"; UI.render("travel"); });
      app.querySelectorAll("[data-sysfav]").forEach(b=> b.onclick=()=>toggleSystemFav(b.dataset.sysfav));
      app.querySelectorAll("[data-fav]").forEach(b=> b.onclick=()=>togglePlanetFav(b.dataset.fav));
      app.querySelectorAll("[data-favgo]").forEach(b=> b.onclick=()=>{ const [s,p]=b.dataset.favgo.split(":").map(Number); moveGroupTo(travelCtx.ids, s, p, "crew"); });
      app.querySelectorAll("[data-go]").forEach(b=> b.onclick=()=>{ const [s,p]=b.dataset.go.split(":").map(Number); moveGroupTo(travelCtx.ids, s, p, "crew"); });
      app.querySelectorAll("[data-jumpsys]").forEach(b=> b.onclick=()=>{ const sid=+b.dataset.jumpsys, sys=state.galaxy.systems[sid];
        if(!sys.planets) sys.planets=buildSystemPlanets(sys.size);
        let slot=sys.planets.findIndex(p=>p&&p.discovered); if(slot<0) slot=0;
        moveGroupTo(travelCtx.ids, sid, slot, "crew"); });
      app.querySelectorAll("[data-voiddir]").forEach(b=> b.onclick=()=>voidHop(b.dataset.voiddir));
      $("#tvBack").onclick=()=>{ travelCtx=null; UI.render("crew"); };
    }
    if(screen==="map" && state.galaxy){
      const clampSpan=s=>Math.max(6, Math.min(GALAXY.radius*2.4, s)), step=()=>mapView.span*0.28;
      const z=(f)=>{ mapView.span=clampSpan(mapView.span*f); UI.render("map"); };
      const zi=$("#mapZin"); if(zi) zi.onclick=()=>z(0.6);
      const zo=$("#mapZout"); if(zo) zo.onclick=()=>z(1.6);
      const me=$("#mapMe"); if(me) me.onclick=()=>{ this.mapCenterMe(); UI.render("map"); };
      const all=$("#mapAll"); if(all) all.onclick=()=>{ mapView={ cx:0, cy:0, span:GALAXY.radius*2.2 }; UI.render("map"); };
      const mu=$("#mapU"); if(mu) mu.onclick=()=>{ mapView.cy+=step(); UI.render("map"); };
      const md=$("#mapD"); if(md) md.onclick=()=>{ mapView.cy-=step(); UI.render("map"); };
      const ml=$("#mapL"); if(ml) ml.onclick=()=>{ mapView.cx-=step(); UI.render("map"); };
      const mr=$("#mapR"); if(mr) mr.onclick=()=>{ mapView.cx+=step(); UI.render("map"); };
    }
    if(screen==="codex"){
      app.querySelectorAll("[data-cx]").forEach(b=> b.onclick=()=>UI.render("cx_"+b.dataset.cx));
      app.querySelectorAll("[data-goto]").forEach(b=> b.onclick=()=>UI.render(b.dataset.goto));
    }
    if(screen.indexOf("cx_")===0){
      const bk=$("#cxBack"); if(bk) bk.onclick=()=>UI.render("codex");
      const bp=$("#backPeople"); if(bp) bp.onclick=()=>{ convo=null; personExpand=false; UI.render(bp.dataset.back||"cx_people"); };
      const lc=$("#leaveConvo"); if(lc) lc.onclick=()=>{ const p=(state.codex.people||[])[viewingPerson]; convo=null; personExpand=false; UI.render(p&&p.hired?"cx_crew":"cx_people"); };
      const lm=$("#learnMore"); if(lm) lm.onclick=()=>{ personExpand=!personExpand; UI.render("cx_person"); };
      const so=$("#shipOfferBtn"); if(so) so.onclick=()=>{ const p=(state.codex.people||[])[viewingPerson]; buyPersonShip(p, +($("#shipOfferAmt").value), ()=>UI.render("cx_person")); };
      const br=$("#backRaces"); if(br) br.onclick=()=>UI.render("cx_races");
      app.querySelectorAll("[data-person]").forEach(b=> b.onclick=()=>{ convo=null; personExpand=false; shipDealMsg=null; viewingPerson=+b.dataset.person; UI.render("cx_person"); });
      app.querySelectorAll("[data-race]").forEach(b=> b.onclick=()=>{ viewingRace=b.dataset.race; UI.render("cx_race"); });
      app.querySelectorAll("[data-world]").forEach(b=> b.onclick=()=>{ const [si,pi]=b.dataset.world.split(":").map(Number);
        const p=state.galaxy.systems[si].planets[pi]; if(p&&p.world){ viewingWorld=Object.assign({sysName:state.galaxy.systems[si].name}, p.world); UI.render("cx_world"); } });
      app.querySelectorAll("[data-worldlog]").forEach(b=> b.onclick=()=>{ viewingWorld=(state.codex.worlds||[])[+b.dataset.worldlog]; if(viewingWorld) UI.render("cx_world"); });
      app.querySelectorAll("[data-fav]").forEach(b=> b.onclick=()=>togglePlanetFav(b.dataset.fav));
      const bw=$("#backWorlds"); if(bw) bw.onclick=()=>UI.render("cx_worlds");
      const sh=$("#sayHi"); if(sh) sh.onclick=()=>sayHi(viewingPerson);
      const hr=$("#hire"); if(hr) hr.onclick=()=>hireCrew(viewingPerson);
      const aj=$("#askJob"); if(aj) aj.onclick=()=>{ const p=(state.codex.people||[])[viewingPerson]; if(p) askForJob(p, ()=>UI.render("cx_person")); };
      const at=$("#attack"); if(at) at.onclick=()=>startDuel(viewingPerson);
      const bo=$("#buyOldShip"); if(bo) bo.onclick=()=>buyYarderShip();
      app.querySelectorAll("[data-unassign]").forEach(b=> b.onclick=()=>unassignCrew(+b.dataset.unassign));
      app.querySelectorAll("[data-dismiss]").forEach(b=> b.onclick=()=>dismissCrew(+b.dataset.dismiss));
    }
    if(screen==="arrive") this.bindArrive();
    if(screen==="meet") this.bindMeet();
    if(screen==="combat"){
      app.querySelectorAll("[data-atk]").forEach(b=> b.onclick=()=>playerAttack(b.dataset.atk));
      app.querySelectorAll("[data-claim]").forEach(b=> b.onclick=()=>claimBounty(b.dataset.claim==="alive"));
      const tm=$("#actTame"); if(tm) tm.onclick=()=>tryTame();
      app.querySelectorAll("[data-quaff]").forEach(b=> b.onclick=()=>useItem(b.dataset.quaff));   // quick-use packs mid-fight
      const fl=$("#actFlee"); if(fl) fl.onclick=()=>fleeEncounter();
      const bg=$("#actBag"); if(bg) bg.onclick=()=>UI.render("bag");
    }
    if(screen==="bag"){
      app.querySelectorAll("[data-use]").forEach(b=> b.onclick=()=>useItem(b.dataset.use));
      app.querySelectorAll("[data-equip]").forEach(b=> b.onclick=()=>equipItem(b.dataset.equip));
      app.querySelectorAll("[data-sell]").forEach(b=> b.onclick=()=>sellItem(b.dataset.sell));
      app.querySelectorAll("[data-equipg]").forEach(b=> b.onclick=()=>equipItem(b.dataset.equipg));
      app.querySelectorAll("[data-sellg]").forEach(b=> b.onclick=()=>sellGear(b.dataset.sellg));
      const bc=$("#backCombat"); if(bc) bc.onclick=()=>UI.render("combat");
    }
    if(screen==="crew"){
      app.querySelectorAll("[data-crewtab]").forEach(b=> b.onclick=()=>{ crewTab=b.dataset.crewtab; viewingShip=null; UI.render("crew"); });
      app.querySelectorAll("[data-selshipview]").forEach(b=> b.onclick=()=>{ viewingShip=b.dataset.selshipview; UI.render("crew"); });
      const sb=$("#shipsBack"); if(sb) sb.onclick=()=>{ viewingShip=null; UI.render("crew"); };
      app.querySelectorAll("[data-launch]").forEach(b=> b.onclick=()=>launchFighter(b.dataset.launch));
      app.querySelectorAll("[data-stow]").forEach(b=> b.onclick=()=>{ const [cid,fid]=b.dataset.stow.split(":"); stowFighter(fid,cid); });
      app.querySelectorAll("[data-seat]").forEach(b=> b.onclick=()=>{ const [sid,n]=b.dataset.seat.split(":"); seatPick={shipId:sid, seat:+n}; UI.render("crew"); });
      app.querySelectorAll("[data-seatpax]").forEach(b=> b.onclick=()=>{ const v=(state.vehicles||[]).find(x=>x.id===b.dataset.seatpax); const n=v?nextFreeBerth(v):-1;
        if(n>=0){ seatPick={shipId:b.dataset.seatpax, seat:n}; UI.render("crew"); } else toast("No free berth"); });
      app.querySelectorAll("[data-putcrew]").forEach(b=> b.onclick=()=>assignToSeat(+b.dataset.putcrew, seatPick.shipId, seatPick.seat));
      const sc=$("#seatCancel"); if(sc) sc.onclick=()=>{ seatPick=null; UI.render("crew"); };
      app.querySelectorAll("[data-unseat]").forEach(b=> b.onclick=()=>unassignCrew(+b.dataset.unseat));
      app.querySelectorAll("[data-dismiss]").forEach(b=> b.onclick=()=>dismissCrew(+b.dataset.dismiss));
      app.querySelectorAll("[data-selship]").forEach(b=> b.onclick=()=>selectShip(b.dataset.selship));
      app.querySelectorAll("[data-renship]").forEach(b=> b.onclick=()=>renameShip(b.dataset.renship));
      app.querySelectorAll("[data-takeoff]").forEach(b=> b.onclick=()=>departFirstFlight());
      app.querySelectorAll("[data-moveship]").forEach(b=> b.onclick=()=>moveShip(b.dataset.moveship));
      // fleets
      const fn=$("#fleetNew"); if(fn) fn.onclick=()=>{ fleetBuild={ name:genName("ship"), shipIds:[] }; UI.render("crew"); };
      app.querySelectorAll("[data-fleetview]").forEach(b=> b.onclick=()=>{ viewingFleet=b.dataset.fleetview; UI.render("crew"); });
      const flb=$("#fleetBack"); if(flb) flb.onclick=()=>{ viewingFleet=null; UI.render("crew"); };
      app.querySelectorAll("[data-fbtoggle]").forEach(b=> b.onclick=()=>{ const id=b.dataset.fbtoggle;
        const i=fleetBuild.shipIds.indexOf(id); if(i<0) fleetBuild.shipIds.push(id); else fleetBuild.shipIds.splice(i,1); UI.render("crew"); });
      const fbc=$("#fbCancel"); if(fbc) fbc.onclick=()=>{ fleetBuild=null; UI.render("crew"); };
      const fbk=$("#fbCreate"); if(fbk) fbk.onclick=()=>{ const nm=$("#fleetName"); createFleet(nm?nm.value:fleetBuild.name, fleetBuild.shipIds); };
      app.querySelectorAll("[data-fleetmove]").forEach(b=> b.onclick=()=>moveFleet(b.dataset.fleetmove));
      app.querySelectorAll("[data-fleetrename]").forEach(b=> b.onclick=()=>renameFleet(b.dataset.fleetrename));
      app.querySelectorAll("[data-fleetdisband]").forEach(b=> b.onclick=()=>disbandFleet(b.dataset.fleetdisband));
      app.querySelectorAll("[data-tbjob]").forEach(b=> b.onclick=()=>{ tradeBuild={ fid:b.dataset.tbjob, phase:"buySys" }; UI.render("crew"); });
      app.querySelectorAll("[data-tbcancel]").forEach(b=> b.onclick=()=>{ tradeBuild=null; UI.render("crew"); });
      app.querySelectorAll("[data-tbback]").forEach(b=> b.onclick=()=>{ if(!tradeBuild) return;
        const prev={ buyPlanet:"buySys", buyGood:"buyPlanet", sellSys:"buyGood", sellPlanet:"sellSys", confirm:"sellPlanet" }[tradeBuild.phase];
        if(prev){ tradeBuild={ ...tradeBuild, phase:prev }; UI.render("crew"); } });
      app.querySelectorAll("[data-tbbuysys]").forEach(b=> b.onclick=()=>{ const [fid,s]=b.dataset.tbbuysys.split(":"); tradeBuild={ fid, phase:"buyPlanet", buySys:+s }; UI.render("crew"); });
      app.querySelectorAll("[data-tbbuyplanet]").forEach(b=> b.onclick=()=>{ const [fid,p]=b.dataset.tbbuyplanet.split(":"); tradeBuild={ ...tradeBuild, fid, phase:"buyGood", buySlot:+p }; UI.render("crew"); });
      app.querySelectorAll("[data-tbgood]").forEach(b=> b.onclick=()=>{ const [fid,cid]=b.dataset.tbgood.split(":"); tradeBuild={ ...tradeBuild, fid, phase:"sellSys", commodity:cid }; UI.render("crew"); });
      app.querySelectorAll("[data-tbsellsys]").forEach(b=> b.onclick=()=>{ const [fid,s]=b.dataset.tbsellsys.split(":"); tradeBuild={ ...tradeBuild, fid, phase:"sellPlanet", sellSys:+s }; UI.render("crew"); });
      app.querySelectorAll("[data-tbsellplanet]").forEach(b=> b.onclick=()=>{ const [fid,p]=b.dataset.tbsellplanet.split(":"); tradeBuild={ ...tradeBuild, fid, phase:"confirm", sellSlot:+p }; UI.render("crew"); });
      app.querySelectorAll("[data-tbconfirm]").forEach(b=> b.onclick=()=>{ const tb=tradeBuild; if(!tb) return; setFleetTrade(tb.fid, { buySys:tb.buySys, buySlot:tb.buySlot, sellSys:tb.sellSys, sellSlot:tb.sellSlot, commodity:tb.commodity }); tradeBuild=null; UI.render("crew"); });
      app.querySelectorAll("[data-fleetuntrade]").forEach(b=> b.onclick=()=>clearFleetTrade(b.dataset.fleetuntrade));
      app.querySelectorAll("[data-fleetremove]").forEach(b=> b.onclick=()=>{ const [fid,sid]=b.dataset.fleetremove.split(":"); removeFromFleet(fid,sid); });
      app.querySelectorAll("[data-fleetadd]").forEach(b=> b.onclick=()=>{ const [fid,sid]=b.dataset.fleetadd.split(":"); addToFleet(fid,sid); });
    }
    if(screen==="menagerie"){
      app.querySelectorAll("[data-nick]").forEach(b=> b.onclick=()=>{ const i=+b.dataset.nick;
        const nn=prompt("Name your companion:", state.pets[i].nick||state.pets[i].name); if(nn){ state.pets[i].nick=nn.slice(0,20); Game.save(); UI.render("menagerie"); } });
      app.querySelectorAll("[data-release]").forEach(b=> b.onclick=()=>{ const i=+b.dataset.release;
        if(confirm(`Release ${state.pets[i].nick||state.pets[i].name}?`)){ state.pets.splice(i,1); Game.save(); UI.render("menagerie"); } });
    }
    if(screen==="market"){
      app.querySelectorAll("[data-buy]").forEach(b=> b.onclick=()=>buyItem(b.dataset.buy));
      app.querySelectorAll("[data-buygear]").forEach(b=> b.onclick=()=>buyMarketGear(b.dataset.buygear));
      app.querySelectorAll("[data-sell]").forEach(b=> b.onclick=()=>sellItem(b.dataset.sell));
      $("#leaveMarket").onclick=()=>UI.render("hub");
    }
    if(screen==="save"){
      $("#btnExport").onclick=exportSave; $("#btnImport").onclick=()=>$("#fileInput").click();
      $("#fileInput").onchange=importSave;
      $("#btnReset").onclick=()=>{ if(confirm("Delete this character forever?")){ Game.wipe(); UI.render("title"); } };
    }
  },

  bindCreate(){
    const s=creating.step??1;
    // 🎲 Randomize buttons: fill the target input with a procedural name
    app.querySelectorAll("[data-rnd]").forEach(b=> b.onclick=()=>{ const inp=$("#"+b.dataset.for); if(inp) inp.value=genName(b.dataset.rnd); });
    if(s===0){
      $("#backTitle").onclick=()=>UI.render("title");
      $("#toName").onclick=()=>{ let v=$("#galInput").value.trim()||genName("galaxy");
        creating.galaxy=v; creating.step=1; UI.render("create"); };
    }
    if(s===1){

function useItem(id){ const it=DATA.items[id]; if(!it||!state.inv[id]) return;
  if(it.kind!=="consumable"){ toast("Can't use that"); return; } let msg=[];
  // a faster metabolism gets more out of healing
  const metaMult=1+(Game.bio("metabolism")-10)*0.02;
  if(it.heal){ const b=state.hp; state.hp=Math.min(Game.effMaxHp(),state.hp+Math.round(it.heal*metaMult)); msg.push(`+${state.hp-b} HP`); }
  if(it.energy){ const b=state.energy; state.energy=Math.min(Game.effMaxEnergy(),state.energy+it.energy); msg.push(`+${state.energy-b} energy`); }
  if(it.buff==="stim"){ state.stimReady=true; msg.push("stim primed"); }
  Game.removeItem(id,1); Game.logMsg(`Used ${it.name}: ${msg.join(", ")}.`,"good"); Game.save();
  UI.render(combat&&!combat.over?"combat":"bag"); }
function equipItem(ref){ const it=resolveItem(ref); const slot=it&&it.slot;   // ref = a catalog id or a gear uid
  if(!slot){ toast("Can't equip that"); return; }
  if(state.equipped[slot]===ref){ state.equipped[slot]=null; toast("Unequipped"); }
  else { state.equipped[slot]=ref; toast(`Equipped ${it.name}`); }
  state.hp=Math.min(state.hp,Game.effMaxHp()); state.energy=Math.min(state.energy,Game.effMaxEnergy());
  Game.save(); UI.render("bag"); }
/* sell a one-off gear instance (looted/scavenged) — for credits, gone for good */
function sellGear(uid){ const g=gearByUid(uid); if(!g) return;
  if(state.equipped[g.slot]===uid){ toast("Unequip it first"); return; }
  const p=Math.max(1,Math.round(g.value*0.5*(1+(state.world?state.world.wealth:4)*0.02)));
  state.credits+=p; state.gear=(state.gear||[]).filter(x=>x.uid!==uid);
  Game.logMsg(`Sold ${g.name} for ${p}c.`,"sys"); toast(`+${commas(p)}c`); Game.save(); UI.render("bag"); }
function sellItem(id){ if(!state.inv[id]) return;
  if(Object.values(state.equipped).includes(id)){ toast("Unequip it first"); return; }
  const p=Game.sellPrice(id); state.credits+=p; Game.removeItem(id,1);
  Game.logMsg(`Sold ${DATA.items[id].name} for ${p}c.`,"sys"); Game.save();
  UI.render(UI.current==="market"?"market":"bag"); }
function buyItem(id){ const p=Game.buyPrice(id); if(state.credits<p){ toast("Not enough credits"); return; }
  state.credits-=p; Game.addItem(id,1); Game.logMsg(`Bought ${DATA.items[id].name} for ${p}c.`,"sys"); Game.save(); UI.render("market"); }

const objReward=o=>o&&o.reward!=null?o.reward:100;
/* mark an objective complete (once per galaxy) and pay out its credit bounty */
function awardObjective(id){
