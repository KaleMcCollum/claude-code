    </div>`;
  },

  /* ---------- CREATION (galaxy -> you -> race -> world -> ship) ---------- */
  screen_create(){
    const s=creating.step??1;
    if(s===0) return `
      <div class="card">
        <h2>Name your galaxy</h2>
        <p class="dim small">This save is a whole galaxy — the long journey that outlives any one
        character. Name it, or roll the dice.</p>
        ${nameField("galInput","e.g. Orion's Veil","galaxy",creating.galaxy)}
        <div class="divider"></div>
        <div class="row between">
          <button class="ghost" id="backTitle">&larr; Back</button>
          <button class="primary" id="toName">Begin &rarr;</button>
        </div>
      </div>`;
    if(s===1) return `
      <div class="card">
        <h2>What is your name?</h2>
        <p class="dim small"><span class="dim">Galaxy:</span> <b class="gold">${creating.galaxy}</b></p>
        ${nameField("nameInput","e.g. Kael Voss","person",creating.name)}
        <div class="divider"></div>
        <div class="row between">
          <button class="ghost" id="backGalaxy">&larr; Back</button>
          <button class="primary" id="rollSpecies">Roll my origin &rarr;</button>
        </div>
      </div>`;

    if(s===2){ const sp=creating.species; const t=RARITY.byId(sp.tier); return `
      ${this.rarityBanner(sp.tier, `${humanizeCount(sp.population)} alive of ~${humanizeCount(GALAXY.totalSapients)}`)}
      ${originCard(sp)}
      ${speciesSheet(sp)}
      <div class="card reveal">
        <p class="small">Name your race:</p>
        ${nameField("spNameInput","Name your race","race",sp.name)}
        <div class="row between" style="margin-top:10px">
          <button class="ghost" id="backStep1">&larr; Back</button>
          <button class="primary" id="rollWorld">Name &amp; continue &rarr;</button>
        </div>
      </div>`;
    }

    if(s===3){ const w=creating.world; return `
      ${this.rarityBanner(w.tier, "your birthworld")}
      <div class="card reveal">
        <h2>${cap(article(w.biomeName))} <span class="blue">${w.biomeName}</span></h2>
        <p class="small dim">${worldDesc(w)}</p>
        <div class="divider"></div>
        <div class="statline"><span>Population</span><span>${cap(w.popName)}</span></div>
        <div class="statline"><span>Technology</span><span>${TECH_LABELS[w.tech]} <span class="dim">(${w.tech}/9)</span></span></div>
        <div class="statline"><span>Wealth</span><span>${WEALTH_LABELS[w.wealth]} <span class="dim">(${w.wealth}/9)</span></span></div>
        <div class="statline"><span>Danger</span><span class="${w.danger>=7?'red':w.danger>=4?'gold':'green'}">${DANGER_LABELS[w.danger]} <span class="dim">(${w.danger}/10)</span></span></div>
        <div class="divider"></div>
        <p class="small">What will you call this world?</p>
        ${nameField("wNameInput","Name your world","world",w.name)}
        <div class="row between" style="margin-top:10px">
          <button class="ghost" id="backStep2">&larr; Back</button>
          <button class="primary" id="rollShip">Name &amp; continue &rarr;</button>
        </div>
      </div>`;
    }

    if(s===4){ const v=creating.vehicle; return `
      ${this.rarityBanner(v.tier, "your first craft")}
      <div class="card reveal">
        <h2>You inherit ${article(v.clsName)} <span class="gold">${v.clsName}</span></h2>
        <p class="small dim">A battered machine, but it runs. ${powerLine(v)}</p>
        <div class="divider"></div>
        ${v.axes.map(a=>`<div class="statline"><span>${UNITS.power[a].label}</span><span class="gold">${UNITS.fmtPower(v.power[a])}</span></div>`).join("")}
        <p class="small dim" style="margin-top:6px">Power is measured in ${UNITS.power.unitLong} (${UNITS.power.unit}).</p>
        <div class="divider"></div>
        <p class="small">Every good pilot names their ship.</p>
        ${nameField("vNameInput","Name your craft","ship",v.name)}
        <div class="row between" style="margin-top:10px">
          <button class="ghost" id="backStep3">&larr; Back</button>
          <button class="primary" id="toReview">Name &amp; review &rarr;</button>
        </div>
      </div>`;
    }

    // step 5 review
    const sp=creating.species, w=creating.world, v=creating.vehicle;
    return `
    <div class="card reveal">
      <h2>The galaxy has decided.</h2>
      <p><span class="dim">You are</span> <b class="gold">${creating.name}</b>,
         <span class="dim">of the</span> <b class="violet">${sp.name}</b>
         <span class="small" style="color:${RARITY.byId(sp.tier).color}">(${RARITY.byId(sp.tier).name})</span></p>
      <p><span class="dim">Born on</span> <b class="blue">${w.name}</b>,
         a ${w.biomeName} <span class="small" style="color:${RARITY.byId(w.tier).color}">(${RARITY.byId(w.tier).name})</span></p>
      <p><span class="dim">Flying</span> <b class="gold">${v.name}</b>,
         ${article(v.clsName)} ${v.clsName} <span class="small" style="color:${RARITY.byId(v.tier).color}">(${RARITY.byId(v.tier).name})</span></p>
      <div class="divider"></div>
      <p class="small dim">You will begin as a <b class="blue">young child</b> — barely a fraction of your
      potential — and grow into your genetics as the years pass. There are no second rolls. This life is yours.</p>
      <div class="row between">
        <button class="ghost" id="backStep4">&larr; Back</button>
        <button class="primary" id="beginGame">&#9654; Be born</button>
      </div>
    </div>`;
  },

  /* ---------- HUB ---------- */
  screen_hub(){
    if(adrift()) return this.screen_void();
    const w=state.world;
    return `
    ${this.statHeader()}
    <div class="card">
      <div class="row between"><h2>&#9737; ${w.name}</h2>
        <span class="tag" style="color:${RARITY.byId(w.tier).color}">${RARITY.byId(w.tier).name}</span></div>
      <p class="small dim">${worldDesc(w)}</p>
      ${isInhabited(w)?`<span class="pill b">${TECH_LABELS[w.tech]} ${w.tech}/9</span>
      <span class="pill g">${WEALTH_LABELS[w.wealth]} ${w.wealth}/9</span>`:'<span class="pill">Uninhabited</span>'}
      <span class="pill ${w.danger>=7?'':'v'}">${DANGER_LABELS[w.danger]} ${w.danger}/10</span>
      <p class="small ${Game.atHome()?'green':'dim'}" style="margin-top:6px">
        ${Game.atHome()?`&#9737; Your kind's ancestral biome — you are at home here (better finds &amp; faster healing).`
          :`Far from the ${cap(BIOMES.find(b=>b.id===state.species.detail.nativeBiome).name)} your kind calls home.`}</p>
    </div>
    <div class="card">
      <h3>Around ${w.name}</h3>
      ${(()=>{ const sd=settleDef(w.settle), amen=settleAmen(w);
        const note = !isInhabited(w)
          ? `<p class="small dim">This world is uninhabited — no settlement, no shipyard, no trade. Just the wilds. (Move ships and travel from the <b>Crew</b> tab.)</p>`
          : (sd?`<p class="small dim"><b class="gold">${sd.name}</b> — ${sd.desc}.</p>`:"");
        return `${note}
      <div class="grid">
        ${amen.includes("tavern")?`<button id="vTavern">&#127866; Tavern</button>`:""}
        ${amen.includes("depot")?`<button id="vDepot">&#128230; Depot</button>`:""}
        ${amen.includes("market")?`<button id="vMarket">&#9879; Market</button>`:""}
        ${amen.includes("broker")?`<button id="vBroker">&#128225; Info Broker</button>`:""}
        ${amen.includes("talk")?`<button id="vTalk">&#128483; Talk to a stranger</button>`:""}
        ${amen.includes("shipyard")?`<button id="vShipyard">&#128736; Shipyard</button>`:""}
        <button id="vWilds" class="primary">${worldCivility(w)>=0.7?"&#127961; ":"&#127807; "}${exploreLabel(w)}</button>
        <button id="vRest">&#9789; Rest</button>
      </div>`; })()}
    </div>`;
  },

  /* ---------- TAVERN ---------- */
  screen_tavern(){
    const w=state.world;
    return `
    ${this.statHeader()}
    <div class="card"><h2>&#127866; ${w.name} Tavern</h2>
      <p class="small dim">Smoke, music, and a hundred stories you haven't heard.</p></div>
    <div class="card"><h3>Who's here</h3>
      <button class="full" id="tPatron">&#128483; Talk to a patron</button>
      <button class="full" id="tBartender">&#127867; Talk to the bartender</button>
      <button class="full" id="tBounty">&#127919; Talk to a bounty hunter</button>
      ${(state.bounties||[]).length?`<button class="full primary" id="tRedeem">&#9878; Redeem bounties (${state.bounties.length}) &middot; +${commas(state.bounties.reduce((s,b)=>s+b.value,0))}c</button>`:""}
      <button class="full ghost" id="tDrink">Buy a round &middot; 10c (rest your bones)</button>
    </div>
    <div class="card"><button id="tBack" class="ghost full center">&larr; Back outside</button></div>`;
  },

  /* ---------- BOUNTY BOARD (a hunter's posted contracts) ---------- */
  screen_bounties(){
    const b=state.bountyBoard, active=state.contracts||[];
    const mark=c=>{ const th=threatOf(c.level||1); return `<div class="row between"><span><b>${c.name}</b> <span class="small dim">&middot; ${c.raceName} ${careerName(c.career)}</span></span><span class="small">Lv ${c.level||"?"} <span class="${th.c}">${th.t}</span></span></div>
      <div class="small dim" style="margin:1px 0 2px">${THREAT_LABEL[c.threat]||"WANTED"}${(c.level||0)>(state.level||1)+30?' &middot; <span class="red">far above your level</span>':''}</div>`; };
    return `${this.statHeader()}
    <div class="card"><h2>&#127919; Bounty Hunter</h2>
      <p class="small dim">A scarred hunter slides a datapad across the table. "Three marks worth your time. Bring 'em in breathing or cold — the price holds either way. They're out there; you'll have to track 'em down yourself."</p></div>
    ${active.length?`<div class="card sheet"><h3>Your contracts <span class="dim small">&middot; ${active.length}/3</span></h3>
      ${active.map(c=>`<div style="padding:6px 0;border-bottom:1px solid var(--line)">${mark(c)}
        <p class="small dim" style="margin:2px 0">&#128205; <b>${c.worldName}</b> (${c.sysName} system) &middot; ${commas(c.alive)}c alive / ${commas(c.dead)}c dead</p>
        <button class="small ghost" data-abandon="${c.id}">Abandon</button></div>`).join("")}
      <p class="small dim" style="margin-top:6px">Travel to a mark's world, then <b>Talk to a patron</b> and ask around to flush them out.</p></div>`:""}
    <div class="card sheet"><h3>Marks on offer</h3>
      ${b?b.list.map((c,i)=> c?`<div style="padding:7px 0;border-bottom:1px solid var(--line)">${mark(c)}
        <p class="small dim" style="margin:2px 0">Last seen: &#128205; <b>${c.worldName}</b> (${c.sysName} system)</p>
        <div class="odds">${commas(c.alive)}c alive &middot; ${commas(c.dead)}c dead</div>
        <button class="small" data-accept="${i}" ${active.length>=3?"disabled":""}>Accept contract</button></div>`
        :`<div style="padding:7px 0;border-bottom:1px solid var(--line)"><span class="small dim">&mdash; contract taken &mdash;</span></div>`).join(""):""}
      ${active.length>=3?`<p class="small gold" style="margin-top:6px">Your contract ledger is full (3/3).</p>`:""}
    </div>
    <div class="card"><button id="bvBack" class="ghost full center">&larr; Back to the tavern</button></div>`;
  },
  /* ---------- THE BARTENDER (rumors + buys your information) ---------- */
  screen_bartender(){
    const w=state.world, u=unreportedInfo();
    const bits=[u.systems.length&&`${u.systems.length} system${u.systems.length>1?"s":""}`,
                u.worlds.length&&`${u.worlds.length} world${u.worlds.length>1?"s":""}`,
                u.races.length&&`${u.races.length} race${u.races.length>1?"s":""}`,
                u.creatures.length&&`${u.creatures.length} creature${u.creatures.length>1?"s":""}`].filter(Boolean);
    return `
    ${this.statHeader()}
    <div class="card"><h2>&#127867; The Bartender</h2>
      <p class="small dim">"You look like you've been places. Tell you what — I'll pay good credits for word of anywhere new you've charted, any peoples or beasts you've come across. Charts, tales, gossip. What've you got?"</p></div>
    <div class="card"><h3>&#128225; Sell information</h3>
      ${u.total>0?`<p class="small">You can tell of: ${bits.join(", ")}.</p>
        <button class="full primary" id="bSell">Sell it all &middot; +${commas(u.total)}c</button>`
        :`<p class="small dim">"Nothing new from you today. Come back when you've seen more of the galaxy."</p>`}
    </div>
    <div class="card"><h3>&#128101; Looking for crew?</h3>
      <p class="small dim">"Need hands? A few tradesfolk drink here between berths — say the word and I'll point you to one."</p>
      <div class="grid">
        <button id="bCrewPilot">&#9992; Know a pilot?</button>
        <button id="bCrewGunner">&#9876; Know a gunner?</button>
        <button id="bCrewMech">&#128295; Know a mechanic?</button>
      </div>
    </div>
    <div class="card"><button id="bRumor" class="full center">&#128172; Ask for a rumor</button></div>
    <div class="card"><button id="bBack" class="ghost full center">&larr; Back to the tavern</button></div>`;
  },

  /* ---------- INFORMATION BROKER (sell your discoveries) ---------- */
  screen_broker(){
    const w=state.world, u=unreportedInfo();
    const row=(label,val)=>`<div class="krow"><span class="lbl">${label}</span><span class="kv gold">${commas(val)}c</span></div>`;
    return `
    ${this.statHeader()}
    <div class="card"><h2>&#128225; ${w.name} Information Broker</h2>
      <p class="small dim">Charts, peoples, beasts — fresh knowledge fetches good credits. The rarer
      the find, the fatter the fee.</p></div>
    <div class="card sheet">
      <h3>Unreported finds</h3>
      ${u.total<=0?`<p class="small dim">Nothing new since your last report. Go meet someone or chart a world.</p>`
      :`${u.races.map(r=>row(`${r.name} <span class="dim small">(${RARITY.byId(r.tier).name} race)</span>`, raceValue(r.tier))).join("")}
        ${u.worlds.map(x=>row(`${x.name} <span class="dim small">(${RARITY.byId(x.tier).name} world)</span>`, worldValue(x.tier))).join("")}
        ${u.creatures.map(c=>row(`${c.name} <span class="dim small">(creature)</span>`, CREATURE_VALUE)).join("")}
        <div class="krow" style="border-top:1px solid var(--line);margin-top:4px"><span class="lbl"><b>Total</b></span><span class="kv gold"><b>${commas(u.total)}c</b></span></div>`}
    </div>
    ${u.total>0?`<div class="card"><button id="sellInfo" class="primary full center">Sell all information &middot; +${commas(u.total)}c</button></div>`:""}
    <div class="card"><button id="brBack" class="ghost full center">&larr; Back outside</button></div>`;
  },

  /* ---------- DEPOT (commodity trading) ---------- */
  screen_depot(){
    const w=state.world, used=poolUsed(), cap=poolMax(), n=poolShips().length, free=cap-used;
    let lastCat=null;
    return `
    ${this.statHeader()}
    <div class="card"><h2>&#128230; ${w.name} Depot</h2>
      <p class="small dim">${isInhabited(w)?settleDef(w.settle).name:""} &middot; ${WEALTH_LABELS[w.wealth]} ${w.wealth}/9. Prices follow what this world makes and needs.
      Shared hold: <b>${used}/${cap}</b> slot${cap!==1?"s":""} (${free} free) across ${n} ship${n!==1?"s":""} docked here.</p>
      <p class="small dim">Bulk goods fill more of the hold &mdash; a Ship Chassis takes 10 slots, Grain just 1.</p></div>
    <div class="card">
      ${COMMODITIES.map(c=>{ const buy=canBuyHere(w,c), sell=canSellHere(w,c), have=poolHave(c.id);
        const bp=commodityBuy(w,c), sp=commoditySell(w,c), prod=produces(w,c), dem=demands(w,c);
        const tag = prod?'<span class="green">produced here &middot; buy low</span>'
                  : dem?'<span class="gold">in demand &middot; sells high</span>'
                  : isStaple(c)?'<span class="dim">basic supply</span>'
                  : (buy||sell)?'<span class="dim">market goods</span>':'<span class="dim">not traded here</span>';
        const head = c.cat!==lastCat ? (lastCat=c.cat, `<h3 style="margin:10px 0 2px">${c.cat}</h3>`) : "";
        if(!buy&&!sell&&!have) return head+`<div class="krow"><span class="lbl dim">${c.name} <span class="small">&middot; ${c.bulk} slot${c.bulk>1?"s":""}</span></span><span class="kv dim small">not traded here</span></div>`;
        return `${head}<div class="card" style="margin:6px 0;padding:10px">
          <div class="row between"><b>${c.name}</b> <span class="tag">${c.bulk} slot${c.bulk>1?"s":""}</span></div>
          <p class="small" style="margin:3px 0">${tag}${have?` &middot; <span class="blue">you hold ${have}</span>`:""}</p>
          <div class="row">
            ${buy?`<button data-buyc="${c.id}" ${state.credits<bp||free<c.bulk?"disabled":""}>Buy &middot; ${commas(bp)}c</button>
              <button class="ghost small" data-buyallc="${c.id}" ${state.credits<bp||free<c.bulk?"disabled":""}>Buy all</button>`:""}
            ${sell&&have>0?`<button class="ghost" data-sellc="${c.id}">Sell &middot; ${commas(sp)}c</button>
              <button class="ghost small" data-sellallc="${c.id}">Sell all</button>`:""}
          </div>
        </div>`; }).join("")}
    </div>
    ${(()=>{ const dmg=damagedShipsHere(), tot=repairTotalHere(); return dmg.length?`<div class="card"><div class="row between"><h3>&#128295; Repairs</h3>
      <button class="small" id="depRepairAll" ${state.credits<tot?"disabled":""}>Repair all (${dmg.length}) &middot; ${commas(tot)}c</button></div>
      <p class="small dim">The depot's hands will patch the hulls of every ship docked here.</p></div>`:""; })()}
    <div class="card"><button id="depBack" class="ghost full center">&larr; Back outside</button></div>`;
  },

  /* ---------- SHIPYARD (buy/sell ships, the Yarder) — only on inhabited worlds ---------- */
  screen_shipyard(){
    const w=state.world, stock=shipStockAt();
    return `
    ${this.statHeader()}
    <div class="card"><h2>&#128736; ${w.name} Shipyard</h2>
      <p class="small dim">${WEALTH_LABELS[w.wealth]} ${w.wealth}/9, ${TECH_LABELS[w.tech]} ${w.tech}/9 — stock reflects this world's industry, and turns over each year.</p></div>
    <div class="card"><h3>Ships for sale <span class="dim small">&middot; ${stock.length}</span></h3>
      ${stock.length?(()=>{ let lastCat=null;
        const ordered=stock.map((o,i)=>({o,i})).sort((a,b)=>{
          const ca=SHIP_CATS.findIndex(x=>x.id===a.o.cat), cb=SHIP_CATS.findIndex(x=>x.id===b.o.cat);
          return ca!==cb ? ca-cb : (a.o.size||0)-(b.o.size||0) || a.o.price-b.o.price; });
        return ordered.map(({o,i})=>{
          const head = o.cat!==lastCat ? (lastCat=o.cat, `<h4 class="gold" style="margin:12px 0 2px">${shipCatName(o.cat)}</h4>`) : "";
          const req=[`${o.reqPilots} pilot${o.reqPilots>1?"s":""}`]
            .concat(o.reqMech?[`${o.reqMech} mech`]:[], o.reqLabor?[`${o.reqLabor} labor`]:[], o.gunnerGuns?[`${o.gunnerGuns} gunner${o.gunnerGuns>1?"s":""}`]:[]).join(" &middot; ");
          return `${head}<div class="card" style="margin:6px 0;padding:10px">
            <div class="row between"><b>${o.name} <span class="small" style="color:${RARITY.byId(o.tier).color}">${RARITY.byId(o.tier).name}</span></b>
              <button data-ship="${i}" ${state.credits<o.price?"disabled":""}>${commas(o.price)}c</button></div>
            <p class="small dim" style="margin:4px 0">${RANGE_LABEL[o.range]} &middot; cargo ${commas(o.cargo)} &middot; crew up to ${o.crew}</p>
            <p class="small dim" style="margin:2px 0">&#128101; needs ${req}</p>
            <p class="small dim" style="margin:2px 0">&#10084; ${commas(o.maxHp)} HP${o.armor?` &middot; <span class="gold">${ARMOR[o.armor].name}</span>`:""}${o.hyper?` &middot; <span class="gold">${HYPERDRIVE[o.hyper].name} drive</span>`:""}${(o.slotSizes&&o.slotSizes.length)?` &middot; mounts: ${slotBreakdown(o.slotSizes)}`:""}${o.bays?` &middot; carries ${o.bays} fighter${o.bays>1?"s":""}`:""}</p>
          </div>`; }).join("");
        })()
        :`<p class="small dim">No ships for sale here — this world hasn't the industry for it. Try a wealthier, higher-tech world.</p>`}
    </div>
    <div class="card"><div class="row between"><h3>Ships docked here</h3>
      ${(()=>{ const dmg=damagedShipsHere(), tot=repairTotalHere();
        return dmg.length?`<button class="small" id="syRepairAll" ${state.credits<tot?"disabled":""}>&#128295; Repair all (${dmg.length}) &middot; ${commas(tot)}c</button>`:""; })()}</div>
      ${Game.shipsHere().map(v=>{ const active=v.id===state.activeShip, used=shipUsed(v), atk=shipAttack(v);
        return `<div style="padding:6px 0;border-bottom:1px solid var(--line)">
          <div class="row between"><span>${active?'<span class="green">&#9654; </span>':''}${v.name}
            <span class="small dim">(${v.clsName} &middot; ${RANGE_LABEL[v.range]||"?"})</span></span>
            <span class="small dim">cargo ${used}/${v.hold}</span></div>
          <p class="small dim" style="margin:2px 0">&#10084; ${commas(v.hp||0)}/${commas(v.maxHp||0)} HP${v.armor?` &middot; ${ARMOR[v.armor].name}`:""}${atk?` &middot; &#9876; ${commas(atk)} atk`:""}</p>
          <div class="row" style="margin-top:4px">
            ${active?'<span class="small green">piloting</span>':`<button class="small" data-selship="${v.id}">Pilot this</button>`}
            <button class="small" data-outfit="${v.id}">&#128295; Outfit</button>
            <button class="small ghost" data-renship="${v.id}">Rename</button>
            ${state.vehicles.length>1&&!active?`<button class="small ghost" data-sellship="${v.id}">Sell &middot; ${shipSell(v)}c</button>`:""}
          </div></div>`; }).join("")}
    </div>
    <div class="card"><p class="small dim">To move ships or travel between worlds, use the <b>Crew &rarr; Ships / Fleets</b> tab.</p></div>
    <div class="card"><h3>The Yarder</h3>
      <p class="small dim">The dockmaster who runs this yard — hauling, salvage, lost ships.</p>
      <button id="yarder" class="full center">Talk to the Yarder</button>
    </div>
    <div class="card"><button id="syBack" class="ghost full center">&larr; Back outside</button></div>`;
  },

  /* ---------- OUTFITTING (repair, weapons, armor) ---------- */
  screen_outfit(){
    const v=(state.vehicles||[]).find(x=>x.id===outfitShip); if(!v) return this.screen_shipyard();
    const w=state.world, rc=repairCost(v), atk=shipAttack(v), gunners=Game.aboard(v,"gunner");
    const pilotN=v.pilotGuns||0, total=(v.guns||[]).length;
    const nextArmor=(v.armor||0)<ARMOR.length-1?(v.armor||0)+1:null;
    const armorCost=nextArmor!=null?Math.round((shipClass(v.cls)?shipClass(v.cls).baseHp:200)*ARMOR[nextArmor].mult*8*(1+w.wealth*0.04)):0;
    const armorPct=a=>Math.round((ARMOR[a].mult-1)*100), hyper=v.hyper||0;
    const interstellar=v.range==="interstellar";
    const nextHyper=interstellar&&hyper<HYPERDRIVE.length-1?hyper+1:null;
    const hyperCost=nextHyper!=null?Math.round((v.power.star||0)*10*nextHyper*(1+w.wealth*0.03)):0;
    const hyperPct=h=>Math.round((HYPERDRIVE[h].mult-1)*100);
    return `
    ${this.statHeader()}
    <div class="card"><div class="row between"><h2 class="gold">&#128295; ${v.name}</h2>
      <span class="tag" style="color:${RARITY.byId(v.tier).color}">${RARITY.byId(v.tier).name}</span></div>
      <p class="small dim">${v.role||v.clsName} &middot; ${RANGE_LABEL[v.range]}</p>
      ${krow("Hull", `<b>${commas(v.hp||0)} / ${commas(v.maxHp||0)}</b> HP`)}
      ${krow("Plating", `Tier ${(v.armor||0)+1}/5 &middot; ${ARMOR[v.armor||0].name} <span class="dim small">(+${armorPct(v.armor||0)}% hull)</span>`)}
      ${interstellar?krow("Hyperdrive", `Tier ${hyper+1}/5 &middot; ${HYPERDRIVE[hyper].name} <span class="dim small">(+${hyperPct(hyper)}% range &middot; ${jumpRange(v).toFixed(1)} ly)</span>`):""}
      ${krow("Total attack", `<span class="gold">${commas(atk)}</span> ${total?`<span class="dim small">(${gunners} gunner${gunners!==1?"s":""} aboard for ${v.gunnerGuns||0} heavy mounts)</span>`:""}`)}
    </div>
    <div class="card"><h3>Repair hull</h3>
      ${rc>0?`<button class="primary full center" id="ofRepair" ${state.credits<rc?"disabled":""}>Repair to full &middot; ${commas(rc)}c</button>`
        :`<p class="small green">Hull is at full integrity.</p>`}</div>
    ${interstellar?`<div class="card"><h3>Hyperdrive <span class="dim small">&middot; Tier ${hyper+1}/5</span></h3>
      ${nextHyper!=null?`<p class="small dim">Upgrade to <b>${HYPERDRIVE[nextHyper].name}</b> (Tier ${nextHyper+1}) &mdash; +${hyperPct(nextHyper)}% range, reaching <b class="gold">${(jumpRange(v)/HYPERDRIVE[hyper].mult*HYPERDRIVE[nextHyper].mult).toFixed(1)} ly</b>.</p>
        <button class="full center" id="ofHyper" ${state.credits<hyperCost?"disabled":""}>Fit hyperdrive &middot; ${commas(hyperCost)}c</button>`
        :`<p class="small green">Already the top-tier Quantum hyperdrive.</p>`}</div>`:""}
    ${(shipCat(v)==="fighter"&&v.range==="system")?(()=>{ const advCost=Math.round((v.power.star||400)*25*(1+w.wealth*0.04)), advLy=(Math.round((v.power.star||400)*1.8)/LY_PER_STAR);
      return `<div class="card"><h3>&#128640; Hyperdrive refit</h3>
        <p class="small dim">Fit a hyperdrive to this fighter, making it an <b class="gold">Advanced Starfighter</b> that can jump between systems &mdash; <b class="gold">~${advLy.toFixed(1)} ly</b> to start, then upgradable like any interstellar drive.</p>
        ${w.tech>=6?`<button class="full center" id="ofAdvance" ${state.credits<advCost?"disabled":""}>Fit hyperdrive &middot; ${commas(advCost)}c</button>`
          :`<p class="small red">This world's yard isn't advanced enough &mdash; a hyperdrive needs a Tech 6+ world.</p>`}</div>`; })():""}
    ${shipCanShield(v)?(()=>{ const cur=v.shieldTier||0, next=cur<SHIELD_MAX_TIER?cur+1:null,
        shCost=next!=null?Math.round((v.maxHp||500)*0.55*next*(1+w.wealth*0.04)):0;
      return `<div class="card"><h3>&#128737; Shield generator <span class="dim small">&middot; ${cur?`Tier ${cur}/3`:"none fitted"}</span></h3>
        <p class="small dim">${cur?`A <b>${SHIELD[cur].name}</b> absorbs <b class="gold">${commas(shipMaxShield(v))}</b> damage before your hull, and recharges in a fight.`:"No shield fitted. A shield soaks fire before it reaches your hull — the big-ship answer to not being able to dodge."}</p>
        ${next!=null?(w.tech>=6?`<button class="full center" id="ofShield" ${state.credits<shCost?"disabled":""}>${cur?`Upgrade to ${SHIELD[next].name} (Tier ${next})`:`Install ${SHIELD[next].name}`} &middot; ${commas(shCost)}c</button>`
          :`<p class="small red">Shields need a Tech 6+ world to fit.</p>`)
          :`<p class="small green">Already the top-tier Bastion Barrier.</p>`}</div>`; })():""}
    <div class="card"><h3>Hull plating <span class="dim small">&middot; Tier ${(v.armor||0)+1}/5</span></h3>
      ${nextArmor!=null?`<p class="small dim">Upgrade to <b>${ARMOR[nextArmor].name}</b> (Tier ${nextArmor+1}) &mdash; +${armorPct(nextArmor)}% base hull.</p>
        <button class="full center" id="ofArmor" ${state.credits<armorCost?"disabled":""}>Refit plating &middot; ${commas(armorCost)}c</button>`
        :`<p class="small green">Already the heaviest plating available.</p>`}</div>
    <div class="card sheet"><h3>Weapon hardpoints <span class="dim small">&middot; ${total?slotBreakdown(v.slotSizes):"none"}</span></h3>
      ${total?(v.guns||[]).map((gid,i)=>{ const pilot=i<pilotN, wp=gid?weaponById(gid):null, sz=(v.slotSizes||[])[i]||0;
        return `<div class="krow"><span class="lbl">${pilot?'<span class="green">Pilot</span>':'<span class="blue">Gunner</span>'} &middot; <b>${SLOT_SIZES[sz]}</b> mount</span>
          <span class="kv">${wp?`${wp.name} <span class="dim small">&middot; ${commas(wp.atk)}</span> <button class="small ghost" data-unmount="${i}">Strip</button>`
            :`<button class="small" data-mountslot="${i}">Mount &hellip;</button>`}</span></div>`; }).join("")
        :`<p class="small dim">This hull has no weapon hardpoints. Gunships and warships do — rarer hulls have more.</p>`}
      ${pilotN&&total?`<p class="small dim" style="margin-top:6px">Pilot mounts fire under your own hand; heavy mounts each need a gunner. A weapon only fits a mount its size or larger.</p>`:""}
    </div>
    ${mountPick!=null?(()=>{ const sz=(v.slotSizes||[])[mountPick]||0;
      const fit=WEAPONS.filter(wp=>wp.minTech<=w.tech && (wp.size||0)<=sz);
      return `<div class="card sheet"><h3>Mount on a ${SLOT_SIZES[sz]} mount (slot ${mountPick+1})</h3>
      ${fit.length?fit.map(wp=>`<div class="krow"><span class="lbl">${wp.name} <span class="dim small">&middot; ${SLOT_SIZES[wp.size||0]} &middot; &#9876; ${commas(wp.atk)}</span></span>
        <span class="kv"><button class="small" data-buygun="${wp.id}" ${state.credits<wp.price?"disabled":""}>${commas(wp.price)}c</button></span></div>`).join("")
        :`<p class="small dim">No weapons this mount can take are sold at this world's tech level.</p>`}
      <button class="ghost full center" id="ofMountCancel" style="margin-top:6px">Cancel</button></div>`; })():""}
    <div class="card"><button class="ghost full center" id="ofBack">&larr; Back to shipyard</button></div>`;
  },
  /* ---------- SHIP-TO-SHIP BATTLE ---------- */
  screen_shipbattle(){
    const c=shipCombat; if(!c) return this.screen_hub();
    const bar=(hp,max,cl)=>`<div class="bar" style="margin:2px 0 5px"><i class="${cl}" style="width:${max?clamp(hp/max*100,0,100):0}%"></i></div>`;
    const enemyAlive=c.enemy.filter(e=>e.hp>0).length;
    const myShips=c.my.map(id=>(state.vehicles||[]).find(v=>v.id===id)).filter(Boolean);
    const myAlive=myShips.filter(v=>v.hp>0).length;
    const enemyRows=c.enemy.map((e,i)=>{ const dead=e.hp<=0, foc=c.target===i;
      return `<button class="shipcard${foc?' on':''}" data-etarget="${i}" ${dead?"disabled":""} style="${dead?'opacity:.45':''}">
        <div class="top"><span class="nm">${dead?'&#9760; ':''}${e.name}${foc?' <span class="gold small">&#127919; focus</span>':''}</span><span class="tag">&#9876; ${commas(e.attack)}</span></div>
        ${e.maxShield?`<div class="sub">shield ${commas(Math.max(0,e.shield))} / ${commas(e.maxShield)}</div>${bar(e.shield,e.maxShield,'enfill')}`:""}
        <div class="sub">hull ${commas(Math.max(0,e.hp))} / ${commas(e.maxHp)}</div>${bar(e.hp,e.maxHp,'hpfill')}</button>`; }).join("");
    const myRows=myShips.map(v=>{ const ms=shipMaxShield(v), ev=shipEvasion(v), dead=v.hp<=0, wing=c.wing.includes(v.id);
      return `<div class="shipcard" style="${dead?'opacity:.45':''}">
        <div class="top"><span class="nm">${dead?'&#9760; ':wing?'&#9992; ':v.bays>0?'&#128640; ':''}${v.name}</span><span class="tag">&#9876; ${commas(shipPower(v))}</span></div>
        ${ms?`<div class="sub">shield ${commas(Math.max(0,v.shield||0))} / ${commas(ms)}</div>${bar(v.shield||0,ms,'enfill')}`:""}
        <div class="sub">hull ${commas(Math.max(0,v.hp))} / ${commas(v.maxHp)}${ev>0?` &middot; <span class="green">${Math.round(ev*100)}% evade</span>`:""}</div>${bar(v.hp,v.maxHp,'hpfill')}</div>`; }).join("");
    return `
    <div class="card"><div class="row between"><h2 class="red">${c.name}</h2><span class="tag">${enemyAlive}/${c.enemy.length} ship${c.enemy.length>1?"s":""}</span></div>
      <p class="small dim">${c.over?"":`Tap an enemy to focus your fire${c.target!=null?"":" — otherwise your guns finish off the weakest"}. Fighters dodge; big ships tank behind shields.`}</p></div>
    <div class="card sheet"><h3>Enemy fleet</h3>${enemyRows}</div>
    <div class="card sheet"><h3>Your fleet <span class="dim small">&middot; ${myAlive}/${myShips.length}</span></h3>${myRows}</div>
    ${c.log&&c.log.length?`<div class="card"><p class="small">${c.log.join("<br>")}</p></div>`:""}
    ${c.over?`<div class="card"><p class="small ${c.win?'green':'red'}">${c.msg}</p>
      <button class="primary full center" id="sbDone">${c.win?"Collect &amp; carry on":(c.fled?"Jump clear":"Limp away")}</button></div>`
    :`<div class="card"><div class="grid">
      <button id="sbFire" class="primary">&#9876; Fire salvo</button>
      ${c.wing&&c.wing.length?`<button id="sbWing" class="${c.wingOut?'ghost':''}">${c.wingOut?'&#9992; Recall wing':'&#9992; Launch wing'}</button>`:""}
      <button id="sbRetreat" class="ghost">&#127756; Retreat</button>
      </div><p class="small dim" style="margin-top:6px">Retreating lets the enemy fire one parting volley before you jump clear.</p></div>`}`;
  },

  /* ---------- TRADE-FLEET AMBUSH (raiders hit a run — fight or flee) ---------- */
  screen_traderaid(){
    const r=state.tradeRaid; if(!r) return this.screen_crew();
    const f=fleetById(r.fleetId);
    const escorts=f?shipsByIds(f.shipIds).filter(v=>v.hp>0&&shipPower(v)>1):[];
    const armed=r.power>=r.raiderPower*0.6;
    const fleeOdds=clamp(0.72 - r.threat*0.07 + (armed?0.12:0), 0.18, 0.85);
    const odds=p=>{ const c=p>=0.66?"green":p>=0.4?"gold":"red"; return `<span class="${c}">${Math.round(p*100)}%</span>`; };
    const edge=r.power>=r.raiderPower?'<span class="green">you outgun them</span>':r.power>1?'<span class="gold">a hard fight</span>':'<span class="red">you have no escort</span>';
    return `
    <div class="rarity-banner" style="border-color:#c0392b">
      <div class="rn" style="color:#e74c3c">&#9876; RAIDERS</div>
      <div class="odds">${r.name} is jumped near ${r.sysName}</div>
    </div>
    <div class="card sheet">
      <p class="small dim">A raider pack drops out of the dark across your trade lane and moves to board. Your captain holds for orders.</p>
      ${krow("Threat", `<b class="red">${"&#9876;".repeat(r.threat)}</b> <span class="dim small">level ${r.threat}</span>`)}
      ${krow("Raider strength", `<b class="red">${commas(r.raiderPower)}</b>`)}
      ${krow("Your firepower", `<b class="${r.power>=r.raiderPower?'green':r.power>1?'gold':'red'}">${commas(r.power)}</b> ${escorts.length?`<span class="dim small">&middot; ${escorts.length} escort${escorts.length>1?"s":""}</span>`:`<span class="red small">&middot; no escort!</span>`}`)}
      ${krow("Cargo at risk", r.cargo?`<b class="gold">${commas(r.cargo)}</b> units`:`<span class="dim">empty holds</span>`)}
    </div>
    <div class="card">
      <button class="primary full center" id="raidFight">&#9876; Stand and fight <span class="dim small">(${edge})</span></button>
      <p class="small dim" style="margin:6px 0 12px">Take the helm and fight it out, round by round, on the battle screen. Win and your escorts strip the wrecks for salvage; you can still break off mid-fight.</p>
      <button class="full center" id="raidFlee">&#128640; Run for it <span class="dim small">(${odds(fleeOdds)} to escape)</span></button>
      <p class="small dim" style="margin-top:6px">Burn for the horizon. Slip away light, or get run down and hit hard from astern.</p>
    </div>`;
  },

  /* ---------- TRAVEL / MOVE (a ship or a whole fleet) ---------- */
  screen_travel(){
    const ctx=travelCtx; if(!ctx) return this.screen_crew();
    const ids=ctx.ids, caps=groupCaps(ids), origin=caps.sysId;
    if(origin<0 && ids.includes(state.activeShip)) return this.screen_void();   // your group is adrift
    const osys=state.galaxy.systems[origin];
    const playerIn=ids.includes(state.activeShip);
    const blockers=groupBlockers(ids), g=state.galaxy;
    const planets = osys.planets||[];
    const inSys = caps.tier!=="surface", jumpable = caps.tier==="interstellar";
    const others = g.systems.filter(x=>x.id!==origin).map(x=>({ sys:x, d:sysDist(origin,x.id) })).sort((a,b)=>a.d-b.d);
    const reach = others.filter(o=>o.d<=caps.jump+1e-6), beyond = others.filter(o=>o.d>caps.jump+1e-6);
    const aIcon={shipyard:"&#128736;",market:"&#9878;",tavern:"&#127866;"};
    const sCol={friendly:'g',hostile:'r',wary:'gold'};
    // a rich destination card for a charted planet
    const pcard=(s,slot,p)=>{ const w=p.world, inhab=isInhabited(w), sameSys=s.id===origin, dist=sameSys?0:sysDist(origin,s.id);
      const hereNow=sameSys&&slot===groupSlot(ids), reachable=sameSys||(jumpable&&dist<=caps.jump+1e-6);
      const amen=settleAmen(w).filter(a=>aIcon[a]).map(a=>`<span class="chip" title="${a}">${aIcon[a]}</span>`).join("");
      const dC=w.danger>=7?'r':w.danger>=4?'gold':'g';
      return `<div class="shipcard">
        <div class="top"><span class="nm">${p.isHome?"&#9737; ":""}${p.fav?'<span class="gold">&#9733;</span> ':''}${w.name}</span>
          <span class="tag"${inhab?' style="color:#caa84a"':''}>${inhab?settleDef(w.settle).name:cap(w.biomeName)}</span></div>
        <div class="sub">${cap(w.biomeName)} &middot; ${s.name}${sameSys?'':` &middot; ${dist.toFixed(1)} ly`}</div>
        <div class="chips">
          ${hereNow?'<span class="chip g">&#9679; you are here</span>':''}
          ${inhab?`<span class="chip">${TECH_LABELS[w.tech]} ${w.tech}/9</span><span class="chip gold">${WEALTH_LABELS[w.wealth]} ${w.wealth}/9</span>`:'<span class="chip">uninhabited</span>'}
          <span class="chip ${dC}">&#9760; ${DANGER_LABELS[w.danger]||'?'}</span>${amen}</div>
        <div class="row" style="margin-top:7px">
          ${hereNow?'<span class="small green">your group is here</span>':reachable?`<button class="small" data-favgo="${s.id}:${slot}">${sameSys?'&#9992; Travel':'&#9650; Jump in'}</button>`:`<span class="small dim">&#128274; ${jumpable?'out of jump range':'system-bound'}</span>`}
          <button class="small ghost" data-fav="${s.id}:${slot}">${p.fav?'&#9733; Unpin':'&#9734; Favourite'}</button></div></div>`; };
    // a card for a system within jump range
    const scard=(o)=>{ const s=o.sys, ch=s.discovered, inRange=o.d<=caps.jump+1e-6, canGo=inRange&&(ch||playerIn);
      const gov=ch?systemGov(s):null, charted=ch?(s.planets||[]).filter(p=>p&&p.discovered).length:0, isCap=ch&&s.capital!=null;
      return `<div class="shipcard">
        <div class="top"><span class="nm">${ch?s.name:'<span class="dim">Uncharted star</span>'}${isCap?' <span class="gold" title="capital system">&#9733;</span>':''}</span><span class="tag">${o.d.toFixed(1)} ly</span></div>
        <div class="sub">${ch?`${s.size} world${s.size>1?'s':''} &middot; ${charted} charted${isCap?' &middot; a capital system':''}`:`sensor contact &middot; ${s.size} world${s.size>1?'s':''}`}</div>
        ${gov?`<div class="chips"><span class="chip" style="color:${gov.color}">&#127963; ${gov.name}</span><span class="chip ${sCol[govStance(gov)]||''}">${govStance(gov)}</span></div>`:(ch?'<div class="chips"><span class="chip">unclaimed space</span></div>':'')}
        <div class="row" style="margin-top:7px">${canGo?`<button class="small" data-jumpsys="${s.id}">&#9650; Jump in</button>`:`<span class="small dim">&#128274; ${!inRange?'out of range':'need to be aboard'}</span>`}${ch?` <button class="small ghost" data-sysfav="${s.id}">${s.fav?'&#9733; Unpin':'&#9734; Favourite'}</button>`:''}</div></div>`; };
    const favs=[]; g.systems.forEach(s=>(s.planets||[]).forEach((p,slot)=>{ if(p&&p.discovered&&p.fav&&p.world) favs.push({s,slot,p,d:s.id===origin?0:sysDist(origin,s.id)}); }));
    favs.sort((a,b)=>a.d-b.d);
    const favSystems=g.systems.filter(s=>s.fav&&s.id!==origin&&s.discovered).map(s=>({sys:s,d:sysDist(origin,s.id)})).sort((a,b)=>a.d-b.d);
    return `
    ${this.statHeader()}
    <div class="card"><div class="row between"><h2>&#9992; ${ctx.title||"Move"}</h2><span class="tag">${RANGE_LABEL[caps.tier]}</span></div>
      <div class="chips" style="margin-top:5px"><span class="chip b">&#128205; ${osys.name}</span>${jumpable?`<span class="chip gold">&#9889; ${caps.jump.toFixed(1)} ly reach</span>`:''}<span class="chip ${playerIn?'g':''}">${playerIn?'aboard':'remote group'}</span></div>
      ${blockers.length?`<p class="small red" style="margin-top:6px">Grounded: ${blockers.map(b=>b.name).join(", ")} ${blockers.length>1?"need":"needs"} more crew to fly.</p>`:""}
      ${caps.tier==="surface"?`<p class="small red" style="margin-top:6px">No ship in this group can leave the ground.</p>`:""}</div>
    <div class="card">
      <div class="row" style="gap:6px">
        <button class="${travelTab==='planets'?'sel':''}" data-traveltab="planets">&#9737; Planets</button>
        <button class="${travelTab==='systems'?'sel':''}" data-traveltab="systems">&#10024; Systems</button></div>
      <div class="row" style="gap:6px;margin-top:6px">
        <button class="small ${!travelFav?'sel':''}" data-travelfav="0">All</button>
        <button class="small ${travelFav?'sel':''}" data-travelfav="1">&#9733; Favourites</button></div></div>
    ${travelTab==="systems" ? (travelFav
      ? (favSystems.length?`<div class="card sheet"><h3>&#9733; Favourite systems</h3>${favSystems.map(scard).join("")}</div>`
          :`<div class="card sheet"><h3>&#9733; Favourite systems</h3><p class="small dim">No favourite systems yet — switch to <b>All</b> and tap <b>&#9734; Favourite</b> on a system to pin it here.</p></div>`)
      : `${jumpable?`<div class="card"><h3>&#10024; Star Map</h3>${this.mapSvg({cx:osys.x, cy:osys.y, span:Math.max(caps.jump*2.6, 26)}, {originId:origin, reach:caps.jump})}</div>
        <div class="card sheet"><h3>Jump to another system <span class="dim small">&middot; within reach</span></h3>
          ${reach.length?reach.slice(0,16).map(scard).join("")+(reach.length>16?`<p class="small dim center" style="margin-top:4px">+${reach.length-16} more within reach — pan the map.</p>`:""):'<p class="small dim">No systems within a single jump. Drift through open space below to close the gap.</p>'}</div>`
        :`<div class="card"><p class="small dim">This group can only travel within its own system. A fleet jumps between stars only if every ship aboard is interstellar-class.</p></div>`}
        ${jumpable&&playerIn&&beyond.length?`<div class="card sheet"><h3>&#127756; Hyperdrive into open space</h3>
          <p class="small dim">Out of single-jump reach? Burn into the void and drift between the stars to bring distant systems into range (you may cross paths with other ships).</p>
          ${beyond.slice(0,5).map(o=>`<div class="krow"><span class="lbl">${o.sys.discovered?o.sys.name:'<span class="dim">distant star</span>'} <span class="dim small">&middot; ${o.d.toFixed(1)} ly ${compassBearing(o.sys.x-osys.x, o.sys.y-osys.y)}</span></span></div>`).join("")}
        </div>${this.voidCompass(caps.jump)}`:""}`)
    : (travelFav
      ? (favs.length?`<div class="card sheet"><h3>&#9733; Favourite worlds <span class="dim small">&middot; quick travel</span></h3>${favs.map(f=>pcard(f.s,f.slot,f.p)).join("")}</div>`
          :`<div class="card sheet"><h3>&#9733; Favourite worlds</h3><p class="small dim">No favourites yet — switch to <b>All</b> and tap <b>&#9734; Favourite</b> on a world to pin it here for quick travel.</p></div>`)
      : `${inSys?`<div class="card sheet"><h3>Within ${osys.name}</h3>
        ${planets.map((p,i)=> (p&&p.discovered) ? pcard(osys,i,p)
          : `<div class="shipcard" style="opacity:.62"><div class="top"><span class="nm dim">Uncharted world ${i+1}</span><span class="tag">unexplored</span></div>
             <div class="row" style="margin-top:6px">${playerIn?`<button class="small" data-go="${origin}:${i}">&#10022; Explore</button>`:'<span class="small dim">&#128274; need to be aboard</span>'}</div></div>`).join("")}
      </div>${jumpable?`<p class="small dim center">Looking to leave the system? Check the <b>&#10024; Systems</b> tab.</p>`:""}`:`<div class="card"><p class="small dim">This group can't leave the ground.</p></div>`}`)}
    <div class="card"><button id="tvBack" class="ghost full center">&larr; Back</button></div>`;
  },
  /* ---------- DEEP SPACE (adrift between the stars) ---------- */
  screen_void(){
    const pos=state.voidPos, core=Math.round(Math.hypot(pos.x,pos.y));
    const ids=playerGroupIds(), caps=groupCaps(ids), reach=caps.jump;
    const near=state.galaxy.systems.map(s=>({s,d:pointDist(pos,{x:s.x,y:s.y})})).sort((a,b)=>a.d-b.d).slice(0,9);
    return `
    ${this.statHeader()}
    <div class="card"><h2>&#127756; Deep Space</h2>
      <p class="small dim">Adrift between the stars at <b>(${Math.round(pos.x)}, ${Math.round(pos.y)})</b>, ${core} ly from the core.
      Your hyperdrive reaches <b class="gold">${reach.toFixed(1)} ly</b> per jump.</p>
      ${this.mapSvg({cx:pos.x, cy:pos.y, span:Math.max(reach*2.6, 26)}, {originXY:pos, reach})}
    </div>
    ${this.voidCompass(reach)}
    <div class="card sheet"><h3>Nearby stars</h3>
      ${near.map(({s,d})=>{ const inRange=d<=reach+1e-6, bearing=compassBearing(s.x-pos.x, s.y-pos.y);
        return `<div class="krow"><span class="lbl">${s.discovered?s.name:'<span class="dim">unknown star</span>'} <span class="dim small">&middot; ${d.toFixed(1)} ly ${s.id===state.sysId?"":bearing}</span></span>
          <span class="kv">${inRange?`<button class="small" data-jumpsys="${s.id}">&#9650; Jump in</button>`:'<span class="dim small">out of range</span>'}</span></div>`; }).join("")}
    </div>`;
  },
  /* the N/E/S/W hyperdrive pad — burn one jump (reach ly) in a straight direction */

    return `<div class="card center"><h3>Hyperdrive heading</h3>
      <p class="small dim">Burn one jump &mdash; <b class="gold">${reach.toFixed(1)} ly</b> &mdash; in a direction. Bring a star into range, then Jump in.</p>

        <button class="cn" data-voiddir="n">&#9650;<br>N</button>

  /* ---------- DEEP-SPACE SHIP ENCOUNTER ---------- */

    const alignTag=a<=-20?"red":a>=20?"blue":"";
    return `${this.statHeader()}
    <div class="card"><h2>&#127963; Allegiance</h2>
      <div class="krow"><span class="lbl">Government</span><span class="kv">${myGov?`<b style="color:${myGov.color}">${myGov.name}</b>`:'<span class="dim">Independent</span>'}</span></div>
      <div class="krow"><span class="lbl">Faction${myFacs.length===1?"":"s"}</span><span class="kv">${myFacs.length?myFacs.map(f=>f.name).join(", "):'<span class="dim">none</span>'}</span></div>
      <div class="krow"><span class="lbl">Alignment</span><span class="kv ${alignTag}">${alignLabel(a)}</span></div>
      <div style="margin-top:5px;height:8px;border-radius:99px;background:linear-gradient(90deg,#d6455a,#7a7f8c,#3a8dff);position:relative">
        <i style="position:absolute;left:calc(${pos}% - 2px);top:-2px;width:4px;height:12px;background:#fff;border-radius:2px;display:block"></i></div>
      <div class="row between small dim" style="margin-top:2px"><span>Dark</span><span>Neutral</span><span>Light</span></div>
      <p class="small dim" style="margin-top:7px">You answer to no one yet. Earn the trust of a power or faction among their people, and your deeds will tilt you toward the Light or the Dark.</p>
    </div>
    <div class="card sheet"><h3>Governments <span class="dim small">&middot; ranked by power</span></h3>
      ${govs.map(g=>{ const st=govStance(g), mine=g.id===al.govId, hereCtl=here&&here.id===g.id;
        const act = mine ? `<button class="small ghost" data-renounce="1">Renounce allegiance</button>`
          : hereCtl ? (pledgeCheck(g).ok ? `<button class="small" data-pledge="${g.id}">&#9733; Pledge allegiance</button>` : `<span class="small dim">${pledgeCheck(g).why||""}</span>`)
          : ``;
        return `<div style="padding:7px 0;border-bottom:1px solid var(--line)">
          <div class="row between"><span><b style="color:${g.color}">#${g.rank} ${g.name}</b>${mine?' <span class="green small">&#9733; yours</span>':''}${hereCtl?' <span class="blue small">&#128205; here</span>':''}</span>
            <span class="tag ${sc[st]}">${sl[st]}</span></div>
          <p class="small dim" style="margin:2px 0">${g.alignment==="dark"?"&#9790; Dark":g.alignment==="light"?"&#9728; Light":"&#9678; Neutral"} &middot; ${g.wealth>=7?"wealthy":g.wealth>=4?"prosperous":"struggling"} &middot; seat: ${g.capitalName} &middot; ${g.rivals.length?`at war with ${g.rivals.length} power${g.rivals.length>1?"s":""}`:"no open wars"}</p>
          ${act?`<div style="margin-top:3px">${act}</div>`:""}
        </div>`; }).join("")}
    </div>
    <div class="card sheet"><h3>Factions &amp; clans</h3>
      <p class="small dim">Smaller outfits within and across the great powers — some you may one day join. Two under the same banner can still be bitter enemies.</p>
      ${facs.map(f=>{ const pg=f.govId?govById(f.govId):null, mem=(al.factionIds||[]).includes(f.id);
        const act = mem ? `<button class="small ghost" data-leavefac="${f.id}">Leave</button>`
          : joinFactionCheck(f).ok ? `<button class="small" data-joinfac="${f.id}">Join</button>` : ``;
        return `<div style="padding:6px 0;border-bottom:1px solid var(--line)">
          <div class="row between"><span>${f.name}${mem?' <span class="green small">&#9733; member</span>':''}</span><span class="small dim">${f.alignment}</span></div>
          <p class="small dim" style="margin:2px 0">${cap(f.kind)} &middot; ${pg?`serves <span style="color:${pg.color}">${pg.name}</span>`:"independent"}${f.rivals.length?` &middot; feuds with ${f.rivals.length}`:""}</p>
          ${act?`<div style="margin-top:3px">${act}</div>`:""}
        </div>`; }).join("")}

  },
  screen_voidmeet(){
    const m=voidMeet; if(!m) return this.screen_hub();

      ${gov?`<p class="small dim">This is <b style="color:${gov.color}">${gov.name}</b> space &middot; they regard you as <b class="${({friendly:'green',hostile:'red',wary:'gold'})[govStance(gov)]||'dim'}">${govStance(gov)}</b>.</p>`:`<p class="small dim">Lawless, unclaimed space — no power holds sway here.</p>`}

      ${m.id==="derelict"?`<button id="voidSalvage" class="primary">&#9874; Salvage</button>`
        :hostile?`<button id="voidAttack" class="primary">&#9876; Engage</button>
      <button id="voidContact" class="ghost">&#128483; Hail</button>`
        :`<button id="voidContact" class="primary">&#128483; Contact</button>
      <button id="voidAttack" class="ghost">&#9876; Attack</button>`}
      <button id="voidEvade" class="ghost">&#127756; ${hostile?'Run':'Evade'}</button>
      </div>${m.id==="derelict"?"":`<p class="small dim" style="margin-top:6px">${hostile?'They will not let you pass easily — running may fail.':`Contact them to meet who commands this ${m.ships>1?"fleet":"ship"} — name them and record their kind.`}</p>`}</div>`}

  /* ---------- GALAXY MAP (zoomable, fog-of-war) ---------- */
  screen_map(){
    if(!state.galaxy) return `${this.statHeader()}
      <div class="card center"><h2>&#128506; Galaxy Map</h2>
        <p class="small dim">The galaxy is uncharted until you take off. Buy a ship and leave your homeworld (Crew &rarr; Ships) to map the stars.</p></div>`;
    const cur=curSys(), pos=playerXY(), core=Math.round(Math.hypot(pos.x,pos.y));
    if(!mapView) this.mapCenterMe();

    const hg=systemGov(cur);
    return `${this.statHeader()}
    <div class="card"><div class="row between"><h2>&#128506; Galaxy Map</h2>
      <span class="tag">${core} ly from core</span></div>
      <p class="small dim">You are ${cur?`in <b class="blue">${cur.name}</b>`:`<b class="gold">adrift in deep space</b>`} at <b>(${Math.round(pos.x)}, ${Math.round(pos.y)})</b> &middot; ${charted} system${charted!==1?"s":""} charted, ${vis.length-charted} sensor contact${(vis.length-charted)!==1?"s":""} in range.</p>
      <p class="small dim">${hg?`Held by <b style="color:${hg.color}">${hg.name}</b> &middot; they regard you as <b class="${({friendly:'green',hostile:'red',wary:'gold'})[govStance(hg)]||'dim'}">${govStance(hg)}</b>.`:`<span class="gold">Unclaimed space</span> — no power holds sway here.`}</p>
      ${this.mapSvg(undefined, adrift()?{originXY:pos}:{})}
      <div class="row" style="margin-top:8px;justify-content:center;gap:6px">
        <button class="small" id="mapZin">&#10133; Zoom in</button>
        <button class="small" id="mapZout">&#10134; Zoom out</button>
        <button class="small ghost" id="mapMe">&#9673; Center on me</button>
        <button class="small ghost" id="mapAll">&#9737; Whole galaxy</button>
      </div>
      <div class="row" style="margin-top:6px;justify-content:center;gap:6px">
        <button class="small ghost" id="mapU">&#9650;</button>
        <button class="small ghost" id="mapD">&#9660;</button>
        <button class="small ghost" id="mapL">&#9664;</button>
        <button class="small ghost" id="mapR">&#9654;</button>
      </div>
    </div>`;
  },
  /* build the SVG for the current mapView window */
  /* view defaults to the Map-tab viewport. opts.originId marks the "you/fleet" star; opts.reach
     (ly) draws a hyperdrive-range ring around it so you can see what's in jump distance. */
  mapSvg(view, opts){
    view = view || mapView; opts = opts || {};
    const originId = opts.originId!=null ? opts.originId : state.sysId, reach = opts.reach||0;
    const SIZE=300, v=view, half=v.span/2;
    const L=v.cx-half, T=v.cy+half;                 // top-left in ly (+y is up)
    const sx=x=>(x-L)/v.span*SIZE, sy=y=>(T-y)/v.span*SIZE;
    const inView=(px,py,m)=>px>=-m&&px<=SIZE+m&&py>=-m&&py<=SIZE+m;
    let els="";
    // galaxy rim + core (centred on 0,0)
    const cR=GALAXY.radius/v.span*SIZE, cx0=sx(0), cy0=sy(0);
    els+=`<circle cx="${cx0.toFixed(1)}" cy="${cy0.toFixed(1)}" r="${cR.toFixed(1)}" fill="none" stroke="#26314a" stroke-dasharray="3 4"/>`;
    if(inView(cx0,cy0,40)) els+=`<text x="${cx0.toFixed(1)}" y="${(cy0+4).toFixed(1)}" fill="#caa84a" font-size="13" text-anchor="middle">&#9737;</text>
      <text x="${cx0.toFixed(1)}" y="${(cy0-9).toFixed(1)}" fill="#7d8aa5" font-size="7" text-anchor="middle">CORE</text>`;
    // hyperdrive-range ring around the fleet's star (or its drift point in deep space)
    const oxy = opts.originXY || (state.galaxy.systems[originId] ? {x:state.galaxy.systems[originId].x, y:state.galaxy.systems[originId].y} : null);
    if(reach>0 && oxy){ const ox=sx(oxy.x), oy=sy(oxy.y), rr=reach/v.span*SIZE;
      els+=`<circle cx="${ox.toFixed(1)}" cy="${oy.toFixed(1)}" r="${rr.toFixed(1)}" fill="#1f6f4322" stroke="#3f9c6a" stroke-dasharray="2 3"/>`; }
    // a drift marker when you're between the stars (no system to mark)
    if(opts.originXY){ const ox=sx(opts.originXY.x), oy=sy(opts.originXY.y);
      els+=`<circle cx="${ox.toFixed(1)}" cy="${oy.toFixed(1)}" r="3" fill="#e0b24a"/>`; }
    // territory of the powers you've learned of (a government becomes known once you chart any
    // system it holds) — drawn UNDER the stars so the map reads as a political chart
    const showLabels=v.span<=46;
    const knownGovs=new Set(); (state.galaxy.systems||[]).forEach(s=>{ if(s.discovered && s.govId) knownGovs.add(s.govId); });
    const hereG=systemGov(curSys()); if(hereG) knownGovs.add(hereG.id);
    (state.galaxy.governments||[]).forEach(g=>{ if(!knownGovs.has(g.id)) return;
      const gx=sx(g.center.x), gy=sy(g.center.y), gr=g.radius/v.span*SIZE;
      if(!inView(gx,gy,gr)) return;
      els+=`<circle cx="${gx.toFixed(1)}" cy="${gy.toFixed(1)}" r="${gr.toFixed(1)}" fill="${g.color}1e" stroke="${g.color}88" stroke-width="1.2" stroke-dasharray="5 4"/>`;
      if(gr>16) els+=`<text x="${gx.toFixed(1)}" y="${gy.toFixed(1)}" fill="${g.color}" font-size="${clamp(gr/6,7,12).toFixed(0)}" text-anchor="middle" opacity="0.85" font-weight="bold">${g.name}</text>`;
    });
    // systems you can see — discovered stars are tinted by who controls them
    visibleSystems().forEach(s=>{ const px=sx(s.x), py=sy(s.y); if(!inView(px,py,8)) return;
      const here=s.id===originId, gcol=(s.govId&&knownGovs.has(s.govId))?((govById(s.govId)||{}).color||null):null;
      if(here){ els+=`<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="5.5" fill="none" stroke="#5aa9ff" stroke-width="1.5"/>
        <circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="2" fill="#5aa9ff"/>`; }
      else if(s.capital!=null && gcol){ /* capital drawn in the pass below */ }
      else if(s.discovered){ els+=`<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="2.6" fill="${gcol||'#cfe0ff'}"/>`; }
      else { els+=`<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="2.2" fill="none" stroke="${gcol||'#5b6b8a'}" stroke-width="1"/>`; }
      if(showLabels && (s.discovered||here) && s.capital==null) els+=`<text x="${px.toFixed(1)}" y="${(py-5).toFixed(1)}" fill="${here?'#5aa9ff':'#9fb0cc'}" font-size="7" text-anchor="middle">${here?(originId===state.sysId?"You":"Fleet"):s.name}</text>`;
    });
    // capital stars for the powers you know — landmarks toward the core, drawn on top
    (state.galaxy.governments||[]).forEach(g=>{ if(!knownGovs.has(g.id) || g.capitalSys==null) return;
      const cap=state.galaxy.systems[g.capitalSys]; if(!cap) return;
      const cxp=sx(cap.x), cyp=sy(cap.y); if(!inView(cxp,cyp,12)) return;
      els+=`<text x="${cxp.toFixed(1)}" y="${(cyp+4.5).toFixed(1)}" fill="${g.color}" font-size="14" text-anchor="middle" stroke="#0a0e16" stroke-width="0.6" paint-order="stroke">&#9733;</text>`;
      if(showLabels) els+=`<text x="${cxp.toFixed(1)}" y="${(cyp-7).toFixed(1)}" fill="${g.color}" font-size="7" text-anchor="middle">${cap.name}</text>`;
    });
    return `<svg viewBox="0 0 ${SIZE} ${SIZE}" class="gmap" preserveAspectRatio="xMidYMid meet">${els}</svg>
      <p class="small dim center" style="margin-top:4px">&#9678; ${originId===state.sysId?"you":"fleet"} &middot; &#9737; core &middot; &#9733; capital &middot; &#9679; charted (tinted by ruling power) &middot; &#8728; contact${reach>0?' &middot; ring = jump range':''}</p>`;
  },
  mapCenterMe(){ const p=playerXY(); mapView={ cx:p.x, cy:p.y, span:36 }; },

  /* ---------- MEET A PERSON (on-planet) ---------- */
  screen_meet(){
    const m=meeting; if(!m) return this.screen_hub();
    const person=m.person, known=!m.draw.isNew, race=m.draw.race;
    return `
      <div class="card">
        <h2>${person.name||"A stranger"}</h2>
        <p class="small dim">${m.intro}</p>
        <p class="small dim">${careerName(person.career)} &middot; ${known?`<b class="violet">${race.name}</b>`:`<span class="gold">a people new to your Codex</span>`} &middot; worth <span class="gold">${commas(person.credits||0)}c</span>.</p>
        ${isHostile(person)?`<p class="small red">${THREAT_LABEL[person.hostile]} — bounty ${commas(person.bounty.alive)}c alive / ${commas(person.bounty.dead)}c dead.</p>`:""}
        ${person.force&&forceDesc(person.force)?`<p class="small ${isHostile(person)?'red':'blue'}">Commands ${forceDesc(person.force)}${m.fleet?` under <b class="violet">${m.fleet.faction}</b> colors`:""}.</p>`:""}
      </div>
      ${m.fleet?(()=>{ const f=m.fleet, gov=f.govId?govById(f.govId):null;
        return `<div class="card"><h3>&#9876; Sizing them up</h3>
          <div class="chips" style="margin-bottom:6px">
            <span class="chip">${f.ships} ship${f.ships>1?"s":""}</span>
            <span class="chip ${f.threat>=3?'r':f.threat>=1?'gold':'g'}">${["No threat","Armed","Dangerous","War-fleet","Armada"][f.threat]||"Unknown"}</span>
            ${gov?`<span class="chip b" style="color:${gov.color}">${gov.name}</span>`:'<span class="chip">unaligned</span>'}
            <span class="chip ${({friendly:'g',hostile:'r',wary:'gold'})[f.dispo]||''}">${f.dispo||"neutral"}</span>
          </div>
          <p class="small dim">${FLEET_ASSESS[f.threat]||"An unknown quantity."}${f.dispo==="friendly"?" They greeted you as a friend — turning on them is a dark deed.":""}</p>
          <div class="row" style="margin-top:6px"><button id="meetEngage" class="primary">&#9876; Open fire</button><button id="meetFinish2" class="ghost">Leave them be</button></div>
        </div>`; })():""}
      <div class="card">
        ${!known?`<p class="small">Name this new race:</p>${nameField("meetRace","Name this race","race",race.name)}<div style="height:8px"></div>`:""}
        <div class="row">
          ${jobOf(person.career)&&!person.askedJob&&!isHostile(person)?`<button id="meetJob" class="primary">&#128188; Ask for work <span class="small dim">(${Math.round(jobOf(person.career).chance*100)}% &middot; ${commas(jobOf(person.career).pay)}c/yr)</span></button>`:""}
          ${HIRE_ROLES[person.career]&&!isHostile(person)?`<button id="meetHire" class="primary">Offer a job &middot; ${careerName(person.career)} &middot; ${commas(HIRE_ROLES[person.career].fee)}c</button>`:""}
          ${isHostile(person)?`<button id="meetAttack" class="primary">&#9876; Attack &amp; claim the bounty</button>`:""}
          <button id="meetMore" class="ghost">${personExpand?"Show less":"Learn more"}</button>
          <button id="meetFinish" class="ghost">Leave conversation</button>
        </div>
        ${person.askedJob?`<p class="small dim" style="margin-top:6px">${state.job&&state.job.career===person.career?"You took the job.":"They had no work for you."}</p>`:""}
        ${HIRE_ROLES[person.career]&&!isHostile(person)?`<p class="small dim" style="margin-top:6px">${cap(careerName(person.career))}: ${HIRE_ROLES[person.career].role}.</p>`:""}
        <p class="small dim" style="margin-top:6px">Leaving the conversation records ${(person.name||"this stranger").split(" ")[0]} in your Codex.</p>
      </div>
      ${!isHostile(person)?this.shipDealCard(person):""}
      ${personExpand?`${originCard(person)}${speciesSheet(person)}`:""}`;
  },
