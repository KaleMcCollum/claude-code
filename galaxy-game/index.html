/* How built-up a world is (0 wild .. 1 dense city) — decides whether wandering turns up
   beasts (wild worlds) or bad people (cities), or nothing at all (dead worlds). */
const SETTLE_CIV={ capital:1.0, trade:0.85, industrial:0.7, scrap:0.55, colony:0.5, mining:0.45, agri:0.4, frontier:0.25 };
function worldCivility(w){ if(!isInhabited(w)) return 0;
  let c=SETTLE_CIV[w.settle]; if(c==null) c=0.5;
  if(w.biome==="urban") c=Math.max(c,0.9);
  return c; }
function exploreLabel(w){ const c=worldCivility(w);
  return c>=0.7 ? "Prowl the streets" : c>0 ? "Explore the outskirts" : "Wander the wilds"; }

/* ============================================================ STATE ==== */
const SAVE_KEY = "eots_save_v4"; // bumped: save is now a galaxy (Codex/achievements persist across lives)
let state=null, combat=null, creating={};

function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),1800); }

/* ============================================================ GAME ===== */
const Game = {
  hasSave(){ try{ return !!localStorage.getItem(SAVE_KEY); }catch(e){ return false; } },
  save(){ if(!state) return; state.updated=Date.now();
    try{ localStorage.setItem(SAVE_KEY,JSON.stringify(state)); }catch(e){ toast("Save failed"); } },
  load(){ try{ const r=localStorage.getItem(SAVE_KEY); if(!r) return false; state=JSON.parse(r); Game.migrate(); return true; }catch(e){ return false; } },
  // backfill fields added after a save was created (multi-ship cargo/locations)
  migrate(){
    if(state.atSlot==null) state.atSlot=0;
    if(state.sysId==null) state.sysId=0;
    if(!state.spawn) state.spawn={x:0,y:0};
    if(!state.fleets) state.fleets=[];
    // pre-multisystem saves stored a lone home system in state.system — wrap it in a galaxy
    if(state.system && !state.galaxy){
      const home=state.system; home.id=0; home.x=state.spawn.x; home.y=state.spawn.y; home.discovered=true;
      home.name=home.name||genName("system");
      state.galaxy={ name:state.galaxyName, systems:[home].concat(makeNeighborSystems(home.x, home.y, 1)) };
    }
    // carve up older galaxies that predate the politics layer, and init your (blank) allegiance
    if(state.galaxy && !state.galaxy.governments) seedPolitics(state.galaxy);
    if(state.galaxy && !state.galaxy.full) populateGalaxy(state.galaxy, state.spawn);   // fill out thin older galaxies
    if(state.galaxy && state.galaxy.governments) assignCapitals(state.galaxy);          // ensure capitals sit on real systems
    if(!state.allegiance) state.allegiance={ govId:null, factionIds:[], align:0 };
    if(!state.contracts) state.contracts=[];
    if(!state.gear) state.gear=[];
    learnSkills(true);   // grant techniques an existing character already qualifies for
    // keep the live pointer in sync with the saved galaxy
    if(state.galaxy && state.galaxy.systems[state.sysId]) state.system=state.galaxy.systems[state.sysId];
    if(state.galaxy && state.galaxy.systems[0]) state.galaxy.systems[0].reported=true;   // you always knew home
    (state.vehicles||[]).forEach(v=>{ if(v.sysId==null) v.sysId=0; if(v.fleetId===undefined) v.fleetId=null; });
    // heal fleets that reference sold/lost ships: drop the stale ids, then disband any left empty
    { const have=new Set((state.vehicles||[]).map(v=>v.id));
      (state.fleets||[]).forEach(f=>{ f.shipIds=(f.shipIds||[]).filter(id=>have.has(id)); });
      state.fleets=(state.fleets||[]).filter(f=>f.shipIds.length); }
    (state.crew||[]).forEach(c=>{ if(!c.skills){ const p=c.personIdx>=0&&state.codex&&state.codex.people?state.codex.people[c.personIdx]:null; c.skills=rollCrewSkills(c.career||"laborer", p); } });
    if(state.actions==null) state.actions=Math.round((state.daysElapsed||0)/15);   // old day-based saves -> actions
    if(state.lastBillYear==null) state.lastBillYear=Math.floor((state.actions||0)/ACTIONS_PER_YEAR);
    (state.vehicles||[]).forEach(v=>{ if(!v.id) v.id=newVid(); if(!v.cargo) v.cargo={};
      if(!v.range) v.range=v.systemCapable?"system":"surface";   // migrate old systemCapable flag
      if(v.hold==null) v.hold=spaceworthy(v)?50:8; if(v.slot==null) v.slot=0;
      if(v.crewMax==null) v.crewMax=spaceworthy(v)?2:1; if(v.bays==null) v.bays=0;
      if(v.value==null) v.value=spaceworthy(v)?3000:600;
      if(v.reqPilots==null){ const c=SHIP_CLASSES.find(x=>x.id===v.cls); v.reqPilots=c?c.reqPilots:1; v.reqMech=c?c.reqMech:0; v.reqGun=c?c.reqGun:0; } });
    if(!state.activeShip) state.activeShip=((state.vehicles||[]).find(v=>spaceworthy(v))||(state.vehicles||[])[0]||{}).id;
    state.crew=state.crew||[];
    // migrate old ship.pilot objects into the crew roster
    (state.vehicles||[]).forEach(v=>{ if(v.pilot){ state.crew.push({ name:v.pilot.name, raceName:v.pilot.raceName, personIdx:-1, shipId:v.id }); delete v.pilot; } });
    // ensure any previously-hired person has a crew entry
    (state.codex&&state.codex.people||[]).forEach((p,i)=>{ if(p.hired && !state.crew.some(c=>c.personIdx===i)) state.crew.push({ name:p.name, raceName:p.raceName, personIdx:i, shipId:p.shipId||null }); });
    state.crew.forEach(c=>{ if(!c.career) c.career=(c.personIdx>=0&&state.codex&&state.codex.people[c.personIdx]?state.codex.people[c.personIdx].career:"pilot");
      if(c.shipId && c.seat==null) c.seat=0; });
    if(state.cargo && Object.keys(state.cargo).length){ const a=Game.ship(); if(a) a.cargo=state.cargo; }
    delete state.cargo;
    // migrate renamed commodities in existing cargo holds
    const CARGO_RENAME={ raw:"ore", engine:"machinery" };
    (state.vehicles||[]).forEach(v=>{ if(v.cargo) for(const k in CARGO_RENAME){ if(v.cargo[k]){
      v.cargo[CARGO_RENAME[k]]=(v.cargo[CARGO_RENAME[k]]||0)+v.cargo[k]; delete v.cargo[k]; } } });
    // backfill ship combat stats (HP, armor, weapon hardpoints) for pre-combat saves
    (state.vehicles||[]).forEach(v=>{ const c=shipClass(v.cls);
      if(v.reqLabor==null) v.reqLabor=c?(c.reqLabor||0):0;
      if(v.shieldTier==null) v.shieldTier=0;
      if(v.pilotGuns==null){ v.pilotGuns=c?c.pilotGuns:0; v.gunnerGuns=c?c.gunnerGuns:0; }
      if(!v.guns) v.guns=new Array((v.pilotGuns||0)+(v.gunnerGuns||0)).fill(null);
      if(v.armor==null) v.armor=0;
      if(v.hyper==null) v.hyper=0;
      if(v.maxHp==null) v.maxHp=c?Math.round(c.baseHp*HP_SCALE*(spaceworthy(v)?1.4:1)):200;
      if(v.hp==null) v.hp=v.maxHp;
      // backfill hardpoint sizes — make each slot at least big enough for whatever's mounted
      if(!v.slotSizes){ const pn=v.pilotGuns||0;
        v.slotSizes=(v.guns||[]).map((g,i)=>Math.max(g?weaponSize(g):0, i<pn?1:2)); } });
    // migrate old equipment slots (weapon/armor/relic) -> the expanded armor slots
    const eq=state.equipped||{};
    if(!("chest" in eq)) state.equipped={ weapon:eq.weapon||null, head:eq.head||null,
      chest:eq.chest||eq.armor||null, legs:eq.legs||null, feet:eq.feet||null, back:eq.back||eq.relic||null };
    // pre-settlement saves: inhabited worlds had no settlement type — give them one so they
    // keep their town services (and so "inhabited" and "has a market" stay consistent)
    const fixSettle=w=>{ if(w && w.occupied && !settleDef(w.settle)){
      w.settle = (w.tech>=6&&w.wealth>=6)?"trade":(w.tech>=4?"industrial":(w.tech>=2?"trade":"frontier")); } };
    fixSettle(state.world);
    (state.galaxy?state.galaxy.systems:[]).forEach(s=>(s.planets||[]).forEach(p=>{ if(p&&p.world) fixSettle(p.world); }));
    (state.codex&&state.codex.worlds||[]).forEach(fixSettle);
  },
  wipe(){ try{ localStorage.removeItem(SAVE_KEY); }catch(e){} state=null; },

  hasPower(id){ return state.species.powers.includes(id); },
  ship(){ return (state.vehicles||[]).find(v=>v.id===state.activeShip) || (state.vehicles||[])[0] || null; },
  pilotOf(v){ return v?((state.crew||[]).find(c=>c.shipId===v.id && c.career==="pilot")||null):null; },  // a pilot aboard
  shipCrew(v){ return v?(state.crew||[]).filter(c=>c.shipId===v.id):[]; },
  aboard(v,career){ return Game.shipCrew(v).filter(c=>c.career===career).length; },
  // pilots aboard, counting YOU on the ship you personally fly
  pilots(v){ return Game.aboard(v,"pilot") + (v.id===state.activeShip?1:0); },
  // a ship is operational (flyable) only with enough pilots + mechanics for its class
  laborers(v){ return v?(state.crew||[]).filter(c=>c.shipId===v.id && isLaborCareer(c.career)).length:0; },
  // your own crew skills as captain — you run the pilot-mounts and fly your own ship
  selfGunnery(){ return clamp(Math.round(3 + Game.effStat("agility")*0.25), 0, 10); },
  selfPiloting(){ return clamp(Math.round(3 + Game.effStat("agility")*0.2 + Game.effStat("tech")*0.1), 0, 10); },
  operational(v){ return Game.pilots(v) >= (v.reqPilots??1) && Game.aboard(v,"mechanic") >= (v.reqMech??0) && Game.laborers(v) >= (v.reqLabor??0); },
  canLeave(){ const s=Game.ship(); return !!(s && spaceworthy(s) && atHere(s) && Game.operational(s)); },
  shipsHere(){ return (state.vehicles||[]).filter(v=>atHere(v)&&!shipBusy(v)&&!v.carrier); },

  /* ---- assemble a new life from the generated (and now named) pieces ---- */
  begin(){
    const sp=creating.species, world=creating.world, veh=creating.vehicle;
    // starting skills derive from the species, not a chosen class
    const skills=new Set(["Strike","Focus"]);
    const sig={ strength:"Heavy Strike", agility:"Steady Shot", endurance:"Heavy Strike",
                intellect:"Steady Shot", attunement:"Current Bolt", presence:"Strike" }[sp.sig];
    if(sig) skills.add(sig);
    if(sp.powers.includes("current")){ skills.add("Current Bolt"); skills.add("Current Sense"); skills.add("Mend"); }

    // Trained combat stats are SEEDED from your fixed genetics, then improve with levels.
    // Genetics stay fixed for life; training is the part you can grow.
    const a=sp.attrs;
    const stats={
      might:  Math.max(1,Math.round(a.strength.value/2)),
      agility:Math.max(1,Math.round(a.agility.value/2)),
      force:  Math.max(1,Math.round(a.attunement.value/2)),
      tech:   Math.max(1,Math.round(a.intellect.value/2)),
      charm:  Math.max(1,Math.round(a.presence.value/2)),
    };
    // size feeds vitality: endurance + a bit of height + a bit of mass
    let maxHp=Math.round(a.endurance.value*5 + sp.height.value*0.05 + sp.mass.value*0.06);
    if(sp.powers.includes("hardy")) maxHp=Math.round(maxHp*1.25);
    const maxEnergy=30+Math.round(a.attunement.value*1.5);

    // galaxy-level data persists across lives in the same galaxy (Codex, achievements)
    const sameGalaxy = state && state.galaxyName===creating.galaxy;
    const codex = sameGalaxy ? state.codex : { races:{}, worlds:[], people:[], creatures:{} };
    if(!codex.people) codex.people=[]; if(!codex.creatures) codex.creatures={};
    const achievements = sameGalaxy ? state.achievements : {};

    // your galactic birthplace (ly from the core). Area-uniform, so most are born toward the
    // sparse rim; a core birth (lush, crowded, dangerous) is a lucky roll you keep for life.
    const spAng=Math.random()*Math.PI*2, spR=GALAXY.radius*Math.sqrt(Math.random());
    const spawn={ x:+(Math.cos(spAng)*spR).toFixed(2), y:+(Math.sin(spAng)*spR).toFixed(2) };

    state={
      v:4, created:Date.now(), updated:Date.now(),
      galaxyName:creating.galaxy, codex, achievements,
      name:creating.name, species:sp, world, vehicles:[veh],
      level:1, xp:0, xpNext:50, stats,
      maxHp, hp:maxHp, maxEnergy, energy:maxEnergy,
      credits:0, skills:[...skills],
      inv:{}, equipped:{weapon:null,head:null,chest:null,legs:null,feet:null,back:null}, pets:[],
      // you begin as a YOUNG CHILD and grow toward your potential as time flows
      ageStart:Math.max(2, Math.round(sp.maturity.value*LIFE.startFraction)),
      actions:0, dead:false, deathCause:null, lastStage:null,
      // planetary structure is unknown until you buy a ship and leave: you are GROUNDED
      grounded:true, galaxy:null, system:null, sysId:0, atSlot:0, spawn, fleets:[],
      allegiance:{ govId:null, factionIds:[], align:0 },   // start Independent & Neutral; earn it in play
      activeShip:veh.id, bounties:[], contracts:[], gear:[], crew:[], lastBillYear:0, job:null,
      stimReady:false, log:[],
    };
    veh.slot=0; veh.sysId=0;      // your inherited craft is docked on your homeworld
    state.world.occupied=true;   // your homeworld is inhabited (your own kind live here)
    state.world.settle="colony"; // a working spaceport — always has a yard so you can leave
    state.lastStage=Game.stage();
    state.hp=Game.effMaxHp(); state.energy=Game.effMaxEnergy(); // child-scaled to start
    DATA.startKit.forEach(([id,n])=>Game.addItem(id,n));   // empty — you begin with nothing
    // you know your own race and your homeworld from the start — into the Codex
    const selfRace=raceFrom(sp); selfRace.id="self"; selfRace.reported=true;
    state.codex.races["self"]=selfRace;
    const homeW=worldSummary(world); homeW.reported=true;
    state.codex.worlds.push(homeW);
    Game.logMsg(`You are born on ${world.name}, ${article(world.biomeName)} ${world.biomeName}.`,"sys");
    Game.logMsg(`You are ${creating.name}, a young ${sp.name} child — far from your potential, but growing.`,"hit");
    checkObjectives();
    Game.save();
  },

  /* ---- growth: a child realizes only part of their genetic potential ---- */
  // 0.35 as a young child, rising linearly to 1.0 at maturity, then flat.
  maturation(){
    const f=Game.age()/state.species.maturity.value;       // fraction of maturity reached
    if(f>=1) return 1;
    const f0=LIFE.startFraction, base=LIFE.childPotential;
    return clamp(base + (1-base)*((f-f0)/(1-f0)), base, 1);
  },
  stage(){
    if(Game.age()>=Game.twilight()) return "elder";
    const f=Game.age()/state.species.maturity.value;
    for(const s of LIFE_STAGES){ if(f<s.f) return s.name; }
    return "adult";
  },

  /* ---- derived combat stats (genetics × growth × equipment) ---- */
  // Body & training scale with growth; gear adds full value (a child with a blaster
  // is still dangerous), so even a young child is capable — just not near their peak.
  // sum a mod (might/agility/force/hp/energy/def/dodge/flee) across every equipped slot
  gearMod(key){ let v=0; const eq=state.equipped||{};
    for(const slot in eq){ const it=resolveItem(eq[slot]);
      if(it && it.mods && it.mods[key]) v+=it.mods[key]; }
    return v; },
  effStat(key){ return Math.round((state.stats[key]||0)*Game.maturation()) + Game.gearMod(key); },
  effMaxHp(){ return Math.max(1, Math.round(state.maxHp*Game.maturation()*Game.frailty() + Game.gearMod("hp"))); },
  effMaxEnergy(){ return Math.max(1, Math.round(state.maxEnergy*Game.maturation() + Game.gearMod("energy"))); },
  effDef(){ return Math.max(0, Game.gearMod("def")); },   // flat damage reduction from armor

  /* ---- biology, temperament & heritage accessors ---- */
  bio(key){ return state.species.bio[key].value; },
  temp(){ return TEMPERAMENTS.find(t=>t.id===state.species.temperament); },
  tempEff(key,def){ const e=Game.temp().eff; return e[key]!==undefined?e[key]:def; },
  detail(key){ return state.species.detail[key]; },
  circ(){ return CIRCADIAN.find(c=>c.id===state.species.detail.circadian); },
  circEff(key,def){ const c=Game.circ(); return c[key]!==undefined?c[key]:def; },
  // you do better on worlds whose biome matches your kind's ancestral home
  atHome(){ return state.world && state.species.detail.nativeBiome===state.world.biome; },
  lightFeeder(){ const d=state.species.detail.diet; return d==="photovore"||d==="energivore"; },

  /* ---- time & aging: every action spends days; lifespan caps the campaign ---- */
  age(){ return state.ageStart + (state.actions||0)/ACTIONS_PER_YEAR; },
  lifespan(){ return state.species.lifespan.value; },
  twilight(){ return Game.lifespan()*0.85; },
  // vitality fades past the twilight of life; Stalwart temperament resists it
  frailty(){ const a=Game.age(), l=Game.lifespan(), tw=Game.twilight();
    if(a<=tw) return 1;
    const resist=Game.tempEff("frailtyResist",0);
    const drop=clamp((a-tw)/(l-tw),0,1.4)*0.25*(1-resist);
    return clamp(1-drop, 0.6, 1); },

  addItem(id,n=1){ state.inv[id]=(state.inv[id]||0)+n; },
  removeItem(id,n=1){ if(!state.inv[id]) return; state.inv[id]-=n; if(state.inv[id]<=0) delete state.inv[id]; },

  /* ---- economy: prices shaped by the WORLD (wealth) + species power ---- */
  buyPrice(id){ const w=state.world;
    let p=DATA.items[id].value*(1.4-w.wealth*0.05);
    if(Game.hasPower("mercantile")) p*=0.85;
    return Math.max(1,Math.round(p)); },
  sellPrice(id){ let p=DATA.items[id].value*0.55*(1+state.world.wealth*0.02);
    if(Game.hasPower("mercantile")) p*=1.15; return Math.max(1,Math.round(p)); },
  marketStock(){ state.marketStock=state.marketStock||{};
    const key=(state.sysId??0)+":"+state.atSlot;
    if(!state.marketStock[key]) state.marketStock[key]=genMarketStock(state.world);
    return state.marketStock[key]; },
  // an Outfitter occasionally has a rare find under the counter — wealthy/high-tech worlds more so,
  // but it's never the path to the best gear (that comes from kills). Stable per world per year.
  marketGear(){ state.marketGearByLoc=state.marketGearByLoc||{};
    const key=(state.sysId??0)+":"+state.atSlot;
    if(!(key in state.marketGearByLoc)) state.marketGearByLoc[key]=genMarketGear(state.world);
    return state.marketGearByLoc[key]; },

  gainXp(n){ n=Math.round(n*Game.tempEff("xpMult",1)); state.xp+=n; let lv=false;
    // your GENETICS set how fast you grow — a gifted genome gains more HP, stamina and stats per level
    const gq=clamp(((state.species&&state.species.genome&&state.species.genome.avgPct)||50)/100, 0.05, 0.99), gmul=0.7+gq*0.9;
    while(state.xp>=state.xpNext){ state.xp-=state.xpNext; state.level++; lv=true;
      state.xpNext=Math.round(state.xpNext*1.4+20);
      const hpGain=Math.round(12*gmul), enGain=Math.round(5*gmul);
      state.maxHp+=hpGain; state.maxEnergy+=enGain;
      const keys=["might","agility","force","tech","charm"], k1=keys[state.level%keys.length]; state.stats[k1]=(state.stats[k1]||0)+1;
      let statMsg=`${k1} +1`; if(chance(gq)){ const k2=pick(keys); state.stats[k2]=(state.stats[k2]||0)+1; statMsg+=`, ${k2} +1`; }   // good genes -> extra growth
      state.hp=Game.effMaxHp(); state.energy=Game.effMaxEnergy();
      const cr=state.level*15; state.credits+=cr;
      Game.logMsg(`Level ${state.level}! +${hpGain} HP, +${enGain} stamina, ${statMsg}, +${commas(cr)}c.`,"good");
      if(chance(0.16)){ const g=levelRewardGear(state.level); state.gear=state.gear||[]; state.gear.push(g);
        Game.logMsg(`A spoil of your renown: <b style="color:${rarityColor(g.rarity)}">${g.name}</b>!`,"good"); }
      learnSkills(); }
    return lv; },

  logMsg(t,c=""){ state.log.push({t,c}); if(state.log.length>60) state.log=state.log.slice(-60); },
};

/* ============================================================ TIME ===== */
/* Every meaningful action spends days. Age creeps up; once you pass your kind's
   natural lifespan, the game (not you) decides when your story ends. */
function advanceTime(n){
  n=n||1;
  state.actions=(state.actions||0)+n;
  tickTrades(n);                          // automated trade fleets bank their profit as time passes
  if(state.tradeRaid){ UI.render("traderaid"); return true; }   // raiders jumped a fleet — demand the player's call before time moves on
  // natural healing between actions — faster for high Recovery, doubled at home
  if(state.hp < Game.effMaxHp()){
    const heal=Math.round(n*Game.bio("recovery")*0.3*(Game.atHome()?2:1));
    if(heal>0) state.hp=Math.min(Game.effMaxHp(), state.hp+heal);
  }
  // growing up: announce when you cross into a new life stage
  const st=Game.stage();
  if(st!==state.lastStage){
    if(st==="adult" && state.lastStage==="young adult")
      Game.logMsg(`You have reached maturity — your body has grown into its full potential.`,"good");
    else if(st!=="elder")
      Game.logMsg(`The years pass; you grow into ${article(st)} ${st}.`,"good");
    else Game.logMsg(`Age settles into your bones — you are an elder now.`,"sys");
    state.lastStage=st;
  }
  // yearly upkeep: bill wages + maintenance for each year (ACTIONS_PER_YEAR actions) elapsed
  const yrs=Math.floor(state.actions/ACTIONS_PER_YEAR);
  if(state.lastBillYear==null) state.lastBillYear=yrs;
  const prevYr=state.lastBillYear;
  while(state.lastBillYear<yrs){ chargeUpkeep(); state.lastBillYear++; }
  if(yrs>prevYr){                       // a year turned over: markets & shipyards refresh stock
    state.shipStock={}; state.marketStock={};
    Game.logMsg(`A year turns over — markets and shipyards across the galaxy refresh their stock.`,"sys");
  }
  const a=Game.age(), l=Game.lifespan();
  if(a>=l){
    const over=a-l, p=clamp(0.04+over*0.05, 0.04, 0.6);
    if(chance(p)){ die("the long sleep of old age"); return true; }
  }
  return false;
}
function die(cause){
  state.dead=true; state.deathCause=cause;
  Game.logMsg(`At ${Math.floor(Game.age())} years, your journey ends — ${cause}.`,"bad");
  Game.save(); UI.render("epilogue");
}

/* ============================================================ COMBAT === */
/* Exploring turns up different things depending on the world: dense cities breed robbers and
   thieves; wild worlds hold beasts; dead, near-lifeless worlds are often just empty. */
function startEncounter(){
  if(advanceTime()) return;                    // exploring is one action
  const w=state.world, civ=worldCivility(w), wild=biomeHab(w.biome);
  // exploring often just turns up salvage — the early game is scavenging and staying alive
  let peace=clamp(0.32+w.peaceMod,0.1,0.55);
  if(chance(peace)) return peacefulEvent(w);
  if(w.occupied===false){                       // no one lives here — beasts, or empty silence
    if(wild<0.12 && chance(0.55)) return emptyEvent(w);
    return beastEncounter(w);
  }
  // inhabited: the more built-up, the more it's people; the wilder the biome, the more beasts
  if(chance(civ)) return humanoidEncounter(w);
  if(wild<0.12 && chance(0.5)) return emptyEvent(w);
  return beastEncounter(w);
}
/* perception + senses decide who gets the drop; returns true if a surprise hit downed you */
function applyInitiative(name, intro){
  const edge=(Game.bio("perception")-10)*0.03 + Game.detail("senses").length*0.03
    + (state.skills.includes("Current Sense")?0.1:0);
  if(chance(clamp(0.25+edge,0.05,0.75))){ combat.surprised=true;
    Game.logMsg(`${intro} You see it coming and seize the initiative.`,"hit"); }
  else if(chance(clamp(0.18-edge,0.02,0.4))){
    Game.logMsg(`${name} catches you off guard!`,"bad");
    const d=Math.max(1,Math.round((combat.atk+rnd(0,3))*Game.tempEff("dmgTakenMult",1))-Game.effDef());
    state.hp-=d; Game.logMsg(`${name} lands a surprise hit for ${d}.`,"bad");
    if(state.hp<=0){ UI.render("combat"); loseEncounter(); return true; }
  } else Game.logMsg(intro,"hit");
  return false;
}
function emptyEvent(w){
  Game.logMsg(`You range across the ${w.biomeName} and find nothing but wind and silence.`,"sys");
  Game.save(); UI.render("hub"); UI.flashLog();
}
function beastEncounter(w){
  const cid=pick(w.creatures), tpl=DATA.creatures[cid];
  if(!state.codex.creatures) state.codex.creatures={};
  const seen=state.codex.creatures[cid]||(state.codex.creatures[cid]={name:tpl.name, blurb:tpl.blurb, count:0, where:w.name, reported:false});
  seen.count++;
  const scale=1+(w.danger-1)*0.06, lvl=enemyLevelFor(w.danger, centralFactor(curSys()?curSys().x:0, curSys()?curSys().y:0));
  combat={ cid, name:tpl.name, blurb:tpl.blurb, level:lvl,
    maxHp:Math.round(tpl.hp*scale), hp:Math.round(tpl.hp*scale),
    atk:Math.round(tpl.atk*scale), xp:Math.round(tpl.xp*scale*(1+lvl*0.04)),
    tame:tpl.tame, over:false, stim:state.stimReady, surprised:false,
    traits: chance(0.45)?[pick(["savage","evasive","venomous"])]:[], dropTier:clamp(Math.round((w.danger-1)/2),0,3) };
  applyLevelScaling(combat); initCombat(combat); state.stimReady=false;
  if(applyInitiative(tpl.name, `A wild ${tpl.name} appears! ${tpl.blurb}`)) return;
  Game.save(); UI.render("combat");
}
function humanoidEncounter(w){
  const pool=FOES.filter(f=>w.danger>=(f.minDanger||1));
  const f=weightedPick(pool.length?pool:FOES);
  const scale=1+(w.danger-1)*0.06, hp=Math.round(f.hp*scale), lvl=enemyLevelFor(w.danger, centralFactor(curSys()?curSys().x:0, curSys()?curSys().y:0));
  combat={ foe:true, fid:f.id, name:f.name, blurb:f.blurb, level:lvl, maxHp:hp, hp,
    atk:Math.round(f.atk*scale), xp:Math.round(f.xp*scale*(1+lvl*0.04)), loot:f.loot,
    over:false, stim:state.stimReady, surprised:false,
    traits:(f.traits||[]).slice().concat(w.danger>=6&&chance(0.3)?[pick(["armored","brute","venomous"])]:[]),
    dropTier:clamp(Math.round((w.danger-1)/2),0,4) };
  applyLevelScaling(combat); initCombat(combat); state.stimReady=false;
  if(applyInitiative(f.name, `${f.blurb}`)) return;
  Game.save(); UI.render("combat");
}
function peacefulEvent(w){
  // scavenging is the early game: mostly salvage you sell at a market for your first weapons.
  // keen/curious find more; so do you on your ancestral biome.
  const find=(Game.bio("perception")-10)*0.04 + Game.tempEff("find",0) + (Game.atHome()?0.15:0);
  const r=Math.random();
  if(r<0.62){ // pick over wrecks and ruins for parts
    const id = chance(0.12+find) ? "circuit-scrap" : pick(["rusted-parts","rusted-parts","scrap"]);
    const n = 1 + (chance(0.4+find)?1:0) + (chance(find)?1:0);
    Game.addItem(id,n);
    Game.logMsg(`You scavenge ${n>1?n+"x ":"some "}${DATA.items[id].name}.`,"good"); }
  else if(r<0.8){ const c=Math.round(rnd(4,14)*(1+find)); state.credits+=c; Game.logMsg(`You turn up a few loose credits: +${c}.`,"good"); }
  else if(r<0.92){ const id=pick(["pelt","ration"]); Game.addItem(id,1);
    Game.logMsg(`You salvage a ${DATA.items[id].name}.`,"good"); }
  else { const xp=rnd(4,10); Game.gainXp(xp); Game.logMsg(`You study the ${w.biomeName}. +${xp} XP.`,"good"); }
  Game.save(); UI.render("hub"); UI.flashLog();
}
/* new techniques you master as you train the matching stat (and, for Current arts, are attuned) */
const SKILL_UNLOCKS=[
  { id:"Rend",            need:{might:10} },
  { id:"Aimed Shot",      need:{agility:10} },
  { id:"Concussive Blow", need:{might:16} },
  { id:"Flurry",          need:{agility:16} },
  { id:"Current Nova",    need:{force:13}, power:"current" },
];
function learnSkills(silent){
  if(!state||!state.skills||!state.stats) return;
  SKILL_UNLOCKS.forEach(u=>{ if(state.skills.includes(u.id)) return;
    if(u.power && !Game.hasPower(u.power)) return;
    if(!Object.entries(u.need).every(([k,v])=>(state.stats[k]||0)>=v)) return;
    state.skills.push(u.id);
    if(!silent) Game.logMsg(`You master a new technique: ${u.id}!`,"good"); });
}
/* enemy traits add behaviour & texture to a fight (no new defensive action needed from you) */
const COMBAT_TRAITS={
  armored:  { name:"Armored",  tag:"b", hint:"soaks part of your damage" },
  evasive:  { name:"Evasive",  tag:"g", hint:"hard to land a clean hit on" },
  brute:    { name:"Brute",    tag:"r", hint:"winds up devastating blows" },
  venomous: { name:"Venomous", tag:"v", hint:"its hits can poison you" },
  savage:   { name:"Savage",   tag:"gold", hint:"grows deadlier as it's hurt" },
};
/* set up the transient combat fields a fight needs from its traits */
function initCombat(c){
  c.traits=c.traits||[];
  c.armorPct=c.traits.includes("armored")?0.3:0;
  c.evade=c.traits.includes("evasive")?0.22:0;
  c.eStatus={bleed:0,daze:0}; c.pStatus={poison:0}; c.winding=false;
  return c;
}
/* ---- LEVELS: every character has one. The GAP between their level and yours decides the fight:
   far above you and they nearly one-shot you; far below and you stomp them. ---- */
function levelGap(enemyLevel){ return clamp(Math.pow(1.07, (enemyLevel||1)-(state.level||1)), 0.02, 250); }
function threatOf(enemyLevel){ const g=(enemyLevel||1)-(state.level||1);
  if(g<=-22) return {t:"Trivial",  c:"dim"};
  if(g<=-8)  return {t:"Easy",     c:"green"};
  if(g<8)    return {t:"Even",     c:"blue"};
  if(g<20)   return {t:"Tough",    c:"gold"};
  if(g<45)   return {t:"Deadly",   c:"red"};
  return            {t:"Suicidal", c:"red"}; }
/* an enemy's absolute level, from how rough & developed its corner of the galaxy is */
function enemyLevelFor(danger, cf){ return Math.max(1, Math.round((danger*2.6 + (cf||0)*16) * rndF(0.8,1.2))); }
/* scale a fresh combatant's hp & atk by the level gap to the player (the one-shot / stomp dynamic) */
function applyLevelScaling(c){ const gm=levelGap(c.level); c.maxHp=Math.max(1,Math.round(c.maxHp*gm)); c.hp=c.maxHp; c.atk=Math.max(1,Math.round(c.atk*gm)); return c; }
/* drop loot gear from a beaten foe, by its toughness tier */
function dropFoeGear(ch){ if(!combat||!chance(ch)) return null;
  state.gear=state.gear||[]; const g=genGear(rollDropRarity(clamp(combat.dropTier||0,0,4)));
  state.gear.push(g); Game.logMsg(`Looted: <b style="color:${rarityColor(g.rarity)}">${g.name}</b>!`,"good"); return g; }
function playerAttack(name){
  if(!combat||combat.over) return;
  const sk=DATA.skills[name], cost=sk.energy||0;
  if(state.energy<cost){ toast("Not enough energy"); return; }
  state.energy-=cost;
  if(Game.hasPower("current") && name.includes("Current"))
    state.energy=Math.min(Game.effMaxEnergy(),state.energy+Math.round(cost*0.25));
  if(sk.type==="heal"){ const amt=20+Game.effStat("force")*3;
    state.hp=Math.min(Game.effMaxHp(),state.hp+amt); Game.logMsg(`You mend ${amt} HP.`,"good"); }
  else if(sk.type==="buff"){ state.energy=Math.min(Game.effMaxEnergy(),state.energy+12);
    state.hp=Math.min(Game.effMaxHp(),state.hp+5); Game.logMsg(`You focus. +12 energy, +5 HP.`,"sys"); }
  else {
    const hits=sk.hits||1; let total=0, landed=0, crit=false, evaded=false;
    for(let h=0; h<hits; h++){
      const acc=(sk.acc||0.85)+Game.effStat("agility")*0.01+Game.tempEff("acc",0);
      if(!chance(acc)) continue;                                       // you miss
      if(combat.evade && chance(combat.evade)){ evaded=true; continue; } // foe slips it
      landed++;
      let dmg=Game.effStat(sk.scale)*sk.mult+rnd(0,4);
      if(sk.scale==="might") dmg += (state.species.mass.value-HUMAN.mass)*0.03;
      dmg *= Game.tempEff("dmgDealtMult",1);
      if(combat.stim) dmg*=1.5;
      const critChance=0.1+Game.effStat("agility")*0.005+(Game.bio("perception")-10)*0.008
        +(Game.hasPower("nightsight")?0.1:0)+(sk.critBonus||0)+Game.tempEff("crit",0)+Game.circEff("crit",0);
      if(chance(critChance)){ dmg*=1.6; crit=true; }
      if(Game.hasPower("venom")&&chance(0.25)) dmg+=4;
      dmg *= (1-(combat.armorPct||0));                                  // armored foes soak part of it
      dmg=Math.max(1,Math.round(dmg)); combat.hp-=dmg; total+=dmg;
    }
    if(!landed){ Game.logMsg(`Your ${name} ${evaded?"is slipped by "+combat.name:"misses"}!`,"bad"); }
    else {
      Game.logMsg(`${name} hits ${combat.name} for ${total}${crit?" CRIT!":""}${hits>1?` (${landed}/${hits} hits)`:""}.`,"hit");
      if(sk.applies && (!sk.appliesChance || chance(sk.appliesChance))){
        if(sk.applies==="bleed"){ combat.eStatus.bleed=Math.max(combat.eStatus.bleed, sk.appliesTurns||3);
          combat.bleedDmg=Math.max(2,Math.round(Game.effStat(sk.scale)*0.5)); Game.logMsg(`${combat.name} is bleeding!`,"hit"); }
        if(sk.applies==="daze"){ combat.eStatus.daze=Math.max(combat.eStatus.daze,1); Game.logMsg(`${combat.name} is dazed — it loses its next move!`,"good"); }
      }
    }
  }
  if(combat.hp<=0) return combat.person?winDuel():(combat.foe?winFoe():winEncounter());
  if(combat.surprised){ combat.surprised=false; Game.save(); UI.render("combat"); return; } // free hit, no retaliation
  enemyTurn();
}
function enemyTurn(){
  // a dazed foe loses its turn
  if(combat.eStatus && combat.eStatus.daze>0){ combat.eStatus.daze--; Game.logMsg(`${combat.name} is too dazed to act.`,"good"); return endRound(); }
  // brutes telegraph a heavy blow one round, then unleash it the next
  let mult=1;
  if(combat.winding){ mult=2; combat.winding=false; }
  else if((combat.traits||[]).includes("brute") && chance(0.32)){ combat.winding=true;
    Game.logMsg(`&#9888; ${combat.name} winds up a crushing blow! (heal up or hit it fast)`,"gold"); return endRound(); }
  // savage foes grow deadlier as they're hurt
  let atk=combat.atk; if((combat.traits||[]).includes("savage") && combat.hp < combat.maxHp*0.5) atk=Math.round(combat.atk*1.4);
  let dmg=atk*mult+rnd(0,3);
  if(Game.hasPower("armored")) dmg-=2;
  const resist=clamp(1-(Game.bio("resilience")-10)*0.012, 0.7, 1.2)*Game.tempEff("dmgTakenMult",1);
  dmg=Math.max(1,Math.round(dmg*resist)-Game.effDef());
  let dodge=Game.effStat("agility")*0.012-Math.max(0,(state.species.mass.value-HUMAN.mass))*0.0004+Game.gearMod("dodge");
  if(Game.hasPower("flight")) dodge+=0.12;
  if(chance(clamp(dodge,0,0.6))){ Game.logMsg(`You evade the ${combat.name}.`,"good"); }
  else { state.hp-=dmg; Game.logMsg(`${combat.name} strikes you for ${dmg}${mult>1?" — a HEAVY blow!":""}.`,"bad");
    if((combat.traits||[]).includes("venomous") && chance(0.4)){ combat.pStatus.poison=Math.max(combat.pStatus.poison,3);
      combat.poisonDmg=Math.max(2,Math.round(combat.atk*0.22)); Game.logMsg(`You've been poisoned!`,"bad"); } }
  endRound();
}
/* end of a combat round: biology regen, then damage-over-time ticks and death checks */
function endRound(){
  const en=Math.round((Game.bio("metabolism")-10)*0.2)+Game.tempEff("energyRegen",0)+Game.circEff("energyRegen",0)+(Game.lightFeeder()?1:0);
  if(en>0) state.energy=Math.min(Game.effMaxEnergy(),state.energy+en);
  if(Game.hasPower("regen")) state.hp=Math.min(Game.effMaxHp(),state.hp+Math.round(Game.effMaxHp()*0.04));
  if(Game.hasPower("photosynth")) state.energy=Math.min(Game.effMaxEnergy(),state.energy+2);
  if(combat.eStatus && combat.eStatus.bleed>0){ const d=combat.bleedDmg||3; combat.hp-=d; combat.eStatus.bleed--; Game.logMsg(`${combat.name} bleeds for ${d}.`,"hit"); }
  if(combat.pStatus && combat.pStatus.poison>0){ const d=combat.poisonDmg||3; state.hp-=d; combat.pStatus.poison--; Game.logMsg(`Poison courses through you: -${d} HP.`,"bad"); }
  if(combat.hp<=0) return combat.person?winDuel():(combat.foe?winFoe():winEncounter());
  if(state.hp<=0) return loseEncounter();
  Game.save(); UI.render("combat");
}
function tryTame(){
  if(!combat||combat.over||combat.person||combat.foe) return;   // people can't be tamed
  let p=combat.tame*(1.2-combat.hp/combat.maxHp)+Game.effStat("charm")*0.01;
  if(Game.hasPower("telepath")) p+=0.12;
  p+=Game.tempEff("tame",0);
  p=clamp(p,0.03,0.95);
  if(chance(p)){ state.pets.push({cid:combat.cid,name:combat.name,hp:combat.maxHp,atk:combat.atk,level:1,nick:null});
    Game.logMsg(`You bond with the ${combat.name}! It joins your menagerie.`,"good");
    combat.over=true; Game.gainXp(Math.round(combat.xp*0.5)); Game.save(); UI.render("hub"); UI.flashLog(); }
  else { Game.logMsg(`The ${combat.name} resists!`,"bad"); enemyTurn(); }
}
function fleeEncounter(){
  let p=0.5+Game.effStat("agility")*0.015+Game.tempEff("flee",0)+Game.gearMod("flee");
  if(state.skills.includes("Current Sense")) p+=0.1;
  if(Game.hasPower("flight")) p+=0.12; if(Game.hasPower("telepath")) p+=0.06;
  if(chance(p)){ Game.logMsg(`You slip away from the ${combat.name}.`,"sys");
    combat.over=true; Game.save(); UI.render("hub"); UI.flashLog(); }
  else { Game.logMsg(`You fail to escape!`,"bad"); enemyTurn(); }
}
function winEncounter(){
  combat.over=true; const cr=rnd(6,18); state.credits+=cr; Game.gainXp(combat.xp);
  Game.logMsg(`You defeat the ${combat.name}! +${combat.xp} XP, +${cr} credits.`,"good");
  if(chance(0.4)){ const id=pick(["scrap","pelt","ration"]); Game.addItem(id,1);
    Game.logMsg(`Loot: ${DATA.items[id].name}.`,"good"); }
  dropFoeGear(0.06);   // wild things rarely carry gear, but trophies happen
  Game.save(); UI.render("hub"); UI.flashLog();
}
function winFoe(){
  combat.over=true; const [lo,hi]=combat.loot||[10,60];
  const cr=Math.round(rnd(lo,hi)*(1+(state.world.danger-1)*0.05)); state.credits+=cr; Game.gainXp(combat.xp);
  Game.logMsg(`You put down the ${combat.name}! +${combat.xp} XP, +${cr} credits looted.`,"good");
  if(chance(0.25)){ const id=pick(["stim","medpack","ration","scrap"]); Game.addItem(id,1);
    Game.logMsg(`Pulled from them: ${DATA.items[id].name}.`,"good"); }
  dropFoeGear(0.12 + (state.world.danger-1)*0.015);
  Game.save(); UI.render("hub"); UI.flashLog();
}
function loseEncounter(){
  combat.over=true; const lost=Math.round(state.credits*0.2); state.credits-=lost;
  state.hp=Math.max(1,Math.round(Game.effMaxHp()*0.3));
  Game.logMsg(`You black out, ${lost} credits lighter.`,"bad");
  // knocked out -> carried back to your home world. Your ship stays where it was docked.
  if(state.galaxy && (adrift() || state.sysId!==0 || state.atSlot!==0)){
    const stranded=Game.ship();
    if(adrift()){ playerGroupIds().forEach(id=>{ const v=(state.vehicles||[]).find(x=>x.id===id); if(v){ v.sysId=0; v.slot=0; } });
      state.voidPos=null; }       // limp out of deep space back home
    state.sysId=0; state.atSlot=0; state.system=state.galaxy.systems[0];
    state.world=state.system.planets[0].world;
    const here=Game.shipsHere();
    state.activeShip=(here.find(v=>spaceworthy(v))||here[0]||{}).id||null;
    Game.logMsg(`You wake on your homeworld. Your ${stranded?stranded.name:"ship"} is still docked at ${shipLocationName(stranded)}.`,"bad");
    if(!Game.canLeave()) Game.logMsg(`You have no ship here that can fly — you'll need to buy one at the Shipyard.`,"sys");
  }
  Game.save(); UI.render("hub"); UI.flashLog();
}

/* ============================================================ UI ======= */
