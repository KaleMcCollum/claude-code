<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#05060a">
<title>Edge of the Outer Stars</title>
<!--
  EDGE OF THE OUTER STARS
  A self-contained, text-based galaxy RPG in a single HTML file. Open it in any phone
  or desktop browser; progress autosaves to the browser and can be exported to a file.

  DESIGN PILLARS
   - You are the NAMER and EXPLORER, not the rule-maker. You choose names (character,
     species, world, ship, beast, gun, ...). The GAME rolls everything else — stats,
     power, rarity, life and death — through weighted randomness. No re-rolls.
   - RARITY drives power. Every generated thing rolls a tier (Common -> Primordial)
     with transparent odds. Rarer = stronger and may carry rarer powers (e.g. flight).
   - UNIVERSAL METRICS. Shared units measure everything. First up: the vehicle power
     triad — Star / Flight / Ground Power, all in "Stellar-Horsepower" (SHp).

  CODE MAP
    UNITS    - documented universal measurements
    RARITY   - weighted tier engine (roll, odds, power scaling)
    TABLES   - archetypes, biomes, populations, vehicle classes, names of axes
    Gen      - procedural generators (species, world, vehicle) -> player names them
    DATA     - hand-authored creatures & items (procedural versions come later)
    state    - the live save object
    Game     - logic (creation, economy, leveling, saving)
    combat   - turn-based encounters
    UI       - screen rendering + scrolling log
-->
<style>
  :root{
    --bg:#05060a; --panel:#0d1018; --panel2:#141a26; --line:#222c3d;
    --ink:#cdd6e6; --dim:#7c8aa3; --gold:#e8c372; --blue:#5fd0ff;
    --green:#6ee7a0; --red:#ff6b6b; --violet:#b98cff;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--ink);
    font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace; font-size:16px;
    line-height:1.45;}
  body{max-width:680px; margin:0 auto; min-height:100vh; padding:0 14px 90px;}
  h1,h2,h3{font-weight:700; line-height:1.2; margin:0 0 8px;}
  h1{font-size:1.45rem; color:var(--gold); letter-spacing:.5px;}
  h2{font-size:1.1rem; color:var(--blue);}
  h3{font-size:.95rem; color:var(--dim); text-transform:uppercase; letter-spacing:1px;}
  p{margin:0 0 10px;}
  a{color:var(--blue);}
  .stars{position:fixed; inset:0; z-index:-1; background:
    radial-gradient(1px 1px at 20% 30%, #fff8 0, transparent),
    radial-gradient(1px 1px at 70% 60%, #fff6 0, transparent),
    radial-gradient(1px 1px at 40% 80%, #fff5 0, transparent),
    radial-gradient(2px 2px at 85% 20%, #fffa 0, transparent),
    radial-gradient(1px 1px at 55% 12%, #fff7 0, transparent),
    radial-gradient(1px 1px at 12% 70%, #fff6 0, transparent),
    var(--bg);}
  header{padding:16px 0 8px; text-align:center;}
  header .sub{color:var(--dim); font-size:.8rem; letter-spacing:2px; text-transform:uppercase;}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:14px; margin:0 0 12px;}
  .row{display:flex; gap:8px; flex-wrap:wrap;}
  .row.between{justify-content:space-between; align-items:center;}
  button{font-family:inherit; font-size:.95rem; cursor:pointer; color:var(--ink);
    background:var(--panel2); border:1px solid var(--line); border-radius:10px;
    padding:11px 14px; transition:.12s; touch-action:manipulation;}
  button:active{transform:scale(.97);}
  button:hover{border-color:var(--blue);}
  button.primary{background:linear-gradient(180deg,#1c2638,#141a26); border-color:var(--gold); color:var(--gold);}
  button.full{display:block; width:100%; margin:6px 0; text-align:left;}
  button.ghost{background:transparent;}
  button:disabled{opacity:.4; cursor:not-allowed;}
  button.sel{border-color:var(--gold); background:#1a2233; color:var(--gold);}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
  .pill{display:inline-block; background:var(--panel2); border:1px solid var(--line);
    border-radius:999px; padding:3px 10px; font-size:.78rem; margin:2px 4px 2px 0; color:var(--dim);}
  .pill.g{color:var(--gold); border-color:#4a3f22;}
  .pill.b{color:var(--blue); border-color:#234a57;}
  .pill.v{color:var(--violet); border-color:#3a2a57;}
  input[type=text]{width:100%; font-family:inherit; font-size:1rem; padding:11px;
    background:#070a11; color:var(--ink); border:1px solid var(--line); border-radius:10px;}
  button.rnd{flex:0 0 auto; padding:11px 13px; font-size:1.1rem; line-height:1;}
  .dim{color:var(--dim);} .gold{color:var(--gold);} .green{color:var(--green);}
  .red{color:var(--red);} .blue{color:var(--blue);} .violet{color:var(--violet);}
  .bar{height:9px; background:#070a11; border:1px solid var(--line); border-radius:99px; overflow:hidden; margin:3px 0 8px;}
  .bar > i{display:block; height:100%;}
  .hpfill{background:linear-gradient(90deg,#ff6b6b,#ffae6b);}
  .xpfill{background:linear-gradient(90deg,#5fd0ff,#b98cff);}
  .enfill{background:linear-gradient(90deg,#6ee7a0,#5fd0ff);}
  .statline{display:flex; justify-content:space-between; font-size:.9rem; padding:2px 0;}
  /* compact stat-sheet rows */
  .sheet .srow{display:grid; grid-template-columns:1fr auto 28px; gap:10px; align-items:baseline;
    padding:4px 0; border-bottom:1px solid var(--line); font-size:.86rem;}
  .sheet .srow:last-of-type{border-bottom:none;}
  .sheet .srow .lbl{color:var(--dim);}
  .sheet .srow .v{text-align:right; color:var(--ink); font-weight:600; white-space:nowrap;}
  .sheet .srow .v .rg{color:var(--dim); font-weight:400; font-size:.72rem;}
  .sheet .srow .pc{text-align:right; font-variant-numeric:tabular-nums; font-size:.8rem; font-weight:600;}
  .sheet .krow{display:grid; grid-template-columns:auto 1fr; gap:10px; align-items:baseline;
    padding:4px 0; border-bottom:1px solid var(--line); font-size:.86rem;}
  .sheet .krow:last-of-type{border-bottom:none;}
  .sheet .krow .lbl{color:var(--dim);} .sheet .krow .kv{text-align:right;}
  .log{background:#070a11; border:1px solid var(--line); border-radius:10px; padding:10px;
    height:160px; overflow-y:auto; font-size:.86rem;}
  .log p{margin:0 0 5px;}
  .log .sys{color:var(--dim);} .log .good{color:var(--green);} .log .bad{color:var(--red);}
  .log .hit{color:var(--gold);}
  nav{position:fixed; left:0; right:0; bottom:0; background:#0a0d14ee; backdrop-filter:blur(6px);
    border-top:1px solid var(--line); display:flex; max-width:680px; margin:0 auto; z-index:10;}
  nav button{flex:1; border:none; border-radius:0; background:transparent; padding:10px 2px;
    font-size:.7rem; color:var(--dim); display:flex; flex-direction:column; align-items:center; gap:2px;}
  nav button.on{color:var(--gold);}
  nav .ico{font-size:1.1rem;}
  .center{text-align:center;}
  .small{font-size:.8rem;}
  .divider{height:1px; background:var(--line); margin:12px 0;}
  .tag{font-size:.72rem; padding:2px 7px; border-radius:6px; background:var(--panel2); color:var(--dim);}
  .hidden{display:none;}
  .flash{animation:flash .5s;}
  @keyframes flash{0%{background:#1a2233;}100%{background:var(--panel);}}
  .reveal{animation:reveal .5s ease;}
  @keyframes reveal{from{opacity:0; transform:translateY(8px);}to{opacity:1; transform:none;}}
  .rarity-banner{border-radius:12px; padding:12px; margin:0 0 12px; text-align:center;
    border:1px solid; background:#0a0d14;}
  .rarity-banner .rn{font-size:1.3rem; font-weight:700; letter-spacing:1px;}
  .rarity-banner .odds{font-size:.78rem; color:var(--dim); letter-spacing:1px;}
  .toast{position:fixed; top:14px; left:50%; transform:translateX(-50%); z-index:50;
    background:#141a26; border:1px solid var(--gold); color:var(--gold); padding:10px 16px;
    border-radius:10px; font-size:.85rem; opacity:0; transition:.25s; pointer-events:none; max-width:90%;}
  .toast.show{opacity:1;}
</style>
</head>
<body>
<div class="stars"></div>
<header>
  <h1>EDGE OF THE OUTER STARS</h1>
  <div class="sub">A galaxy text RPG</div>
</header>

<main id="app"><!-- screens render here --></main>

<nav id="nav" class="hidden">
  <button data-screen="hub"><span class="ico">&#9737;</span>World</button>
  <button data-screen="char"><span class="ico">&#9670;</span>Self</button>
  <button data-screen="codex"><span class="ico">&#9776;</span>Codex</button>
  <button data-screen="bag"><span class="ico">&#9783;</span>Items</button>
  <button data-screen="garage"><span class="ico">&#9992;</span>Ships</button>
  <button data-screen="save"><span class="ico">&#8635;</span>Save</button>
</nav>

<div id="toast" class="toast"></div>

<script>
"use strict";
/* ============================================================ UTIL ===== */
const $ = (sel,el=document)=>el.querySelector(sel);
const app = $("#app");
const rnd  = (a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const rndF = (a,b)=>Math.random()*(b-a)+a;
const pick = arr => arr[Math.floor(Math.random()*arr.length)];
const chance = p => Math.random() < p;
const cap = s => s.charAt(0).toUpperCase()+s.slice(1);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const commas = n => n.toLocaleString("en-US");
// pick one entry from [{...,weight}] proportional to weight
function weightedPick(list){
  const total=list.reduce((s,e)=>s+e.weight,0);
  let r=Math.random()*total;
  for(const e of list){ if((r-=e.weight)<0) return e; }
  return list[list.length-1];
}
// integer 0..max, biased low when skew>1 (rare highs); biased high when skew<1
const skewRoll=(max,skew)=>Math.floor(Math.pow(Math.random(),skew)*(max+1));

/* ============================================================ UNITS ==== */
/* Universal measurements every system shares. Display helpers live here so
   the whole game speaks the same language. Add new metrics in one place. */
const UNITS = {
  // Vehicle power triad — the "horsepower equivalent" of the galaxy.
  power:{
    unit:"SHp", unitLong:"Stellar-Horsepower",
    star:{   label:"Star Power",   abbr:"STR", desc:"Interstellar drive output among the stars (hyperlanes)." },
    flight:{ label:"Flight Power", abbr:"FLT", desc:"Sublight & atmospheric flight thrust." },
    ground:{ label:"Ground Power", abbr:"GRD", desc:"Locomotion for craft that ride the ground." },
  },
  fmtPower:v=>`${commas(Math.round(v))} ${UNITS.power.unit}`,
};

/* ============================================================ RARITY === */
/* The heart of the game. Everything generated rolls a tier here. Weights are
   relative; odds are computed and shown to the player ("a 1-in-N origin").
   `pow` is the stat/power multiplier band for that tier. */
const RARITY = {
  tiers:[
    { id:"common",     name:"Common",     color:"#9aa7bd", weight:600000, pow:[0.85,1.15] },
    { id:"uncommon",   name:"Uncommon",   color:"#6ee7a0", weight:240000, pow:[1.1,1.45] },
    { id:"rare",       name:"Rare",       color:"#5fd0ff", weight:100000, pow:[1.4,1.9] },
    { id:"epic",       name:"Epic",       color:"#b98cff", weight:40000,  pow:[1.85,2.5] },
    { id:"legendary",  name:"Legendary",  color:"#e8c372", weight:15000,  pow:[2.4,3.4] },
    { id:"mythic",     name:"Mythic",     color:"#ff9f5a", weight:4000,   pow:[3.2,4.6] },
    { id:"godlike",    name:"Godlike",    color:"#ff6b6b", weight:900,    pow:[4.4,6.5] },
    { id:"primordial", name:"Primordial", color:"#ffffff", weight:100,    pow:[6,9] },
  ],
  _total:0,
  init(){ this._total=this.tiers.reduce((s,t)=>s+t.weight,0); },
  byId(id){ return this.tiers.find(t=>t.id===id); },
  index(id){ return this.tiers.findIndex(t=>t.id===id); },
  roll(){ // weighted tier draw
    let r=Math.random()*this._total;
    for(const t of this.tiers){ if((r-=t.weight)<0) return t; }
    return this.tiers[0];
  },
  mult(tier){ return rndF(tier.pow[0],tier.pow[1]); },
  // "1 in N" string for a tier's odds
  odds(tier){ const n=Math.round(this._total/tier.weight); return n<=1?"near-certain":`1 in ${commas(n)}`; },
};
RARITY.init();

/* ============================================================ GENETICS = */
/* Two independent layers of luck decide who you are:
     1) SPECIES rarity  — how unusual the PEOPLE you're born to are. Rarer peoples
        have smaller populations, so being born one is itself rare (population-weighted).
        Rarer species also drift further from the human baseline (taller giants, etc.).
     2) GENETICS        — where YOU land within your own species' range. Even a common
        humanlike person can roll a 1-in-1000 genome. Sampled near the middle, so
        extremes (runts and prodigies) are rare. These values are FIXED for life.
   Everything is anchored to humans so the numbers are intuitive at a glance. */
const HUMAN = { height:175, mass:78, maturity:18, lifespan:82, attr:10 }; // cm, kg, yrs, yrs, pts

/* Conceptual scale of the setting (tunable). Drives flavor + population math. */
const GALAXY = {
  speciesCap: 10000,     // estimated number of distinct sapient peoples in the galaxy
  totalSapients: 1e12,   // ~1 trillion thinking beings across all worlds
};

/* You begin as a YOUNG CHILD — able to do a bit of everything, but far from your
   genetic potential — and grow toward it as the years pass (full power at maturity). */
const LIFE = {
  startFraction:  0.20,  // you start at 20% of your species' age-of-maturity
  childPotential: 0.35,  // a young child performs at ~35% of adult potential (not worthless)
};
/* Life stages by fraction of maturity age (elder is handled via twilight). */
const LIFE_STAGES = [
  { f:0.12, name:"infant" }, { f:0.30, name:"young child" }, { f:0.55, name:"child" },
  { f:0.85, name:"adolescent" }, { f:1.10, name:"young adult" }, { f:Infinity, name:"adult" },
];

const ATTR_KEYS  = ["strength","agility","endurance","intellect","attunement","presence"];
const ATTR_LABEL = { strength:"Strength", agility:"Agility", endurance:"Endurance",
  intellect:"Intellect", attunement:"Attunement", presence:"Presence" };

/* How far a species' average can drift from human, by rarity index (0..7). */
const SPECIES_DEV = [0.10, 0.16, 0.26, 0.40, 0.60, 0.90, 1.30, 1.90];
/* Population band of a species, by rarity index — rarer peoples are fewer. */
const POP_RANGE = [
  [2e9, 2.5e10], [3e8, 2e9], [2e7, 3e8], [1e6, 2e7],
  [8e4, 1e6], [6e3, 8e4], [400, 6e3], [12, 400],
];
function rollPopulation(ti){ const [lo,hi]=POP_RANGE[ti];
  return Math.round(Math.exp(rndF(Math.log(lo),Math.log(hi)))); }

/* ~normal-ish bounded draw in [-1,1], used for SPECIES-level mean drift. */
const approxNorm = ()=>((Math.random()+Math.random()+Math.random())/3)*2-1;
/* True standard-normal (Box–Muller) + its CDF — used for INDIVIDUAL genetics so
   percentiles span 1–99 with realistic tails (≈1% reach the 99th, etc.). */
function gauss(){ let u=0,v=0; while(u===0)u=Math.random(); while(v===0)v=Math.random();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); }
function normCdf(x){ const t=1/(1+0.2316419*Math.abs(x)), d=0.3989423*Math.exp(-x*x/2);
  let p=d*t*(0.3193815+t*(-0.3565638+t*(1.781478+t*(-1.821256+t*1.330274))));
  return x>0?1-p:p; }

/* Generate one fixed genetic trait:
   - the SPECIES gets an average that drifts from `humanMean` by the rarity `dev`
   - the species gets a min..max spread around that average
   - YOU get a specific value sampled within, plus the percentile you landed at. */
function genTrait(humanMean, dev, opts={}){
  // SPECIES average: drifts from the human baseline by the rarity `dev`
  let meanMult = 1 + approxNorm()*dev*(opts.devScale??1) + (opts.skew||0);
  meanMult = Math.max(opts.floorMult??0.2, meanMult);
  const mean = humanMean*meanMult;
  const spread = opts.spread ?? rndF(0.1,0.18);
  const min = mean*(1-spread), max = mean*(1+spread);
  // INDIVIDUAL position within the species, as a standard-normal `g`. `lifeRoll`
  // is the character's overall genetic luck; `corr` mixes it in (so a gifted soul
  // tends broadly gifted) while keeping a fresh per-trait roll (strong-but-slow ok).
  const corr = opts.corr ?? 0;
  const g = corr*(opts.lifeRoll??0) + Math.sqrt(1-corr*corr)*gauss();
  // value clusters near the mean; ±2.5σ reaches the species' stated min/max
  const value = clamp(mean*(1 + g*spread/2.5), min, max);
  const pct = clamp(Math.round(normCdf(g)*100), 1, 99);
  const r = opts.intval ? (x=>Math.max(opts.floor??1, Math.round(x))) : (x=>x);
  return { mean:r(mean), min:r(min), max:r(max), value:r(value), pct, g };
}

/* Words for where a roll landed within its own species. */
function pctLabel(p){
  if(p>=98) return "once in a generation";
  if(p>=90) return "exceptional for its kind";
  if(p>=75) return "well above average";
  if(p>=60) return "above average";
  if(p>40)  return "typical of its kind";
  if(p>25)  return "below average";
  if(p>12)  return "poor for its kind";
  if(p>3)   return "very poor";
  return "the runt of the line";
}
function gradeLabel(p){
  if(p>=90) return "Pristine genome";
  if(p>=75) return "Gifted genome";
  if(p>=60) return "Strong genome";
  if(p>40)  return "Sound genome";
  if(p>25)  return "Frail genome";
  if(p>12)  return "Poor genome";
  return "Wretched genome";
}
function pctColor(p){ return p>=85?"#6ee7a0":p>=60?"#5fd0ff":p>=40?"#7c8aa3":p<=15?"#ff6b6b":"#e8c372"; }

/* formatters anchored to human-readable units */
function cmToFt(cm){ const ti=cm/2.54; let ft=Math.floor(ti/12), inch=Math.round(ti-ft*12);
  if(inch===12){ft++; inch=0;} return `${ft}'${inch}"`; }
function kgToLb(kg){ return `${commas(Math.round(kg*2.20462))} lb`; }
const yrsFmt = y=>`${Math.round(y)} yr`;
function humanizeCount(n){
  if(n>=1e12) return (n/1e12).toFixed(1)+" trillion";
  if(n>=1e9)  return (n/1e9).toFixed(n>=1e10?0:1)+" billion";
  if(n>=1e6)  return (n/1e6).toFixed(n>=1e7?0:1)+" million";
  if(n>=1e3)  return commas(Math.round(n));
  return commas(Math.round(n));
}

/* ============================================================ TABLES === */
/* Species body-plans (the broad templates every generated people is built from).
   `bias` nudges that people's average attributes off the human baseline of 10;
   `powers` is the pool of innate abilities this body-plan can roll; `sig`
   is the attribute that defines its signature combat skill. Weights make
   humanlike peoples by far the most common, exotic ones rare. */
const ARCHETYPES = [
  { id:"humanlike", name:"Humanlike", weight:34, bias:{}, sig:"strength",
    powers:["hardy","mercantile","telepath"],
    flavor:"familiar of frame — two arms, two legs, endless ambition" },
  { id:"reptilian", name:"Reptilian", weight:16, bias:{strength:2,agility:2,endurance:1}, sig:"agility",
    powers:["armored","venom","nightsight","amphibious"],
    flavor:"cold-blooded and scaled, patient and quick to strike" },
  { id:"avian", name:"Avian", weight:9, bias:{agility:4,strength:-2,endurance:-1}, sig:"agility",
    powers:["flight","nightsight","telepath"],
    flavor:"hollow-boned and feathered, built for the open sky" },
  { id:"insectoid", name:"Insectoid", weight:11, bias:{agility:2,intellect:2,strength:-1}, sig:"agility",
    powers:["armored","venom","hivemind","flight"],
    flavor:"chitin-plated and many-limbed, thinking in swarms" },
  { id:"aquatic", name:"Aquatic", weight:8, bias:{attunement:2,endurance:1}, sig:"attunement",
    powers:["amphibious","regen","telepath"],
    flavor:"sleek and gilled, more at home beneath the waves" },
  { id:"saurian", name:"Saurian", weight:7, bias:{strength:5,endurance:3,agility:-3}, sig:"strength",
    powers:["armored","hardy","venom"],
    flavor:"great and heavy-jawed, a walking fortress of muscle" },
  { id:"plantkin", name:"Plantkin", weight:5, bias:{attunement:2,endurance:2,intellect:-2,agility:-2}, sig:"attunement",
    powers:["photosynth","regen","venom"],
    flavor:"rooted heritage — bark, sap, and slow green patience" },
  { id:"crystalline", name:"Crystalline", weight:3, bias:{intellect:3,endurance:2,agility:-2}, sig:"intellect",
    powers:["armored","current","hardy"],
    flavor:"living lattice of mineral, humming with stored charge" },
  { id:"machinekin", name:"Machine-kin", weight:4, bias:{intellect:5,presence:-2,attunement:-1}, sig:"intellect",
    powers:["armored","hardy","current"],
    flavor:"part-forged, part-grown — circuits laced through sinew" },
  { id:"energy", name:"Energy-being", weight:1, bias:{attunement:6,strength:-3,endurance:-2}, sig:"attunement",
    powers:["flight","current","telepath","regen"],
    flavor:"barely-bound light given will — a rumor made flesh" },
];

/* Powers a species can roll. Functional ones hook into combat/economy. */
const POWERS = {
  flight:{ name:"Flight", desc:"Take wing — far better evasion and escape." },
  armored:{ name:"Armored Hide", desc:"Natural plating reduces incoming damage." },
  regen:{ name:"Regeneration", desc:"Knit wounds — heal a little each combat round." },
  current:{ name:"Current Attunement", desc:"Born to the Current: cheaper powers, innate sense." },
  venom:{ name:"Venomous", desc:"Strikes may leave a biting venom." },
  telepath:{ name:"Telepathy", desc:"Read intent — better taming and escape." },
  nightsight:{ name:"Night Sight", desc:"See in the dark — sharper critical strikes." },
  amphibious:{ name:"Amphibious", desc:"Equally at home in water." },
  photosynth:{ name:"Photosynthesis", desc:"Drink the light — regain energy each round." },
  hivemind:{ name:"Hive Mind", desc:"Never truly alone — steadier under fire." },
  mercantile:{ name:"Mercantile Instinct", desc:"A nose for a deal — 15% better market prices." },
  hardy:{ name:"Hardy", desc:"Tough constitution — extra maximum HP." },
};

/* World biomes. Each maps to a creature pool (reusing DATA.creatures for now). */
const BIOMES = [
  { id:"forest",   weight:18, name:"temperate forest",  creatures:["thornhare","mossback","glimmer-moth"] },
  { id:"arid",     weight:16, name:"arid scrubland",     creatures:["sandskitter","dusthound","saltcrawler"] },

/* Build is DERIVED from height + mass (a BMI-like read), pure flavor. */
function buildLabel(heightCm, massKg){
  const m=heightCm/100, bmi=massKg/(m*m);

  if(bmi<28) return "lean";
  if(bmi<34) return "sturdy";
  if(bmi<42) return "stocky";
  return "massive";
}

/* Ship rarity scales a hull's size/power. Common is the smallest; rarer hulls are much
   bigger — an Epic Cargo Hauler dwarfs a Common one. */
const SHIP_RARITY_MULT=[1, 1.3, 1.7, 2.4, 3.2, 4.5, 6, 8];
/* Rarer hulls only turn up at higher-tech worlds (and are still rare even there). */
function rollShipTier(tech){
  const maxIdx=clamp(Math.floor(tech*0.9), 0, RARITY.tiers.length-1);
  const allowed=RARITY.tiers.slice(0, maxIdx+1);
  const total=allowed.reduce((s,t)=>s+t.weight,0); let r=Math.random()*total;
  for(const t of allowed){ if((r-=t.weight)<0) return t; }
  return allowed[0];
}
/* A planet's shipyard stock, shaped by its tech & wealth (cached per planet). */
function genShipStock(w){
  const avail=SHIP_CLASSES.filter(c=>w.tech>=c.minTech);
  if(!avail.length) return [];
  const count=clamp(Math.round((w.tech+w.wealth)/3)+rnd(-1,1), 0, 8);
  const stock=[];
  for(let i=0;i<count;i++){
    const c=weightedPick(avail), t=rollShipTier(w.tech), m=SHIP_RARITY_MULT[RARITY.index(t.id)], vf=rndF(0.9,1.12);
    const power={}; Object.keys(c.power).forEach(a=>power[a]=Math.round(c.power[a]*m));
    stock.push({ cls:c.id, name:c.name, tier:t.id, range:c.range,
      cargo:Math.round(c.cargo*m*vf), crew:Math.max(c.crew, Math.round(c.crew*m)), bays:Math.round(c.bays*m),
      power, price:Math.round(c.price*m*(1.35-w.wealth*0.04)*rndF(0.92,1.1)) });
  }
  return stock;
}
function shipStockAt(){ state.shipStock=state.shipStock||{};
  if(!state.shipStock[state.atSlot]) state.shipStock[state.atSlot]=genShipStock(state.world);
  return state.shipStock[state.atSlot]; }

/* Tradeable commodities. Raw goods are cheap where mined (low tech), dear where industry
   consumes them (high tech). Manufactured goods are the reverse: cheap where built (high
   tech), dear where they can't be. buyTech/sellTech are the tech ranges where a world
   sells the good to you / buys it from you — so some worlds only buy, some only sell. */
const COMMODITIES=[
  { id:"raw",       name:"Raw Materials",      base:8,   kind:"raw", buyTech:[0,5], sellTech:[4,9] },
  { id:"fuel",      name:"Fuel",               base:20,  kind:"raw", buyTech:[2,7], sellTech:[0,9] },

  { id:"chassis",   name:"Ship Chassis",       base:400, kind:"mfg", buyTech:[7,9], sellTech:[0,7] },
];
function commodityPrice(w, c){
  let factor = c.kind==="raw" ? (0.6 + 0.09*w.tech) : (1.45 - 0.09*w.tech);
  factor *= (1 + (w.wealth-4.5)*0.02);           // wealthier worlds run a little pricier
  return Math.max(1, Math.round(c.base*factor));
}
const inRange=(t,r)=>t>=r[0]&&t<=r[1];
function canBuyHere(w,c){ return inRange(w.tech,c.buyTech); }
function canSellHere(w,c){ return inRange(w.tech,c.sellTech); }
function newVid(){ return "s"+Math.random().toString(36).slice(2,9); }
// cargo lives on the ACTIVE ship — each ship has its own hold
function cargoUsed(){ const s=Game.ship(); return s?Object.values(s.cargo||{}).reduce((a,n)=>a+n,0):0; }
function cargoMax(){ const s=Game.ship(); return s?(s.hold||0):0; }

/* ============================================================ GEN ====== */
/* Procedural generators. Each rolls rarity + traits, returns an object with
   name:null so the player can christen it. NOTHING here is chosen by the player. */
const Gen = {
  species(forceTier){
    const tier=forceTier||RARITY.roll();      // how rare these PEOPLE are to be born to
    const arche=weightedPick(ARCHETYPES);      // body-plan template
    const ti=RARITY.index(tier.id);
    const dev=SPECIES_DEV[ti];                 // how far this people drifts from human
    const population=rollPopulation(ti);       // how many of them exist in the galaxy

    // The character's overall GENETIC LUCK — one hidden standard-normal that nudges
    // every quality trait together, so "great genetics" is a whole-self event (rare).
    const lifeRoll=gauss();
    const CORR=0.5;                 // trait-to-trait correlation is CORR^2 (~0.25): mild
    const q={ lifeRoll, corr:CORR }; // spread into quality-trait rolls below

    // fixed physical genetics (height/mass/maturity are NEUTRAL — not luck-correlated)
    const height   = genTrait(HUMAN.height,   dev,      { spread:rndF(0.10,0.20) });
    const massBase = HUMAN.mass*Math.pow(height.value/HUMAN.height, 2.0); // mass tracks size
    const mass     = genTrait(massBase,       dev*0.6,  { spread:rndF(0.12,0.22) });
    const maturity = genTrait(HUMAN.maturity, dev*0.8,  { spread:rndF(0.12,0.20) });
    // lifespan IS a quality axis (long life = better), so it shares genetic luck
    const lifespan = genTrait(HUMAN.lifespan, dev,      { spread:rndF(0.10,0.18), skew:dev*0.15, ...q });

    // fixed attribute genetics — share luck but keep per-trait scatter (strong-but-slow ok)
    const attrs={};
    for(const a of ATTR_KEYS){
      attrs[a]=genTrait(HUMAN.attr+(arche.bias[a]||0), dev, { spread:rndF(0.10,0.16), devScale:0.7, intval:true, floor:1, ...q });
    }

    // fixed biology — quality traits share luck; fertility is neutral (independent)
    const bioRoll=()=>genTrait(HUMAN.attr, dev, { spread:rndF(0.12,0.22), devScale:0.7, intval:true, floor:1, ...q });
    const bio={
      metabolism: bioRoll(),   // energy & healing speed
      perception: bioRoll(),   // senses: surprise, crits, finds
      resilience: bioRoll(),   // toughness vs. harm
      recovery:   bioRoll(),   // natural healing over time
      fertility:  genTrait(HUMAN.attr, dev, { spread:rndF(0.15,0.3), devScale:0.8, intval:true, floor:1 }),
    };
    const temperament=weightedPick(TEMPERAMENTS).id;
    const build=buildLabel(height.value, mass.value);

    // Innate powers are a RARE GIFT. The galaxy is mostly ordinary people: common and
    // uncommon peoples essentially never have one, and even rare/epic peoples usually
    // don't. Flight, night sight, breathing water and the like are true rarities.
    const POWER_EXP=[0, 0.01, 0.05, 0.15, 0.45, 0.95, 1.5, 2.3][ti] || 0; // expected # by tier
    const pool=[...arche.powers];
    ["telepath","nightsight","regen","hardy"].forEach(p=>{ if(!pool.includes(p)) pool.push(p); });
    // Flight is the rarest gift of all — only the very rare, or naturally-winged peoples
    // (and even then only the rare among them), ever truly fly.
    const winged=["avian","insectoid","energy"].includes(arche.id);
    const flightOk=(winged && ti>=3) || ti>=5;
    if(!flightOk){ const i=pool.indexOf("flight"); if(i>=0) pool.splice(i,1); }
    let count=0, exp=POWER_EXP; const capN=Math.min(6, pool.length);
    while(exp>0 && count<capN){ if(exp>=1){ count++; exp-=1; } else { if(chance(exp)) count++; break; } }
    const powers=[];
    for(const p of pool.sort(()=>Math.random()-0.5)){ if(powers.length>=count) break; powers.push(p); }

    // heritage detail (diet, rhythm, body, senses, ancestral biome) + reproduction
    const detail=genDetail(arche.id, powers, ti);
    const reproduction=reproText(bio.fertility.value);

    // overall genome grade = how good a specimen you are (quality axes only; size /
    // fertility / heritage flavor are neutral). Computed from the shared-normal of the
    // quality traits, so averaging shrinks variance: broadly-excellent is rarer than
    // excelling at one thing — exactly the "wow, great genetics" payoff.
    const qg=[...ATTR_KEYS.map(a=>attrs[a].g), lifespan.g,
              bio.perception.g, bio.metabolism.g, bio.resilience.g, bio.recovery.g];
    const avgG=qg.reduce((s,x)=>s+x,0)/qg.length;
    const avgPct=clamp(Math.round(normCdf(avgG)*100),1,99);

    return { kind:"species", name:null, tier:tier.id, arche:arche.id, archeName:arche.name,
             flavor:arche.flavor, sig:arche.sig, population,
             height, mass, maturity, lifespan, attrs, bio, temperament, build,
             detail, reproduction, powers,
             genome:{ avgPct, grade:gradeLabel(avgPct) } };
  },

  world(){
    const tier=RARITY.roll();              // overall "specialness" / resource richness
    const biome=weightedPick(BIOMES);
    const pop=weightedPick(POPULATIONS);
    const ti=RARITY.index(tier.id);
    // independent skewed axes (rarer worlds nudge tech/wealth up a touch)
    const tech  =clamp(skewRoll(9,1.7)+Math.round(ti*0.4),0,9);
    const wealth=clamp(skewRoll(9,1.7)+Math.round(ti*0.5),0,9);
    const danger=clamp(skewRoll(9,1.5)+1+Math.round(ti*0.3),1,10);
    const market=+(0.5+tech*0.05+wealth*0.05).toFixed(2); // breadth/quality of goods
    return { kind:"world", name:null, tier:tier.id, biome:biome.id, biomeName:biome.name,
             creatures:biome.creatures, pop:pop.id, popName:pop.name, peaceMod:pop.peaceMod,
             stockMod:pop.stock, tech, wealth, danger, market };
  },

  vehicle(humble=false){
    // your INHERITED craft is always a humble SURFACE/atmospheric ride — never star-capable,
    // so you start grounded and must buy a system ship to ever leave the planet.
    const pool=humble ? VEHICLE_CLASSES.filter(v=>v.weight>=10 && !v.axes.includes("star"))
                      : VEHICLE_CLASSES;
    const tier=humble?(chance(0.8)?RARITY.tiers[rnd(0,2)]:RARITY.roll()):RARITY.roll();
    const cls=weightedPick(pool);
    const mult=RARITY.mult(tier);
    const power={};
    cls.axes.forEach(a=>{ power[a]=Math.round(cls.base[a]*mult*rndF(0.9,1.15)); });
    return { kind:"vehicle", id:newVid(), name:null, tier:tier.id, cls:cls.id, clsName:cls.name,
             axes:cls.axes, power, mult:+mult.toFixed(2),
             range:"surface", hold:8, crewMax:1, bays:0, value:600, cargo:{}, slot:0 };
  },

  /* A PERSON is a fresh individual rolled WITHIN a race's fixed ranges. Same shape as a
     generated species, so the stat sheet renders it identically. */
  person(race){
    const q={ lifeRoll:gauss(), corr:0.5 };       // this person's overall genetic luck
    const R=race.ranges;
    const t=(range,quality,intval)=>{ const g=(quality?q.corr*q.lifeRoll:0)+Math.sqrt(1-(quality?q.corr*q.corr:0))*gauss();
      const spread=range.mean?(range.max-range.min)/(2*range.mean):0.1;
      let value=clamp(range.mean*(1+g*spread/2.5), range.min, range.max);
      const rd=intval?(x=>Math.max(1,Math.round(x))):(x=>x);
      return { mean:rd(range.mean), min:rd(range.min), max:rd(range.max), value:rd(value),
               pct:clamp(Math.round(normCdf(g)*100),1,99), g }; };
    const height=t(R.height,false,false), mass=t(R.mass,false,false),
          maturity=t(R.maturity,false,false), lifespan=t(R.lifespan,true,false);
    const attrs={}; ATTR_KEYS.forEach(k=>attrs[k]=t(R.attrs[k],true,true));
    const bio={}; ["metabolism","perception","resilience","recovery"].forEach(k=>bio[k]=t(R.bio[k],true,true));
    bio.fertility=t(R.bio.fertility,false,true);
    const qg=[...ATTR_KEYS.map(k=>attrs[k].g), lifespan.g, bio.perception.g, bio.metabolism.g, bio.resilience.g, bio.recovery.g];
    const avgPct=clamp(Math.round(normCdf(qg.reduce((s,x)=>s+x,0)/qg.length)*100),1,99);
    const career=weightedPick(CAREERS).id;
    const out={ kind:"species", name:null, raceName:race.name, tier:race.tier, arche:race.arche,
             archeName:race.archeName, flavor:race.flavor, sig:race.sig, population:race.population,
             height, mass, maturity, lifespan, attrs, bio, career,
             temperament:weightedPick(TEMPERAMENTS).id, build:buildLabel(height.value,mass.value),
             detail:race.detail, reproduction:race.reproduction, powers:race.powers,
             genome:{ avgPct, grade:gradeLabel(avgPct) } };
    if(career==="wanted"){ const tm=1+RARITY.index(race.tier)*0.5, base=rnd(600,3000);
      out.bounty={ alive:Math.round(base*tm), dead:Math.round(base*tm*0.6) }; }
    return out;
  },
};

/* Extract the RACE-level record (fixed ranges + heritage) from a full species. */
function raceFrom(sp){
  const rng=x=>({mean:x.mean,min:x.min,max:x.max});
  const attrs={}, bio={};
  ATTR_KEYS.forEach(k=>attrs[k]=rng(sp.attrs[k]));
  ["metabolism","perception","resilience","recovery","fertility"].forEach(k=>bio[k]=rng(sp.bio[k]));
  return { id:null, name:sp.name||null, tier:sp.tier, arche:sp.arche, archeName:sp.archeName,
    flavor:sp.flavor, sig:sp.sig, population:sp.population, powers:[...sp.powers],
    detail:JSON.parse(JSON.stringify(sp.detail)), reproduction:sp.reproduction,
    ranges:{ height:rng(sp.height), mass:rng(sp.mass), maturity:rng(sp.maturity),
             lifespan:rng(sp.lifespan), attrs, bio } };
}

/* How many distinct races of each rarity exist (fewer common ones saturate fast). */
const RACE_POOL=[5,10,30,80,200,600,2000,6000];
/* Information value paid for documenting a NEW find, by rarity tier index. */
const RACE_VALUE =[50,150,600,2000,7000,30000,120000,500000];
const WORLD_VALUE=[30,90,300,900,3000,12000,50000,200000];
const CREATURE_VALUE=40;
function raceValue(tier){ return RACE_VALUE[RARITY.index(tier)]; }
function worldValue(tier){ return WORLD_VALUE[RARITY.index(tier)]; }
/* Draw the race you meet — population-weighted by tier, recognized if already known. */
function drawRace(){
  const tier=RARITY.roll(), ti=RARITY.index(tier.id);
  const slot=rnd(0, RACE_POOL[ti]-1);
  const id="w_"+tier.id+"_"+slot;
  if(state.codex.races[id]) return { id, race:state.codex.races[id], isNew:false };
  const race=raceFrom(Gen.species(tier)); race.id=id; race.reported=false;
  return { id, race, isNew:true };
}

/* ============================================================ STATE ==== */
const SAVE_KEY = "eots_save_v4"; // bumped: save is now a galaxy (Codex/achievements persist across lives)
let state=null, combat=null, creating={};

function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),1800); }

/* ============================================================ GAME ===== */
const Game = {
  hasSave(){ try{ return !!localStorage.getItem(SAVE_KEY); }catch(e){ return false; } },
  save(){ if(!state) return; state.updated=Date.now();
    try{ localStorage.setItem(SAVE_KEY,JSON.stringify(state)); }catch(e){ toast("Save failed"); } },
  load(){ try{ const r=localStorage.getItem(SAVE_KEY); if(!r) return false; state=JSON.parse(r); Game.migrate(); return true; }catch(e){ return false; } },
  // backfill fields added after a save was created (multi-ship cargo/locations)
  migrate(){
    if(state.atSlot==null) state.atSlot=0;
    (state.vehicles||[]).forEach(v=>{ if(!v.id) v.id=newVid(); if(!v.cargo) v.cargo={};
      if(!v.range) v.range=v.systemCapable?"system":"surface";   // migrate old systemCapable flag
      if(v.hold==null) v.hold=spaceworthy(v)?50:8; if(v.slot==null) v.slot=0;
      if(v.crewMax==null) v.crewMax=spaceworthy(v)?2:1; if(v.bays==null) v.bays=0;
      if(v.value==null) v.value=spaceworthy(v)?3000:600; });
    if(!state.activeShip) state.activeShip=((state.vehicles||[]).find(v=>spaceworthy(v))||(state.vehicles||[])[0]||{}).id;
    state.crew=state.crew||[];
    // migrate old ship.pilot objects into the crew roster
    (state.vehicles||[]).forEach(v=>{ if(v.pilot){ state.crew.push({ name:v.pilot.name, raceName:v.pilot.raceName, personIdx:-1, shipId:v.id }); delete v.pilot; } });
    // ensure any previously-hired person has a crew entry
    (state.codex&&state.codex.people||[]).forEach((p,i)=>{ if(p.hired && !state.crew.some(c=>c.personIdx===i)) state.crew.push({ name:p.name, raceName:p.raceName, personIdx:i, shipId:p.shipId||null }); });
    if(state.cargo && Object.keys(state.cargo).length){ const a=Game.ship(); if(a) a.cargo=state.cargo; }
    delete state.cargo;
  },
  wipe(){ try{ localStorage.removeItem(SAVE_KEY); }catch(e){} state=null; },

  hasPower(id){ return state.species.powers.includes(id); },
  ship(){ return (state.vehicles||[]).find(v=>v.id===state.activeShip) || (state.vehicles||[])[0] || null; },
  pilotOf(v){ return v?((state.crew||[]).find(c=>c.shipId===v.id)||null):null; },  // hired pilot crewing a ship
  canLeave(){ const s=Game.ship(); return !!(s && spaceworthy(s) && s.slot===state.atSlot); },
  shipsHere(){ return (state.vehicles||[]).filter(v=>v.slot===state.atSlot); },

  /* ---- assemble a new life from the generated (and now named) pieces ---- */
  begin(){
    const sp=creating.species, world=creating.world, veh=creating.vehicle;
    // starting skills derive from the species, not a chosen class
    const skills=new Set(["Strike","Focus"]);
    const sig={ strength:"Heavy Strike", agility:"Steady Shot", endurance:"Heavy Strike",
                intellect:"Steady Shot", attunement:"Current Bolt", presence:"Strike" }[sp.sig];
    if(sig) skills.add(sig);
    if(sp.powers.includes("current")){ skills.add("Current Bolt"); skills.add("Current Sense"); skills.add("Mend"); }

    // Trained combat stats are SEEDED from your fixed genetics, then improve with levels.
    // Genetics stay fixed for life; training is the part you can grow.
    const a=sp.attrs;
    const stats={
      might:  Math.max(1,Math.round(a.strength.value/2)),
      agility:Math.max(1,Math.round(a.agility.value/2)),
      force:  Math.max(1,Math.round(a.attunement.value/2)),
      tech:   Math.max(1,Math.round(a.intellect.value/2)),
      charm:  Math.max(1,Math.round(a.presence.value/2)),
    };
    // size feeds vitality: endurance + a bit of height + a bit of mass
    let maxHp=Math.round(a.endurance.value*5 + sp.height.value*0.05 + sp.mass.value*0.06);
    if(sp.powers.includes("hardy")) maxHp=Math.round(maxHp*1.25);
    const maxEnergy=30+Math.round(a.attunement.value*1.5);

    // galaxy-level data persists across lives in the same galaxy (Codex, achievements)
    const sameGalaxy = state && state.galaxyName===creating.galaxy;
    const codex = sameGalaxy ? state.codex : { races:{}, worlds:[], people:[], creatures:{} };
    if(!codex.people) codex.people=[]; if(!codex.creatures) codex.creatures={};
    const achievements = sameGalaxy ? state.achievements : {};

    state={
      v:4, created:Date.now(), updated:Date.now(),
      galaxyName:creating.galaxy, codex, achievements,
      name:creating.name, species:sp, world, vehicles:[veh],
      level:1, xp:0, xpNext:50, stats,
      maxHp, hp:maxHp, maxEnergy, energy:maxEnergy,
      credits:120, skills:[...skills],
      inv:{}, equipped:{weapon:null,armor:null,relic:null}, pets:[],
      // you begin as a YOUNG CHILD and grow toward your potential as time flows
      ageStart:Math.max(2, Math.round(sp.maturity.value*LIFE.startFraction)),
      daysElapsed:0, dead:false, deathCause:null, lastStage:null,
      // planetary structure is unknown until you buy a ship and leave: you are GROUNDED
      grounded:true, system:null, atSlot:0, activeShip:veh.id, bounties:[], crew:[],
      stimReady:false, log:[],
    };
    veh.slot=0;                  // your inherited craft is docked on your homeworld
    state.world.occupied=true;   // your homeworld is inhabited (your own kind live here)
    state.lastStage=Game.stage();
    state.hp=Game.effMaxHp(); state.energy=Game.effMaxEnergy(); // child-scaled to start
    DATA.startKit.forEach(([id,n])=>Game.addItem(id,n));
    // you know your own race and your homeworld from the start — into the Codex
    const selfRace=raceFrom(sp); selfRace.id="self"; selfRace.reported=true;
    state.codex.races["self"]=selfRace;
    const homeW=worldSummary(world); homeW.reported=true;
    state.codex.worlds.push(homeW);
    Game.logMsg(`You are born on ${world.name}, ${article(world.biomeName)} ${world.biomeName}.`,"sys");
    Game.logMsg(`You are ${creating.name}, a young ${sp.name} child — far from your potential, but growing.`,"hit");
    checkObjectives();
    Game.save();
  },

  /* ---- growth: a child realizes only part of their genetic potential ---- */
  // 0.35 as a young child, rising linearly to 1.0 at maturity, then flat.
  maturation(){
    const f=Game.age()/state.species.maturity.value;       // fraction of maturity reached
    if(f>=1) return 1;
    const f0=LIFE.startFraction, base=LIFE.childPotential;
    return clamp(base + (1-base)*((f-f0)/(1-f0)), base, 1);
  },
  stage(){
    if(Game.age()>=Game.twilight()) return "elder";
    const f=Game.age()/state.species.maturity.value;
    for(const s of LIFE_STAGES){ if(f<s.f) return s.name; }
    return "adult";
  },

  /* ---- derived combat stats (genetics × growth × equipment) ---- */
  // Body & training scale with growth; gear adds full value (a child with a blaster
  // is still dangerous), so even a young child is capable — just not near their peak.
  effStat(key){
    let v=Math.round((state.stats[key]||0)*Game.maturation());
    for(const slot of ["weapon","armor","relic"]){ const id=state.equipped[slot];
      if(id && DATA.items[id].mods && DATA.items[id].mods[key]) v+=DATA.items[id].mods[key]; }
    return v;
  },
  effMaxHp(){ let v=state.maxHp*Game.maturation()*Game.frailty(); const a=state.equipped.armor;
    if(a && DATA.items[a].mods && DATA.items[a].mods.hp) v+=DATA.items[a].mods.hp;
    return Math.max(1, Math.round(v)); },
  effMaxEnergy(){ let v=state.maxEnergy*Game.maturation(); const r=state.equipped.relic;
    if(r && DATA.items[r].mods && DATA.items[r].mods.energy) v+=DATA.items[r].mods.energy;
    return Math.max(1, Math.round(v)); },

  /* ---- biology, temperament & heritage accessors ---- */
  bio(key){ return state.species.bio[key].value; },
  temp(){ return TEMPERAMENTS.find(t=>t.id===state.species.temperament); },
  tempEff(key,def){ const e=Game.temp().eff; return e[key]!==undefined?e[key]:def; },
  detail(key){ return state.species.detail[key]; },
  circ(){ return CIRCADIAN.find(c=>c.id===state.species.detail.circadian); },
  circEff(key,def){ const c=Game.circ(); return c[key]!==undefined?c[key]:def; },
  // you do better on worlds whose biome matches your kind's ancestral home
  atHome(){ return state.world && state.species.detail.nativeBiome===state.world.biome; },
  lightFeeder(){ const d=state.species.detail.diet; return d==="photovore"||d==="energivore"; },

  /* ---- time & aging: every action spends days; lifespan caps the campaign ---- */
  age(){ return state.ageStart + state.daysElapsed/365; },
  lifespan(){ return state.species.lifespan.value; },
  twilight(){ return Game.lifespan()*0.85; },
  // vitality fades past the twilight of life; Stalwart temperament resists it
  frailty(){ const a=Game.age(), l=Game.lifespan(), tw=Game.twilight();
    if(a<=tw) return 1;
    const resist=Game.tempEff("frailtyResist",0);
    const drop=clamp((a-tw)/(l-tw),0,1.4)*0.25*(1-resist);
    return clamp(1-drop, 0.6, 1); },

  addItem(id,n=1){ state.inv[id]=(state.inv[id]||0)+n; },
  removeItem(id,n=1){ if(!state.inv[id]) return; state.inv[id]-=n; if(state.inv[id]<=0) delete state.inv[id]; },

  /* ---- economy: prices shaped by the WORLD (wealth) + species power ---- */
  buyPrice(id){ const w=state.world;
    let p=DATA.items[id].value*(1.4-w.wealth*0.05);
    if(Game.hasPower("mercantile")) p*=0.85;
    return Math.max(1,Math.round(p)); },
  sellPrice(id){ let p=DATA.items[id].value*0.55*(1+state.world.wealth*0.02);
    if(Game.hasPower("mercantile")) p*=1.15; return Math.max(1,Math.round(p)); },
  marketStock(){ const w=state.world;
    return Object.keys(DATA.items).filter(id=>{ const it=DATA.items[id];
      if(it.kind==="trade") return false; return it.minTech<=w.tech; }); },

  gainXp(n){ n=Math.round(n*Game.tempEff("xpMult",1)); state.xp+=n; let lv=false;
    while(state.xp>=state.xpNext){ state.xp-=state.xpNext; state.level++; lv=true;
      state.xpNext=Math.round(state.xpNext*1.4+20);
      state.maxHp+=12; state.maxEnergy+=5; state.hp=Game.effMaxHp(); state.energy=Game.effMaxEnergy();
      const keys=["might","agility","force","tech","charm"]; state.stats[keys[state.level%keys.length]]++; }
    if(lv) Game.logMsg(`You reached level ${state.level}!`,"good"); return lv; },

  logMsg(t,c=""){ state.log.push({t,c}); if(state.log.length>60) state.log=state.log.slice(-60); },
};

/* ============================================================ TIME ===== */
/* Every meaningful action spends days. Age creeps up; once you pass your kind's
   natural lifespan, the game (not you) decides when your story ends. */
function advanceTime(days){
  state.daysElapsed += days;
  // natural healing as the days pass — faster for high Recovery, doubled at home
  if(state.hp < Game.effMaxHp()){
    const heal=Math.round(days*0.02*Game.bio("recovery")*(Game.atHome()?2:1));
    if(heal>0) state.hp=Math.min(Game.effMaxHp(), state.hp+heal);
  }
  // growing up: announce when you cross into a new life stage
  const st=Game.stage();
  if(st!==state.lastStage){
    if(st==="adult" && state.lastStage==="young adult")
      Game.logMsg(`You have reached maturity — your body has grown into its full potential.`,"good");
    else if(st!=="elder")
      Game.logMsg(`The years pass; you grow into ${article(st)} ${st}.`,"good");
    else Game.logMsg(`Age settles into your bones — you are an elder now.`,"sys");
    state.lastStage=st;
  }
  const a=Game.age(), l=Game.lifespan();
  if(a>=l){
    const over=a-l, p=clamp(0.04+over*0.05, 0.04, 0.6);
    if(chance(p)){ die("the long sleep of old age"); return true; }
  }
  return false;
}
function die(cause){
  state.dead=true; state.deathCause=cause;
  Game.logMsg(`At ${Math.floor(Game.age())} years, your journey ends — ${cause}.`,"bad");
  Game.save(); UI.render("epilogue");
}

/* ============================================================ COMBAT === */
function startEncounter(){
  if(advanceTime(rnd(20,60))) return;          // exploring takes weeks
  const w=state.world;
  let peace=clamp(0.2+w.peaceMod,0.05,0.4);
  if(chance(peace)) return peacefulEvent(w);
  const cid=pick(w.creatures), tpl=DATA.creatures[cid];
  if(!state.codex.creatures) state.codex.creatures={};
  const seen=state.codex.creatures[cid]||(state.codex.creatures[cid]={name:tpl.name, blurb:tpl.blurb, count:0, where:w.name, reported:false});
  seen.count++;
  const scale=1+(state.level-1)*0.05+(w.danger-1)*0.06;
  combat={ cid, name:tpl.name, blurb:tpl.blurb,
    maxHp:Math.round(tpl.hp*scale), hp:Math.round(tpl.hp*scale),
    atk:Math.round(tpl.atk*scale), xp:Math.round(tpl.xp*scale),
    tame:tpl.tame, over:false, stim:state.stimReady, surprised:false };
  state.stimReady=false;
  // Perception (plus special senses) decides who gets the drop. Keen senses surprise
  // the beast; dull senses (low perception) risk an ambush that strikes before you act.
  const edge=(Game.bio("perception")-10)*0.03 + Game.detail("senses").length*0.03
    + (state.skills.includes("Current Sense")?0.1:0);
  if(chance(clamp(0.25+edge,0.05,0.75))){ combat.surprised=true;
    Game.logMsg(`A wild ${tpl.name} appears! You spot it first and seize the initiative.`,"hit"); }
  else if(chance(clamp(0.18-edge,0.02,0.4))){
    Game.logMsg(`A wild ${tpl.name} ambushes you!`,"bad");
    const d=Math.round((combat.atk+rnd(0,3))*Game.tempEff("dmgTakenMult",1));
    state.hp-=d; Game.logMsg(`${tpl.name} lands a surprise hit for ${d}.`,"bad");
    if(state.hp<=0){ UI.render("combat"); return loseEncounter(); }
  } else {
    Game.logMsg(`A wild ${tpl.name} appears! ${tpl.blurb}`,"hit");
  }
  Game.save(); UI.render("combat");
}
function peacefulEvent(w){
  // keen/curious find more; so do you on your ancestral biome
  const find=(Game.bio("perception")-10)*0.04 + Game.tempEff("find",0) + (Game.atHome()?0.15:0);
  const r=Math.random();
  if(r<0.5){ const c=Math.round(rnd(8,22)*(1+find)); state.credits+=c; Game.logMsg(`You find a cache: +${c} credits.`,"good"); }
  else if(r<0.8){ const id=pick(["scrap","pelt","ration","energy-cell"]); const n=chance(find)?2:1; Game.addItem(id,n);
    Game.logMsg(`You salvage ${n>1?n+"x ":"a "}${DATA.items[id].name}.`,"good"); }
  else { const xp=rnd(4,10); Game.gainXp(xp); Game.logMsg(`You study the ${w.biomeName}. +${xp} XP.`,"good"); }
  Game.save(); UI.render("hub"); UI.flashLog();
}
function playerAttack(name){
  if(!combat||combat.over) return;
  const sk=DATA.skills[name], cost=sk.energy||0;
  if(state.energy<cost){ toast("Not enough energy"); return; }
  state.energy-=cost;
  if(Game.hasPower("current") && name.includes("Current"))
    state.energy=Math.min(Game.effMaxEnergy(),state.energy+Math.round(cost*0.25));
  if(sk.type==="heal"){ const amt=20+Game.effStat("force")*3;
    state.hp=Math.min(Game.effMaxHp(),state.hp+amt); Game.logMsg(`You mend ${amt} HP.`,"good"); }
  else if(sk.type==="buff"){ state.energy=Math.min(Game.effMaxEnergy(),state.energy+12);
    state.hp=Math.min(Game.effMaxHp(),state.hp+5); Game.logMsg(`You focus. +12 energy, +5 HP.`,"sys"); }
  else {
    const acc=(sk.acc||0.85)+Game.effStat("agility")*0.01+Game.tempEff("acc",0);
    if(!chance(acc)){ Game.logMsg(`Your ${name} misses!`,"bad"); }
    else { let dmg=Game.effStat(sk.scale)*sk.mult+rnd(0,4);
      // heavier bodies hit harder in melee (Might-scaled blows)
      if(sk.scale==="might") dmg += (state.species.mass.value-HUMAN.mass)*0.03;
      dmg *= Game.tempEff("dmgDealtMult",1);
      if(combat.stim) dmg*=1.5;
      // Perception + Night Sight + a Volatile streak sharpen critical hits
      const critChance=0.1+Game.effStat("agility")*0.005+(Game.bio("perception")-10)*0.008
        +(Game.hasPower("nightsight")?0.1:0)+Game.tempEff("crit",0)+Game.circEff("crit",0);
      const crit=chance(critChance); if(crit) dmg*=1.6;
      let venom=""; if(Game.hasPower("venom")&&chance(0.25)){ dmg+=4; venom=" (+venom)"; }
      dmg=Math.max(1,Math.round(dmg));
      combat.hp-=dmg; Game.logMsg(`${name} hits ${combat.name} for ${dmg}${crit?" CRIT!":""}${venom}.`,"hit"); }
  }
  if(combat.hp<=0) return combat.person?winDuel():winEncounter();
  if(combat.surprised){ combat.surprised=false; Game.save(); UI.render("combat"); return; } // free hit, no retaliation
  enemyTurn();
}
function enemyTurn(){
  let dmg=combat.atk+rnd(0,3);
  if(Game.hasPower("armored")) dmg-=2;
  // Resilience genetically toughens you against harm; temperament also shifts it
  const resist=clamp(1-(Game.bio("resilience")-10)*0.012, 0.7, 1.2)*Game.tempEff("dmgTakenMult",1);
  dmg=Math.max(1,Math.round(dmg*resist));
  // dodge: agility helps; very heavy bodies dodge a little worse; flight helps a lot
  let dodge=Game.effStat("agility")*0.012-Math.max(0,(state.species.mass.value-HUMAN.mass))*0.0004;
  if(Game.hasPower("flight")) dodge+=0.12;
  if(chance(clamp(dodge,0,0.6))){ Game.logMsg(`You evade the ${combat.name}.`,"good"); }
  else { state.hp-=dmg; Game.logMsg(`${combat.name} strikes you for ${dmg}.`,"bad"); }
  // per-round biology: metabolism, Resolute/Tireless reserves, light-feeding diets
  const en=Math.round((Game.bio("metabolism")-10)*0.2)+Game.tempEff("energyRegen",0)
    +Game.circEff("energyRegen",0)+(Game.lightFeeder()?1:0);
  if(en>0) state.energy=Math.min(Game.effMaxEnergy(),state.energy+en);
  if(Game.hasPower("regen")){ state.hp=Math.min(Game.effMaxHp(),state.hp+Math.round(Game.effMaxHp()*0.04)); }
  if(Game.hasPower("photosynth")) state.energy=Math.min(Game.effMaxEnergy(),state.energy+2);
  if(state.hp<=0) return loseEncounter();
  Game.save(); UI.render("combat");
}
function tryTame(){
  if(!combat||combat.over) return;
  let p=combat.tame*(1.2-combat.hp/combat.maxHp)+Game.effStat("charm")*0.01;
  if(Game.hasPower("telepath")) p+=0.12;
  p+=Game.tempEff("tame",0);
  p=clamp(p,0.03,0.95);
  if(chance(p)){ state.pets.push({cid:combat.cid,name:combat.name,hp:combat.maxHp,atk:combat.atk,level:1,nick:null});
    Game.logMsg(`You bond with the ${combat.name}! It joins your menagerie.`,"good");
    combat.over=true; Game.gainXp(Math.round(combat.xp*0.5)); Game.save(); UI.render("hub"); UI.flashLog(); }
  else { Game.logMsg(`The ${combat.name} resists!`,"bad"); enemyTurn(); }
}
function fleeEncounter(){
  let p=0.5+Game.effStat("agility")*0.015+Game.tempEff("flee",0);
  if(state.skills.includes("Current Sense")) p+=0.1;
  if(Game.hasPower("flight")) p+=0.12; if(Game.hasPower("telepath")) p+=0.06;
  if(chance(p)){ Game.logMsg(`You slip away from the ${combat.name}.`,"sys");
    combat.over=true; Game.save(); UI.render("hub"); UI.flashLog(); }
  else { Game.logMsg(`You fail to escape!`,"bad"); enemyTurn(); }
}
function winEncounter(){
  combat.over=true; const cr=rnd(6,18); state.credits+=cr; Game.gainXp(combat.xp);
  Game.logMsg(`You defeat the ${combat.name}! +${combat.xp} XP, +${cr} credits.`,"good");
  if(chance(0.4)){ const id=pick(["scrap","pelt","ration"]); Game.addItem(id,1);
    Game.logMsg(`Loot: ${DATA.items[id].name}.`,"good"); }
  Game.save(); UI.render("hub"); UI.flashLog();
}
function loseEncounter(){
  combat.over=true; const lost=Math.round(state.credits*0.2); state.credits-=lost;
  state.hp=Math.max(1,Math.round(Game.effMaxHp()*0.3));
  Game.logMsg(`You black out, ${lost} credits lighter.`,"bad");
  // knocked out -> carried back to your home world. Your ship stays where it was docked.
  if(state.system && state.atSlot!==0){
    const stranded=Game.ship();
    state.atSlot=0; state.world=state.system.planets[0].world;
    const here=Game.shipsHere();
    state.activeShip=(here.find(v=>spaceworthy(v))||here[0]||{}).id||null;
    Game.logMsg(`You wake on your homeworld. Your ${stranded?stranded.name:"ship"} is still docked at ${shipLocationName(stranded?stranded.slot:0)}.`,"bad");
    if(!Game.canLeave()) Game.logMsg(`You have no ship here that can fly — you'll need to buy one at the Shipyard.`,"sys");
  }
  Game.save(); UI.render("hub"); UI.flashLog();
}

const UI = {

  render(screen){
    // keep your scroll position when re-rendering the SAME screen (e.g. buying in a loop);
    // only jump to the top when you actually navigate somewhere new.
    const sameScreen = screen===this.current;
    const keepY = sameScreen ? (window.scrollY||window.pageYOffset||0) : 0;
    this.current=screen;
    const noNav = !state||screen==="title"||screen==="create"||screen==="epilogue"||screen==="arrive"||screen==="meet";
    $("#nav").classList.toggle("hidden", noNav);
    const navScreen = screen.indexOf("cx_")===0?"codex":screen;
    [...$("#nav").children].forEach(b=>b.classList.toggle("on",b.dataset.screen===navScreen));
    app.innerHTML=(this["screen_"+screen]||(()=> "<p>?</p>")).call(this);
    this.bind(screen);
    window.scrollTo(0, keepY);

            <span class="small dim">(${v.clsName} &middot; ${RANGE_LABEL[v.range]||"?"})</span></span>
            <span class="small dim">cargo ${used}/${v.hold}</span></div>
          <div class="row" style="margin-top:4px">
            ${active?'<span class="small green">piloting</span>':`<button class="small" data-selship="${v.id}">Pilot this</button>`}
            <button class="small ghost" data-renship="${v.id}">Rename</button>
            ${state.vehicles.length>1&&!active?`<button class="small ghost" data-sellship="${v.id}">Sell &middot; ${shipSell(v)}c</button>`:""}
          </div></div>`; }).join("")}
    </div>
    <div class="card"><h3>Leave the planet</h3>
      ${!canLeave?`<p class="small red">You're grounded — buy a system-capable ship above to reach the other worlds.</p>`
      :!sys?`<button id="takeoff" class="primary full center">&#9650; Take off &amp; chart your system</button>`
      :`<p class="small dim">Set course to a world in your system:</p>
        ${sys.planets.map((p,i)=>{ const here=i===state.atSlot;
          if(p.discovered) return `<div class="krow"><span class="lbl">${p.isHome?"&#9737; ":""}${p.world.name}</span>
            <span class="kv">${here?'<span class="green small">you are here</span>':`<button class="small" data-travel="${i}">&#9992; Travel</button>`}</span></div>`;
          return `<div class="krow"><span class="lbl dim">Unexplored world ${i+1}</span>
            <span class="kv"><button class="small" data-travel="${i}">&#10022; Explore</button></span></div>`; }).join("")}`}
    </div>
    <div class="card"><h3>The Yarder</h3>
      <p class="small dim">The dockmaster who runs this yard — hauling, salvage, lost ships.</p>
      <button id="yarder" class="full center">Talk to the Yarder</button>
    </div>
    <div class="card"><button id="syBack" class="ghost full center">&larr; Back outside</button></div>`;
  },

  /* ---------- MEET A PERSON (on-planet) ---------- */
  screen_meet(){
    const m=meeting; if(!m) return this.screen_hub();
    if(m.step===1) return `
      <div class="card">
        <h2>A stranger</h2>
        <p class="small dim">${m.intro}</p>
        <p class="small">Name this person:</p>
        ${nameField("meetPerson","Name this person","person",m.person.name)}
        <div class="row between" style="margin-top:10px">
          <button class="ghost" id="meetCancel">&larr; Walk away</button>
          <button class="primary" id="meetStep1">Introduce yourself &rarr;</button>
        </div>
      </div>`;
    const person=m.person, known=!m.draw.isNew, race=m.draw.race;
    return `
      <div class="card">
        <h2>${person.name||"A stranger"}</h2>
        ${known?`<p class="small green">You recognize their kind — <b class="violet">${race.name}</b>, already in your Codex.</p>`
          :`<p class="small gold">Their kind is new to your Codex.</p>`}
        <p class="small dim">Career: ${careerName(person.career)}.${person.career==="wanted"?` <span class="red">WANTED — ${commas(person.bounty.alive)}c alive / ${commas(person.bounty.dead)}c dead.</span>`:""}</p>
      </div>
      ${originCard(person)}
      ${speciesSheet(person)}
      <div class="card">
        ${known?`<p class="small dim">They are ${article(race.name)} <b class="violet">${race.name}</b>.</p>`
          :`<p class="small">Name this new race:</p>${nameField("meetRace","Name this race","race",race.name)}`}
        <button class="primary full center" id="meetFinish" style="margin-top:8px">Record &amp; part ways</button>
        ${person.career==="wanted"?`<button class="full center" id="meetAttack" style="margin-top:6px">&#9876; Attack &amp; claim the bounty</button>`:""}
      </div>`;
  },

  /* ---------- CODEX (everything you've discovered) ---------- */
  /* ---------- CODEX (menu of records) ---------- */
  codexBack(){ return `<div class="card"><button class="ghost full center" id="cxBack">&larr; Back to Codex</button></div>`; },
  screen_codex(){
    const cx=state.codex||{};
    const races=Object.values(cx.races||{}), people=cx.people||[],
          wild=Object.values(cx.creatures||{}), worlds=cx.worlds||[];
    const done=OBJECTIVES.filter(o=>state.achievements[o.id]).length;
    return `
    ${this.statHeader()}
    <div class="card"><h2>&#9776; Codex</h2>
      <p class="small dim">Galaxy <b class="gold">${state.galaxyName}</b> — everything you discover, recorded.</p></div>
    <div class="card">
      <button class="full" data-cx="people">&#128483; People you've met <span class="dim">&middot; ${people.length}</span></button>
      <button class="full" data-cx="races">&#9670; Races <span class="dim">&middot; ${races.length}</span></button>
      <button class="full" data-cx="wildlife">&#128062; Wildlife species <span class="dim">&middot; ${wild.length}</span></button>
      <button class="full" data-cx="worlds">&#9737; Planets &amp; systems <span class="dim">&middot; ${worlds.length}</span></button>
      <button class="full" data-goto="garage">&#9992; Ships <span class="dim">&middot; ${(state.vehicles||[]).length}</span></button>
      <button class="full" data-cx="obj">&#9733; Objectives <span class="dim">&middot; ${done}/${OBJECTIVES.length}</span></button>
    </div>`;
  },
  screen_cx_people(){
    const people=state.codex.people||[];
    return `
    ${this.statHeader()}
    <div class="card sheet"><h2>&#128483; People met <span class="dim small">&middot; ${people.length}</span></h2>
      ${people.length?people.slice().reverse().map((p,ri)=>{ const i=people.length-1-ri;
        const cr = p.career==="wanted"&&!p.captured ? '<span class="red">Wanted</span>' : careerName(p.career);
        return `<div class="krow"><span class="lbl"><button class="small ghost" data-person="${i}">${p.name}</button> <span class="dim small">&middot; ${cr}</span></span>
          <span class="kv">${p.raceName} <span class="dim">&middot; ${p.where}</span></span></div>`; }).join("")
        :`<p class="small dim">No one yet — talk to strangers and visit taverns.</p>`}
    </div>
    ${this.codexBack()}`;
  },
  screen_cx_person(){
    const p=(state.codex.people||[])[viewingPerson]; if(!p) return this.screen_cx_people();
    const here = state.atSlot===p.slot;
    const member = p.hired ? (state.crew||[]).find(c=>c.personIdx===viewingPerson) : null;
    const crewShip = member && member.shipId ? (state.vehicles||[]).find(v=>v.id===member.shipId) : null;
    return `
    <div class="card"><h2>${p.name}</h2>
      <p class="small dim">${article(p.raceName)} <b class="violet">${p.raceName}</b> &middot; ${careerName(p.career)} &middot; met at ${p.where}.</p>
      ${p.raceId?`<button class="small ghost" data-race="${p.raceId}" style="margin-top:8px">View ${p.raceName} race &rarr;</button>`:""}
    </div>
    ${p.career==="wanted"&&!p.captured?`<div class="rarity-banner" style="border-color:#ff6b6b">
      <div class="rn" style="color:#ff6b6b">WANTED</div>
      <div class="odds">bounty ${commas(p.bounty.alive)}c alive &middot; ${commas(p.bounty.dead)}c dead</div></div>`:""}
    <div class="card">
      <h3>${p.career==="wanted"?"A wanted fugitive":"Speak with "+p.name.split(" ")[0]}</h3>
      ${p.captured?`<p class="small">Bounty claimed — you ${p.captureAlive?"restrained":"killed"} them.</p>`
       : p.hired?`<p class="small green">In your crew${crewShip?`, piloting the <b>${crewShip.name}</b>`:` — idle, awaiting a ship (assign from your Fleet)`}.</p>`
       : here?`<div class="row">
            <button id="sayHi">Say hi</button>
            ${p.career==="pilot"?`<button id="hire" class="primary">Hire as pilot &middot; 400c</button>`:""}
            ${p.career==="wanted"?`<button id="attack" class="primary">&#9876; Attack</button>`:""}
            ${p.career!=="pilot"&&p.career!=="wanted"?`<span class="small dim">${careerName(p.career)} — no work for them yet.</span>`:""}
          </div>
          ${convo&&convo.idx===viewingPerson?`<p class="small" style="margin-top:8px"><b>${p.name.split(" ")[0]}:</b> "${convo.text}"</p>`:""}`
       : `<p class="small dim">You met them on <b>${p.where}</b>. Travel back there to ${p.career==="wanted"?"hunt":"speak with"} them.</p>`}
    </div>
    ${originCard(p)}
    ${speciesSheet(p)}
    <div class="card"><button class="ghost full center" id="backPeople">&larr; Back to people</button></div>`;
  },
  screen_cx_races(){
    const races=Object.values(state.codex.races||{}).sort((a,b)=>RARITY.index(a.tier)-RARITY.index(b.tier));
    return `
    ${this.statHeader()}
    <div class="card sheet"><h2>&#9670; Races <span class="dim small">&middot; ${races.length}</span></h2>
      ${races.map(r=>`<div class="krow"><span class="lbl"><button class="small ghost" data-race="${r.id}">${r.id==="self"?"&#9670; ":""}${r.name}</button> <span class="dim small">(${r.archeName})</span></span>
        <span class="kv"><span style="color:${RARITY.byId(r.tier).color}">${RARITY.byId(r.tier).name}</span>
          <span class="dim">&middot; ${r.id==="self"?"your kind":(r.met||0)+" met"}</span></span></div>`).join("")}
    </div>
    ${this.codexBack()}`;
  },
  screen_cx_race(){
    const race=(state.codex.races||{})[viewingRace]; if(!race) return this.screen_cx_races();
    const t=RARITY.byId(race.tier);
    return `
    <div class="card"><h2 class="violet">${race.name}</h2>
      <p class="small dim">${cap(race.flavor)}.</p></div>
    ${this.rarityBannerInline(race.tier, `${humanizeCount(race.population)} in the galaxy`)}
    <div class="card sheet"><h3>Overview</h3>
      ${krow("Body-plan", race.archeName)}
      ${krow("Rarity", `<span style="color:${t.color}">${t.name}</span> &middot; ${RARITY.odds(t)}`)}
      ${krow("Population", humanizeCount(race.population))}
      ${krow("Individuals met", race.id==="self"?"your own race":(race.met||0))}
    </div>
    ${raceSheet(race)}
    <div class="card"><button class="ghost full center" id="backRaces">&larr; Back to races</button></div>`;
  },
  screen_cx_wildlife(){
    const wild=Object.values(state.codex.creatures||{});
    return `
    ${this.statHeader()}
    <div class="card sheet"><h2>&#128062; Wildlife <span class="dim small">&middot; ${wild.length}</span></h2>
      ${wild.length?wild.map(c=>`<div class="krow"><span class="lbl">${c.name}</span>
        <span class="kv dim">${c.count} seen &middot; first on ${c.where}</span></div>`).join("")
        :`<p class="small dim">None — wander the wilds to find creatures.</p>`}
    </div>
    ${this.codexBack()}`;
  },
  screen_cx_worlds(){
    const sys=state.system, worlds=state.codex.worlds||[];
    return `
    ${this.statHeader()}
    <div class="card sheet"><h2>&#9737; Planets &amp; systems</h2>
      <h3 style="margin-top:8px">Your home system</h3>
      ${!sys?`<p class="small dim">Unknown. Buy a ship at the Shipyard and take off to chart it.</p>`
      :`<p class="small dim">${sys.size} world${sys.size>1?"s":""} orbit your home star &middot; ${sys.planets.filter(p=>p.discovered).length} charted. <span class="dim">Fly to worlds from the Shipyard.</span></p>
        ${sys.planets.map((p,i)=>{ const here=i===state.atSlot;
          if(p.discovered) return `<div class="krow"><span class="lbl">${p.isHome?"&#9737; ":""}${p.world.name} ${here?'<span class="green small">&#9679; here</span>':''}</span>
               <span class="kv">${cap(p.world.biomeName)}${p.isHome?' <span class="dim">(home)</span>':p.occupied?'':' <span class="dim">(empty)</span>'}</span></div>`;
          return `<div class="krow"><span class="lbl dim">Uncharted world ${i+1}</span>
               <span class="kv dim">&#128274; unexplored</span></div>`; }).join("")}`}
    </div>
    <div class="card sheet"><h3>Worlds logged <span class="dim small">&middot; ${worlds.length}</span></h3>
      ${worlds.map(w=>`<div class="krow"><span class="lbl">${w.name}</span>
        <span class="kv">${cap(w.biomeName)} <span style="color:${RARITY.byId(w.tier).color}">${RARITY.byId(w.tier).name}</span></span></div>`).join("")}
    </div>
    ${this.codexBack()}`;
  },
  screen_cx_obj(){
    const done=OBJECTIVES.filter(o=>state.achievements[o.id]).length;
    return `
    ${this.statHeader()}
    <div class="card sheet"><h2>&#9733; Objectives <span class="dim small">&middot; ${done}/${OBJECTIVES.length}</span></h2>
      ${OBJECTIVES.map(o=>{ const d=!!state.achievements[o.id];
        return `<div class="krow"><span class="lbl">${d?'<span class="green">&#10003;</span>':'<span class="dim">&#9675;</span>'} ${o.label}</span>
          <span class="kv">${d?'<span class="green small">done</span>':''}</span></div>`; }).join("")}
    </div>
    ${this.codexBack()}`;
  },

  /* ---------- ARRIVAL (fly to a world: name it, meet its people, identify their race) ---------- */
  screen_arrive(){
    const a=arriving; if(!a) return this.screen_codex();
    const w=a.world;
    if(a.step===1) return `
      ${this.rarityBanner(w.tier, "a world in your system")}
      <div class="card sheet">
        <h2>${cap(article(w.biomeName))} <span class="blue">${w.biomeName}</span></h2>
        <p class="small dim">${worldDesc(w)}</p>
        ${krow("Population", cap(w.popName))}
        ${krow("Technology", TECH_LABELS[w.tech])}
        ${krow("Wealth", WEALTH_LABELS[w.wealth])}
        ${krow("Danger", `<span class="${w.danger>=7?'red':w.danger>=4?'gold':'green'}">${DANGER_LABELS[w.danger]}</span>`)}
      </div>
      <div class="card">
        <p class="small">Name this world:</p>
        ${nameField("arrWorld","Name this world","world",w.name)}
        <div class="row between" style="margin-top:10px">
          <button class="ghost" id="arrCancel">&larr; Leave orbit</button>
          <button class="primary" id="arrStep1">${a.occupied?"Name &amp; land &rarr;":"Name &amp; log &rarr;"}</button>
        </div>
      </div>`;
    if(a.step===2) return `
      <div class="card">
        <h2>${w.name}</h2>
        <p class="small dim">You set down at ${a.outpost}. A figure approaches — you are introduced.</p>
        <p class="small">Name this person:</p>
        ${nameField("arrPerson","Name this person","person",a.person?a.person.name:"")}
        <div class="row between" style="margin-top:10px">
          <button class="ghost" id="arrBack2">&larr; Back</button>
          <button class="primary" id="arrStep2">Meet them &rarr;</button>
        </div>
      </div>`;
    // step 3 — their stat sheet + race identity
    const person=a.person, known=!a.draw.isNew, race=a.draw.race;
    return `
      <div class="card">
        <h2>${person.name||"A stranger"}</h2>
        ${known?`<p class="small green">You recognize their kind — <b class="violet">${race.name}</b>, already in your Codex.</p>`
          :`<p class="small gold">Their kind is new to your Codex.</p>`}
        <p class="small dim">Career: ${careerName(person.career)}.</p>
      </div>
      ${originCard(person)}
      ${speciesSheet(person)}
      <div class="card">
        ${known?`<p class="small dim">They are ${article(race.name)} <b class="violet">${race.name}</b>.</p>`
          :`<p class="small">Name this new race:</p>${nameField("arrRace","Name this race","race",race.name)}`}
        <div class="row between" style="margin-top:10px">
          <button class="ghost" id="arrBack3">&larr; Back</button>
          <button class="primary" id="arrFinish">Record &amp; continue &rarr;</button>
        </div>
      </div>`;
  },

  /* ---------- COMBAT ---------- */
  screen_combat(){
    if(!combat) return this.screen_hub();
    const c=combat, atk=state.skills.filter(s=>DATA.skills[s].type==="attack");
    // a beaten Wanted target: choose to kill or restrain
    if(c.person && c.claim) return `
    ${this.statHeader()}
    <div class="card">
      <h2 class="gold">${c.name} is beaten</h2>
      <p class="small dim">Their bounty is yours to claim — redeem it at any bar.</p>
      <div class="row">
        <button class="primary" data-claim="alive">Restrain &middot; ${commas(c.bounty.alive)}c</button>
        <button data-claim="dead">Kill &middot; ${commas(c.bounty.dead)}c</button>
      </div>
    </div>
    ${this.logCard()}`;
    return `
    ${this.statHeader()}
    <div class="card">
      <div class="row between"><h2 class="red">${c.name}</h2>
        <span class="small dim">${c.stim?'<span class="gold">stim primed</span>':''}</span></div>
      <p class="small dim">${c.blurb}</p>
      <div class="statline"><span>HP</span><span>${Math.max(0,c.hp)} / ${c.maxHp}</span></div>
      <div class="bar"><i class="hpfill" style="width:${Math.max(0,c.hp/c.maxHp*100)}%"></i></div>
      <span class="pill">atk ${c.atk}</span>
    </div>
    <div class="card">
      <h3>Your move</h3>
      <div class="grid">
        ${atk.map(s=>`<button data-atk="${s}">${s}<br><span class="small dim">${DATA.skills[s].energy||0} en</span></button>`).join("")}
        ${state.skills.includes("Mend")?`<button data-atk="Mend">Mend<br><span class="small dim">6 en</span></button>`:""}
        <button data-atk="Focus" class="ghost">Focus<br><span class="small dim">+energy</span></button>
        ${c.person?"":`<button id="actTame">Tame</button>`}
        <button id="actFlee" class="ghost">Flee</button>
        <button id="actBag">Use item</button>
      </div>
    </div>
    ${this.logCard()}`;
  },

  /* ---------- SELF ---------- */
  screen_char(){
    const sp=state.species, t=RARITY.byId(sp.tier);
    return `
    ${this.statHeader()}
    ${genomeBanner(sp.genome)}
    <div class="card sheet">
      <h3>Identity</h3>
      ${krow("Name", state.name)}
      ${krow("Race", `${sp.name} <span class="dim">(${sp.archeName})</span>`)}
      ${krow("Race rarity", `<span style="color:${t.color}">${t.name}</span> &middot; ${RARITY.odds(t)} &middot; ${humanizeCount(sp.population)} alive`)}
      ${krow("Life stage", `${cap(Game.stage())} <span class="${Game.maturation()<1?'blue':'green'}">${Math.round(Game.maturation()*100)}% grown</span>`)}
      ${krow("Age", `${Math.floor(Game.age())} yr${Game.age()>=Game.twilight()?' <span class="red">(twilight)</span>':''}`)}
    </div>
    ${speciesSheet(sp)}
    <div class="card sheet">
      <h3>Trained combat stats <span class="dim small">&middot; genetics × growth × gear</span></h3>
      ${["might","agility","force","tech","charm"].map(k=>krow(cap(k), Game.effStat(k))).join("")}
    </div>
    <div class="card sheet">
      <h3>Skills</h3>
      ${state.skills.map(s=>krow(s, `<span class="dim">${DATA.skills[s].blurb}</span>`)).join("")}
    </div>
    <div class="card sheet">
      <h3>Equipment</h3>
      ${["weapon","armor","relic"].map(slot=>{ const id=state.equipped[slot];
        return krow(cap(slot), id?DATA.items[id].name:'<span class="dim">— empty —</span>'); }).join("")}
    </div>`;
  },

  /* ---------- BAG ---------- */
  screen_bag(){
    const ids=Object.keys(state.inv), inC=combat&&!combat.over;
    return `
    ${this.statHeader()}
    <div class="card">
      <h2>&#9776; Inventory</h2>
      <p class="small dim">Credits: <b class="gold">${state.credits}</b></p>
      ${ids.length===0?`<p class="dim">Your pack is empty.</p>`:""}
      ${ids.map(id=>{ const it=DATA.items[id], n=state.inv[id], eq=Object.values(state.equipped).includes(id);
        let btn=""; if(it.kind==="consumable") btn=`<button data-use="${id}">Use</button>`;
        else if(["weapon","armor","relic"].includes(it.kind)) btn=`<button data-equip="${id}">${eq?"Unequip":"Equip"}</button>`;
        return `<div class="card" style="margin:8px 0;padding:10px">
          <div class="row between"><b>${it.name} ${n>1?`<span class="dim">x${n}</span>`:""}</b><span class="tag">${it.kind}</span></div>
          <p class="small dim" style="margin:4px 0">${it.blurb}</p>
          <div class="row">${btn}<button class="ghost small" data-sell="${id}">Sell &middot; ${Game.sellPrice(id)}c</button></div>
        </div>`; }).join("")}
    </div>
    ${inC?`<div class="card"><button id="backCombat" class="primary full center">&larr; Back to fight</button></div>`:""}`;
  },

  /* ---------- GARAGE (vehicles + the power metrics) ---------- */
  screen_garage(){
    const ships=state.vehicles||[];
    return `
    ${this.statHeader()}
    <div class="card"><h2>&#9992; Your fleet <span class="dim small">&middot; ${ships.length}</span></h2>
      <p class="small dim">Each ship has its own cargo hold and stays docked where you left it.
      You can only switch to a ship at the world you're currently on.</p></div>
    ${ships.map(v=>{ const active=v.id===state.activeShip, here=v.slot===state.atSlot,
        used=Object.values(v.cargo||{}).reduce((a,n)=>a+n,0), pil=Game.pilotOf(v);
      return `<div class="card">
        <div class="row between"><h2 class="gold">${active?'&#9654; ':''}${v.name}</h2>
          <span class="tag" style="color:${RARITY.byId(v.tier).color}">${RARITY.byId(v.tier).name}</span></div>
        <p class="small dim">${v.clsName} &middot; ${RANGE_LABEL[v.range]||"?"}</p>
        ${krow("Crew", `${pil||active?1:0}/${v.crewMax||1}${v.bays?` &middot; ${v.bays} ship bay${v.bays>1?"s":""}`:""}`)}
        ${krow("Docked at", `<b class="blue">${shipLocationName(v.slot)}</b>${here?' <span class="green small">(here)</span>':''}`)}
        ${krow("Pilot", active?'<span class="green">you</span>':pil?`${pil.name} <span class="dim small">(hired)</span>`:'<span class="dim">none (won&#39;t follow)</span>')}
        ${krow("Cargo", `${used}/${v.hold}${used?` &middot; ${Object.entries(v.cargo).map(([id,n])=>n+"× "+COMMODITIES.find(c=>c.id===id).name).join(", ")}`:""}`)}
        ${v.axes.map(a=>krow(UNITS.power[a].label, UNITS.fmtPower(v.power[a]))).join("")}
