  /* ---------- TRAVEL / MOVE (a ship or a whole fleet) ---------- */
  screen_travel(){
    const ctx=travelCtx; if(!ctx) return this.screen_crew();
    const ids=ctx.ids, caps=groupCaps(ids), origin=caps.sysId;
    if(origin<0 && ids.includes(state.activeShip)) return this.screen_void();   // your group is adrift
    const osys=state.galaxy.systems[origin];
    const playerIn=ids.includes(state.activeShip);
    const blockers=groupBlockers(ids), g=state.galaxy;
    const planets = osys.planets||[];
    const inSys = caps.tier!=="surface";
    const jumpable = caps.tier==="interstellar";
    const others = g.systems.filter(x=>x.id!==origin).map(x=>({ sys:x, d:sysDist(origin,x.id) })).sort((a,b)=>a.d-b.d);
    const beyond = others.filter(o=>o.d>caps.jump+1e-6);
    return `
    ${this.statHeader()}
    <div class="card"><h2>&#9992; ${ctx.title||"Move"}</h2>
      <p class="small dim">In <b class="blue">${osys.name}</b> &middot; ${RANGE_LABEL[caps.tier]} group${jumpable?` &middot; hyperdrive reach <b class="gold">${caps.jump.toFixed(1)} ly</b> (set by the weakest ship)`:""}.
      ${playerIn?" You're aboard — you travel with it.":" You're not aboard; it can only go to charted worlds."}</p>
      ${blockers.length?`<p class="small red">Grounded: ${blockers.map(b=>b.name).join(", ")} ${blockers.length>1?"need":"needs"} more crew to fly.</p>`:""}
      ${caps.tier==="surface"?`<p class="small red">No ship in this group can leave the ground.</p>`:""}
    </div>
    ${inSys?`<div class="card sheet"><h3>Within ${osys.name}</h3>
      ${planets.map((p,i)=>{ const hereSlot=i===groupSlot(ids);
        if(p&&p.discovered) return `<div class="krow"><span class="lbl">${p.isHome?"&#9737; ":""}${p.world.name}</span>
          <span class="kv">${hereSlot?'<span class="green small">fleet is here</span>':`<button class="small" data-go="${origin}:${i}">&#9992; Travel</button>`}</span></div>`;
        return `<div class="krow"><span class="lbl dim">Uncharted world ${i+1}</span>
          <span class="kv">${playerIn?`<button class="small" data-go="${origin}:${i}">&#10022; Explore</button>`:'<span class="dim small">&#128274; need to be aboard</span>'}</span></div>`; }).join("")}
    </div>`:""}
    ${jumpable?`<div class="card"><h3>&#10024; Star Map</h3>${this.mapSvg({cx:osys.x, cy:osys.y, span:Math.max(caps.jump*2.6, 26)}, {originId:origin, reach:caps.jump})}</div>
    <div class="card sheet"><h3>Jump to another system <span class="dim small">&middot; nearest first</span></h3>
      ${others.map(o=>{ const inRange=o.d<=caps.jump+1e-6, ch=o.sys.discovered, canGo=inRange&&(ch||playerIn);
        return `<div class="krow"><span class="lbl">${ch?o.sys.name:'<span class="dim">Uncharted star</span>'}
            <span class="dim small">&middot; ${o.d.toFixed(1)} ly${ch?` &middot; ${o.sys.size} world${o.sys.size>1?"s":""}`:""}</span></span>
          <span class="kv">${canGo?`<button class="small" data-jumpsys="${o.sys.id}">&#9650; Jump</button>`
            :`<span class="dim small">${!inRange?"out of range":"need to be aboard"}</span>`}</span></div>`; }).join("")}
    </div>`:`<div class="card"><p class="small dim">This group can only travel within its own system. A fleet can jump between stars only if every ship aboard is interstellar-class.</p></div>`}
    ${jumpable&&playerIn&&beyond.length?`<div class="card sheet"><h3>&#127756; Hyperdrive into open space</h3>
      <p class="small dim">Out of reach by a single jump? Burn into the void in a direction and drift between the stars — keep going to bring distant systems into range (you may cross paths with other ships).</p>
      ${beyond.slice(0,6).map(o=>`<div class="krow"><span class="lbl">${o.sys.discovered?o.sys.name:'<span class="dim">distant star</span>'} <span class="dim small">&middot; ${o.d.toFixed(1)} ly ${compassBearing(o.sys.x-osys.x, o.sys.y-osys.y)}</span></span></div>`).join("")}
    </div>${this.voidCompass(caps.jump)}`:""}
    <div class="card"><button id="tvBack" class="ghost full center">&larr; Back</button></div>`;
  },
  /* ---------- DEEP SPACE (adrift between the stars) ---------- */
  screen_void(){
    const pos=state.voidPos, core=Math.round(Math.hypot(pos.x,pos.y));
    const ids=playerGroupIds(), caps=groupCaps(ids), reach=caps.jump;
    const near=state.galaxy.systems.map(s=>({s,d:pointDist(pos,{x:s.x,y:s.y})})).sort((a,b)=>a.d-b.d).slice(0,9);
    return `
    ${this.statHeader()}
    <div class="card"><h2>&#127756; Deep Space</h2>
      <p class="small dim">Adrift between the stars at <b>(${Math.round(pos.x)}, ${Math.round(pos.y)})</b>, ${core} ly from the core.
      Your hyperdrive reaches <b class="gold">${reach.toFixed(1)} ly</b> per jump.</p>
      ${this.mapSvg({cx:pos.x, cy:pos.y, span:Math.max(reach*2.6, 26)}, {originXY:pos, reach})}
    </div>
    ${this.voidCompass(reach)}
    <div class="card sheet"><h3>Nearby stars</h3>
      ${near.map(({s,d})=>{ const inRange=d<=reach+1e-6, bearing=compassBearing(s.x-pos.x, s.y-pos.y);
        return `<div class="krow"><span class="lbl">${s.discovered?s.name:'<span class="dim">unknown star</span>'} <span class="dim small">&middot; ${d.toFixed(1)} ly ${s.id===state.sysId?"":bearing}</span></span>
          <span class="kv">${inRange?`<button class="small" data-jumpsys="${s.id}">&#9650; Jump in</button>`:'<span class="dim small">out of range</span>'}</span></div>`; }).join("")}
    </div>`;
  },

    return `<div class="card center"><h3>Hyperdrive heading</h3>

        <button class="cn" data-voiddir="n">&#9650;<br>N</button>
        <button class="cw" data-voiddir="w">&#9664; W</button>
        <button class="ce" data-voiddir="e">E &#9654;</button>
        <button class="cs" data-voiddir="s">S<br>&#9660;</button>

  },

  /* ---------- GALAXY MAP (zoomable, fog-of-war) ---------- */
  screen_map(){
    if(!state.galaxy) return `${this.statHeader()}
      <div class="card center"><h2>&#128506; Galaxy Map</h2>
        <p class="small dim">The galaxy is uncharted until you take off. Buy a ship and leave your homeworld (Crew &rarr; Ships) to map the stars.</p></div>`;

      ${this.mapSvg(undefined, adrift()?{originXY:pos}:{})}
      <div class="row" style="margin-top:8px;justify-content:center;gap:6px">

      </div>

        <button class="small ghost" id="mapU">&#9650;</button>
        <button class="small ghost" id="mapD">&#9660;</button>
        <button class="small ghost" id="mapL">&#9664;</button>
        <button class="small ghost" id="mapR">&#9654;</button>
      </div>
    </div>`;
  },
  /* build the SVG for the current mapView window */
  /* view defaults to the Map-tab viewport. opts.originId marks the "you/fleet" star; opts.reach
     (ly) draws a hyperdrive-range ring around it so you can see what's in jump distance. */
  mapSvg(view, opts){
    view = view || mapView; opts = opts || {};
    const originId = opts.originId!=null ? opts.originId : state.sysId, reach = opts.reach||0;
    const SIZE=300, v=view, half=v.span/2;
    const L=v.cx-half, T=v.cy+half;                 // top-left in ly (+y is up)
    const sx=x=>(x-L)/v.span*SIZE, sy=y=>(T-y)/v.span*SIZE;
    const inView=(px,py,m)=>px>=-m&&px<=SIZE+m&&py>=-m&&py<=SIZE+m;
    let els="";
    // galaxy rim + core (centred on 0,0)
    const cR=GALAXY.radius/v.span*SIZE, cx0=sx(0), cy0=sy(0);
    els+=`<circle cx="${cx0.toFixed(1)}" cy="${cy0.toFixed(1)}" r="${cR.toFixed(1)}" fill="none" stroke="#26314a" stroke-dasharray="3 4"/>`;
    if(inView(cx0,cy0,40)) els+=`<text x="${cx0.toFixed(1)}" y="${(cy0+4).toFixed(1)}" fill="#caa84a" font-size="13" text-anchor="middle">&#9737;</text>
      <text x="${cx0.toFixed(1)}" y="${(cy0-9).toFixed(1)}" fill="#7d8aa5" font-size="7" text-anchor="middle">CORE</text>`;
    // hyperdrive-range ring around the fleet's star (or its drift point in deep space)
    const oxy = opts.originXY || (state.galaxy.systems[originId] ? {x:state.galaxy.systems[originId].x, y:state.galaxy.systems[originId].y} : null);
    if(reach>0 && oxy){ const ox=sx(oxy.x), oy=sy(oxy.y), rr=reach/v.span*SIZE;
      els+=`<circle cx="${ox.toFixed(1)}" cy="${oy.toFixed(1)}" r="${rr.toFixed(1)}" fill="#1f6f4322" stroke="#3f9c6a" stroke-dasharray="2 3"/>`; }
    // a drift marker when you're between the stars (no system to mark)
    if(opts.originXY){ const ox=sx(opts.originXY.x), oy=sy(opts.originXY.y);
      els+=`<circle cx="${ox.toFixed(1)}" cy="${oy.toFixed(1)}" r="3" fill="#e0b24a"/>`; }
    // systems (only those you can see), labels only when zoomed in enough
    const showLabels=v.span<=46;
    visibleSystems().forEach(s=>{ const px=sx(s.x), py=sy(s.y); if(!inView(px,py,8)) return;
      const here=s.id===originId;
      if(here){ els+=`<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="5.5" fill="none" stroke="#5aa9ff" stroke-width="1.5"/>
        <circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="2" fill="#5aa9ff"/>`; }
      else if(s.discovered){ els+=`<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="2.6" fill="#cfe0ff"/>`; }
      else { els+=`<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="2.2" fill="none" stroke="#5b6b8a" stroke-width="1"/>`; }
      if(showLabels && (s.discovered||here)) els+=`<text x="${px.toFixed(1)}" y="${(py-5).toFixed(1)}" fill="${here?'#5aa9ff':'#9fb0cc'}" font-size="7" text-anchor="middle">${here?(originId===state.sysId?"You":"Fleet"):s.name}</text>`;
    });
    return `<svg viewBox="0 0 ${SIZE} ${SIZE}" class="gmap" preserveAspectRatio="xMidYMid meet">${els}</svg>
      <p class="small dim center" style="margin-top:4px">&#9678; ${originId===state.sysId?"you":"fleet"} &middot; &#9737; core &middot; &#9679; charted &middot; &#8728; contact${reach>0?' &middot; ring = jump range':''}</p>`;
  },
  mapCenterMe(){ const p=playerXY(); mapView={ cx:p.x, cy:p.y, span:36 }; },

  /* ---------- MEET A PERSON (on-planet) ---------- */
  screen_meet(){
    const m=meeting; if(!m) return this.screen_hub();
    if(m.step===1) return `
      <div class="card">
        <h2>A stranger</h2>
        <p class="small dim">${m.intro}</p>
        <p class="small">Name this person:</p>
        ${nameField("meetPerson","Name this person","person",m.person.name)}
        <div class="row between" style="margin-top:10px">
          <button class="ghost" id="meetCancel">&larr; Walk away</button>
          <button class="primary" id="meetStep1">Introduce yourself &rarr;</button>
        </div>
      </div>`;
    const person=m.person, known=!m.draw.isNew, race=m.draw.race;
    return `
      <div class="card">
        <h2>${person.name||"A stranger"}</h2>
        ${known?`<p class="small green">You recognize their kind — <b class="violet">${race.name}</b>, already in your Codex.</p>`
          :`<p class="small gold">Their kind is new to your Codex.</p>`}
        <p class="small dim">Career: ${careerName(person.career)} &middot; worth <span class="gold">${commas(person.credits||0)}c</span>.${isHostile(person)?` <span class="red">${THREAT_LABEL[person.hostile]} — ${commas(person.bounty.alive)}c alive / ${commas(person.bounty.dead)}c dead.</span>`:""}</p>
        ${person.force&&forceDesc(person.force)?`<p class="small ${isHostile(person)?'red':'blue'}">Commands ${forceDesc(person.force)}${m.fleet?` under <b class="violet">${m.fleet.faction}</b> colors`:""}.</p>`:""}
      </div>
      ${originCard(person)}
      ${speciesSheet(person)}
      <div class="card">
        ${known?`<p class="small dim">They are ${article(race.name)} <b class="violet">${race.name}</b>.</p>`
          :`<p class="small">Name this new race:</p>${nameField("meetRace","Name this race","race",race.name)}`}
        <button class="primary full center" id="meetFinish" style="margin-top:8px">Record &amp; part ways</button>
        ${isHostile(person)?`<button class="full center" id="meetAttack" style="margin-top:6px">&#9876; Attack &amp; claim the bounty</button>`:""}
      </div>`;
  },

  /* ---------- CODEX (everything you've discovered) ---------- */
  /* ---------- CODEX (menu of records) ---------- */
  codexBack(){ return `<div class="card"><button class="ghost full center" id="cxBack">&larr; Back to Codex</button></div>`; },
  screen_codex(){
    const cx=state.codex||{};
    const races=Object.values(cx.races||{}), people=cx.people||[],
          wild=Object.values(cx.creatures||{}), worlds=cx.worlds||[];
    const done=OBJECTIVES.filter(o=>state.achievements[o.id]).length;
    return `
    ${this.statHeader()}
    <div class="card"><h2>&#9776; Codex</h2>
      <p class="small dim">Galaxy <b class="gold">${state.galaxyName}</b> — everything you discover, recorded.</p></div>
    <div class="card">
      <button class="full" data-cx="people">&#128483; People you've met <span class="dim">&middot; ${people.length}</span></button>
      <button class="full" data-cx="races">&#9670; Races <span class="dim">&middot; ${races.length}</span></button>
      <button class="full" data-cx="wildlife">&#128062; Wildlife species <span class="dim">&middot; ${wild.length}</span></button>
      <button class="full" data-cx="worlds">&#9737; Planets &amp; systems <span class="dim">&middot; ${worlds.length}</span></button>
      <button class="full" data-cx="obj">&#9733; Objectives <span class="dim">&middot; ${done}/${OBJECTIVES.length}</span></button>
    </div>`;
  },
  screen_cx_people(){
    const people=state.codex.people||[];
    return `
    ${this.statHeader()}
    <div class="card sheet"><h2>&#128483; People met <span class="dim small">&middot; ${people.length}</span></h2>
      ${people.length?people.slice().reverse().map((p,ri)=>{ const i=people.length-1-ri;
        const cr = isHostile(p)&&!p.captured ? `<span class="red">${careerName(p.career)}</span>` : careerName(p.career);
        return `<div class="krow"><span class="lbl"><button class="small ghost" data-person="${i}">${p.name}</button> <span class="dim small">&middot; ${cr}</span></span>
          <span class="kv">${p.raceName} <span class="dim">&middot; ${p.where}</span></span></div>`; }).join("")
        :`<p class="small dim">No one yet — talk to strangers and visit taverns.</p>`}
    </div>
    ${this.codexBack()}`;
  },
  screen_cx_person(){
    const p=(state.codex.people||[])[viewingPerson]; if(!p) return this.screen_cx_people();
    const here = state.atSlot===p.slot;
    const member = p.hired ? (state.crew||[]).find(c=>c.personIdx===viewingPerson) : null;
    const crewShip = member && member.shipId ? (state.vehicles||[]).find(v=>v.id===member.shipId) : null;
    return `
    <div class="card"><h2>${p.name}</h2>
      <p class="small dim">${article(p.raceName)} <b class="violet">${p.raceName}</b> &middot; ${careerName(p.career)} &middot; met at ${p.where}.</p>
      <p class="small">Holdings: <b class="gold">${commas(p.credits||0)}c</b>${p.force&&forceDesc(p.force)?` <span class="dim">&middot; commands ${forceDesc(p.force)}</span>`:""}</p>
      ${p.raceId?`<button class="small ghost" data-race="${p.raceId}" style="margin-top:8px">View ${p.raceName} race &rarr;</button>`:""}
    </div>
    ${isHostile(p)&&!p.captured?`<div class="rarity-banner" style="border-color:#ff6b6b">
      <div class="rn" style="color:#ff6b6b">${THREAT_LABEL[p.hostile]||"WANTED"}</div>
      <div class="odds">bounty ${commas(p.bounty.alive)}c alive &middot; ${commas(p.bounty.dead)}c dead</div></div>`:""}
    <div class="card">
      <h3>${isHostile(p)?`A wanted ${careerName(p.career).toLowerCase()}`:"Speak with "+p.name.split(" ")[0]}</h3>
      ${p.captured?`<p class="small">Bounty claimed — you ${p.captureAlive?"restrained":"killed"} them.</p>`
       : p.hired?`<p class="small green">In your crew${crewShip?`, piloting the <b>${crewShip.name}</b>`:` — idle, awaiting a ship (assign from your Fleet)`}.</p>`
       : here?`<div class="row">
            <button id="sayHi">Say hi</button>
            ${HIRE_ROLES[p.career]?`<button id="hire" class="primary">Hire as ${careerName(p.career)} &middot; ${HIRE_ROLES[p.career].fee}c</button>`:""}
            ${isHostile(p)?`<button id="attack" class="primary">&#9876; Attack</button>`:""}
            ${p.career==="shipwright"?`<button id="buyOldShip" class="primary">Buy their old ship &middot; ${commas(YARDER_SHIP.price)}c</button>`:""}
            ${!HIRE_ROLES[p.career]&&!isHostile(p)&&p.career!=="shipwright"?`<span class="small dim">${careerName(p.career)} — can't hire as crew.</span>`:""}
          </div>
          ${isHostile(p)&&p.hostile>=3?`<p class="small red" style="margin-top:6px">A figure this powerful is guarded — taking them on alone is desperate work. (Fleet vs. fleet combat is coming.)</p>`:""}
          ${HIRE_ROLES[p.career]?`<p class="small dim" style="margin-top:6px">${cap(careerName(p.career))}: ${HIRE_ROLES[p.career].role}.</p>`:""}
          ${p.career==="shipwright"?`<p class="small dim" style="margin-top:6px">${YARDER_SHIP.name}: in-system only, cargo ${YARDER_SHIP.cargo}, room for you alone — but it'll get you off-world.</p>`:""}
          ${convo&&convo.idx===viewingPerson?`<p class="small" style="margin-top:8px"><b>${p.name.split(" ")[0]}:</b> "${convo.text}"</p>`:""}`
       : `<p class="small dim">You met them on <b>${p.where}</b>. Travel back there to ${isHostile(p)?"hunt":"speak with"} them.</p>`}
    </div>
    ${originCard(p)}
    ${speciesSheet(p)}
    <div class="card"><button class="ghost full center" id="backPeople">&larr; Back to people</button></div>`;
  },
  screen_cx_races(){
    const races=Object.values(state.codex.races||{}).sort((a,b)=>RARITY.index(a.tier)-RARITY.index(b.tier));
    return `
    ${this.statHeader()}
    <div class="card sheet"><h2>&#9670; Races <span class="dim small">&middot; ${races.length}</span></h2>
      ${races.map(r=>`<div class="krow"><span class="lbl"><button class="small ghost" data-race="${r.id}">${r.id==="self"?"&#9670; ":""}${r.name}</button> <span class="dim small">(${r.archeName})</span></span>
        <span class="kv"><span style="color:${RARITY.byId(r.tier).color}">${RARITY.byId(r.tier).name}</span>
          <span class="dim">&middot; ${r.id==="self"?"your kind":(r.met||0)+" met"}</span></span></div>`).join("")}
    </div>
    ${this.codexBack()}`;
  },
  screen_cx_race(){
    const race=(state.codex.races||{})[viewingRace]; if(!race) return this.screen_cx_races();
    const t=RARITY.byId(race.tier);
    return `
    <div class="card"><h2 class="violet">${race.name}</h2>
      <p class="small dim">${cap(race.flavor)}.</p></div>
    ${this.rarityBannerInline(race.tier, `${humanizeCount(race.population)} in the galaxy`)}
    <div class="card sheet"><h3>Overview</h3>
      ${krow("Body-plan", race.archeName)}
      ${krow("Rarity", `<span style="color:${t.color}">${t.name}</span> &middot; ${RARITY.odds(t)}`)}
      ${krow("Population", humanizeCount(race.population))}
      ${krow("Individuals met", race.id==="self"?"your own race":(race.met||0))}
    </div>
    ${raceSheet(race)}
    <div class="card"><button class="ghost full center" id="backRaces">&larr; Back to races</button></div>`;
  },
  screen_cx_wildlife(){
    const wild=Object.values(state.codex.creatures||{});
    return `
    ${this.statHeader()}
    <div class="card sheet"><h2>&#128062; Wildlife <span class="dim small">&middot; ${wild.length}</span></h2>
      ${wild.length?wild.map(c=>`<div class="krow"><span class="lbl">${c.name}</span>
        <span class="kv dim">${c.count} seen &middot; first on ${c.where}</span></div>`).join("")
        :`<p class="small dim">None — wander the wilds to find creatures.</p>`}
    </div>
    ${this.codexBack()}`;
  },
  screen_cx_hires(){
    const crew=state.crew||[];
    return `
    ${this.statHeader()}
    <div class="card sheet"><h2>&#128101; Hires <span class="dim small">&middot; ${crew.length}</span></h2>
      ${crew.length?crew.map((c,ci)=>{ const sh=c.shipId?(state.vehicles||[]).find(v=>v.id===c.shipId):null;
        return `<div class="krow"><span class="lbl">${c.personIdx>=0?`<button class="small ghost" data-person="${c.personIdx}">${c.name}</button>`:c.name} <span class="dim small">&middot; Pilot</span></span>
          <span class="kv">${sh?`<span class="green">piloting ${sh.name}</span> <button class="small ghost" data-unassign="${ci}">Unassign</button>`:'<span class="dim">idle</span>'} <button class="small ghost" data-dismiss="${ci}">Dismiss</button></span></div>`; }).join("")
        :`<p class="small dim">No hires yet. Meet a Pilot out in the galaxy and hire them from their Codex page.</p>`}
      <p class="small dim" style="margin-top:8px">Assign idle hires to ships in the <b>Ships</b> tab (you must be docked with the ship).</p>
    </div>
    ${this.codexBack()}`;
  },
  screen_cx_worlds(){
    const g=state.galaxy, sys=curSys(), worlds=state.codex.worlds||[], pos=playerXY();
    // known systems (the one you're in + any you've charted), nearest first — distance from
    // your current system OR your deep-space drift point
    const known = g ? g.systems.filter(s=>s.discovered).map(s=>({ s, d:s.id===state.sysId?0:pointDist(pos,{x:s.x,y:s.y}) }))
      .sort((a,b)=>a.d-b.d) : [];
    return `
    ${this.statHeader()}
    <div class="card sheet"><h2>&#9737; Planets &amp; systems</h2>
      ${sys?`<h3 style="margin-top:8px">${sys.name} <span class="dim small">&middot; current system</span></h3>
        <p class="small dim">${sys.size} world${sys.size>1?"s":""} &middot; ${sys.planets.filter(p=>p.discovered).length} charted. <span class="dim">Tap a charted world to study it.</span></p>
        ${sys.planets.map((p,i)=>{ const here=i===state.atSlot;
          if(p.discovered) return `<div class="krow"><span class="lbl">${p.isHome?"&#9737; ":""}<button class="small ghost" data-world="${sys.id}:${i}">${p.world.name}</button> ${here?'<span class="green small">&#9679; here</span>':''}</span>
               <span class="kv">${isInhabited(p.world)?`<span class="gold">${settleDef(p.world.settle).name}</span>`:cap(p.world.biomeName)}${p.isHome?' <span class="dim">(home)</span>':!isInhabited(p.world)?' <span class="dim">(empty)</span>':''}</span></div>`;
          return `<div class="krow"><span class="lbl dim">Uncharted world ${i+1}</span>
               <span class="kv dim">&#128274; unexplored</span></div>`; }).join("")}`
      : adrift()?`<h3 style="margin-top:8px">&#127756; Deep space</h3>
        <p class="small dim">Adrift between the stars at <b>(${Math.round(pos.x)}, ${Math.round(pos.y)})</b>, ${Math.round(Math.hypot(pos.x,pos.y))} ly from the core. Navigate from the <b>World</b> tab.</p>`
      : `<p class="small dim">Unknown. Buy a ship at the Shipyard and take off to chart your home system — then the wider galaxy opens up.</p>`}
    </div>
    ${g&&g.systems.length>1?`<div class="card sheet"><h3>Known systems <span class="dim small">&middot; ${known.length} charted / ${g.systems.length} in range of sensors</span></h3>
      ${known.map(({s,d})=>{ const cur=!adrift()&&s.id===state.sysId;
        return `<div class="krow"><span class="lbl">${cur?'&#9737; ':''}${s.name}${cur?' <span class="green small">&#9679; here</span>':''}</span>
        <span class="kv">${cur?'<span class="dim">current</span>':`${d.toFixed(1)} ly`} <span class="dim small">&middot; ${(s.planets||[]).filter(p=>p.discovered).length}/${s.size} charted</span></span></div>`; }).join("")}
      <p class="small dim" style="margin-top:6px">Open <b>Travel</b> from the Crew tab to fly or jump between systems.</p>
    </div>`:""}
    <div class="card sheet"><h3>Worlds logged <span class="dim small">&middot; ${worlds.length}</span></h3>
      ${worlds.length?worlds.map((w,wi)=>`<div class="krow"><span class="lbl"><button class="small ghost" data-worldlog="${wi}">${w.name}</button>${w.sysName?` <span class="dim small">&middot; ${w.sysName}</span>`:""}</span>
        <span class="kv">${cap(w.biomeName)} <span style="color:${RARITY.byId(w.tier).color}">${RARITY.byId(w.tier).name}</span></span></div>`).join("")
        :`<p class="small dim">None logged yet.</p>`}
    </div>
    ${this.codexBack()}`;
  },
  screen_cx_world(){
    const w=viewingWorld; if(!w) return this.screen_cx_worlds();
    const t=RARITY.byId(w.tier);
    return `
    <div class="card"><h2 class="blue">${w.name}</h2>
      <p class="small dim">${cap(w.biomeName)}${w.sysName?` &middot; ${w.sysName} system`:""}</p></div>
    ${this.rarityBannerInline(w.tier, `${cap(w.biomeName)} world`)}
    <div class="card sheet"><h3>Survey</h3>
      ${krow("Biome", cap(w.biomeName))}
      ${krow("Settlement", isInhabited(w)?settleDef(w.settle).name:'<span class="dim">Uninhabited</span>')}
      ${krow("Rarity", `<span style="color:${t.color}">${t.name}</span> &middot; ${RARITY.odds(t)}`)}
      ${w.tech!=null?krow("Tech level", TECH_LABELS[w.tech]):""}
      ${w.wealth!=null?krow("Wealth", WEALTH_LABELS[w.wealth]):""}
      ${w.danger!=null?krow("Danger", `${w.danger}/9`):""}
      ${w.popName?krow("Population", w.popName):""}
    </div>
    ${isInhabited(w)?`<div class="card"><p class="small dim">${settleDef(w.settle).desc}.</p></div>`:""}
    <div class="card"><button class="ghost full center" id="backWorlds">&larr; Back to planets &amp; systems</button></div>`;
  },
  screen_cx_obj(){
    const doneList=OBJECTIVES.filter(o=>state.achievements[o.id]), done=doneList.length;
    const earned=doneList.reduce((s,o)=>s+objReward(o),0);
    return `
    ${this.statHeader()}
    <div class="card sheet"><h2>&#9733; Objectives <span class="dim small">&middot; ${done}/${OBJECTIVES.length}</span></h2>
      <p class="small dim">Each milestone pays a credit bounty when you reach it. Earned so far: <b class="gold">${commas(earned)}c</b>.</p>
      ${OBJECTIVES.map(o=>{ const d=!!state.achievements[o.id];
        return `<div class="krow"><span class="lbl">${d?'<span class="green">&#10003;</span>':'<span class="dim">&#9675;</span>'} ${o.label}</span>
          <span class="kv">${d?'<span class="green small">+'+commas(objReward(o))+'c claimed</span>':'<span class="gold small">+'+commas(objReward(o))+'c</span>'}</span></div>`; }).join("")}
    </div>
    ${this.codexBack()}`;
  },

  /* ---------- ARRIVAL (fly to a world: name it, meet its people, identify their race) ---------- */
  screen_arrive(){
    const a=arriving; if(!a) return this.screen_codex();
    const w=a.world;
    if(a.step===1) return `
      ${this.rarityBanner(w.tier, a.crossSys?`a world in the ${state.galaxy.systems[a.sysId].name} system`:"a world in your system")}
      <div class="card sheet">
        <h2>${cap(article(w.biomeName))} <span class="blue">${w.biomeName}</span></h2>
        <p class="small dim">${worldDesc(w)}</p>
        ${krow("Settlement", isInhabited(w)?`<b class="gold">${settleDef(w.settle).name}</b>`:'<span class="dim">Uninhabited</span>')}
        ${krow("Population", cap(w.popName))}
        ${krow("Technology", TECH_LABELS[w.tech])}
        ${krow("Wealth", WEALTH_LABELS[w.wealth])}
        ${krow("Danger", `<span class="${w.danger>=7?'red':w.danger>=4?'gold':'green'}">${DANGER_LABELS[w.danger]}</span>`)}
      </div>
      ${isInhabited(w)?`<div class="card"><p class="small dim">${settleDef(w.settle).desc}.</p></div>`:""}
      <div class="card">
        <p class="small">Name this world:</p>
        ${nameField("arrWorld","Name this world","world",w.name)}
        <div class="row between" style="margin-top:10px">
          <button class="ghost" id="arrCancel">&larr; Leave orbit</button>
          <button class="primary" id="arrStep1">${a.occupied?"Name &amp; land &rarr;":"Name &amp; log &rarr;"}</button>
        </div>
      </div>`;
    if(a.step===2) return `
      <div class="card">
        <h2>${w.name}</h2>
        <p class="small dim">You set down at ${a.outpost}. A figure approaches — you are introduced.</p>
        <p class="small">Name this person:</p>
        ${nameField("arrPerson","Name this person","person",a.person?a.person.name:"")}
        <div class="row between" style="margin-top:10px">
          <button class="ghost" id="arrBack2">&larr; Back</button>
          <button class="primary" id="arrStep2">Meet them &rarr;</button>
        </div>
      </div>`;
    // step 3 — their stat sheet + race identity
    const person=a.person, known=!a.draw.isNew, race=a.draw.race;
    return `
      <div class="card">
        <h2>${person.name||"A stranger"}</h2>
        ${known?`<p class="small green">You recognize their kind — <b class="violet">${race.name}</b>, already in your Codex.</p>`
          :`<p class="small gold">Their kind is new to your Codex.</p>`}
        <p class="small dim">Career: ${careerName(person.career)}.</p>
      </div>
      ${originCard(person)}
      ${speciesSheet(person)}
      <div class="card">
        ${known?`<p class="small dim">They are ${article(race.name)} <b class="violet">${race.name}</b>.</p>`
          :`<p class="small">Name this new race:</p>${nameField("arrRace","Name this race","race",race.name)}`}
        <div class="row between" style="margin-top:10px">
          <button class="ghost" id="arrBack3">&larr; Back</button>
          <button class="primary" id="arrFinish">Record &amp; continue &rarr;</button>
        </div>
      </div>`;
  },

  /* ---------- COMBAT ---------- */
  screen_combat(){
    if(!combat) return this.screen_hub();
    const c=combat, atk=state.skills.filter(s=>DATA.skills[s].type==="attack");
    // a beaten Wanted target: choose to kill or restrain
    if(c.person && c.claim) return `
    ${this.statHeader()}
    <div class="card">
      <h2 class="gold">${c.name} is beaten</h2>
      <p class="small dim">Their bounty is yours to claim — redeem it at any bar.</p>
      <div class="row">
        <button class="primary" data-claim="alive">Restrain &middot; ${commas(c.bounty.alive)}c</button>
        <button data-claim="dead">Kill &middot; ${commas(c.bounty.dead)}c</button>
      </div>
    </div>
    ${this.logCard()}`;
    return `
    ${this.statHeader()}
    <div class="card">
      <div class="row between"><h2 class="red">${c.name}</h2>
        <span class="small dim">${c.stim?'<span class="gold">stim primed</span>':''}</span></div>
      <p class="small dim">${c.blurb}</p>
      <div class="statline"><span>HP</span><span>${Math.max(0,c.hp)} / ${c.maxHp}</span></div>
      <div class="bar"><i class="hpfill" style="width:${Math.max(0,c.hp/c.maxHp*100)}%"></i></div>
      <span class="pill">atk ${c.atk}</span>
    </div>
    <div class="card">
      <h3>Your move</h3>
      <div class="grid">
        ${atk.map(s=>`<button data-atk="${s}">${s}<br><span class="small dim">${DATA.skills[s].energy||0} en</span></button>`).join("")}
        ${state.skills.includes("Mend")?`<button data-atk="Mend">Mend<br><span class="small dim">6 en</span></button>`:""}
        <button data-atk="Focus" class="ghost">Focus<br><span class="small dim">+energy</span></button>
        ${(c.person||c.foe)?"":`<button id="actTame">Tame</button>`}
        <button id="actFlee" class="ghost">Flee</button>
        <button id="actBag">Use item</button>
      </div>
    </div>
    ${this.logCard()}`;
  },

  /* ---------- SELF ---------- */
  screen_char(){
    const sp=state.species, t=RARITY.byId(sp.tier);
    return `
    ${this.statHeader()}
    ${genomeBanner(sp.genome)}
    <div class="card sheet">
      <h3>Identity</h3>
      ${krow("Name", state.name)}
      ${krow("Race", `${sp.name} <span class="dim">(${sp.archeName})</span>`)}
      ${krow("Race rarity", `<span style="color:${t.color}">${t.name}</span> &middot; ${RARITY.odds(t)} &middot; ${humanizeCount(sp.population)} alive`)}
      ${krow("Life stage", `${cap(Game.stage())} <span class="${Game.maturation()<1?'blue':'green'}">${Math.round(Game.maturation()*100)}% grown</span>`)}
      ${krow("Age", `${Math.floor(Game.age())} yr${Game.age()>=Game.twilight()?' <span class="red">(twilight)</span>':''}`)}
    </div>
    ${speciesSheet(sp)}
    <div class="card sheet">
      <h3>Trained combat stats <span class="dim small">&middot; genetics × growth × gear</span></h3>
      ${["might","agility","force","tech","charm"].map(k=>krow(cap(k), Game.effStat(k))).join("")}
    </div>
    <div class="card sheet">
      <h3>Skills</h3>
      ${state.skills.map(s=>krow(s, `<span class="dim">${DATA.skills[s].blurb}</span>`)).join("")}
    </div>
    <div class="card sheet">
      <h3>Equipment <span class="dim small">&middot; ${Game.effDef()} armor</span></h3>
      ${[["weapon","Weapon"],["head","Head"],["chest","Chest"],["legs","Legs"],["feet","Feet"],["back","Back"]].map(([slot,label])=>{ const id=state.equipped[slot];
        return krow(label, id?DATA.items[id].name:'<span class="dim">— empty —</span>'); }).join("")}
    </div>`;
  },

  /* ---------- BAG ---------- */
  screen_bag(){
    const ids=Object.keys(state.inv), inC=combat&&!combat.over;
    return `
    ${this.statHeader()}
    <div class="card">
      <h2>&#9776; Inventory</h2>
      <p class="small dim">Credits: <b class="gold">${state.credits}</b></p>
      ${ids.length===0?`<p class="dim">Your pack is empty.</p>`:""}
      ${ids.map(id=>{ const it=DATA.items[id], n=state.inv[id], eq=Object.values(state.equipped).includes(id);
        let btn=""; if(it.kind==="consumable") btn=`<button data-use="${id}">Use</button>`;
        else if(it.slot) btn=`<button data-equip="${id}">${eq?"Unequip":"Equip"}</button>`;
        return `<div class="card" style="margin:8px 0;padding:10px">
          <div class="row between"><b>${it.name} ${n>1?`<span class="dim">x${n}</span>`:""}</b><span class="tag">${it.kind}</span></div>
          <p class="small dim" style="margin:4px 0">${it.blurb}</p>
          <div class="row">${btn}<button class="ghost small" data-sell="${id}">Sell &middot; ${Game.sellPrice(id)}c</button></div>
        </div>`; }).join("")}
    </div>
    ${inC?`<div class="card"><button id="backCombat" class="primary full center">&larr; Back to fight</button></div>`:""}`;
  },

  /* ---------- GARAGE (vehicles + the power metrics) ---------- */
  /* ---------- CREW (manage crewmates + fleet seats) ---------- */
  screen_crew(){
    const ships=state.vehicles||[];
    if(seatPick){                                   // choosing who fills a seat
      const v=ships.find(x=>x.id===seatPick.shipId), idle=idleHires();
      return `${this.statHeader()}
      <div class="card"><h2>Assign &middot; ${v?v.name:"ship"} Seat ${seatPick.seat+1}</h2>
        <p class="small dim">Idle crewmates travel with you, so any of them can take this seat.</p>
        ${idle.length?idle.map(c=>`<button class="full" data-putcrew="${state.crew.indexOf(c)}">${c.name} <span class="dim small">&middot; ${careerName(c.career)}</span></button>`).join("")
          :`<p class="small dim">No idle crewmates. Hire Pilots from people you've met.</p>`}
        <div class="divider"></div><button class="ghost full center" id="seatCancel">Cancel</button>
      </div>`;
    }
    const tab=crewTab||"crewmates", wages=annualWages(), maint=annualMaint();
    return `${this.statHeader()}
    <div class="card"><h2>&#128101; Crew</h2>
      <p class="small dim">Annual upkeep: <b class="gold">${commas(wages+maint)}c/yr</b> — wages ${commas(wages)}c, ship maintenance ${commas(maint)}c. Billed each year; can't pay and crew walk off.</p>
      <div class="row"><button class="${tab==="crewmates"?"sel":""}" data-crewtab="crewmates">Crewmates</button>
        <button class="${tab==="ships"?"sel":""}" data-crewtab="ships">Ships</button>
        <button class="${tab==="fleets"?"sel":""}" data-crewtab="fleets">Fleets</button></div></div>
    ${tab==="crewmates"?this.crewmatesView():tab==="fleets"?this.fleetsView():this.shipsView()}`;
  },
  crewmatesView(){
    const crew=state.crew||[];
    return `<div class="card sheet"><h3>Your crewmates <span class="dim small">&middot; ${crew.length}</span></h3>
      ${crew.length?crew.map((c,ci)=>{ const sh=c.shipId?(state.vehicles||[]).find(v=>v.id===c.shipId):null;
        return `<div style="padding:6px 0;border-bottom:1px solid var(--line)">
          <div class="row between"><span>${c.name} <span class="dim small">&middot; ${careerName(c.career)} &middot; ${commas(careerSalary(c.career))}c/yr</span></span>
            <span class="small ${sh?'green':'dim'}">${sh?`aboard ${sh.name} (seat ${(c.seat||0)+1})`:"idle"}</span></div>
          <div class="row" style="margin-top:4px">
            <button class="small ghost" disabled>Assign a job (soon)</button>
            ${sh?`<button class="small ghost" data-unseat="${ci}">Unassign</button>`:""}
            <button class="small ghost" data-dismiss="${ci}">Dismiss</button>
          </div></div>`; }).join("")
        :`<p class="small dim">No crewmates yet. Meet a Pilot out in the galaxy and hire them from their Codex page.</p>`}
    </div>`;
  },
  shipsView(){
    const ships=state.vehicles||[];
    if(viewingShip){
      const v=ships.find(x=>x.id===viewingShip); if(!v){ viewingShip=null; return this.shipsView(); }
      const active=v.id===state.activeShip, here=atHere(v), cmax=v.crewMax||1;
      let seats="";
      for(let n=0;n<cmax;n++){
        if(active && n===0){ seats+=`<div class="krow"><span class="lbl">Seat ${n+1}</span><span class="kv green">You (pilot)</span></div>`; continue; }
        const occ=seatOccupant(v.id,n);
        seats+= occ
          ? `<div class="krow"><span class="lbl">Seat ${n+1}</span><span class="kv">${occ.name} <span class="dim small">${careerName(occ.career)}</span> <button class="small ghost" data-unseat="${state.crew.indexOf(occ)}">Remove</button></span></div>`
          : `<div class="krow"><span class="lbl">Seat ${n+1}</span><span class="kv">${here?`<button class="small" data-seat="${v.id}:${n}">Assign</button>`:'<span class="dim">empty</span>'}</span></div>`;
      }
      const fleet=fleetOf(v), grounded=state.grounded && active && spaceworthy(v);
      const canMove=!grounded && (v.range!=="surface") && Game.operational(v);
      return `<div class="card">
        <div class="row between"><h2 class="gold">${active?'&#9654; ':''}${v.name}</h2>
          <span class="tag" style="color:${RARITY.byId(v.tier).color}">${RARITY.byId(v.tier).name}</span></div>
        <p class="small dim">${v.clsName} &middot; ${RANGE_LABEL[v.range]} &middot; docked at <b class="blue">${shipLocationName(v)}</b>${here?' <span class="green small">(here)</span>':''}</p>
        ${krow("Fleet", fleet?`<b class="blue">${fleet.name}</b>`:'<span class="dim">Independent</span>')}
        ${krow("Crew needed", `${v.reqPilots||1} pilot${(v.reqPilots||1)>1?"s":""}${v.reqMech?`, ${v.reqMech} mechanic${v.reqMech>1?"s":""}`:""}${v.reqGun?` <span class="dim">(+${v.reqGun} gunners, coming soon)</span>`:""}`)}
        ${krow("Aboard", `${Game.pilots(v)} pilot${Game.pilots(v)!==1?"s":""}${active?' <span class="dim small">(incl. you)</span>':''}, ${Game.aboard(v,"mechanic")} mechanic${Game.aboard(v,"mechanic")!==1?"s":""}`)}
        ${krow("Operational", Game.operational(v)?'<span class="green">Yes — ready to fly</span>':'<span class="red">No — needs more crew</span>')}
        ${krow("Range", v.range==="interstellar"?`<span class="gold">${jumpRange(v).toFixed(1)} ly hyperdrive</span>`:RANGE_LABEL[v.range])}
        ${krow("Maintenance", `${commas(shipMaint(v))}c/yr`)}
        <div class="row" style="margin-top:8px">
          ${grounded?`<button class="primary" data-takeoff="${v.id}">&#9650; Take off &amp; chart your system</button>`:""}
          ${canMove?`<button data-moveship="${v.id}">&#9992; ${fleet?`Move (via ${fleet.name})`:"Move ship"}</button>`:""}
        </div>
        ${!here?`<p class="small dim">You're not docked with this ship — travel to it to assign crew or pilot it.</p>`:""}
      </div>
      <div class="card sheet"><h3>Seats <span class="dim small">&middot; ${cmax}</span></h3>${seats}
        <p class="small dim" style="margin-top:6px">Crew aboard a ship travel with it. A ship needs its full pilot/mechanic crew to fly.</p></div>
      <div class="card"><div class="row">
        ${!active&&here?`<button class="small" data-selship="${v.id}">Pilot this</button>`:""}
        <button class="small ghost" data-renship="${v.id}">Rename</button>
        <button class="ghost" id="shipsBack">&larr; All ships</button>
      </div></div>`;
    }
    return `<div class="card sheet"><h3>Your ships <span class="dim small">&middot; ${ships.length}</span></h3>
      <p class="small dim">Select a ship to manage its crew, fleet, and travel.</p>
      ${ships.map(v=>{ const active=v.id===state.activeShip, here=atHere(v), n=Game.shipCrew(v).length, fleet=fleetOf(v);
        return `<div class="krow"><span class="lbl"><button class="small ghost" data-selshipview="${v.id}">${active?'&#9654; ':''}${v.name}</button>${fleet?` <span class="dim small">&middot; ${fleet.name}</span>`:''}</span>
          <span class="kv">${RANGE_LABEL[v.range]} <span class="dim">&middot; ${shipLocationName(v)}${here?' (here)':''} &middot; crew ${(active?1:0)+n}/${v.crewMax||1}</span></span></div>`; }).join("")}
    </div>`;
  },
  /* ---------- FLEETS (named ship groups you can move together) ---------- */
  fleetsView(){
    const fleets=state.fleets||[];
    if(fleetBuild){            // creating a new fleet — only ships in your current system, not already in a fleet
      const avail=fleetShipsHereWithYou();
      const sel=new Set(fleetBuild.shipIds);
      return `<div class="card"><h2>New fleet</h2>
        <p class="small dim">Add ships docked in <b class="blue">${curSys()?curSys().name:"this"}</b> system. You must be here to form the fleet.</p>
        ${nameField("fleetName","Name this fleet","ship",fleetBuild.name)}
        <div class="sheet" style="margin-top:8px">
        ${avail.length?avail.map(v=>`<div class="krow"><span class="lbl">${sel.has(v.id)?'&#9745; ':'&#9744; '}${v.name} <span class="dim small">&middot; ${RANGE_LABEL[v.range]}</span></span>
          <span class="kv"><button class="small ${sel.has(v.id)?'':'ghost'}" data-fbtoggle="${v.id}">${sel.has(v.id)?"Remove":"Add"}</button></span></div>`).join("")
          :`<p class="small dim">No free ships in this system. Buy or fly ships here first.</p>`}
        </div>
        <div class="row between" style="margin-top:10px">
          <button class="ghost" id="fbCancel">Cancel</button>
          <button class="primary" id="fbCreate" ${fleetBuild.shipIds.length?"":"disabled"}>Create fleet (${fleetBuild.shipIds.length})</button>
        </div></div>`;
    }
    if(viewingFleet){
      const f=fleetById(viewingFleet); if(!f){ viewingFleet=null; return this.fleetsView(); }
      const caps=groupCaps(f.shipIds), fsys=state.galaxy.systems[fleetSys(f)];
      const withYou=fleetSys(f)===state.sysId;
      const addable=(state.vehicles||[]).filter(v=>!v.fleetId && (v.sysId??0)===fleetSys(f));
      return `<div class="card">
        <div class="row between"><h2 class="gold">${f.name}</h2><span class="tag">${f.shipIds.length} ship${f.shipIds.length>1?"s":""}</span></div>
        <p class="small dim">In <b class="blue">${fsys?fsys.name:"?"}</b> system${withYou?' <span class="green small">(with you)</span>':''} &middot; ${RANGE_LABEL[caps.tier]}${caps.tier==="interstellar"?` &middot; reach <b class="gold">${caps.jump.toFixed(1)} ly</b>`:""}</p>
        <div class="row" style="margin-top:8px">
          <button data-fleetmove="${f.id}">&#9992; Move fleet</button>
          <button class="ghost small" data-fleetrename="${f.id}">Rename</button>
          <button class="ghost small ${withYou?'':'dim'}" data-fleetdisband="${f.id}">Disband</button>
        </div>
        ${withYou?"":'<p class="small dim" style="margin-top:6px">You can add/remove ships from anywhere, but must be with the fleet to disband it.</p>'}
      </div>
      <div class="card sheet"><h3>Ships in fleet</h3>
        ${shipsByIds(f.shipIds).map(v=>`<div class="krow"><span class="lbl">${v.id===state.activeShip?'&#9654; ':''}${v.name} <span class="dim small">&middot; ${RANGE_LABEL[v.range]}${!Game.operational(v)?' <span class="red">no crew</span>':''}</span></span>
          <span class="kv"><button class="small ghost" data-fleetremove="${f.id}:${v.id}">Remove</button></span></div>`).join("")}
      </div>
      <div class="card sheet"><h3>Add a ship <span class="dim small">&middot; must be in ${fsys?fsys.name:"the fleet's"} system</span></h3>
        ${addable.length?addable.map(v=>`<div class="krow"><span class="lbl">${v.name} <span class="dim small">&middot; ${RANGE_LABEL[v.range]}</span></span>
          <span class="kv"><button class="small" data-fleetadd="${f.id}:${v.id}">Add</button></span></div>`).join("")
          :`<p class="small dim">No free ships in that system.</p>`}
      </div>
      <div class="card"><button class="ghost full center" id="fleetBack">&larr; All fleets</button></div>`;
    }
    return `<div class="card sheet"><h3>Your fleets <span class="dim small">&middot; ${fleets.length}</span></h3>
      <p class="small dim">Group ships to move them together. A fleet jumps between systems only if every ship is interstellar-class, and is limited by its weakest ship's range.</p>
      ${fleets.length?fleets.map(f=>{ const caps=groupCaps(f.shipIds), fs=state.galaxy.systems[fleetSys(f)];
        return `<div class="krow"><span class="lbl"><button class="small ghost" data-fleetview="${f.id}">${f.name}</button> <span class="dim small">&middot; ${f.shipIds.length} ship${f.shipIds.length>1?"s":""}</span></span>
          <span class="kv">${RANGE_LABEL[caps.tier]} <span class="dim">&middot; ${fs?fs.name:"?"}</span></span></div>`; }).join("")
        :`<p class="small dim">No fleets yet.</p>`}
    </div>
    <div class="card"><button class="primary full center" id="fleetNew" ${state.galaxy?"":"disabled"}>+ Create a fleet</button>
      ${state.galaxy?"":'<p class="small dim" style="margin-top:6px">Take off first (Ships tab) to chart your system.</p>'}</div>`;
  },

  /* ---------- MENAGERIE ---------- */
  screen_menagerie(){
    return `
    ${this.statHeader()}
    <div class="card">
      <h2>&#9758; Menagerie</h2>
      <p class="small dim">Defeat weakened creatures and choose <b>Tame</b> to add them here.</p>
      ${state.pets.length===0?`<p class="dim">No companions yet.</p>`:""}
      ${state.pets.map((p,i)=>`
        <div class="card" style="margin:8px 0;padding:10px">
          <div class="row between"><b class="violet">${p.nick||p.name}</b><span class="tag">lv ${p.level}</span></div>
          <p class="small dim" style="margin:4px 0">${DATA.creatures[p.cid].blurb}</p>
          <span class="pill">HP ${p.hp}</span><span class="pill">ATK ${p.atk}</span>
          <div class="row" style="margin-top:6px">
            <button class="small" data-nick="${i}">Rename</button>
            <button class="small ghost" data-release="${i}">Release</button>
          </div>
        </div>`).join("")}
    </div>`;
  },

  /* ---------- MARKET ---------- */
  screen_market(){
    const w=state.world, order={weapon:0,armor:1,accessory:2,consumable:3};
    const stock=Game.marketStock().slice().sort((a,b)=>{ const A=DATA.items[a],B=DATA.items[b];
      return (order[A.kind]-order[B.kind])||(A.value-B.value); });
    const SECTION={weapon:"Weapons",armor:"Armor",accessory:"Gear",consumable:"Supplies"};
    let lastKind=null;
    return `
    ${this.statHeader()}
    <div class="card">
      <h2>&#9879; ${w.name} Outfitter</h2>
      <p class="small dim">${WEALTH_LABELS[w.wealth]}, ${TECH_LABELS[w.tech]}. Weapons, armor and field gear —
        stock turns over each year. Credits: <b class="gold">${state.credits}</b></p>
    </div>
    <div class="card">
      ${stock.length===0?`<p class="dim small">This world is too primitive to sell much of anything.</p>`:""}
      ${stock.map(id=>{ const it=DATA.items[id], p=Game.buyPrice(id), owned=state.inv[id]||0;
        const head = it.kind!==lastKind ? (lastKind=it.kind, `<h3 style="margin:8px 0 2px">${SECTION[it.kind]||"Goods"}</h3>`) : "";
        return `${head}<div class="row between" style="padding:6px 0;border-bottom:1px solid var(--line)">
          <span><b>${it.name}</b>${it.slot?` <span class="tag">${it.slot}</span>`:""}${owned?` <span class="dim small">&middot; owned ${owned}</span>`:""}<br><span class="small dim">${it.blurb}</span></span>
          <button data-buy="${id}" ${state.credits<p?"disabled":""}>${p}c</button></div>`; }).join("")}
    </div>
    ${(()=>{ const sell=Object.keys(state.inv).filter(id=>!Object.values(state.equipped).includes(id));
      if(!sell.length) return "";
      return `<div class="card"><h3>Sell your haul</h3>
        ${sell.map(id=>{ const it=DATA.items[id], n=state.inv[id], p=Game.sellPrice(id);
          return `<div class="row between" style="padding:6px 0;border-bottom:1px solid var(--line)">
            <span><b>${it.name}</b> <span class="dim small">x${n}</span></span>
            <button class="ghost" data-sell="${id}">Sell &middot; ${p}c</button></div>`; }).join("")}
      </div>`; })()}
    <div class="card"><button id="leaveMarket" class="ghost full center">Leave market</button></div>`;
  },

  /* ---------- SAVE ---------- */
  screen_save(){
    const d=new Date(state.updated||Date.now());
    return `
    ${this.statHeader()}
    <div class="card">
      <h2>&#8635; Save &amp; Data</h2>
      <p class="small"><span class="dim">Galaxy:</span> <b class="gold">${state.galaxyName||"—"}</b></p>
      <p class="small dim">Autosaves to this browser after every action. Last saved: ${d.toLocaleString()}.</p>
      <div class="divider"></div>
      <button class="full center" id="btnExport">&#8681; Export save file</button>
      <button class="full center" id="btnImport">&#8679; Import save file</button>
      <input type="file" id="fileInput" accept=".json,application/json" class="hidden">
      <div class="divider"></div>
      <button class="full center ghost small red" id="btnReset">Delete this character</button>
    </div>
    <div class="card small dim">
      <h3>Tip</h3>
      <p>Export makes a small <b>.json</b> backup you can store in cloud or email to yourself,
      then import on any device to continue.</p>
    </div>`;
  },

  /* ---------- shared bits ---------- */
  rarityBannerInline(tier, sub){ const t=RARITY.byId(tier);
    return `<div class="rarity-banner" style="border-color:${t.color}">
      <div class="rn" style="color:${t.color}">${t.name.toUpperCase()}</div>
      <div class="odds">${RARITY.odds(t)} &middot; ${sub||""}</div></div>`; },
  statHeader(){
    const hpMax=Game.effMaxHp(), enMax=Game.effMaxEnergy();
    const age=Math.floor(Game.age()), life=Math.round(Game.lifespan());
    const grown=Math.round(Game.maturation()*100);
    return `
    <div class="card">
      <div class="row between"><b>${state.name}</b>
        <span class="small dim">Lv ${state.level} &middot; <span class="gold">${state.credits}c</span></span></div>
      <div class="row between"><span class="small dim">Age ${age} <span class="dim">of ~${life} yr</span> &middot; <span class="${grown<100?'blue':'green'}">${cap(Game.stage())}${grown<100?` ${grown}% grown`:''}</span></span>
        <span class="small dim">${cap(state.species.build)} ${state.species.archeName}</span></div>
      <div class="statline"><span class="small">HP</span><span class="small">${Math.max(0,state.hp)} / ${hpMax}</span></div>
      <div class="bar"><i class="hpfill" style="width:${Math.max(0,state.hp/hpMax*100)}%"></i></div>
      <div class="statline"><span class="small">Energy</span><span class="small">${state.energy} / ${enMax}</span></div>
      <div class="bar"><i class="enfill" style="width:${state.energy/enMax*100}%"></i></div>
      <div class="statline"><span class="small">XP</span><span class="small">${state.xp} / ${state.xpNext}</span></div>
      <div class="bar"><i class="xpfill" style="width:${state.xp/state.xpNext*100}%"></i></div>
    </div>`;
  },
  logCard(){ const items=state.log.slice(-30).reverse();
    return `<div class="card"><h3>Log</h3><div class="log" id="logBox">${items.map(l=>`<p class="${l.c}">${l.t}</p>`).join("")}</div></div>`; },
  flashLog(){ const el=$("#logBox"); if(el){ el.scrollTop=0; el.parentElement.classList.add("flash");
    setTimeout(()=>el.parentElement.classList.remove("flash"),500);} },

  /* ---------- binding ---------- */
  bind(screen){
    [...$("#nav").children].forEach(b=> b.onclick=()=>{ if(combat&&!combat.over&&b.dataset.screen!=="bag"){toast("Finish the encounter first");return;} UI.render(b.dataset.screen); });
    // 🎲 randomize buttons work on every screen that hosts a nameField
    app.querySelectorAll("[data-rnd]").forEach(b=> b.onclick=()=>{ const inp=$("#"+b.dataset.for); if(inp) inp.value=genName(b.dataset.rnd); });

/* ============================================================ ACTIONS == */
function useItem(id){ const it=DATA.items[id]; if(!it||!state.inv[id]) return;
  if(it.kind!=="consumable"){ toast("Can't use that"); return; } let msg=[];
  // a faster metabolism gets more out of healing
  const metaMult=1+(Game.bio("metabolism")-10)*0.02;
  if(it.heal){ const b=state.hp; state.hp=Math.min(Game.effMaxHp(),state.hp+Math.round(it.heal*metaMult)); msg.push(`+${state.hp-b} HP`); }
  if(it.energy){ const b=state.energy; state.energy=Math.min(Game.effMaxEnergy(),state.energy+it.energy); msg.push(`+${state.energy-b} energy`); }
  if(it.buff==="stim"){ state.stimReady=true; msg.push("stim primed"); }
  Game.removeItem(id,1); Game.logMsg(`Used ${it.name}: ${msg.join(", ")}.`,"good"); Game.save();
  UI.render(combat&&!combat.over?"combat":"bag"); }
function equipItem(id){ const it=DATA.items[id]; const slot=it&&it.slot;
  if(!slot){ toast("Can't equip that"); return; }
  if(state.equipped[slot]===id){ state.equipped[slot]=null; toast("Unequipped"); }
  else { state.equipped[slot]=id; toast(`Equipped ${it.name}`); }
  state.hp=Math.min(state.hp,Game.effMaxHp()); state.energy=Math.min(state.energy,Game.effMaxEnergy());
  Game.save(); UI.render("bag"); }
function sellItem(id){ if(!state.inv[id]) return;
  if(Object.values(state.equipped).includes(id)){ toast("Unequip it first"); return; }
  const p=Game.sellPrice(id); state.credits+=p; Game.removeItem(id,1);
  Game.logMsg(`Sold ${DATA.items[id].name} for ${p}c.`,"sys"); Game.save();
  UI.render(UI.current==="market"?"market":"bag"); }
function buyItem(id){ const p=Game.buyPrice(id); if(state.credits<p){ toast("Not enough credits"); return; }
  state.credits-=p; Game.addItem(id,1); Game.logMsg(`Bought ${DATA.items[id].name} for ${p}c.`,"sys"); Game.save(); UI.render("market"); }

/* ============================================================ OBJECTIVES */
const OBJECTIVES=[
  { id:"first_flight", label:"Take your first flight off-world", reward:150 },
  { id:"discover_world", label:"Discover a new world", reward:100, test:s=>s.codex.worlds.length>=2 },
  { id:"worlds_5", label:"Discover 5 worlds", reward:200, test:s=>s.codex.worlds.length>=5 },
  { id:"meet_race", label:"Meet a race other than your own", reward:100, test:s=>Object.keys(s.codex.races).length>=2 },
  { id:"races_5", label:"Document 5 races", reward:200, test:s=>Object.keys(s.codex.races).length>=5 },
  { id:"giant", label:"Meet a giant people (avg ≥ 8 ft)", reward:250, test:s=>codexRaces(s).some(r=>r.ranges.height.mean>=243.8) },
  { id:"tiny", label:"Meet a tiny people (avg ≤ 3½ ft)", reward:250, test:s=>codexRaces(s).some(r=>r.ranges.height.mean<=106.7) },
  { id:"flier", label:"Meet a people who can fly", reward:300, test:s=>codexRaces(s).some(r=>r.powers.includes("flight")) },
  { id:"rareworld", label:"Find a Legendary-or-rarer world", reward:300, test:s=>s.codex.worlds.some(w=>RARITY.index(w.tier)>=4) },
  { id:"hostile", label:"Set foot on a hostile world (danger ≥ 8)", reward:200, test:s=>s.codex.worlds.some(w=>w.danger>=8) },
];
function codexRaces(s){ return Object.values(s.codex.races); }
const objReward=o=>o&&o.reward!=null?o.reward:100;
/* mark an objective complete (once per galaxy) and pay out its credit bounty */
function awardObjective(id){
  if(!state.achievements) state.achievements={};
  if(state.achievements[id]) return false;
  state.achievements[id]=true;
  const o=OBJECTIVES.find(x=>x.id===id), reward=objReward(o);
  if(reward>0) state.credits+=reward;
  Game.logMsg(`★ Objective complete: ${o?o.label:id}. +${commas(reward)}c`,"good");
  toast(`★ ${o?o.label:id}  +${commas(reward)}c`);
  return true;
}
function checkObjectives(){
  if(!state.achievements) state.achievements={};
  for(const o of OBJECTIVES){
    if(!state.achievements[o.id] && o.test && o.test(state)) awardObjective(o.id);
  }
}

  "a refueling depot","a quiet spaceport","a mining camp gate","a pilgrim's waystation"];
/* build a fresh (all-uncharted) planet list for a system of the given size */
function buildSystemPlanets(size){
  const planets=[];
  for(let i=0;i<size;i++) planets.push({ index:i, discovered:false, isHome:false, occupied:false, world:null });
  return planets;
}
/* Scatter neighbouring systems around a home position (galactic coordinates, ly). Count and
   size scale with how central the home position is. The first few sit within a starter
   interstellar ship's reach so there's always somewhere to jump. ids start at startId. */
function makeNeighborSystems(hx, hy, startId){
  const cf=centralFactor(hx,hy);
  const n=clamp(Math.round((8 + 30*cf)*rndF(0.8,1.2)), 5, 44);  // dense core, sparse rim
  const out=[];
  for(let i=0;i<n;i++){
    const ang=Math.random()*Math.PI*2;
    const r = i<3 ? rndF(4.5,7.5) : rndF(4,55);  // ly from the home star (first few in clipper reach)
    const x=+(hx+Math.cos(ang)*r).toFixed(2), y=+(hy+Math.sin(ang)*r).toFixed(2);
    out.push({ id:startId+i, name:genName("system"), x, y,
      size:rollSystemSize(centralFactor(x,y)), discovered:false, planets:null });
  }
  return out;
}
/* ===================== MOVEMENT =====================
   Ships move as a group. You ride along only if your active ship is in the group; a group
   you aren't aboard can only travel to worlds you've already charted (no remote exploring). */
function shipsByIds(ids){ const set=new Set(ids); return (state.vehicles||[]).filter(v=>set.has(v.id)); }
const RANGE_ORDER={ surface:0, system:1, interstellar:2 };
/* a group's capabilities: weakest range tier + weakest-link jump range (ly), and its system */
function groupCaps(ids){
  const ships=shipsByIds(ids); if(!ships.length) return { tier:"surface", jump:0, sysId:null };
  let tier="interstellar", jump=Infinity;
  ships.forEach(v=>{ if(RANGE_ORDER[v.range]<RANGE_ORDER[tier]) tier=v.range;
    if(v.range==="interstellar") jump=Math.min(jump, jumpRange(v)); });
  if(tier!=="interstellar") jump=0;
  return { tier, jump:jump===Infinity?0:jump, sysId:ships[0].sysId??0 };
}
/* ships in the group that lack the crew to fly — they block any move */
function groupBlockers(ids){ return shipsByIds(ids).filter(v=>!Game.operational(v)); }
/* drop a set of ships (and, if your ship is among them, you) onto a charted world */
function relocateGroup(ids, destSys, destSlot){
  const set=new Set(ids);
  (state.vehicles||[]).forEach(v=>{ if(set.has(v.id)){ v.sysId=destSys; v.slot=destSlot; } });
  const sys=state.galaxy.systems[destSys]; sys.discovered=true;
  if(set.has(state.activeShip)){ state.sysId=destSys; state.atSlot=destSlot; state.system=sys;
    state.world=sys.planets[destSlot].world; state.voidPos=null; }   // arriving at a star ends the drift
}
/* move a group to (destSys,destSlot). Uncharted worlds need you aboard (you do the charting). */
function moveGroupTo(ids, destSys, destSlot, backTo){
  const caps=groupCaps(ids), origin=caps.sysId, crossSys=destSys!==origin;
  const sys=state.galaxy.systems[destSys];
  if(crossSys){
    if(caps.tier!=="interstellar"){ toast("Not every ship can jump between systems"); return; }
    const dist=pointDist(groupXY(ids), {x:sys.x, y:sys.y});   // measured from your system OR your drift point
    if(dist>caps.jump+1e-6){ toast(`Out of range — the fleet reaches ${caps.jump.toFixed(1)} ly`); return; }
  } else if(caps.tier==="surface"){ toast("These ships can't leave the ground"); return; }
  const blockers=groupBlockers(ids);
  if(blockers.length){ toast(`${blockers[0].name} needs more crew to fly`); return; }
  if(!sys.planets) sys.planets=buildSystemPlanets(sys.size);
  const p=sys.planets[destSlot], playerIn=ids.includes(state.activeShip);
  if(destSys===origin && destSlot===groupSlot(ids)){ toast("Already there"); return; }
  if(!p.discovered && !playerIn){ toast("You must be aboard to chart a new world"); return; }
  if(advanceTime()) return;                       // a move is one action
  if(p.discovered){
    relocateGroup(ids, destSys, destSlot);
    Game.logMsg(crossSys?`The fleet jumps to ${p.world.name}, in the ${sys.name} system.`
                        :`The fleet sets down on ${p.world.name}.`,"sys");
    Game.save(); UI.render(playerIn?"hub":(backTo||"crew")); UI.flashLog(); return;
  }
  // uncharted, and you're aboard -> chart it
  const world=Gen.world(), occupied=chance(occChanceFor(sys, world.biome));
  if(occupied) world.settle=pickSettlement(world, destSys);   // capital, trade hub, farmworld, ...
  const draw=occupied?drawRace():null;
  arriving={ sysId:destSys, slot:destSlot, world, occupied, draw, outpost:pick(OUTPOSTS),
    person:null, step:1, crossSys, shipIds:ids.slice() };
  UI.render("arrive");
}
/* a group's current planet slot (its lead ship's) */
function groupSlot(ids){ const s=shipsByIds(ids)[0]; return s?s.slot:state.atSlot; }
function finishArrival(){
  const a=arriving, slot=a.slot, sid=a.sysId;
  a.world.occupied=a.occupied;
  const sys=state.galaxy.systems[sid]; sys.discovered=true;
  if(!sys.planets) sys.planets=buildSystemPlanets(sys.size);
  sys.planets[slot]={ index:slot, discovered:true, isHome:false, world:a.world,
    occupied:a.occupied, raceId:a.draw?a.draw.id:null };
  const ws=worldSummary(a.world); ws.reported=false; ws.sysName=sys.name; state.codex.worlds.push(ws);
  if(a.draw && a.draw.isNew){ state.codex.races[a.draw.id]=a.draw.race; }
  relocateGroup(a.shipIds||[state.activeShip], sid, slot);   // you + your group arrive together
  if(a.occupied){
    recordMeeting(a.person, a.draw.race, a.world.name);   // the local who greets you
    if(settleHasShipyard(a.world)){ state.yarders=state.yarders||{}; state.yarders[sid+":"+slot]=state.codex.people.length-1; }
  }
  Game.logMsg(`You chart ${a.world.name}${a.crossSys?` in the ${sys.name} system`:""}${a.occupied?`, met at the dock by ${a.person.name}`:" — uninhabited"}.`,"sys");
  checkObjectives();
  arriving=null; Game.save(); UI.render("hub"); UI.flashLog();
}

/* ===================== DEEP SPACE (hyperdrive drift) =====================
   When no star is in jump range, you can hyperdrive in a straight line into open space —
   covering one jump's worth of distance toward a heading. Out in the void there's a chance of
   crossing paths with other ships, from a lone freighter to a whole armada (the seed for
   future ship-to-ship combat). */
const VOID_FLEETS=[
  { id:"derelict",  name:"Derelict Hulk",    weight:6,   ships:[1,1],   threat:0, salvage:[40,320], blurb:"a dead, drifting wreck — long abandoned" },
  { id:"cargo",     name:"Cargo Freighter",  weight:15,  ships:[1,1],   threat:0, blurb:"a lone freighter hauling goods between the stars" },
  { id:"transport", name:"Transport Convoy", weight:12,  ships:[2,4],   threat:0, blurb:"a transport convoy ferrying colonists out to the rim" },
  { id:"trader",    name:"Free Trader",      weight:10,  ships:[1,2],   threat:0, blurb:"a free trader flashing a friendly beacon" },
  { id:"patrol",    name:"Patrol Squadron",  weight:7,   ships:[2,4],   threat:1, blurb:"a patrol squadron sweeping the lanes" },
  { id:"mercs",     name:"Mercenary Wing",   weight:5,   ships:[2,5],   threat:1, blurb:"a mercenary wing — for hire, or for hunting" },
  { id:"pirates",   name:"Pirate Raiders",   weight:5,   ships:[2,6],   threat:2, blurb:"pirate raiders sizing up your hull" },
  { id:"warfleet",  name:"War Fleet",        weight:2,   ships:[8,18],  threat:3, blurb:"a war fleet under banners you don't recognize" },
  { id:"armada",    name:"Grand Armada",     weight:0.5, ships:[30,90], threat:4, blurb:"a vast armada — an entire army adrift between worlds" },
];
let voidMeet=null;   // transient deep-space ship encounter
/* drop your group out of a system (or further along) into open space at `np` */
function enterVoid(ids, np){
  const set=new Set(ids);
  (state.vehicles||[]).forEach(v=>{ if(set.has(v.id)){ v.sysId=-1; v.slot=0; } });
  if(set.has(state.activeShip)){ state.sysId=-1; state.atSlot=0; state.system=null; state.world=null; state.voidPos=np; }
}
/* hyperdrive one jump's distance in a cardinal direction (n/e/s/w). If a star is in range
   afterward, you can Jump in to it from the Deep Space view. */
const VOID_DIRS={ n:{d:[0,1], name:"north"}, e:{d:[1,0], name:"east"}, s:{d:[0,-1], name:"south"}, w:{d:[-1,0], name:"west"} };
function voidHop(dir){
  const ids=playerGroupIds(), caps=groupCaps(ids);
  if(caps.tier!=="interstellar"){ toast("You need an interstellar hyperdrive for that"); return; }
  if(groupBlockers(ids).length){ toast("Your ships need more crew to fly"); return; }
  const D=VOID_DIRS[dir]||VOID_DIRS.e, reach=caps.jump, cur=groupXY(ids);
  if(advanceTime()) return;                                 // a hop is one action
  enterVoid(ids, { x:+(cur.x+D.d[0]*reach).toFixed(2), y:+(cur.y+D.d[1]*reach).toFixed(2) });
  Game.logMsg(`Your hyperdrive carries you ${reach.toFixed(1)} ly ${D.name} into open space.`,"sys");
  if(voidEncounter()){ Game.save(); UI.flashLog(); return; }   // crossed paths with someone
  Game.save(); UI.render("hub"); UI.flashLog();
}
/* a rough compass bearing from a vector (which way a star lies) */
function compassBearing(dx,dy){ const dirs=["E","NE","N","NW","W","SW","S","SE"];
  let a=Math.atan2(dy,dx); if(a<0) a+=Math.PI*2; return dirs[Math.round(a/(Math.PI/4))%8]; }
/* a chance, on each deep-space hop, to run into other ships */
function voidEncounter(){
  if(!chance(0.5)) return false;
  const f=weightedPick(VOID_FLEETS), n=rnd(f.ships[0], f.ships[1]);
  voidMeet={ id:f.id, name:f.name, ships:n, threat:f.threat, salvage:f.salvage,
    faction:genName("system"), blurb:f.blurb, resolved:false, msg:"" };
  UI.render("voidmeet"); return true;
}
function voidSalvage(){
  const m=voidMeet; if(!m||m.resolved) return;
  const [lo,hi]=m.salvage||[20,120], cr=rnd(lo,hi); state.credits+=cr;
  m.resolved=true; m.msg=`You strip the hulk for ${commas(cr)}c in salvage.`;
  Game.gainXp(8); Game.save(); UI.render("voidmeet");
}
/* which career commands each kind of void fleet */
const VOID_CAREER={ cargo:"merchant", transport:"merchant", trader:"merchant", patrol:"mercenary",
  mercs:"mercenary", pirates:"pirate", warfleet:"warlord", armada:"warlord" };
/* Contact: open a channel and meet whoever commands the ship/fleet — name them, learn their
   race (like meeting a stranger), and see the force they command. */
function voidContact(){
  const m=voidMeet; if(!m) return;
  const draw=drawRace(), person=Gen.person(draw.race);
  const career=VOID_CAREER[m.id]||"merchant", cc=careerById(career);
  person.career=career;
  // their command becomes their "force"; bigger fleets, deeper pockets
  person.force={ ships:m.ships, shipName:"ship", crew:rnd(m.ships*3, Math.max(m.ships*12,6)),
    fleet:m.ships>=4, controls:false };
  person.credits=Math.round(rollWealth(cc)*(1+m.ships*0.15));
  delete person.bounty; delete person.hostile;
  if(cc.hostile){ person.hostile=cc.hostile; person.bounty=rollBounty(cc, draw.race.tier); }
  meeting={ draw, person, intro:`You open a channel to the ${m.name}, flying ${m.faction} colors.`,
    back:"hub", step:1, where:"deep space", fleet:m };
  voidMeet=null; UI.render("meet");
}
function voidEvade(){
  const m=voidMeet; if(!m) return;
  let p=clamp(0.55+Game.effStat("agility")*0.01+Game.gearMod("flee")-m.threat*0.08, 0.1, 0.95);
  if(chance(p)){ m.resolved=true; m.msg=`You slip back into hyperspace before they can close.`; }
  else if(m.threat>=2){ const lost=Math.round(state.credits*0.15); state.credits-=lost;
    state.hp=Math.max(1,state.hp-Math.round(Game.effMaxHp()*0.15));
    m.resolved=true; m.msg=`They rake your hull as you run — ${commas(lost)}c and some blood lost, but you escape.`; }
  else { m.resolved=true; m.msg=`They shadow you a while, then lose interest. You drift on.`; }
  Game.save(); UI.render("voidmeet");
}
function voidLeave(){ voidMeet=null; UI.render("hub"); UI.flashLog(); }

/* ---- meet a person on the planet you're on (tavern patrons, strangers, ...) ---- */

function shipSell(v){ return Math.round((v.value||(spaceworthy(v)?3000:600))*0.5); }
function sellShip(id){
  if(state.vehicles.length<=1){ toast("That's your only craft"); return; }
  if(id===state.activeShip){ toast("Pilot another ship first"); return; }
  const i=state.vehicles.findIndex(v=>v.id===id); if(i<0) return;
  const v=state.vehicles[i], p=shipSell(v);
  state.vehicles.splice(i,1); state.credits+=p;
  Game.logMsg(`You sell the ${v.name} for ${p}c.`,"sys"); Game.save(); UI.render("shipyard");
}

/* ---- Depot: buy/sell commodities across your active fleet docked here ---- */
function buyCommodity(id, all){
  const c=commodityById(id), w=state.world, ships=poolShips();
  if(!ships.length){ toast("No ship docked here"); return; }
  if(!canBuyHere(w,c)){ toast("Not sold here"); return; }
  const space=poolMax()-poolUsed();
  if(space<c.bulk){ toast("Not enough cargo space"); return; }
  const p=commodityBuy(w,c);
  if(state.credits<p){ toast("Not enough credits"); return; }
  let qty = all ? Math.min(Math.floor(space/c.bulk), Math.floor(state.credits/p)) : 1;
  if(qty<1){ toast("Not enough room or credits"); return; }
  state.credits-=qty*p; let rem=qty;
  for(const v of ships){ if(rem<=0) break; const free=Math.floor((v.hold-shipUsed(v))/c.bulk), add=Math.min(free, rem);
    if(add>0){ v.cargo[id]=(v.cargo[id]||0)+add; rem-=add; } }
  if(rem>0){ state.credits+=rem*p; qty-=rem; }    // couldn't pack the last few — refund them
  if(qty>0) Game.logMsg(`Bought ${qty} ${c.name} for ${commas(qty*p)}c (${qty*c.bulk} slot${qty*c.bulk>1?"s":""}).`,"sys");
  Game.save(); UI.render("depot");
}
function sellCommodity(id, all){
  const c=commodityById(id), w=state.world, ships=poolShips();
  const have=ships.reduce((s,v)=>s+(v.cargo[id]||0),0); if(!have) return;
  if(!canSellHere(w,c)){ toast("Not bought here"); return; }
  const p=commoditySell(w,c);
  let qty = all ? have : 1; state.credits+=qty*p; let rem=qty;
  for(const v of ships){ if(rem<=0) break; const take=Math.min(v.cargo[id]||0, rem);
    if(take>0){ v.cargo[id]-=take; if(v.cargo[id]<=0) delete v.cargo[id]; rem-=take; } }
  Game.logMsg(`Sold ${qty} ${c.name} for ${commas(qty*p)}c.`,"sys");
  Game.save(); UI.render("depot");
}
/* select which ship you're piloting — only if it's docked where you are */
function selectShip(id){
  const v=(state.vehicles||[]).find(x=>x.id===id); if(!v) return;
  if(!atHere(v)){ toast("That ship is docked elsewhere"); return; }
  state.activeShip=id; toast(`Now piloting ${v.name}`); Game.save(); UI.render(UI.current);
}
function renameShip(id){
  const v=(state.vehicles||[]).find(x=>x.id===id); if(!v) return;
  const nn=prompt("Rename your ship:", v.name); if(nn){ v.name=nn.slice(0,22); Game.save(); UI.render(UI.current); }
}
function shipLocationName(v){
  if(!v||!state.galaxy) return "home";
  const sys=state.galaxy.systems[v.sysId??0]; if(!sys) return "uncharted space";
  const p=(sys.planets||[])[v.slot];
  const pn = p&&p.discovered ? p.world.name : "uncharted space";
  return (v.sysId??0)===state.sysId ? pn : `${pn} · ${sys.name}`;
}

/* ---- Information Broker: sell your unreported discoveries for credits ---- */
function unreportedInfo(){
  const cx=state.codex;
  const races=Object.values(cx.races||{}).filter(r=>r.id!=="self" && !r.reported);
  const worlds=(cx.worlds||[]).filter(w=>!w.reported);
  const creatures=Object.values(cx.creatures||{}).filter(c=>!c.reported);
  const total=races.reduce((s,r)=>s+raceValue(r.tier),0)
    +worlds.reduce((s,w)=>s+worldValue(w.tier),0)
    +creatures.length*CREATURE_VALUE;
  return { races, worlds, creatures, total };
}
function sellInformation(){
  const u=unreportedInfo();
  if(u.total<=0){ toast("Nothing new to report"); return; }
  u.races.forEach(r=>r.reported=true); u.worlds.forEach(w=>w.reported=true); u.creatures.forEach(c=>c.reported=true);
  state.credits+=u.total;
  const n=u.races.length+u.worlds.length+u.creatures.length;
  Game.logMsg(`You sell information on ${n} new find${n>1?"s":""} for ${u.total}c.`,"good");
  toast("+"+u.total+"c");
  Game.save(); UI.render("broker");
}

/* record an individual you've met (compact snapshot) + bump their race's tally */
let viewingPerson=null, viewingRace=null, viewingWorld=null;
function recordMeeting(person, race, where){
  if(!state.codex.people) state.codex.people=[];
  const p=JSON.parse(JSON.stringify(person));
  ["height","mass","maturity","lifespan"].forEach(k=>{ if(p[k]) delete p[k].g; });
  ATTR_KEYS.forEach(k=>{ if(p.attrs[k]) delete p.attrs[k].g; });
  Object.keys(p.bio).forEach(k=>{ if(p.bio[k]) delete p.bio[k].g; });
  p.where=where; p.sysId=state.sysId; p.slot=state.atSlot; p.day=state.actions; p.raceId=race.id; p.raceName=race.name;
  state.codex.people.push(p);
  race.met=(race.met||0)+1;
}

/* talk to / hire people you've met — only when you're at the planet you met them on */
let convo=null;   // {idx, text} transient greeting shown on the person page
function sayHi(i){

function hireCrew(i){
