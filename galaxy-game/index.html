/* ============================================================ ACTIONS == */
function useItem(id){ const it=DATA.items[id]; if(!it||!state.inv[id]) return;
  if(it.kind!=="consumable"){ toast("Can't use that"); return; } let msg=[];
  // a faster metabolism gets more out of healing
  const metaMult=1+(Game.bio("metabolism")-10)*0.02;
  if(it.heal){ const b=state.hp; state.hp=Math.min(Game.effMaxHp(),state.hp+Math.round(it.heal*metaMult)); msg.push(`+${state.hp-b} HP`); }
  if(it.energy){ const b=state.energy; state.energy=Math.min(Game.effMaxEnergy(),state.energy+it.energy); msg.push(`+${state.energy-b} energy`); }
  if(it.buff==="stim"){ state.stimReady=true; msg.push("stim primed"); }
  Game.removeItem(id,1); Game.logMsg(`Used ${it.name}: ${msg.join(", ")}.`,"good"); Game.save();
  UI.render(combat&&!combat.over?"combat":"bag"); }
function equipItem(id){ const it=DATA.items[id];
  const slot=it.kind==="weapon"?"weapon":it.kind==="armor"?"armor":"relic";
  if(state.equipped[slot]===id){ state.equipped[slot]=null; toast("Unequipped"); }
  else { state.equipped[slot]=id; toast(`Equipped ${it.name}`); }
  state.hp=Math.min(state.hp,Game.effMaxHp()); state.energy=Math.min(state.energy,Game.effMaxEnergy());
  Game.save(); UI.render("bag"); }
function sellItem(id){ if(!state.inv[id]) return;
  if(Object.values(state.equipped).includes(id)){ toast("Unequip it first"); return; }
  const p=Game.sellPrice(id); state.credits+=p; Game.removeItem(id,1);
  Game.logMsg(`Sold ${DATA.items[id].name} for ${p}c.`,"sys"); Game.save(); UI.render("bag"); }
function buyItem(id){ const p=Game.buyPrice(id); if(state.credits<p){ toast("Not enough credits"); return; }
  state.credits-=p; Game.addItem(id,1); Game.logMsg(`Bought ${DATA.items[id].name} for ${p}c.`,"sys"); Game.save(); UI.render("market"); }

/* ============================================================ OBJECTIVES */
const OBJECTIVES=[
  { id:"first_flight", label:"Take your first flight off-world" },
  { id:"discover_world", label:"Discover a new world", test:s=>s.codex.worlds.length>=2 },
  { id:"worlds_5", label:"Discover 5 worlds", test:s=>s.codex.worlds.length>=5 },
  { id:"meet_race", label:"Meet a race other than your own", test:s=>Object.keys(s.codex.races).length>=2 },
  { id:"races_5", label:"Document 5 races", test:s=>Object.keys(s.codex.races).length>=5 },
  { id:"giant", label:"Meet a giant people (avg ≥ 8 ft)", test:s=>codexRaces(s).some(r=>r.ranges.height.mean>=243.8) },
  { id:"tiny", label:"Meet a tiny people (avg ≤ 3½ ft)", test:s=>codexRaces(s).some(r=>r.ranges.height.mean<=106.7) },
  { id:"flier", label:"Meet a people who can fly", test:s=>codexRaces(s).some(r=>r.powers.includes("flight")) },
  { id:"rareworld", label:"Find a Legendary-or-rarer world", test:s=>s.codex.worlds.some(w=>RARITY.index(w.tier)>=4) },
  { id:"hostile", label:"Set foot on a hostile world (danger ≥ 8)", test:s=>s.codex.worlds.some(w=>w.danger>=8) },
];
function codexRaces(s){ return Object.values(s.codex.races); }
function checkObjectives(){
  if(!state.achievements) state.achievements={};
  for(const o of OBJECTIVES){
    if(!state.achievements[o.id] && o.test && o.test(state)){
      state.achievements[o.id]=true;
      Game.logMsg(`Objective complete: ${o.label}.`,"good");
      toast("★ "+o.label);
    }
  }
}

  tech:w.tech, wealth:w.wealth, danger:w.danger, pop:w.pop, popName:w.popName }; }

/* ---- travel to a world in your system; generate it on arrival; maybe meet someone ---- */
let arriving=null;
const OUTPOSTS=["a dusty trading post","a crowded ship dock","a frontier landing pad","a market caravanserai",
  "a refueling depot","a quiet spaceport","a mining camp gate","a pilgrim's waystation"];
function travelTo(slot){
  if(!Game.canLeave()){ toast("You need a system-capable ship"); return; }
  if(slot===state.atSlot){ toast("You're already here"); return; }
  const p=state.system.planets[slot];
  if(advanceTime(rnd(10,30))) return;            // the crossing takes weeks
  if(p.discovered){                              // already charted — just fly there
    const old=state.atSlot; Game.ship().slot=slot; moveFollowers(old,slot);
    state.world=p.world; state.atSlot=slot;
    Game.logMsg(`You set course for ${p.world.name} and touch down.`,"sys");
    Game.save(); UI.render("hub"); UI.flashLog(); return;
  }
  const world=Gen.world();
  const occupied=chance(0.7);                     // is anyone there?
  const draw=occupied?drawRace():null;
  arriving={ slot, world, occupied, draw, outpost:pick(OUTPOSTS), person:null, step:1 };
  UI.render("arrive");
}
function finishArrival(){
  const a=arriving, slot=a.slot;
  a.world.occupied=a.occupied;
  state.system.planets[slot]={ index:slot, discovered:true, isHome:false, world:a.world,
    occupied:a.occupied, raceId:a.draw?a.draw.id:null };
  const ws=worldSummary(a.world); ws.reported=false; state.codex.worlds.push(ws);
  if(a.draw && a.draw.isNew){ state.codex.races[a.draw.id]=a.draw.race; }
  const old=state.atSlot; Game.ship().slot=slot; moveFollowers(old,slot);   // you + crewed ships arrive
  state.world=a.world; state.atSlot=slot;            // relocate BEFORE recording the meeting
  if(a.occupied){
    recordMeeting(a.person, a.draw.race, a.world.name);   // greeter = the local dockmaster
    state.yarders=state.yarders||{}; state.yarders[slot]=state.codex.people.length-1;
  }
  Game.logMsg(`You chart ${a.world.name}${a.occupied?`, met at the dock by ${a.person.name}`:" — uninhabited"}.`,"sys");

/* ---- Depot: buy/sell commodities at this world's fixed prices ---- */
function buyCommodity(id, all){
  const c=COMMODITIES.find(x=>x.id===id), w=state.world, ship=Game.ship();
  if(!ship){ toast("No ship to load"); return; }
  if(!canBuyHere(w,c)){ toast("Not sold here"); return; }
  const space=cargoMax()-cargoUsed();
  if(space<=0){ toast("Cargo hold full"); return; }
  const p=commodityPrice(w,c);
  if(state.credits<p){ toast("Not enough credits"); return; }
  const qty = all ? Math.min(space, Math.floor(state.credits/p)) : 1;
  state.credits-=qty*p; ship.cargo[id]=(ship.cargo[id]||0)+qty;
  if(qty>1) Game.logMsg(`Bought ${qty} ${c.name} for ${commas(qty*p)}c.`,"sys");
  Game.save(); UI.render("depot");
}
function sellCommodity(id, all){
  const c=COMMODITIES.find(x=>x.id===id), w=state.world, ship=Game.ship(), have=ship?(ship.cargo[id]||0):0;
  if(!have) return;
  if(!canSellHere(w,c)){ toast("Not bought here"); return; }
  const p=Math.round(commodityPrice(w,c)*0.9);   // depot takes a small cut
  const qty = all ? have : 1;
  state.credits+=qty*p; ship.cargo[id]-=qty; if(ship.cargo[id]<=0) delete ship.cargo[id];
  if(qty>1) Game.logMsg(`Sold ${qty} ${c.name} for ${commas(qty*p)}c.`,"sys");
  Game.save(); UI.render("depot");
}
/* select which ship you're piloting — only if it's docked where you are */

  if(v.slot!==state.atSlot){ toast("That ship is docked elsewhere"); return; }

/* ---- Information Broker: sell your unreported discoveries for credits ---- */
function unreportedInfo(){
  const cx=state.codex;
  const races=Object.values(cx.races||{}).filter(r=>r.id!=="self" && !r.reported);
  const worlds=(cx.worlds||[]).filter(w=>!w.reported);
  const creatures=Object.values(cx.creatures||{}).filter(c=>!c.reported);
  const total=races.reduce((s,r)=>s+raceValue(r.tier),0)
    +worlds.reduce((s,w)=>s+worldValue(w.tier),0)
    +creatures.length*CREATURE_VALUE;
  return { races, worlds, creatures, total };
}
function sellInformation(){
  const u=unreportedInfo();
  if(u.total<=0){ toast("Nothing new to report"); return; }
  u.races.forEach(r=>r.reported=true); u.worlds.forEach(w=>w.reported=true); u.creatures.forEach(c=>c.reported=true);
  state.credits+=u.total;
  const n=u.races.length+u.worlds.length+u.creatures.length;
  Game.logMsg(`You sell information on ${n} new find${n>1?"s":""} for ${u.total}c.`,"good");
  toast("+"+u.total+"c");
  Game.save(); UI.render("broker");
}

/* record an individual you've met (compact snapshot) + bump their race's tally */
let viewingPerson=null, viewingRace=null;
function recordMeeting(person, race, where){
  if(!state.codex.people) state.codex.people=[];
  const p=JSON.parse(JSON.stringify(person));
  ["height","mass","maturity","lifespan"].forEach(k=>{ if(p[k]) delete p[k].g; });
  ATTR_KEYS.forEach(k=>{ if(p.attrs[k]) delete p.attrs[k].g; });
  Object.keys(p.bio).forEach(k=>{ if(p.bio[k]) delete p.bio[k].g; });
  p.where=where; p.slot=state.atSlot; p.day=state.daysElapsed; p.raceId=race.id; p.raceName=race.name;
  state.codex.people.push(p);
  race.met=(race.met||0)+1;
}

/* talk to / hire people you've met — only when you're at the planet you met them on */
let convo=null;   // {idx, text} transient greeting shown on the person page

function hirePilot(i){

  if(p.career!=="pilot"){ toast("Only Pilots can be hired (for now)"); return; }

  const ship=(state.vehicles||[]).find(v=>v.slot===state.atSlot && v.id!==state.activeShip && spaceworthy(v) && !Game.pilotOf(v));
  if(ship) member.shipId=ship.id;
  state.crew.push(member); p.hired=true;
  Game.logMsg(`You hire ${p.name} as a pilot${ship?`, assigned to the ${ship.name}`:" — assign them a ship from your Fleet"}.`,"good");
  toast("Hired "+p.name);

function startDuel(i){

/* the dockmaster who runs this planet's shipyard — a Shipwright, met once per planet */

function redeemBounties(){

/* ---------- small text helpers ---------- */
function article(w){ return /^[aeiou]/i.test(w)?"an":"a"; }
function ordinal(n){ const s=["th","st","nd","rd"], v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); }
function powerLine(v){ return v.axes.map(a=>`${UNITS.power[a].abbr} ${commas(v.power[a])}`).join(" / ")+" "+UNITS.power.unit; }

/* ---------- procedural names (for the 🎲 Randomize buttons) ---------- */
const NAMEBANK={
  on:["ka","ve","sho","tri","lo","ma","ze","qu","ar","en","ix","tha","rho","sy","vor","el","nu","dra","phi","os","yl","ten","cas","mir","sol","vex","bro","gan","hel","ja","kor","lum","ny","or","pra","ski"],
  mid:["ra","li","no","sa","te","mi","va","ce","do","ny","za","ko","lu","be","ri","fa","mo","de","su","ta"],
  end:["n","s","r","x","l","th","k","ne","ra","os","is","um","ar","en","ix","on","al","yr","ius","ah","eth"],
};
function nameWord(min,max){ const r=a=>a[Math.floor(Math.random()*a.length)];
  const n=rnd(min,max); let w=r(NAMEBANK.on);
  for(let i=1;i<n;i++) w += (i<n-1 ? r(NAMEBANK.mid) : r(NAMEBANK.end));
  return cap(w);
}
function genName(kind){
  if(kind==="person") return nameWord(2,3)+" "+nameWord(2,3);
  if(kind==="galaxy") return nameWord(2,3)+(chance(0.5)?" "+pick(["Expanse","Reach","Cluster","Spiral","Drift","Veil","Sprawl","Verge","Deep"]):"");
  return nameWord(2,3); // world, race, ship
}
/* a text input paired with a Randomize button */
function nameField(id, placeholder, kind, val){
  return `<div class="row" style="gap:6px">
    <input type="text" id="${id}" maxlength="22" placeholder="${placeholder}" value="${val||""}" style="flex:1">
    <button class="rnd" data-rnd="${kind}" data-for="${id}" title="Randomize">&#127922;</button>
  </div>`;
}

/* ---- compact STAT SHEET rows (easy to scan & compare across people) ---- */
// one numeric trait: label | value (species range) | percentile
function trow(label, t, fmt){
  return `<div class="srow"><span class="lbl">${label}</span>`+
    `<span class="v">${fmt(t.value)} <span class="rg">${fmt(t.min)}&ndash;${fmt(t.max)}</span></span>`+
    `<span class="pc" style="color:${pctColor(t.pct)}">${t.pct}</span></div>`;
}
// one label : value line (categorical traits)
function krow(label, val){
  return `<div class="krow"><span class="lbl">${label}</span><span class="kv">${val}</span></div>`;
}

/* The whole species as a compact stat sheet — shared by the reveal and Self screen
   so any two people read the same way and line up for comparison. */
/* The ORIGIN card — body-plan, race rarity, population, genome. Works for the player,
   anyone you meet, and Codex entries (any species/person-shaped object). */

  return `<div class="card sheet">
    <h3>Origin</h3>
    ${krow("Body-plan", o.archeName)}

}

/* Overall genome quality banner (your genetic luck WITHIN your species). */
function genomeBanner(g){
  const c=pctColor(g.avgPct);
  const standing = g.avgPct>=50 ? `top ${100-g.avgPct}% of your own kind`
                                : `bottom ${g.avgPct}% of your own kind`;
  return `<div class="rarity-banner reveal" style="border-color:${c}">
    <div class="rn" style="color:${c}">${g.grade.toUpperCase()}</div>
    <div class="odds">genetics: ${ordinal(g.avgPct)} percentile overall &middot; ${standing}</div>
  </div>`;
}
function worldDesc(w){
  const wl=WEALTH_LABELS[w.wealth].toLowerCase(), tl=TECH_LABELS[w.tech].toLowerCase();
  return `${cap(article(wl))} ${wl}, ${tl} world, ${w.popName}. The ${w.biomeName} is rated ${DANGER_LABELS[w.danger].toLowerCase()}.`;
}

/* ============================================================ BOOT ===== */
UI.render("title");
</script>
