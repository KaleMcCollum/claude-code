/* ===================== FLEETS =====================
   A fleet is a named group of ships that travel together. Membership is tracked on the ship
   (v.fleetId) and on the fleet (f.shipIds). All ships in a fleet stay in one system. */
let newVfid=(()=>{ let n=Date.now(); return ()=>"f"+(n++).toString(36); })();
let fleetBuild=null, viewingFleet=null;   // transient: the fleet being created / opened
function fleetById(id){ return (state.fleets||[]).find(f=>f.id===id)||null; }
function fleetOf(v){ return v&&v.fleetId?fleetById(v.fleetId):null; }
/* a fleet's system (its ships'); fleets never straddle systems */
function fleetSys(f){ const s=shipsByIds(f.shipIds)[0]; return s?(s.sysId??0):null; }
function fleetShipsHereWithYou(){ // ships in your current system, free to add to a new fleet
  return (state.vehicles||[]).filter(v=>(v.sysId??0)===state.sysId && !v.fleetId); }
/* create a fleet from ships in your current system (you must be in that system) */
function createFleet(name, shipIds){
  shipIds=(shipIds||[]).filter(id=>{ const v=(state.vehicles||[]).find(x=>x.id===id);
    return v && (v.sysId??0)===state.sysId && !v.fleetId; });
  if(!shipIds.length){ toast("Add at least one ship in this system"); return; }
  const f={ id:newVfid(), name:(name||"Fleet").slice(0,24), shipIds };
  state.fleets=state.fleets||[]; state.fleets.push(f);
  shipIds.forEach(id=>{ const v=state.vehicles.find(x=>x.id===id); if(v) v.fleetId=f.id; });
  fleetBuild=null; viewingFleet=f.id;
  Game.logMsg(`Fleet "${f.name}" formed with ${shipIds.length} ship${shipIds.length>1?"s":""}.`,"good");
  Game.save(); UI.render("crew");
}
/* add a ship to an existing fleet — the ship must be in the fleet's system (you needn't be) */
function addToFleet(fid, shipId){
  const f=fleetById(fid), v=(state.vehicles||[]).find(x=>x.id===shipId); if(!f||!v) return;
  if(v.fleetId){ toast("Ship is already in a fleet"); return; }
  if((v.sysId??0)!==fleetSys(f)){ toast("Ship must be in the fleet's system"); return; }
  f.shipIds.push(shipId); v.fleetId=fid;
  Game.save(); UI.render("crew");
}
/* remove a ship from a fleet (allowed from anywhere) */
function removeFromFleet(fid, shipId){
  const f=fleetById(fid), v=(state.vehicles||[]).find(x=>x.id===shipId); if(!f) return;
  f.shipIds=f.shipIds.filter(id=>id!==shipId); if(v) v.fleetId=null;
  if(!f.shipIds.length){ disbandFleet(fid, true); return; }
  Game.save(); UI.render("crew");
}
/* disband a fleet — you must be with it (in its system), unless it's already empty */
function disbandFleet(fid, silent){
  const f=fleetById(fid); if(!f) return;
  if(!silent && f.shipIds.length && fleetSys(f)!==state.sysId){ toast("You must be with the fleet to disband it"); return; }
  f.shipIds.forEach(id=>{ const v=(state.vehicles||[]).find(x=>x.id===id); if(v) v.fleetId=null; });
  state.fleets=(state.fleets||[]).filter(x=>x.id!==fid);
  if(viewingFleet===fid) viewingFleet=null;
  if(!silent) Game.logMsg(`Fleet "${f.name}" disbanded.`,"sys");
  Game.save(); UI.render("crew");
}
function renameFleet(fid){ const f=fleetById(fid); if(!f) return;
  const nn=prompt("Rename fleet:", f.name); if(nn){ f.name=nn.slice(0,24); Game.save(); UI.render("crew"); } }

/* ---- bounty hunting: duel a Wanted person, then kill or restrain them ---- */
function startDuel(i){
  const p=(state.codex.people||[])[i];
  if(!p || !isHostile(p) || p.captured) return;
  // tougher targets fight with guards at their back — threat scales their HP and bite
  const tmul={1:1, 2:1.7, 3:2.8, 4:4.5}[p.hostile]||1;
  const maxHp=Math.round((p.attrs.endurance.value*5 + p.height.value*0.06)*tmul);
  combat={ person:true, personIdx:i, name:p.name,
    blurb:`A ${careerName(p.career).toLowerCase()} — ${commas(p.bounty.alive)}c alive.${forceDesc(p.force)?` Backed by ${forceDesc(p.force)}.`:""}`,
    maxHp, hp:maxHp, atk:Math.round((p.attrs.strength.value*0.8 + p.mass.value*0.02)*tmul),
    xp:Math.round(maxHp*0.4), over:false, claim:false, stim:state.stimReady, surprised:false, bounty:p.bounty };
  state.stimReady=false;
  Game.logMsg(`You move to apprehend ${p.name}.`,"hit");
  UI.render("combat");
}
function winDuel(){
  combat.over=true; combat.claim=true;
  Game.logMsg(`You overpower ${combat.name}.`,"good");
  Game.save(); UI.render("combat");
}
function claimBounty(alive){
  const p=(state.codex.people||[])[combat.personIdx], val=alive?combat.bounty.alive:combat.bounty.dead;
  state.bounties=state.bounties||[];
  state.bounties.push({ name:p.name, raceName:p.raceName, value:val, alive });
  p.captured=true; p.captureAlive=alive;
  Game.logMsg(`${alive?"You restrain":"You kill"} ${p.name}. Redeem the ${commas(val)}c bounty at a bar.`,"good");
  combat=null; Game.save(); UI.render("hub"); UI.flashLog();
}
/* the dockmaster who runs this planet's shipyard — a Shipwright, met once per planet */
function talkToYarder(){
  state.yarders = state.yarders||{};
  const key=(state.sysId??0)+":"+state.atSlot, existing=state.yarders[key];
  if(existing!=null && state.codex.people[existing]){ viewingPerson=existing; UI.render("cx_person"); return; }
  const draw=drawRace(), person=Gen.person(draw.race);
  person.career="shipwright"; person.name=genName("person");
  delete person.bounty; delete person.hostile; delete person.force;
  person.credits=shipwrightWorth(state.world.tech);
  if(draw.isNew){ draw.race.name=genName("race"); state.codex.races[draw.id]=draw.race; }
  person.raceName=draw.race.name;
  recordMeeting(person, draw.race, state.world.name);
  state.yarders[key]=state.codex.people.length-1;
  checkObjectives();
  Game.logMsg(`The dockmaster, ${person.name}, runs this yard.`,"sys");
  viewingPerson=state.codex.people.length-1;
  Game.save(); UI.render("cx_person");
}
function buyYarderShip(){
  const o=YARDER_SHIP;
  if(state.credits<o.price){ toast("That costs "+commas(o.price)+"c"); return; }
  state.credits-=o.price;
  const ship={ kind:"vehicle", id:newVid(), name:o.name, tier:"common", cls:"junker", clsName:o.name,
    range:o.range, axes:Object.keys(o.power), power:{...o.power}, hold:o.cargo, crewMax:o.crew,
    bays:o.bays, reqPilots:1, reqMech:0, reqGun:0, value:o.price, cargo:{}, slot:state.atSlot, sysId:state.sysId };
  state.vehicles.push(ship);
  if(spaceworthy(ship) && !Game.canLeave()) state.activeShip=ship.id;
  Game.logMsg(`The dockmaster sells you their old ${o.name} for ${commas(o.price)}c — barely spaceworthy, but it flies.`,"good");
  toast("Bought "+o.name); Game.save(); UI.render("cx_person");
}
function meetAttack(){
  const m=meeting;
  if(m.draw.isNew) state.codex.races[m.draw.id]=m.draw.race;
  m.person.raceName=m.draw.race.name;
  recordMeeting(m.person, m.draw.race, m.where || (state.world?state.world.name:"deep space"));
  checkObjectives();
  const idx=state.codex.people.length-1; meeting=null;
  startDuel(idx);
}
/* charged once per year of play: crew wages + ship maintenance */
function chargeUpkeep(){
  const wages=annualWages(), maint=annualMaint(), bill=wages+maint;
  if(bill<=0) return;
  if(state.credits>=bill){ state.credits-=bill;
    Game.logMsg(`Annual upkeep: -${commas(bill)}c (${commas(wages)}c wages, ${commas(maint)}c maintenance).`,"sys");
    return;
  }
  let shortfall=bill-state.credits; state.credits=0;
  Game.logMsg(`You can't cover ${commas(bill)}c of annual upkeep!`,"bad");
  // unpaid crew quit (highest-paid first) until the saved wages would have covered the gap
  let saved=0;
  while(saved<shortfall && (state.crew||[]).length){
    let bi=0,bs=-1; state.crew.forEach((c,i)=>{ const s=careerSalary(c.career); if(s>bs){bs=s;bi=i;} });
    const c=state.crew[bi];
    if(c.personIdx>=0 && state.codex.people[c.personIdx]) state.codex.people[c.personIdx].hired=false;
    state.crew.splice(bi,1); saved+=bs;
    Game.logMsg(`${c.name} walks off — unpaid wages.`,"bad");
  }
  if(saved<shortfall) Game.logMsg(`Your ships fall behind on maintenance — keep your credits up or risk losing them.`,"bad");
}
function redeemBounties(){
  const list=state.bounties||[]; if(!list.length){ toast("No bounties to redeem"); return; }
  const total=list.reduce((s,b)=>s+b.value,0), n=list.length;
  state.credits+=total; state.bounties=[];
  Game.logMsg(`You redeem ${n} bounty claim${n>1?"s":""} for ${commas(total)}c.`,"good"); toast("+"+commas(total)+"c");
  Game.save(); UI.render("tavern");
}
function buyShip(i){
  const stock=shipStockAt(), o=stock[i]; if(!o) return;
  if(state.credits<o.price){ toast("Not enough credits"); return; }
  state.credits-=o.price;
  const ship={ kind:"vehicle", id:newVid(), name:o.name, tier:o.tier||"common", cls:o.cls, clsName:o.name,
    range:o.range, axes:Object.keys(o.power), power:{...o.power}, hold:o.cargo, crewMax:o.crew,
    bays:o.bays, reqPilots:o.reqPilots, reqMech:o.reqMech, reqGun:o.reqGun, value:o.price, cargo:{}, slot:state.atSlot, sysId:state.sysId };
  state.vehicles.push(ship);
  if(spaceworthy(ship) && !Game.canLeave()) state.activeShip=ship.id;  // auto-pilot if it frees you to leave
  stock.splice(i,1);
  Game.logMsg(`You buy ${article(o.name)} ${o.name} for ${commas(o.price)}c.`,"good");
  toast("Bought "+o.name); Game.save(); UI.render("shipyard");
}
function departFirstFlight(){
  if(advanceTime()) return;
  // your home sits at your galactic birthplace; the core is denser & more settled than the rim
  const sp=state.spawn||{x:0,y:0}, cf=centralFactor(sp.x,sp.y);
  const size=rollSystemSize(cf), planets=[];
  for(let i=0;i<size;i++) planets.push({ index:i, discovered:i===0, isHome:i===0,
    occupied:i===0, world:i===0?state.world:null });
  const home={ id:0, name:genName("system"), x:sp.x, y:sp.y, size, discovered:true, planets };
  // scatter the rest of the galaxy on the flat 2D plane around the home star
  const galaxy={ name:state.galaxyName,
    systems:[home].concat(makeNeighborSystems(sp.x, sp.y, 1)) };
  state.galaxy=galaxy; state.sysId=0; state.system=home; state.atSlot=0;
  state.grounded=false; mapView=null;
  const dist=Math.round(Math.hypot(sp.x,sp.y)), region=cf>0.66?"deep in the crowded core":cf>0.33?"in the galaxy's middle reaches":"out on the sparse rim";
  Game.logMsg(`You break atmosphere for the first time. Your home star, ${home.name}, lies ${region} — ${dist} ly from the core — and holds ${size} world${size>1?"s":""}, with ${galaxy.systems.length-1} other systems glinting nearby.`,"hit");
  awardObjective("first_flight");
  Game.save(); UI.render("codex"); UI.flashLog();
}

function exportSave(){ Game.save();
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob), a=document.createElement("a");
  a.href=url; a.download=`eots-${(state.name||"hero").replace(/\s+/g,"_")}.json`;
  document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1000); toast("Save exported"); }
function importSave(e){ const f=e.target.files[0]; if(!f) return; const r=new FileReader();
  r.onload=()=>{ try{ const o=JSON.parse(r.result); if(!o||!o.name||!o.species) throw 0;
    state=o; Game.save(); toast("Save imported"); UI.render("hub"); }catch(err){ toast("Couldn't read that file"); } };
  r.readAsText(f); }

/* ---------- small text helpers ---------- */
function article(w){ return /^[aeiou]/i.test(w)?"an":"a"; }
function ordinal(n){ const s=["th","st","nd","rd"], v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); }
function powerLine(v){ return v.axes.map(a=>`${UNITS.power[a].abbr} ${commas(v.power[a])}`).join(" / ")+" "+UNITS.power.unit; }

/* ---------- procedural names (for the 🎲 Randomize buttons) ---------- */
const NAMEBANK={
  on:["ka","ve","sho","tri","lo","ma","ze","qu","ar","en","ix","tha","rho","sy","vor","el","nu","dra","phi","os","yl","ten","cas","mir","sol","vex","bro","gan","hel","ja","kor","lum","ny","or","pra","ski"],
  mid:["ra","li","no","sa","te","mi","va","ce","do","ny","za","ko","lu","be","ri","fa","mo","de","su","ta"],
  end:["n","s","r","x","l","th","k","ne","ra","os","is","um","ar","en","ix","on","al","yr","ius","ah","eth"],
};
function nameWord(min,max){ const r=a=>a[Math.floor(Math.random()*a.length)];
  const n=rnd(min,max); let w=r(NAMEBANK.on);
  for(let i=1;i<n;i++) w += (i<n-1 ? r(NAMEBANK.mid) : r(NAMEBANK.end));
  return cap(w);
}
function genName(kind){
  if(kind==="person") return nameWord(2,3)+" "+nameWord(2,3);
  if(kind==="galaxy") return nameWord(2,3)+(chance(0.5)?" "+pick(["Expanse","Reach","Cluster","Spiral","Drift","Veil","Sprawl","Verge","Deep"]):"");
  if(kind==="system") return nameWord(2,3)+(chance(0.35)?" "+pick(["Majoris","Minoris","Prime","Gate","Reach","Hub","Cross","Verge"]):"");
  return nameWord(2,3); // world, race, ship
}
/* a text input paired with a Randomize button */
function nameField(id, placeholder, kind, val){
  return `<div class="row" style="gap:6px">
    <input type="text" id="${id}" maxlength="22" placeholder="${placeholder}" value="${val||""}" style="flex:1">
    <button class="rnd" data-rnd="${kind}" data-for="${id}" title="Randomize">&#127922;</button>
  </div>`;
}

/* ---- compact STAT SHEET rows (easy to scan & compare across people) ---- */
// one numeric trait: label | value (species range) | percentile
function trow(label, t, fmt){
  return `<div class="srow"><span class="lbl">${label}</span>`+
    `<span class="v">${fmt(t.value)} <span class="rg">${fmt(t.min)}&ndash;${fmt(t.max)}</span></span>`+
    `<span class="pc" style="color:${pctColor(t.pct)}">${t.pct}</span></div>`;
}
// one label : value line (categorical traits)
function krow(label, val){
  return `<div class="krow"><span class="lbl">${label}</span><span class="kv">${val}</span></div>`;
}

/* The whole species as a compact stat sheet — shared by the reveal and Self screen
   so any two people read the same way and line up for comparison. */
/* The ORIGIN card — body-plan, race rarity, population, genome. Works for the player,
   anyone you meet, and Codex entries (any species/person-shaped object). */
function originCard(o){
  const t=RARITY.byId(o.tier);
  return `<div class="card sheet">
    <h3>Origin</h3>
    ${krow("Body-plan", o.archeName)}
    ${krow("Race rarity", `<span style="color:${t.color}">${t.name}</span> &middot; ${RARITY.odds(t)}`)}
    ${krow("Population", humanizeCount(o.population))}
    ${krow("Genome", `<span style="color:${pctColor(o.genome.avgPct)}">${o.genome.grade}</span> &middot; ${ordinal(o.genome.avgPct)} pct`)}
  </div>`;
}

/* Render a RACE's stat sheet — species-level ranges (avg + range), no individual. */
function raceSheet(race){
  const R=race.ranges;
  const rr=(label,rng,fmt)=>`<div class="srow"><span class="lbl">${label}</span>`+
    `<span class="v">${fmt(rng.mean)} <span class="rg">${fmt(rng.min)}&ndash;${fmt(rng.max)}</span></span>`+
    `<span class="pc dim" style="font-weight:400">avg</span></div>`;
  const cir=CIRCADIAN.find(c=>c.id===race.detail.circadian);
  const nb=BIOMES.find(b=>b.id===race.detail.nativeBiome);
  return `
  <div class="card sheet">
    <h3>Physical <span class="dim small">&middot; average / range</span></h3>
    ${rr("Height", R.height, cmToFt)}
    ${rr("Mass", R.mass, kgToLb)}
    ${rr("Maturity", R.maturity, x=>Math.round(x)+"yr")}
    ${rr("Lifespan", R.lifespan, x=>Math.round(x)+"yr")}
  </div>
  <div class="card sheet">
    <h3>Attributes <span class="dim small">&middot; 10 = human average</span></h3>
    ${ATTR_KEYS.map(k=>rr(ATTR_LABEL[k], R.attrs[k], x=>Math.round(x))).join("")}
  </div>
  <div class="card sheet">
    <h3>Biology <span class="dim small">&middot; 10 = human average</span></h3>
    ${["metabolism","perception","resilience","recovery","fertility"].map(k=>rr(cap(k), R.bio[k], x=>Math.round(x))).join("")}
  </div>
  <div class="card sheet">
    <h3>Heritage</h3>
    ${krow("Diet", DIETS[race.detail.diet].name)}
    ${krow("Rhythm", cir.name)}
    ${krow("Locomotion", cap(race.detail.locomotion))}
    ${krow("Biochemistry", cap(race.detail.biochem))}
    ${krow("Communication", cap(race.detail.communication))}
    ${krow("Reproduction", race.reproduction)}
    ${krow("Ancestral biome", cap(nb.name))}
    ${krow("Special senses", race.detail.senses.length?race.detail.senses.join(", "):"ordinary")}
  </div>
  <div class="card sheet">
    <h3>Innate powers</h3>
    ${race.powers.length?race.powers.map(p=>krow(POWERS[p].name, `<span class="dim">${POWERS[p].desc}</span>`)).join("")
      :`<p class="small dim">None.</p>`}
  </div>`;
}

function speciesSheet(sp){
  const tmp=TEMPERAMENTS.find(t=>t.id===sp.temperament);
  const cir=CIRCADIAN.find(c=>c.id===sp.detail.circadian);
  const nb=BIOMES.find(b=>b.id===sp.detail.nativeBiome);
  return `
  <div class="card sheet">
    <h3>Physical <span class="dim small">&middot; you / your&nbsp;kind / %ile &middot; human anchor below</span></h3>
    ${trow("Height", sp.height, cmToFt)}
    ${trow("Mass", sp.mass, kgToLb)}
    ${trow("Maturity", sp.maturity, x=>Math.round(x)+"yr")}
    ${trow("Lifespan", sp.lifespan, x=>Math.round(x)+"yr")}
    ${krow("Build", cap(sp.build))}
    <p class="small dim" style="margin-top:4px">human ~ ${cmToFt(HUMAN.height)}, ${kgToLb(HUMAN.mass)}, ${HUMAN.maturity}yr, ${HUMAN.lifespan}yr</p>
  </div>
  <div class="card sheet">
    <h3>Attributes <span class="dim small">&middot; 10 = human average</span></h3>
    ${ATTR_KEYS.map(k=>trow(ATTR_LABEL[k], sp.attrs[k], v=>v)).join("")}
  </div>
  <div class="card sheet">
    <h3>Biology <span class="dim small">&middot; 10 = human average</span></h3>
    ${["metabolism","perception","resilience","recovery","fertility"].map(k=>trow(cap(k), sp.bio[k], v=>v)).join("")}
  </div>
  <div class="card sheet">
    <h3>Heritage &amp; nature</h3>
    ${krow("Temperament", tmp.name)}
    ${krow("Diet", DIETS[sp.detail.diet].name)}
    ${krow("Rhythm", cir.name)}
    ${krow("Locomotion", cap(sp.detail.locomotion))}
    ${krow("Biochemistry", cap(sp.detail.biochem))}
    ${krow("Communication", cap(sp.detail.communication))}
    ${krow("Reproduction", sp.reproduction)}
    ${krow("Ancestral biome", cap(nb.name))}
    ${krow("Special senses", sp.detail.senses.length?sp.detail.senses.join(", "):"ordinary")}
  </div>
  <div class="card sheet">
    <h3>Innate powers</h3>
    ${sp.powers.length?sp.powers.map(p=>krow(POWERS[p].name, `<span class="dim">${POWERS[p].desc}</span>`)).join("")
      :`<p class="small dim">None.</p>`}
  </div>`;
}

/* Overall genome quality banner (your genetic luck WITHIN your species). */
function genomeBanner(g){
  const c=pctColor(g.avgPct);
  const standing = g.avgPct>=50 ? `top ${100-g.avgPct}% of your own kind`
                                : `bottom ${g.avgPct}% of your own kind`;
  return `<div class="rarity-banner reveal" style="border-color:${c}">
    <div class="rn" style="color:${c}">${g.grade.toUpperCase()}</div>
    <div class="odds">genetics: ${ordinal(g.avgPct)} percentile overall &middot; ${standing}</div>
  </div>`;
}
function worldDesc(w){
  const wl=WEALTH_LABELS[w.wealth].toLowerCase(), tl=TECH_LABELS[w.tech].toLowerCase();
  return `${cap(article(wl))} ${wl}, ${tl} world, ${w.popName}. The ${w.biomeName} is rated ${DANGER_LABELS[w.danger].toLowerCase()}.`;
}

/* ============================================================ BOOT ===== */
UI.render("title");
</script>
