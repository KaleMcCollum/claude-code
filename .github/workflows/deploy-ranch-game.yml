name: Deploy site to GitHub Pages

# Publishes static sites to GitHub Pages on every push to main:
#   ranch-game/         -> site root            (https://<user>.github.io/claude-code/)
#   realm-game/         -> /realm-game/         (https://<user>.github.io/claude-code/realm-game/)
#   armoimc/            -> /armoimc/            (https://<user>.github.io/claude-code/armoimc/)
#   lake-weekend/       -> /lake-weekend/       (https://<user>.github.io/claude-code/lake-weekend/)
#   real-estate-funnel/ -> /real-estate-funnel/ (https://<user>.github.io/claude-code/real-estate-funnel/)
#   personal-site/      -> /personal-site/      (https://<user>.github.io/claude-code/personal-site/)
on:
  push:
    branches: ["main"]
    paths:
      - "ranch-game/**"
      - "realm-game/**"
      - "armoimc/**"
      - "lake-weekend/**"
      - "real-estate-funnel/**"
      - "personal-site/**"
      - ".github/workflows/deploy-ranch-game.yml"
      - ".nojekyll"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Assemble site (ranch-game at root, others in subfolders)
        run: |
          mkdir -p _site/realm-game _site/armoimc _site/lake-weekend _site/real-estate-funnel _site/personal-site
          cp -r ranch-game/. _site/
          cp -r realm-game/. _site/realm-game/
          cp -r armoimc/. _site/armoimc/
          cp -r lake-weekend/. _site/lake-weekend/
          cp -r real-estate-funnel/. _site/real-estate-funnel/
          cp -r personal-site/. _site/personal-site/
          touch _site/.nojekyll
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
