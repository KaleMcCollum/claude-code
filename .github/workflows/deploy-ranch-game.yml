name: Deploy ranch-game to GitHub Pages

# Publishes ranch-game/ to GitHub Pages on every push to the dev branch,
# so a single URL (https://<user>.github.io/claude-code/) always shows the latest build.
on:
  push:
    branches: ["claude/ranching-game-prototype-co8ecg"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload ranch-game as the site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ranch-game
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
