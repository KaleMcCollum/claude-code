name: Deploy site to GitHub Pages

# Publishes static sites to GitHub Pages on every push to main:
#   ranch-game/  -> site root   (https://<user>.github.io/claude-code/)
#   armoimc/     -> /armoimc/   (https://<user>.github.io/claude-code/armoimc/)
on:
  push:
    branches: ["main"]
    paths:
      - "ranch-game/**"
      - "armoimc/**"
      - ".github/workflows/deploy-ranch-game.yml"
      - ".nojekyll"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Assemble site (ranch-game at root, armoimc at /armoimc)
        run: |
          mkdir -p _site/armoimc
          cp -r ranch-game/. _site/
          cp -r armoimc/. _site/armoimc/
          touch _site/.nojekyll
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
